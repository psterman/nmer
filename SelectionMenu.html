<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Selection Hub</title>
<style>
:root {
  --bg-0: #0b0f15;
  --bg-1: #121824;
  --card: rgba(22, 28, 40, 0.92);
  --card-2: rgba(28, 35, 50, 0.96);
  --text: #f3f6ff;
  --text-muted: #a4afc3;
  --accent: #ff8c00;
  --accent-2: #ffae4a;
  --border: rgba(255, 140, 0, 0.32);
  --shadow: 0 12px 36px rgba(0, 0, 0, 0.48), 0 0 22px rgba(255, 140, 0, 0.1);
  --ease: 180ms cubic-bezier(0.22, 1, 0.36, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(120% 100% at 0% 0%, rgba(255, 140, 0, 0.14), transparent 42%),
    radial-gradient(100% 100% at 100% 100%, rgba(58, 98, 255, 0.14), transparent 45%),
    linear-gradient(145deg, var(--bg-0), var(--bg-1));
}
body {
  padding: 8px;
}
#shell {
  width: 100%;
  height: 100%;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: linear-gradient(160deg, rgba(17, 23, 35, 0.94), rgba(11, 16, 26, 0.94));
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid rgba(255, 140, 0, 0.2);
  background: linear-gradient(180deg, rgba(255, 140, 0, 0.12), transparent 90%);
}
#title {
  font-size: 12px;
  letter-spacing: 1.2px;
  color: var(--accent-2);
  font-weight: 700;
}
#subtitle {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-muted);
}
#content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
}
#preview-card {
  background: var(--card);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 9px 10px;
}
#preview-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
#preview {
  color: #eaf0ff;
  font-size: 12px;
  line-height: 1.45;
  min-height: 36px;
  max-height: 62px;
  overflow: hidden;
  word-break: break-word;
}
#actions {
  margin-top: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.btn {
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 10px;
  background: var(--card-2);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 8px;
  cursor: pointer;
  transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease), background var(--ease);
}
.btn:hover {
  transform: translateY(-1px);
  border-color: rgba(255, 255, 255, 0.26);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
}
.btn:active {
  transform: scale(0.98);
}
.btn.primary {
  border-color: rgba(255, 140, 0, 0.55);
  background: linear-gradient(140deg, rgba(255, 140, 0, 0.28), rgba(255, 118, 28, 0.2));
  color: #fff7ea;
}
.btn.primary:hover {
  border-color: rgba(255, 174, 74, 0.85);
  box-shadow: 0 0 16px rgba(255, 140, 0, 0.25);
}
#btnCancel {
  margin-top: 8px;
  width: 100%;
  background: rgba(255, 255, 255, 0.02);
  color: var(--text-muted);
  border-color: rgba(255, 255, 255, 0.14);
}
#btnCancel:hover {
  color: #e8eeff;
  border-color: rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>
<div id="shell">
  <div id="head">
    <div id="title">SELECTION HUB</div>
    <div id="subtitle">选中内容中转卡片</div>
  </div>
  <div id="content">
    <div id="preview-card">
      <div id="preview-label">PREVIEW</div>
      <div id="preview">等待选中文本...</div>
    </div>

    <div id="actions">
      <button class="btn primary" type="button" id="btnSearch">搜索中心</button>
      <button class="btn" type="button" id="btnAi">发送 AI</button>
    </div>
    <button class="btn" type="button" id="btnCancel">关闭</button>
  </div>
</div>
<script>
(function () {
  let fullText = "";

  function postToAhk(obj) {
    try {
      if (!obj || typeof obj !== "object") return;
      if (!obj.action && obj.type) obj.action = obj.type;
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(obj);
    } catch (e) {}
  }

  function setPreview(text) {
    fullText = text || "";
    const el = document.getElementById("preview");
    const compact = fullText.replace(/\s+/g, " ").trim();
    const show = compact.length > 110 ? compact.slice(0, 110) + "..." : compact;
    el.textContent = show || "未检测到有效选中文本";
  }

  document.getElementById("btnSearch").addEventListener("click", function () {
    postToAhk({ type: "selection_menu_search", text: fullText });
  });

  document.getElementById("btnAi").addEventListener("click", function () {
    postToAhk({ type: "selection_menu_ai", text: fullText });
  });

  document.getElementById("btnCancel").addEventListener("click", function () {
    postToAhk({ type: "selection_menu_dismiss" });
  });

  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", function (ev) {
      const d = ev.data;
      if (!d || d.type !== "selection_menu_init") return;
      setPreview(d.text || "");
    });
  }

  postToAhk({ type: "selection_menu_ready" });
})();
</script>
</body>
</html>
