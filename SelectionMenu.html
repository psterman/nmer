<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选区菜单</title>
<style>
:root {
  --bg: #1a1a1a;
  --bg-light: #242424;
  --accent: #ff8c00;
  --accent-hover: #ff9f2e;
  --text: #ffffff;
  --text-muted: #b0b0b0;
  --border: rgba(255, 140, 0, 0.3);
  --ease: 0.18s cubic-bezier(0.22, 1, 0.36, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
  height: 100%;
}
#preview {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
  max-height: 40px;
  overflow: hidden;
  word-break: break-all;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin-bottom: 4px;
}
.btn {
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border);
  background: var(--bg-light);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--ease), border-color var(--ease), transform var(--ease), box-shadow var(--ease);
}
.btn:hover {
  background: rgba(255, 140, 0, 0.12);
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(255, 140, 0, 0.15);
}
.btn:active {
  transform: scale(0.97);
}
.btn .icon {
  font-size: 15px;
  color: var(--accent);
  width: 18px;
  text-align: center;
}
.btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, #e67300 100%);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.btn.primary:hover {
  background: linear-gradient(135deg, var(--accent-hover) 0%, #ff8c00 100%);
  box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
}
.btn.primary .icon {
  color: #fff;
}
.btn.secondary {
  border-color: rgba(255, 255, 255, 0.15);
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.03);
}
.btn.secondary:hover {
  border-color: rgba(255, 255, 255, 0.25);
  color: var(--text);
  background: rgba(255, 255, 255, 0.06);
}
.btn.secondary .icon {
  color: var(--text-muted);
}
</style>
</head>
<body>
<div id="app">
  <div id="preview"></div>
  <button class="btn primary" type="button" id="btnSearch"><span class="icon">🔍</span>搜索</button>
  <button class="btn" type="button" id="btnAi"><span class="icon">✨</span>AI</button>
  <button class="btn secondary" type="button" id="btnCancel"><span class="icon">✕</span>取消</button>
</div>
<script>
(function () {
  let fullText = "";

  function postToAhk(obj) {
    try {
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(obj);
    } catch (e) {}
  }

  function setPreview(t) {
    fullText = t || "";
    const el = document.getElementById("preview");
    const show = fullText.length > 80 ? fullText.slice(0, 80) + "…" : fullText;
    el.textContent = show || "（无选中文本）";
  }

  document.getElementById("btnSearch").onclick = function () {
    postToAhk({ type: "selection_menu_search", text: fullText });
  };
  document.getElementById("btnAi").onclick = function () {
    postToAhk({ type: "selection_menu_ai", text: fullText });
  };
  document.getElementById("btnCancel").onclick = function () {
    postToAhk({ type: "selection_menu_dismiss" });
  };

  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", function (ev) {
      const d = ev.data;
      if (!d || d.type !== "selection_menu_init") return;
      setPreview(d.text || "");
    });
  }

  postToAhk({ type: "selection_menu_ready" });
})();
</script>
</body>
</html>
