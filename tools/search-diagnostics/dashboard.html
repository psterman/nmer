<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchCenter 资源验证清单</title>
  <style>
    :root {
      --bg1: #f5f7fb;
      --bg2: #eef3ff;
      --ink: #162033;
      --muted: #57617a;
      --ok: #2f9e44;
      --warn: #f08c00;
      --critical: #d6336c;
      --card: rgba(255, 255, 255, 0.85);
      --border: rgba(22, 32, 51, 0.12);
      --shadow: 0 8px 22px rgba(22, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1100px 500px at -5% -20%, #d7e4ff 0%, transparent 60%),
        radial-gradient(1200px 600px at 110% -10%, #ffd9d1 0%, transparent 52%),
        linear-gradient(140deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 { margin: 0; font-size: 24px; }
    .sub { color: var(--muted); font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpi, .panel, .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .kpi { padding: 10px 12px; }
    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi .value { font-weight: 700; font-size: 22px; margin-top: 2px; }

    .two {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel { padding: 12px; }
    .panel h2 { margin: 0 0 10px; font-size: 16px; }

    .chart {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(245,248,255,0.6));
      border: 1px solid var(--border);
    }

    .items {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .item { padding: 10px; border-left: 5px solid var(--ok); }
    .item.warn { border-left-color: var(--warn); }
    .item.critical { border-left-color: var(--critical); }
    .item .t { font-weight: 700; font-size: 14px; }
    .item .v { font-size: 13px; margin-top: 2px; }
    .item .r, .item .s { font-size: 12px; color: var(--muted); margin-top: 3px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    th, td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    thead th {
      background: rgba(230, 236, 252, 0.8);
      position: sticky;
      top: 0;
    }

    tr:last-child td { border-bottom: none; }
    .cmd {
      max-width: 420px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: white;
      background: var(--ok);
    }

    .badge.warn { background: var(--warn); }
    .badge.critical { background: var(--critical); }

    @media (max-width: 960px) {
      .two { grid-template-columns: 1fr; }
      .cmd { max-width: 250px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1>SearchCenter 资源验证清单</h1>
        <div class="sub" id="meta">等待采集数据...</div>
      </div>
    </div>

    <div class="grid" id="kpis"></div>

    <div class="two">
      <section class="panel">
        <h2>资源趋势（近 3 分钟）</h2>
        <canvas id="trend" class="chart" width="900" height="280"></canvas>
      </section>
      <section class="panel">
        <h2>环节诊断</h2>
        <div class="items" id="checklist"></div>
      </section>
    </div>

    <section class="panel">
      <h2>活跃进程明细（定位元凶）</h2>
      <table>
        <thead>
          <tr>
            <th>进程</th>
            <th>PID</th>
            <th>CPU%</th>
            <th>工作集(MB)</th>
            <th>存活(s)</th>
            <th>命令行</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const kpisEl = document.getElementById('kpis');
    const checklistEl = document.getElementById('checklist');
    const rowsEl = document.getElementById('rows');
    const metaEl = document.getElementById('meta');
    const canvas = document.getElementById('trend');
    const ctx = canvas.getContext('2d');

    function badge(level, text) {
      return `<span class="badge ${level}">${text}</span>`;
    }

    function renderKpis(s) {
      const cards = [
        ['rg 进程数', s.rgCount],
        ['SearchCenter 进程数', s.scCount],
        ['rg 内存(MB)', s.rgMemMB],
        ['SearchCenter 内存(MB)', s.scMemMB],
        ['rg CPU(%)', s.rgCpuPct],
        ['SearchCenter CPU(%)', s.scCpuPct]
      ];
      kpisEl.innerHTML = cards.map(([label, value]) => `
        <div class="kpi">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join('');
    }

    function renderChecklist(items) {
      checklistEl.innerHTML = items.map(it => `
        <div class="item ${it.status}">
          <div class="t">${it.title} ${badge(it.status, it.status.toUpperCase())}</div>
          <div class="v">${it.value}</div>
          <div class="r">原因：${it.reason}</div>
          <div class="s">建议：${it.suggestion}</div>
        </div>
      `).join('');
    }

    function renderRows(rows) {
      rowsEl.innerHTML = rows.slice(0, 15).map(r => `
        <tr>
          <td>${r.name}</td>
          <td>${r.pid}</td>
          <td>${r.cpuPct}</td>
          <td>${r.workingSetMB}</td>
          <td>${r.ageSec}</td>
          <td class="cmd" title="${(r.commandLine || '').replace(/"/g, '&quot;')}">${r.commandLine || ''}</td>
        </tr>
      `).join('');
    }

    function drawTrend(history) {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#f9fbff';
      ctx.fillRect(0, 0, w, h);

      if (!history || history.length < 2) return;

      const maxY = Math.max(...history.map(x => Math.max(x.rgMemMB, x.scMemMB, x.rgCpuPct * 20, x.scCpuPct * 20)), 100);
      const pad = 26;
      const iw = w - pad * 2;
      const ih = h - pad * 2;

      ctx.strokeStyle = 'rgba(22,32,51,0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad + (ih / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
      }

      function line(key, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        history.forEach((d, i) => {
          const x = pad + (i / (history.length - 1)) * iw;
          const y = pad + ih - (d[key] / maxY) * ih;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      line('rgMemMB', '#d6336c');
      line('scMemMB', '#1c7ed6');
      line('rgCpuPct', '#f08c00');
      line('scCpuPct', '#2f9e44');

      const legend = [
        ['rgMemMB', '#d6336c'],
        ['scMemMB', '#1c7ed6'],
        ['rgCpuPct', '#f08c00'],
        ['scCpuPct', '#2f9e44']
      ];
      let lx = 30;
      legend.forEach(([k, c]) => {
        ctx.fillStyle = c;
        ctx.fillRect(lx, 8, 12, 3);
        ctx.fillStyle = '#465067';
        ctx.font = '12px Segoe UI';
        ctx.fillText(k, lx + 16, 14);
        lx += 120;
      });
    }

    async function tick() {
      try {
        const r = await fetch(`status.json?t=${Date.now()}`, { cache: 'no-store' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const s = data.processSummary;
        metaEl.textContent = `更新时间: ${data.generatedAt} | 采样间隔: ${data.intervalMs}ms`;
        renderKpis(s);
        renderChecklist(data.checklist || []);
        renderRows(data.processes || []);
        drawTrend(data.history || []);
      } catch (e) {
        metaEl.textContent = `等待采集数据... (${e.message})`;
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
