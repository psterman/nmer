<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings Panel</title>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a; --surface3: #202020;
      --border: #2e2e2e; --border2: #3a3a3a; --orange: #e67e22;
      --text: #f0f0f0; --text-dim: #9a9a9a; --text-xs: #666; --success: #00ff41; --danger: #e74c3c;
      --row-hover: #1f1f1f; --row-active: #2a1b0d; --row-active-text: #f0f0f0;
      --glow: 0 0 8px #e67e2288, 0 0 18px #e67e2244;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }
    #app { display: flex; width: 100%; height: 100%; }
    #sidebar { width: 190px; background: var(--surface); border-right: 1px solid var(--border); padding: 10px 8px; display: flex; flex-direction: column; gap: 6px; }
    .tab-btn { border: 1px solid var(--border2); background: var(--surface2); color: var(--text-dim); border-radius: 6px; height: 34px; cursor: pointer; font-size: 12px; text-align: left; padding: 0 12px; transition: .15s; }
    .tab-btn:hover { color: var(--text); border-color: var(--orange); }
    .tab-btn.active { color: var(--orange); border-color: var(--orange); box-shadow: var(--glow); }
    #content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #header { height: 48px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
    #status { font-size: 12px; color: var(--text-dim); }
    #panel { flex: 1; overflow: auto; padding: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .title { font-size: 14px; margin-bottom: 10px; color: var(--text); }
    .row { display: grid; grid-template-columns: 240px 1fr; align-items: center; gap: 12px; margin-bottom: 10px; }
    .label { font-size: 12px; color: var(--text-dim); }
    input[type="text"], input[type="number"], textarea, select { width: 100%; background: var(--surface3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 8px 10px; outline: none; }
    input[type="text"], input[type="number"], select { height: 34px; }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: var(--orange); }
    .inline { display: flex; gap: 8px; align-items: center; }
    .btn { height: 34px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface2); color: var(--text); padding: 0 12px; cursor: pointer; transition: .15s; }
    .btn:hover { border-color: var(--orange); color: var(--orange); }
    .btn.primary { background: #2a1605; border-color: var(--orange); color: var(--orange); }
    .btn.primary:hover { box-shadow: var(--glow); }
    .hint { font-size: 11px; color: var(--text-xs); margin-top: 4px; }
    #footer { display: none; }
    .ok { color: var(--success); } .err { color: var(--danger); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qa-row { display: grid; grid-template-columns: 70px 1fr 130px; gap: 8px; margin-bottom: 8px; }
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { border: 1px solid var(--border2); border-radius: 14px; padding: 4px 10px; font-size: 12px; }
    .subtabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .subtab-btn { border: 1px solid var(--border2); background: var(--surface2); color: var(--text-dim); border-radius: 6px; height: 30px; padding: 0 12px; cursor: pointer; font-size: 12px; }
    .subtab-btn.active { color: var(--orange); border-color: var(--orange); }
    .prompt-grid { display: grid; grid-template-columns: 420px 1fr; gap: 12px; }
    .list-panel { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .list-head, .list-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 8px 10px; }
    .list-head { background: var(--surface2); color: var(--text-dim); font-size: 12px; border-bottom: 1px solid var(--border); }
    .list-body { overflow: visible; }
    .list-row { cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; }
    .list-row:hover { background: var(--row-hover); }
    .list-row.active { background: var(--row-active); border-left: 2px solid var(--orange); color: var(--row-active-text); }
    .compact-row { display: grid; grid-template-columns: 90px 1fr; align-items: center; gap: 8px; margin-bottom: 8px; }
    .editor-toolbar { display: flex; gap: 6px; margin: 6px 0 8px; flex-wrap: wrap; }
    .editor-toolbar .btn { height: 28px; padding: 0 10px; font-size: 12px; }
    .search-row { margin-bottom: 8px; }
    .multi-dd { position: relative; }
    .multi-dd-btn { width: 100%; height: 34px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface3); color: var(--text); text-align: left; padding: 0 10px; cursor: pointer; }
    .multi-dd-panel { position: absolute; z-index: 20; top: 38px; left: 0; right: 0; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface2); padding: 8px; display: none; max-height: 260px; overflow: auto; }
    .multi-dd.open .multi-dd-panel { display: block; }
    .multi-dd-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; font-size: 12px; }
    .multi-dd-item img { width: 16px; height: 16px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border2); }

    /* SearchCenter-style UI overrides (style only, no logic changes) */
    :root {
      --bg: #111315;
      --surface: #171a1e;
      --surface2: #1f2429;
      --surface3: #262c33;
      --border: #313941;
      --border2: #3a434d;
      --glass-edge: rgba(255,255,255,.28);
      --glass-edge-soft: rgba(255,255,255,.08);
      --glass-warm: rgba(255,171,92,.2);
      --orange: #ff8d2a;
      --orange-dk: #ff7a14;
      --orange-lt: #ffb347;
      --text: #e7ebef;
      --text-dim: #93a0ad;
      --text-xs: #6f7d8b;
      --row-hover: rgba(255,255,255,.03);
      --row-active: rgba(255,141,42,.14);
      --row-active-text: #ffffff;
      --glow: 0 18px 42px rgba(0,0,0,.35);
      --glow-hot: 0 0 0 1px rgba(255,179,71,.24), 0 14px 34px rgba(0,0,0,.28);
    }
    html, body {
      background: radial-gradient(circle at top right, rgba(255,141,42,.08), transparent 26%), linear-gradient(180deg, #0f1113 0%, #15181c 100%);
    }
    #app {
      gap: 12px;
      padding: 14px 16px 16px;
    }
    #sidebar,
    #header,
    .card,
    .list-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--surface);
      box-shadow: var(--glow);
    }
    #sidebar::after,
    #header::after,
    .card::after,
    .list-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, var(--glass-edge), var(--glass-edge-soft) 45%, var(--glass-warm));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: .72;
    }
    #sidebar {
      width: 204px;
      border-right: 1px solid rgba(255,255,255,.12);
      padding: 12px 10px;
      gap: 8px;
    }
    .tab-btn {
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      color: var(--text-dim);
      transition: .15s ease;
    }
    .tab-btn:hover {
      color: var(--text);
      border-color: rgba(255,179,71,.5);
      background: linear-gradient(180deg, rgba(255,179,71,.1), rgba(255,141,42,.08));
    }
    .tab-btn.active {
      color: #fff;
      border-color: rgba(255,179,71,.5);
      background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
      box-shadow: var(--glow-hot);
    }
    #content { min-width: 0; }
    #header {
      min-height: 52px;
      margin-bottom: 12px;
      border-bottom: none;
      padding: 0 16px;
    }
    #panel { padding: 0 2px; }
    .card {
      padding: 14px;
      margin-bottom: 12px;
    }
    .title { color: #fff; font-weight: 700; }
    input[type="text"], input[type="number"], textarea, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }
    input[type="text"], input[type="number"], select { height: 38px; }
    textarea { line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: var(--orange); }
    .btn {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      transition: .15s ease;
    }
    .btn:hover {
      color: #fff;
      border-color: rgba(255,179,71,.5);
      background: linear-gradient(180deg, rgba(255,179,71,.12), rgba(255,141,42,.08));
    }
    .btn.primary {
      background: linear-gradient(180deg, #ffb347, #ff8d2a);
      border-color: #ffb347;
      color: #111;
      font-weight: 700;
    }
    .btn.primary:hover { box-shadow: var(--glow-hot); }
    .tag {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--surface2);
    }
    .subtab-btn {
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface2);
      color: var(--text-dim);
      transition: .15s ease;
    }
    .subtab-btn.active {
      color: #fff;
      border-color: rgba(255,179,71,.5);
      background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
    }
    .list-head {
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid var(--border);
    }
    .list-row:hover { background: var(--row-hover); }
    .list-row.active {
      background: linear-gradient(180deg, rgba(255,141,42,.16), rgba(255,141,42,.06));
      border-left: 2px solid var(--orange-lt);
      color: var(--row-active-text);
    }
    .editor-toolbar .btn {
      height: 30px;
      border-radius: 999px;
    }
    .multi-dd-btn {
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      color: var(--text);
    }
    .multi-dd-panel {
      top: 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--glow);
    }
    .multi-dd-item {
      padding: 7px 6px;
      border-radius: 8px;
    }
    .multi-dd-item:hover { background: rgba(255,255,255,.03); }
    #panel::-webkit-scrollbar,
    .multi-dd-panel::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    #panel::-webkit-scrollbar-thumb,
    .multi-dd-panel::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 999px;
    }
    @media (max-width: 1024px) {
      #app { padding: 12px; gap: 10px; }
      #sidebar { width: 172px; }
      .row { grid-template-columns: 1fr; gap: 6px; }
      .prompt-grid { grid-template-columns: 1fr; }
    }
    .hint { display: none !important; }
    .apple-toolbar-wrap { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .apple-group {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      padding: 14px;
    }
    .apple-group-title {
      font-size: 13px;
      color: #dce5ee;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: .2px;
    }
    .apple-list {
      width: 100%;
      min-height: 270px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,12,15,.6);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    .apple-list:focus { border-color: rgba(255,179,71,.7); box-shadow: 0 0 0 2px rgba(255,179,71,.15); }
    .apple-controls {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 8px;
      align-items: stretch;
    }
    .apple-controls select { min-width: 260px; }
    .apple-mini-btn {
      min-width: 56px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.03);
      color: #eaf0f6;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .apple-mini-btn:hover {
      border-color: rgba(255,179,71,.6);
      background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.1));
    }
    @media (max-width: 1180px) {
      .apple-controls { grid-template-columns: 1fr 1fr; }
      .apple-controls select { min-width: 0; }
    }
    .advanced-split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }
    .advanced-workbench-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 1200px) {
      .advanced-workbench-row { grid-template-columns: 1fr; }
    }
    .ftb-workbench-card .ftb-pool-hint {
      font-size: 11px;
      color: var(--text-xs);
      margin: 10px 0 6px;
      line-height: 1.45;
    }
    .ftb-mock-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 10px;
      background: #0a0a0a;

      box-shadow: inset 0 0 0 1px rgba(255, 102, 0, 0.06);

    }
    .ftb-mock-logo {

      height: 40px;

    }
    .ftb-mock-pool {

      flex-wrap: wrap;
      gap: 7px;

      border: 1px dashed rgba(255, 102, 0, 0.28);

    }
    .cfg-ftb-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

<body>
  <div id="app">
    <aside id="sidebar">
      <button class="tab-btn active" data-tab="general">通用设置</button>
      <button class="tab-btn" data-tab="appearance">外观设置</button>
      <button class="tab-btn" data-tab="prompts">提示词设置</button>
      <button class="tab-btn" data-tab="hotkeys">快捷键设置</button>
      <button class="tab-btn" data-tab="advanced">高级设置</button>
      <button class="tab-btn" data-tab="search">搜索设置</button>

    <section id="content">
      <div id="header"><div>[ 设置中心 ]</div><div class="inline"><button id="btn-open-legacy" class="btn">打开原版完整设置</button><button id="btn-open-compare" class="btn">对比模式</button><div id="status">等待连接...</div></div></div>
      <div id="panel"></div>
      <div id="footer"><button id="btn-cancel" class="btn">取消</button><button id="btn-save" class="btn primary">保存</button></div>
    </section>
  </div>
  <script>
    if (typeof BasePanel === 'undefined') {
      window.BasePanel = {
        PROTO_VERSION: 1,
        postToAhk(obj) {
          if (!window.chrome?.webview) return;
          const src = (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
          const p = Object.assign({ v: 1, timestamp: Date.now() }, src);
          if (p.action === undefined && p.type !== undefined) p.action = p.type;
          window.chrome.webview.postMessage(p);
        }
      };
    }
    const ALL_CATEGORIES = ["ai","cli","academic","baidu","image","audio","video","book","price","medical","cloud"];
    const DEFAULT_AI_ENGINES = [
      { id:"deepseek", icon:"https://app.local/aiicons/DeepSeek.png", label:"DeepSeek" },

        document.getElementById("btnOpenLegacyHotkeys").addEventListener("click", () => post({ type: "invokeAction", op: "openLegacyTab", tab: "hotkeys" }));
      } else if (state.activeTab === "advanced") {
        const aiSec = (Number(d.aiSleepTime || 200) / 1000).toFixed(2).replace(/\.?0+$/, "");
        panel.innerHTML = `<div class="advanced-split">
  <div class="card"><div class="title">高级设置</div>
    <div class="row"><div class="label">界面语言</div><select id="language">${optionsKV([{value:"zh",label:"中文"},{value:"en",label:"英文"}],d.language)}</select></div>
    <div class="row"><div class="label">AI 等待时间 (秒)</div><input id="aiSleepTimeSeconds" type="number" min="0.05" max="10" step="0.05" value="${esc(aiSec)}"></div>
    <div class="row"><div class="label">启动延迟 (秒)</div><input id="launchDelaySeconds" type="number" min="0.5" max="10" step="0.1" value="${esc(d.launchDelaySeconds)}"></div>
  </div>
  <div class="card"><div class="title">配置管理</div><div class="inline"><button class="btn" id="btnExportCfg">导出配置</button><button class="btn" id="btnImportCfg">导入配置</button><button class="btn" id="btnResetCfg">重置默认</button></div></div>
  <div class="advanced-workbench-row">
    <div class="card ftb-workbench-card">
      <div class="title">悬浮栏 · 1:1 操作台</div>
      <div class="ftb-pool-hint">仅显示已在 VK KeyBinder 中勾选 Bar 的命令。条内可拖动排序；从下方共用备用池拖回可恢复显示。</div>
      <div class="ftb-mock-strip" aria-label="模拟悬浮栏">
        <div class="ftb-mock-logo" title="实际悬浮栏左侧为牛标，此处仅占位对齐"></div>
        <div id="cfg-ftb-bar" class="ftb-mock-btns"></div>
      </div>
    </div>
    <div class="card menu-workbench-card">
      <div class="title">悬浮栏 · 右键菜单操作台</div>
      <div class="ftb-pool-hint">与悬浮栏空白处右键菜单一致：仅显示 JSON 命令（CH_RUN）。顺序即真实菜单自上而下，长文本支持多行截断。</div>
      <div class="cfg-menu-mock-popup" aria-label="模拟右键菜单">
        <div class="cfg-menu-section-hint">菜单内命令（JSON）</div>
        <div id="cfg-menu-bar-cmds" class="cfg-menu-list"></div>
      </div>
    </div>
  </div>
  <div class="card shared-pool-card">
    <div class="title">共用备用池</div>
    <div class="pool-grid">
      <div>
        <div class="ftb-pool-hint">悬浮栏 · 备用命令</div>
        <div id="cfg-shared-pool-ftb" class="ftb-mock-pool"></div>
      </div>
      <div>
        <div class="ftb-pool-hint">右键菜单 · 备用命令（JSON）</div>
        <div id="cfg-shared-pool-menu-cmds" class="cfg-menu-pool"></div>
      </div>
    </div>
  </div>
</div>`;
        document.getElementById("btnExportCfg").addEventListener("click", () => post({ type: "invokeAction", op: "exportConfig" }));
        document.getElementById("btnImportCfg").addEventListener("click", () => post({ type: "invokeAction", op: "importConfig" }));
        document.getElementById("btnResetCfg").addEventListener("click", () => post({ type: "invokeAction", op: "resetToDefaults" }));
        mountFtbWorkbench();
        mountMenuWorkbench();
      } else {
        const selectedDefault = csvToArr(d.searchEngine || "deepseek");
        const selectedAiCli = csvToArr(d.voiceSearchSelectedEnginesCsv || "codex");
        const defaultSummary = selectedDefault.length ? selectedDefault.join(", ") : "请选择搜索引擎";
        const aiCliSummary = selectedAiCli.length ? selectedAiCli.join(", ") : "请选择 AI/CLI 搜索引擎";
        const defaultOptions = DEFAULT_AI_ENGINES.map(e => `<label class="multi-dd-item"><input type="checkbox" data-engine-target="default" value="${esc(e.id)}" ${checked(selectedDefault.includes(e.id))}> <img src="${esc(e.icon)}" alt="${esc(e.label)}"><span>${esc(e.label)}</span></label>`).join("");
        const aiCliOptions = CLI_ENGINES.map(e => `<label class="multi-dd-item"><input type="checkbox" data-engine-target="ai-cli" value="${esc(e.id)}" ${checked(selectedAiCli.includes(e.id))}> <img src="${esc(e.icon)}" alt="${esc(e.label)}"><span>${esc(e.label)}</span></label>`).join("");
        panel.innerHTML = `<div class="card"><div class="title">搜索设置</div><div class="row"><div class="label">默认搜索引擎（多选）</div><div class="multi-dd" id="ddDefaultEngine"><button type="button" class="multi-dd-btn" id="btnDefaultEngine">${esc(defaultSummary)}</button><div class="multi-dd-panel">${defaultOptions}</div></div></div><div class="row"><div class="label">AI/CLI 搜索引擎（多选）</div><div class="multi-dd" id="ddAiCliEngine"><button type="button" class="multi-dd-btn" id="btnAiCliEngine">${esc(aiCliSummary)}</button><div class="multi-dd-panel">${aiCliOptions}</div></div></div><div class="row"><div class="label">自动加载选中文本</div><div><input id="autoLoadSelectedText" type="checkbox" ${checked(d.autoLoadSelectedText)}></div></div><div class="row"><div class="label">自动更新语音输入</div><div><input id="autoUpdateVoiceInput" type="checkbox" ${checked(d.autoUpdateVoiceInput)}></div></div><div class="label">启用分类</div><div class="tag-wrap">${catRows}</div><div class="inline" style="margin-top:8px;"><button class="btn" id="btnOpenLegacySearch">打开原版搜索设置</button></div></div>`;
        const bindDropdown = (wrapId, btnId, target) => {
          const wrap = document.getElementById(wrapId);
          const btn = document.getElementById(btnId);
          btn.addEventListener("click", () => wrap.classList.toggle("open"));
          wrap.querySelectorAll(`input[data-engine-target="${target}"]`).forEach(chk => chk.addEventListener("change", () => {
            const vals = Array.from(wrap.querySelectorAll(`input[data-engine-target="${target}"]:checked`)).map(el => el.value);
            btn.textContent = vals.length ? vals.join(", ") : (target === "default" ? "请选择搜索引擎" : "请选择 AI/CLI 搜索引擎");
          }));
          document.addEventListener("click", (e) => { if (!wrap.contains(e.target)) wrap.classList.remove("open"); });
        };
        bindDropdown("ddDefaultEngine", "btnDefaultEngine", "default");
        bindDropdown("ddAiCliEngine", "btnAiCliEngine", "ai-cli");
        document.getElementById("btnOpenLegacySearch").addEventListener("click", () => post({ type: "invokeAction", op: "openLegacyTab", tab: "search" }));
      }
      bindAutoSaveControls();
    }
    function validate(d) {
      if (!d.cursorPath) return "Cursor 路径不能为空";
      if (!(d.capslockHoldTimeSeconds >= 0.1 && d.capslockHoldTimeSeconds <= 5.0)) return "CapsLock Hold Time 需要在 0.1 到 5.0 之间";
      if (!Number.isInteger(d.popupScreenIndex) || d.popupScreenIndex < 1) return "弹窗屏幕序号非法";
      const maxMonitors = Math.max(1, Number(d.monitorCount || 1));
      if (d.popupScreenIndex > maxMonitors) return "弹窗屏幕序号超出显示器范围";
      if (!Number.isInteger(d.aiSleepTime) || d.aiSleepTime < 50) return "AI 等待时间非法";
      if (!(d.launchDelaySeconds >= 0.5 && d.launchDelaySeconds <= 10)) return "启动延迟时间非法";
      if (!d.hotkeys || typeof d.hotkeys !== "object") return "快捷键数据无效";
      if (!Array.isArray(d.quickActions) || d.quickActions.length !== 5) return "快速操作必须为 5 项";
      return "";
    }
    document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => {
      if (state.activeTab === "advanced" && ftbSaveTimer) {
        clearTimeout(ftbSaveTimer);
        ftbSaveTimer = 0;
        const payload = collectKeybinderWorkbenchPayload();
        state.data.keybinderToolbarLayout = normalizeToolbarLayoutRows(payload.toolbarLayout);
        state.data.keybinderContextMenuLayout = payload.contextMenuLayout;
        post({
          type: "saveKeybinderToolbarLayout",
          toolbarLayout: payload.toolbarLayout,
          contextMenuLayout: payload.contextMenuLayout,
        });
      }
      state.data = readFromUI();
      state.activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }));
    const panelRoot = document.getElementById("panel");
    panelRoot.addEventListener("input", (e) => {
      const t = e.target;
      if (!t || !(t.matches?.("input,textarea,select"))) return;
      if (t.dataset?.nosave === "1") return;
      scheduleAutoSave();
    });
    panelRoot.addEventListener("change", (e) => {
      const t = e.target;
      if (!t || !(t.matches?.("input,textarea,select"))) return;
      if (t.id === "themeMode") {
        state.data.themeMode = t.value;
        applyWebTheme(t.value);
      }
      if (t.dataset?.nosave === "1") return;
      scheduleAutoSave(50);
    });
    document.getElementById("btn-open-legacy").addEventListener("click", () => post({ type: "invokeAction", op: "openLegacySettings" }));
    document.getElementById("btn-open-compare").addEventListener("click", () => post({ type: "invokeAction", op: "openCompareSettings" }));
    document.getElementById("btn-cancel").addEventListener("click", () => post({ type: "cancel" }));
    document.getElementById("btn-save").addEventListener("click", () => { const d = readFromUI(); const err = validate(d); if (err) return setStatus(err, "err"); post({ type: "saveSettings", payload: d }); });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      e.preventDefault();
      post({ type: "cancel" });
    });
    function handleHostMessage(msg) {
      if (!msg || !msg.type) return;
      if (msg.type === "initData") {
        suppressAutoSave = true;
        const p = msg.payload || {};
        state.data = { ...state.data, ...p, hotkeys: { ...state.data.hotkeys, ...(p.hotkeys || {}) }, quickActions: (p.quickActions?.length ? p.quickActions : state.data.quickActions) };
        if (Array.isArray(p.keybinderToolbarLayout)) state.data.keybinderToolbarLayout = normalizeToolbarLayoutRows(p.keybinderToolbarLayout);
        if (Array.isArray(p.keybinderCommands)) state.data.keybinderCommands = p.keybinderCommands;
        if (Array.isArray(p.keybinderContextMenuLayout)) state.data.keybinderContextMenuLayout = p.keybinderContextMenuLayout;
        const startTab = (msg.payload || {}).defaultStartTab;
        const validStartTabs = new Set(["general","appearance","prompts","hotkeys","advanced","search"]);
        if (startTab && validStartTabs.has(startTab)) {
          state.activeTab = startTab;
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === startTab));
        }
        const ids = (state.data.promptTemplateSummary || []).map(t => t.id);
        if (state.selectedPromptTemplateId && !ids.includes(state.selectedPromptTemplateId))
          state.selectedPromptTemplateId = "";
        render();
        setStatus("已连接", "ok");
        setTimeout(() => { suppressAutoSave = false; }, 0);
        return;
      }
      if (msg.type === "browseCursorPathResult" && msg.path) { state.data.cursorPath = msg.path; render(); return; }
      if (msg.type === "saveResult") { setStatus(msg.ok ? "保存成功" : (msg.error || "保存失败"), msg.ok ? "ok" : "err"); return; }
      if (msg.type === "saveKeybinderToolbarLayoutResult") {
        setStatus(msg.ok ? "工具栏与右键菜单已写入配置" : (msg.error || "保存失败"), msg.ok ? "ok" : "err");
        return;
      }
      if (msg.type === "actionResult") { setStatus(msg.ok ? "操作成功" : (msg.error || "操作失败"), msg.ok ? "ok" : "err"); }
    }
    loadCustomCategories();
    if (window.chrome && window.chrome.webview) { window.chrome.webview.addEventListener("message", e => { const data = typeof e.data === "string" ? JSON.parse(e.data) : e.data; handleHostMessage(data); }); render(); post({ type: "ready" }); setStatus("正在连接..."); } else { render(); setStatus("预览模式"); }
  </script>
</body>
</html>
