<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悬浮工具栏</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #1e1e1e;
  --border: #3c3c3c;
  --matrix: #00ff41;
  --orange: #ff6600;
  --text: #cccccc;
  --ease: 0.2s cubic-bezier(0.22, 1, 0.36, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
  user-select: none;
  -webkit-user-select: none;
}
#strip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px;
  height: 100%;
  width: 100%;
  background: var(--bg);
  border-radius: 8px;
}
#favicon {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
}
#favicon:active { cursor: grabbing; }
#favicon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}
#buttons {
  display: flex;
  gap: 5px;
  flex: 1 1 auto;
  min-width: 0;
  align-items: center;
}
.btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  transition: transform var(--ease), filter var(--ease), box-shadow var(--ease), background var(--ease);
  position: relative;
  background: transparent;
}
.btn img, .btn svg {
  width: 24px;
  height: 24px;
  pointer-events: none;
  transition: transform 0.35s linear;
}
.btn .prompt-new-glyph {
  color: #ff6600;
  font-weight: bold;
  font-size: 16px;
  line-height: 1;
  pointer-events: none;
}
.btn:hover {
  filter: brightness(1.35);
  background: rgba(255, 255, 255, 0.06);
}
.btn:active {
  transform: scale(0.92);
}
.btn .dot {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--orange);
  opacity: 0;
  transition: opacity var(--ease);
}
.btn.selected .dot {
  opacity: 1;
}

/* 搜索按钮特殊状态 */
#btn-search.pulse {
  animation: breathe 1.6s ease-in-out infinite;
  box-shadow: 0 0 14px rgba(0, 255, 65, 0.45), 0 0 28px rgba(0, 255, 65, 0.2);
}
#btn-search.drag-over {
  transform: scale(0.88);
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.65);
}
#btn-search.loading svg, #btn-search.loading img {
  animation: spin 0.7s linear infinite;
}
@keyframes breathe {
  0%, 100% { filter: drop-shadow(0 0 4px rgba(0,255,65,0.35)); }
  50% { filter: drop-shadow(0 0 14px rgba(0,255,65,0.85)); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 气泡提示 */
#bubble {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 6px);
  transform: translateX(-50%);
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--matrix);
  background: rgba(10, 10, 10, 0.92);
  border: 1px solid rgba(0, 255, 65, 0.45);
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--ease);
  z-index: 100;
}
#btn-search.pulse #bubble {
  opacity: 1;
}

/* 工具提示 */
.btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text);
  background: #252526;
  border: 1px solid var(--border);
  border-radius: 4px;
  white-space: nowrap;
  z-index: 99;
}
#btn-search[title]:hover::after {
  display: none;
}

/* ==================== SuperHub 引力场系统 ==================== */

/* 引力场 CSS 变量 */
.btn {
  --pull-x: 0;
  --pull-y: 0;
  --gravity-intensity: 0;
}

.btn.gravity-active {
  transform: translate(calc(var(--pull-x) * 1px), calc(var(--pull-y) * 1px)) scale(calc(1 + var(--gravity-intensity) * 0.15));
  filter: brightness(calc(1 + var(--gravity-intensity) * 0.4));
  transition: transform 0.1s ease-out, filter 0.1s ease-out;
}

.btn.gravity-active::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 16px;
  background: radial-gradient(circle, rgba(0, 255, 65, calc(var(--gravity-intensity) * 0.3)) 0%, transparent 70%);
  pointer-events: none;
  animation: gravity-glow 0.6s ease-in-out infinite;
}

@keyframes gravity-glow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* 融合冲击波 */
.btn.fusion-feedback {
  animation: fusion-shockwave 0.5s ease-out forwards;
}

.btn.fusion-feedback::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--matrix);
  transform: translate(-50%, -50%);
  animation: shockwave-ring 0.5s ease-out forwards;
  pointer-events: none;
}

@keyframes fusion-shockwave {
  0% { transform: scale(1); }
  20% { transform: scale(0.85); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes shockwave-ring {
  0% {
    width: 20px;
    height: 20px;
    opacity: 1;
    border-width: 3px;
  }
  100% {
    width: 80px;
    height: 80px;
    opacity: 0;
    border-width: 1px;
  }
}

/* 能量纽带 SVG 层 */
#tether-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1000;
  overflow: visible;
}

#tether-path {
  fill: none;
  stroke: url(#tether-gradient);
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0;
  transition: opacity 0.2s ease;
}

#tether-path.visible {
  opacity: 1;
  animation: tether-pulse 0.8s ease-in-out infinite;
}

@keyframes tether-pulse {
  0%, 100% { stroke-width: 2; filter: drop-shadow(0 0 4px rgba(0, 255, 65, 0.5)); }
  50% { stroke-width: 3; filter: drop-shadow(0 0 8px rgba(0, 255, 65, 0.8)); }
}

/* 能量粒子 */
.tether-particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: var(--matrix);
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 6px var(--matrix);
  animation: particle-flow 0.6s linear infinite;
}

@keyframes particle-flow {
  0% { opacity: 0; transform: scale(0); }
  20% { opacity: 1; transform: scale(1); }
  80% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0); }
}
</style>
</head>
<body>
<!-- 能量纽带 SVG 层 -->
<svg id="tether-layer">
  <defs>
    <linearGradient id="tether-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <path id="tether-path" d="" />
</svg>

<div id="strip">
  <div id="favicon">
    <img id="favicon-img" src="https://appcursorhelper/favicon.ico" alt="logo" width="52" height="52">
  </div>
  <div id="buttons">
    <div class="btn" id="btn-search" data-action="Search" title="搜索 (Caps+F)">
      <div id="bubble">[Drag Me] · Caps+F</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="btn" id="btn-record" data-action="Record" title="剪贴板历史 (CapsLock+X)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>
    </div>
    <div class="btn" id="btn-ai" data-action="AIAssistant" title="提示词 (Ctrl+Shift+B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </div>
    <div class="btn" id="btn-prompt-new" data-action="HubCapsule" title="HubCapsule 预览窗口">
      <span class="prompt-new-glyph">新</span>
    </div>
    <div class="btn" id="btn-screenshot" data-action="Screenshot" title="截图 (Caps+T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="btn" id="btn-settings" data-action="Settings" title="设置 (Caps+Q)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
    <div class="btn" id="btn-keyboard" data-action="VirtualKeyboard" title="键盘 (Ctrl+Shift+K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg>
    </div>
  </div>
</div>
<script>
(function () {
  var strip = document.getElementById("strip");
  var favicon = document.getElementById("favicon");
  var buttons = document.querySelectorAll(".btn");
  var btnSearch = document.getElementById("btn-search");
  var selectedAction = "";

  function postToAhk(obj) {
    try {
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(obj);
    } catch (e) {}
  }

  function setSelected(action) {
    selectedAction = action;
    buttons.forEach(function (b) {
      b.classList.toggle("selected", b.dataset.action === action);
    });
  }

  function setSearchPulse(on) {
    btnSearch.classList.toggle("pulse", !!on);
  }

  function setSearchDragOver(on) {
    btnSearch.classList.toggle("drag-over", !!on);
  }

  function setSearchLoading(on) {
    btnSearch.classList.toggle("loading", !!on);
  }

  // 按钮点击
  buttons.forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      var action = btn.dataset.action;
      setSelected(action);
      if (action === "Search") {
        postToAhk({ type: "toolbar_search_click" });
      } else {
        postToAhk({ type: "toolbar_action", action: action });
      }
    });
  });

  // 空白区拖动整窗（含 #buttons 右侧留白；排除各 .btn）
  function maybeStartDrag(e) {
    if (e.button !== 0) return;
    var t = e.target;
    if (t.closest && t.closest(".btn")) return;
    e.preventDefault();
    postToAhk({ type: "drag_host" });
  }
  strip.addEventListener("mousedown", maybeStartDrag);

  // 滚轮缩放
  strip.addEventListener("wheel", function (e) {
    e.preventDefault();
    postToAhk({ type: "wheel", delta: e.deltaY > 0 ? -1 : 1 });
  }, { passive: false });

  // 右键菜单
  strip.addEventListener("contextmenu", function (e) {
    e.preventDefault();
    postToAhk({ type: "context_menu", x: e.screenX, y: e.screenY });
  });

  // 拖放：搜索按钮
  async function readDropTextAsync(dt) {
    if (!dt) return "";
    try {
      if (dt.items && dt.items.length) {
        for (var i = 0; i < dt.items.length; i++) {
          var it = dt.items[i];
          if (it.kind !== "string") continue;
          var s = await new Promise(function (res) {
            try {
              it.getAsString(function (x) { res(x || ""); });
            } catch (e2) {
              res("");
            }
          });
          if (s && String(s).trim()) return String(s).trim();
        }
      }
      return (dt.getData("text/plain") || dt.getData("Text") || dt.getData("text/uri-list") || "").trim();
    } catch (e) {
      return "";
    }
  }

  async function onDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    setSearchDragOver(false);
    var t = await readDropTextAsync(e.dataTransfer);
    t = (t || "").trim();
    if (!t && e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length)
      t = (e.dataTransfer.files[0].name || "").trim();
    if (!t) return;
    setSearchLoading(true);
    postToAhk({ type: "drop_search", text: t });
  }

  function onDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    try {
      if (e.dataTransfer) e.dataTransfer.dropEffect = "copy";
    } catch (e2) {}
    setSearchDragOver(true);
  }

  function onDragLeave(e) {
    if (!btnSearch.contains(e.relatedTarget))
      setSearchDragOver(false);
  }

  btnSearch.addEventListener("dragenter", function (e) { e.preventDefault(); });
  btnSearch.addEventListener("dragover", onDragOver);
  btnSearch.addEventListener("dragleave", onDragLeave);
  btnSearch.addEventListener("drop", onDrop);

  // 全局拖放兜底
  document.body.addEventListener("dragover", function (e) { e.preventDefault(); });
  document.body.addEventListener("drop", function (e) {
    e.preventDefault();
    if (e.target === btnSearch || btnSearch.contains(e.target)) return;
    onDrop(e);
  });

  // ==================== SuperHub 引力场系统 ====================
  var btnAi = document.getElementById("btn-ai");
  var tetherPath = document.getElementById("tether-path");
  var tetherLayer = document.getElementById("tether-layer");
  var gravityState = {
    active: false,
    targetBtn: null,
    capsulePos: { x: 0, y: 0 },
    particles: []
  };

  // 上报按钮矩形（屏幕坐标）
  function reportButtonRects() {
    var rects = {};
    buttons.forEach(function(btn) {
      var r = btn.getBoundingClientRect();
      rects[btn.id] = {
        x: window.screenX + r.left,
        y: window.screenY + r.top,
        w: r.width,
        h: r.height
      };
    });
    postToAhk({ type: "button_rects", rects: rects });
  }

  // 设置引力场状态
  function setGravity(btnId, dist, maxDist) {
    var btn = document.getElementById(btnId);
    if (!btn) return;

    var intensity = Math.max(0, 1 - dist / maxDist);
    
    buttons.forEach(function(b) {
      if (b.id === btnId) {
        b.classList.add("gravity-active");
        b.style.setProperty("--gravity-intensity", intensity.toFixed(2));
        
        var pullStrength = intensity * 5;
        var angle = Math.atan2(
          gravityState.capsulePos.y - (b.getBoundingClientRect().top + b.getBoundingClientRect().height / 2 + window.screenY),
          gravityState.capsulePos.x - (b.getBoundingClientRect().left + b.getBoundingClientRect().width / 2 + window.screenX)
        );
        b.style.setProperty("--pull-x", (Math.cos(angle) * pullStrength).toFixed(1));
        b.style.setProperty("--pull-y", (Math.sin(angle) * pullStrength).toFixed(1));
      } else {
        b.classList.remove("gravity-active");
        b.style.setProperty("--gravity-intensity", "0");
        b.style.setProperty("--pull-x", "0");
        b.style.setProperty("--pull-y", "0");
      }
    });

    gravityState.active = true;
    gravityState.targetBtn = btn;
  }

  // 清除引力场
  function clearGravity() {
    buttons.forEach(function(b) {
      b.classList.remove("gravity-active");
      b.style.setProperty("--gravity-intensity", "0");
      b.style.setProperty("--pull-x", "0");
      b.style.setProperty("--pull-y", "0");
    });
    gravityState.active = false;
    gravityState.targetBtn = null;
    hideTether();
  }

  // 绘制能量纽带
  function drawTether(startX, startY, endX, endY) {
    var midX = (startX + endX) / 2;
    var midY = Math.min(startY, endY) - 30;
    
    var d = "M " + startX + " " + startY + 
            " Q " + midX + " " + midY + " " + endX + " " + endY;
    
    tetherPath.setAttribute("d", d);
    tetherPath.classList.add("visible");
  }

  function hideTether() {
    tetherPath.classList.remove("visible");
  }

  // 更新纽带位置
  function updateTether(capsuleX, capsuleY) {
    gravityState.capsulePos.x = capsuleX;
    gravityState.capsulePos.y = capsuleY;
    
    if (gravityState.active && gravityState.targetBtn) {
      var r = gravityState.targetBtn.getBoundingClientRect();
      var btnCenterX = r.left + r.width / 2;
      var btnCenterY = r.top + r.height / 2;
      
      var localCapsuleX = capsuleX - window.screenX;
      var localCapsuleY = capsuleY - window.screenY;
      
      drawTether(localCapsuleX, localCapsuleY, btnCenterX, btnCenterY);
    }
  }

  // 融合反馈动画
  function triggerFusionFeedback(btnId) {
    var btn = document.getElementById(btnId);
    if (!btn) return;
    
    btn.classList.add("fusion-feedback");
    
    setTimeout(function() {
      btn.classList.remove("fusion-feedback");
    }, 500);
    
    clearGravity();
  }

  // 接收 AHK 消息
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", function (ev) {
      var d = ev.data;
      if (!d || !d.type) return;
      
      // 原有消息处理
      if (d.type === "SELECTION_CHANGE") {
        setSearchPulse(true);
        return;
      }
      if (d.type === "SELECTION_CLEAR") {
        setSearchPulse(false);
        return;
      }
      if (d.type === "drop_done") {
        setSearchLoading(false);
        setSearchPulse(false);
        return;
      }
      if (d.type === "set_scale") {
        return;
      }
      if (d.type === "set_logo") {
        var u = d.url || "";
        var im = document.getElementById("favicon-img");
        if (im && u) im.src = u;
        return;
      }
      if (d.type === "set_selected") {
        setSelected(d.action || "");
        return;
      }
      
      // SuperHub 新消息处理
      if (d.type === "request_button_rects") {
        reportButtonRects();
        return;
      }
      if (d.type === "set_gravity") {
        setGravity(d.btnId, d.dist || 100, d.maxDist || 100);
        if (d.capsuleX !== undefined && d.capsuleY !== undefined) {
          updateTether(d.capsuleX, d.capsuleY);
        }
        return;
      }
      if (d.type === "clear_gravity") {
        clearGravity();
        return;
      }
      if (d.type === "update_tether") {
        if (d.x !== undefined && d.y !== undefined) {
          updateTether(d.x, d.y);
        }
        return;
      }
      if (d.type === "fusion_feedback") {
        triggerFusionFeedback(d.btnId);
        return;
      }
    });
  }

  // 窗口 resize 时重新上报按钮位置
  window.addEventListener("resize", function() {
    setTimeout(reportButtonRects, 100);
  });

  postToAhk({ type: "toolbar_ready" });
  
  // 延迟上报初始按钮位置
  setTimeout(reportButtonRects, 200);
})();
</script>
</body>
</html>
