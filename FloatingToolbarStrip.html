<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Floating Toolbar</title>
<style>
:root{--bg:#0a0a0a;--panel:rgba(18,18,18,.92);--panel2:rgba(22,22,22,.96);--orange:#ff6600;--text:#e8e8e8;--muted:#9b9b9b;--ui:1;--ease:.2s cubic-bezier(.22,1,.36,1);--de:.32s ease-in-out;--toolbar-bg:#0a0a0a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--toolbar-bg);font:14px "Segoe UI","Microsoft YaHei UI",sans-serif;color:var(--text);user-select:none;-webkit-user-select:none}
button,input,textarea,select{font:inherit}
#app{position:relative;width:100%;height:100%;background:var(--toolbar-bg)}
body.drawer-open{background:var(--toolbar-bg)}
/* 标准圆角矩形：CSS border-radius 各向一致，避免 SVG 非等比拉伸成“药丸/鼓边” */
#collapsedRoot{position:relative;display:flex;flex-direction:row;align-items:center;height:100%;width:100%;gap:calc(8px * var(--ui));padding:calc(6px * var(--ui)) calc(8px * var(--ui));background:var(--toolbar-bg);background-clip:padding-box;border-radius:calc(10px * var(--ui));border:none;box-shadow:none;opacity:0;visibility:hidden;transition:opacity .12s ease,visibility .12s ease,border-radius .24s cubic-bezier(.22,1,.36,1),padding .24s cubic-bezier(.22,1,.36,1),gap .24s cubic-bezier(.22,1,.36,1);isolation:isolate;transform:translateZ(0)}
/* 仅用户悬停/按下/内部聚焦时：轻盈内发光（平时关闭，避免误以为是黑边） */
#collapsedRoot::after{content:"";position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;opacity:0;transition:opacity .22s ease;box-shadow:none}
#collapsedRoot:hover::after,#collapsedRoot:active::after,#collapsedRoot:focus-within::after{opacity:1;animation:ftbInnerBreath 2.6s ease-in-out infinite}
#collapsedRoot > *{position:relative;z-index:1}
body.ftb-ready #collapsedRoot{opacity:1;visibility:visible}
body.drawer-open #collapsedRoot{display:none!important}
#drawerRoot{display:none;position:absolute;inset:0;flex-direction:column;min-height:0}
body.drawer-open #drawerRoot{display:flex!important}
#stage{flex:1;display:flex;flex-direction:row;min-height:0;position:relative}
#backdrop{position:absolute;inset:0;z-index:1;background:transparent}
#panel{position:relative;z-index:2;flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-left:1px solid rgba(255,102,0,.35);box-shadow:-12px 0 40px rgba(0,0,0,.35)}
#resizeGrip{position:absolute;left:0;top:0;bottom:0;width:10px;z-index:30;cursor:ew-resize;background:linear-gradient(90deg,rgba(255,102,0,.28),transparent);opacity:.6}
#resizeGrip:hover{opacity:1}
.hdr{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(255,102,0,.15);background:linear-gradient(180deg,rgba(255,102,0,.06),transparent);cursor:grab}
.hdr:active{cursor:grabbing}
.t1{font-size:15px;font-weight:700}
.t2{margin-top:3px;font-size:11px;color:var(--muted)}
.icons{display:flex;gap:8px}
.ib{width:34px;height:34px;border:1px solid rgba(255,102,0,.28);border-radius:10px;background:rgba(255,255,255,.04);color:var(--orange);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--ease)}
.ib:hover{background:rgba(255,102,0,.12);border-color:rgba(255,102,0,.6)}
.ib svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#main{flex:1;min-height:0;display:flex;flex-direction:column;min-width:0}
#msgs{flex:1;min-height:0;min-width:0;overflow:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;align-items:stretch}
#msgs > #empty{flex-shrink:0}
#msgs::-webkit-scrollbar,.sbody::-webkit-scrollbar{width:8px}
#msgs::-webkit-scrollbar-thumb,.sbody::-webkit-scrollbar-thumb{background:rgba(255,102,0,.28);border-radius:99px}
#empty{padding:14px;border:1px dashed rgba(255,102,0,.25);border-radius:14px;color:var(--muted);background:rgba(255,255,255,.03);line-height:1.6;font-size:13px}
.m{width:fit-content;max-width:min(92%,100%);border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);overflow:hidden;align-self:flex-start;flex-shrink:0;min-height:min-content}
.m.user{align-self:flex-end;background:rgba(255,102,0,.12);border-color:rgba(255,102,0,.22)}
.mh{display:flex;justify-content:space-between;gap:12px;padding:8px 12px 6px;font-size:11px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.mb{padding:10px 12px 12px;line-height:1.7;font-size:13px;color:var(--text);user-select:text;-webkit-user-select:text;overflow-wrap:anywhere;word-break:break-word;min-width:0;min-height:min-content}
.m .mb a{color:#ffb380}
.m.search-hit{box-shadow:0 0 0 1px rgba(255,132,64,.75),0 0 0 3px rgba(255,102,0,.16)}
.mb pre{margin-top:10px;border:1px solid rgba(255,102,0,.14);border-radius:12px;background:rgba(8,8,8,.95);overflow:auto}
.mb pre code{display:block;padding:12px;font:12px/1.65 Consolas,"JetBrains Mono",monospace}
.hl-comment{color:#6a9955}.hl-string{color:#ce9178}.hl-number{color:#b5cea8}.hl-keyword{color:#ff9b52}.hl-builtins{color:#4fc1ff}.hl-var{color:#dcdcaa}
#cmp{flex-shrink:0;padding:12px 16px 14px;border-top:1px solid rgba(255,102,0,.15);background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}
#input{width:100%;min-height:96px;resize:vertical;border:1px solid rgba(255,102,0,.2);border-radius:14px;background:rgba(8,8,8,.72);color:var(--text);padding:10px 12px;outline:none;user-select:text;-webkit-user-select:text}
#composerFooter{display:flex;flex-direction:row;align-items:flex-end;gap:12px;margin-top:10px}
.drawer-toolbar{flex:1;display:flex;flex-direction:row;align-items:center;gap:calc(6px * var(--ui));min-width:0;background:transparent;padding:0}
#sendWrap{flex-shrink:0;display:flex;align-items:flex-end}
.st{font-size:12px;color:var(--muted)}.st.error{color:#ff7a59}.st.success{color:#4ed08b}
.btn1{min-height:42px;padding:0 18px;border-radius:12px;border:1px solid rgba(255,102,0,.3);cursor:pointer;font-weight:700;background:linear-gradient(180deg,#ff7d26,#ff6600);color:#111;transition:all var(--ease)}
.btn1:disabled{opacity:.45;cursor:not-allowed}
.btn2,.btn3{height:38px;padding:0 14px;border-radius:10px;border:1px solid rgba(255,102,0,.22);cursor:pointer;background:rgba(255,255,255,.04);color:var(--text)}
#chatStatusRow{margin-top:8px}
.logo-btn{flex-shrink:0;width:max(calc(42px * var(--ui)),34px);height:max(calc(42px * var(--ui)),34px);border:none;border-radius:calc(8px * var(--ui));background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;transition:all var(--ease);color:#ff6600;outline:none;position:relative}
.logo-btn:hover{filter:brightness(1.3);background:rgba(255,255,255,.06)}
.logo-btn:focus-visible{background:rgba(255,255,255,.06);box-shadow:0 0 0 1px rgba(255,102,0,.45)}
.logo-img{width:max(calc(30px * var(--ui)),28px);height:max(calc(30px * var(--ui)),28px);min-width:28px;min-height:28px;object-fit:contain;pointer-events:none;transform-origin:center;transition:transform .24s cubic-bezier(.22,1,.36,1),width .24s cubic-bezier(.22,1,.36,1),height .24s cubic-bezier(.22,1,.36,1)}
.icon-btns{display:flex;flex-direction:row;align-items:center;gap:calc(5px * var(--ui));flex:1;min-width:0;flex-wrap:nowrap;overflow-x:auto;transition:max-width .24s cubic-bezier(.22,1,.36,1),opacity .2s ease,transform .24s cubic-bezier(.22,1,.36,1)}
.icon-btns::-webkit-scrollbar{height:4px}
body.ftb-compact #collapsedRoot{justify-content:center;padding:0;gap:0;border-radius:999px}
body.ftb-compact #collapsedBtns{max-width:0;opacity:0;overflow:hidden;pointer-events:none;transform:translateX(-10px) scale(.94)}
body.ftb-compact #collapsedRoot::after{opacity:0!important;animation:none!important}
body.ftb-compact #collapsedRoot .logo-btn{width:100%;height:100%;padding:0;border-radius:999px;background:transparent;box-shadow:none;filter:none}
body.ftb-compact #collapsedRoot .logo-btn:hover{filter:none;background:transparent}
body.ftb-compact #collapsedRoot .logo-btn .logo-img{transform:scale(1.02)}
.tb{width:calc(40px * var(--ui));height:calc(40px * var(--ui));display:flex;align-items:center;justify-content:center;border-radius:calc(8px * var(--ui));cursor:pointer;position:relative;transition:all var(--ease);color:#ff6600;background:transparent;flex-shrink:0}
.tb svg{width:calc(24px * var(--ui));height:calc(24px * var(--ui));pointer-events:none}
.tb:hover{filter:brightness(1.3);background:rgba(255,255,255,.06)}
.tb .dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--orange);opacity:0}
.tb.selected .dot{opacity:1}
.tb[data-action=Search].pulse{animation:breathe 1.6s ease-in-out infinite;box-shadow:0 0 12px rgba(255,102,0,.4)}
.tb[data-action=Search].drag-over{transform:scale(.9)}
.tb.drag-over{transform:scale(.92);background:rgba(255,102,0,.12);box-shadow:0 0 0 1px rgba(255,102,0,.35)}
.tb[data-action=Search].loading svg{animation:spin .7s linear infinite}
.bubble{position:absolute;left:50%;bottom:calc(100% + 5px);transform:translateX(-50%);padding:2px 7px;font-size:10px;font-weight:600;color:#00ff41;background:rgba(10,10,10,.92);border:1px solid rgba(0,255,65,.4);border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none}
.tb[data-action=Search].pulse .bubble{opacity:1}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ftbChromePulse{
0%,100%{border-color:rgba(255,102,0,.42);box-shadow:0 0 0 1px rgba(255,102,0,.1),0 0 10px rgba(255,102,0,.16),0 0 22px rgba(255,102,0,.08)}
50%{border-color:rgba(255,102,0,.58);box-shadow:0 0 0 1px rgba(255,102,0,.16),0 0 16px rgba(255,102,0,.26),0 0 32px rgba(255,102,0,.14)}
}
@keyframes ftbInnerBreath{
0%,100%{box-shadow:inset 0 0 14px rgba(255,102,0,.04),inset 0 0 6px rgba(255,140,60,.03)}
50%{box-shadow:inset 0 0 18px rgba(255,102,0,.08),inset 0 0 10px rgba(255,140,60,.05)}
}
#settings{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity var(--de);z-index:40}
body.settings-open #settings{opacity:1;pointer-events:auto}
.sbg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.sd{position:absolute;top:14px;right:14px;bottom:14px;left:14px;max-width:560px;margin-left:auto;background:var(--panel2);border:1px solid rgba(255,102,0,.28);border-radius:18px;display:flex;flex-direction:column}
.sh{padding:14px 16px 12px;border-bottom:1px solid rgba(255,102,0,.15);display:flex;justify-content:space-between;align-items:center}
.sbt{font-size:15px;font-weight:700}
.sbt2{margin-top:3px;font-size:11px;color:var(--muted)}
.sbody{flex:1;overflow:auto;padding:14px 16px;display:grid;gap:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld{display:grid;gap:6px}
.fld label{font-size:11px;color:var(--muted)}
.ctl{width:100%;min-height:40px;border:1px solid rgba(255,102,0,.22);border-radius:10px;background:#101010;color:var(--text);padding:8px 10px;outline:none}
select.ctl{cursor:pointer;appearance:auto;background-color:#101010;color:var(--text)}
select.ctl option,select.ctl optgroup{background-color:#141414;color:var(--text)}
textarea.ctl{min-height:100px;resize:vertical}
.hint{padding:10px 12px;border:1px solid rgba(255,102,0,.14);border-radius:12px;background:rgba(255,255,255,.03);color:var(--muted);font-size:11px;line-height:1.55}
.hint.mini{padding:6px 8px;font-size:10px;margin-top:4px}
.prompt-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.prompt-tools .ctl{max-width:min(100%,220px)}
.prompt-tools .btn3{flex-shrink:0}
.dd{position:relative}
.dd-wrap{position:relative}
.dd-btn{display:flex;align-items:center;gap:8px;width:100%;min-height:40px;padding:7px 10px;border:1px solid rgba(255,102,0,.22);border-radius:10px;background:#101010;color:var(--text);cursor:pointer;text-align:left;font:inherit}
.dd-btn:hover{border-color:rgba(255,102,0,.45)}
.dd-icon{width:22px;height:22px;flex-shrink:0;object-fit:contain}
.dd-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.dd-chev{flex-shrink:0;color:var(--muted);font-size:10px}
.dd-menu{position:absolute;left:0;right:0;top:calc(100% + 4px);max-height:min(50vh,260px);overflow-y:auto;z-index:50;background:#1a1a1a;border:1px solid rgba(255,102,0,.28);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);padding:4px 0}
.dd-menu[hidden]{display:none!important}
.dd-item{display:flex;align-items:center;gap:8px;width:calc(100% - 8px);margin:0 4px;border:none;border-radius:8px;background:transparent;color:var(--text);padding:8px 10px;cursor:pointer;text-align:left;font:inherit}
.dd-item:hover,.dd-item.dd-active{background:rgba(255,102,0,.14)}
.dd-item .dd-icon{width:22px;height:22px}
.fld-dd .dd{margin-top:4px}
.vh-select{position:absolute;opacity:0;pointer-events:none;width:0;height:0;overflow:hidden;border:none;padding:0;margin:0}
.sf{padding:12px 16px 14px;border-top:1px solid rgba(255,102,0,.15);display:flex;justify-content:space-between;gap:12px;align-items:center}
#ftb-toolbar-tpl{display:none}
.session-tabs{display:flex;flex-wrap:nowrap;gap:5px;padding:8px 10px 10px;border-bottom:1px solid rgba(255,102,0,.12);overflow-x:auto;flex-shrink:0;align-items:center;background:rgba(0,0,0,.12)}
.session-tabs::-webkit-scrollbar{height:4px}
.stab{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;max-width:104px;padding:5px 6px 5px 7px;border-radius:10px;border:1px solid rgba(255,102,0,.2);background:rgba(255,255,255,.04);cursor:pointer;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden}
.stab:hover{background:rgba(255,102,0,.1)}
.stab.active{border-color:rgba(255,102,0,.55);background:rgba(255,102,0,.14);color:var(--orange)}
.stab-ico{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;flex-shrink:0;background:rgba(0,0,0,.25);padding:2px}
.stab-ico-img{width:18px;height:18px;display:block;object-fit:contain}
.stab-t{overflow:hidden;text-overflow:ellipsis;min-width:0;max-width:56px;font-weight:600}
.stab-x{flex-shrink:0;width:18px;height:18px;border:none;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center}
.stab-x:hover{color:#ff7a59;background:rgba(255,255,255,.08)}
.stab-add{flex-shrink:0;width:32px;height:32px;padding:0;border-radius:10px;border:1px dashed rgba(255,102,0,.35);background:transparent;color:var(--orange);cursor:pointer;font-size:18px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center}
.stab-add:hover{background:rgba(255,102,0,.08)}
#newSessionPick{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity var(--de);z-index:42}
body.nspick-open #newSessionPick{opacity:1;pointer-events:auto}
.nsbg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.ns-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(380px,calc(100% - 28px));max-height:min(440px,72vh);background:var(--panel2);border:1px solid rgba(255,102,0,.28);border-radius:18px;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.45)}
.nsh{padding:12px 14px;border-bottom:1px solid rgba(255,102,0,.15);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.nst{font-size:14px;font-weight:700}
.nst2{font-size:11px;color:var(--muted);margin-top:3px}
.ns-grid{flex:1;overflow:auto;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ns-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border:1px solid rgba(255,102,0,.2);border-radius:12px;background:rgba(255,255,255,.04);cursor:pointer;color:var(--text)}
.ns-item:hover{background:rgba(255,102,0,.12);border-color:rgba(255,102,0,.45)}
.ns-item .stab-ico{width:40px;height:40px;border-radius:12px;padding:4px}
.ns-item .stab-ico-img{width:28px;height:28px}
.ns-lab{font-size:11px;font-weight:600;text-align:center;line-height:1.25;word-break:break-all}
</style>
</head>
<body>
<div id="app">
<template id="ftb-toolbar-tpl">
<div class="tb" data-action="Search" title="搜索"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div class="bubble">Selection Ready</div><span class="dot"></span></div>
<div class="tb" data-action="Record" title="记录"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3.8-1 10-10a2.3 2.3 0 0 0-3.3-3.3l-10 10L3 21z"/><path d="M12.9 4.9l3.3 3.3"/></svg><span class="dot"></span></div>
<div class="tb" data-action="Prompt" title="提示词"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2"><path d="M12 3c4.97 0 9 3.58 9 8 0 1.8-.67 3.47-1.8 4.82L20 21l-5.02-1.67A10.53 10.53 0 0 1 12 20c-4.97 0-9-3.58-9-8s4.03-9 9-9Z"/></svg><span class="dot"></span></div>
<div class="tb" data-action="NewPrompt" title="草稿本"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h11a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg><span class="dot"></span></div>
<div class="tb" data-action="Screenshot" title="截图"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.5"/></svg><span class="dot"></span></div>
<div class="tb" data-action="Settings" title="设置"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="dot"></span></div>
<div class="tb" data-action="VirtualKeyboard" title="键盘"><svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="2.5"/><path d="M6 9h1"/><path d="M9 9h1"/><path d="M12 9h1"/><path d="M15 9h1"/><path d="M18 9h1"/><path d="M6 12h1"/><path d="M9 12h1"/><path d="M12 12h1"/><path d="M15 12h1"/><path d="M18 12h1"/><path d="M7 15h10"/></svg><span class="dot"></span></div>
</template>
<div id="collapsedRoot">
<button type="button" class="logo-btn" data-logo-toggle title="牛马 / NiuMa Chat"><img class="logo-img" alt="" /></button>
<div id="collapsedBtns" class="icon-btns"></div>
</div>
<div id="drawerRoot">
<div id="stage">
<div id="backdrop"></div>
<aside id="panel">

  function $(id) {
    return document.getElementById(id);

  function normalizeProviderId(pid) {
    pid = String(pid || '').trim();
    if (pid === 'llama') return 'ollama';

  var _th = _tpl ? _tpl.innerHTML : '';
  var DEFAULT_TOOLBAR_ACTIONS = ['Search', 'Record', 'Prompt', 'NewPrompt', 'Screenshot', 'Settings', 'VirtualKeyboard'];
  function normalizeToolbarActions(actions) {
    var src = Array.isArray(actions) ? actions : DEFAULT_TOOLBAR_ACTIONS;
    var allow = { Search:1, Record:1, Prompt:1, NewPrompt:1, Screenshot:1, Settings:1, VirtualKeyboard:1 };
    var out = [];
    var seen = {};
    src.forEach(function (x) {
      var id = String(x || '').trim();
      if (!id || !allow[id] || seen[id]) return;
      seen[id] = 1;
      out.push(id);
    });
    if (!out.length) out = DEFAULT_TOOLBAR_ACTIONS.slice();
    return out;
  }
  function buildToolbarHtmlByActions(actions) {
    var wrap = document.createElement('div');
    wrap.innerHTML = _th;
    var map = {};
    Array.prototype.slice.call(wrap.querySelectorAll('.tb[data-action]')).forEach(function (el) {
      map[el.getAttribute('data-action') || ''] = el.outerHTML;
    });
    return normalizeToolbarActions(actions).map(function (id) { return map[id] || ''; }).join('');
  }
  function rebuildToolbarButtons(actions) {
    state.toolbarActions = normalizeToolbarActions(actions);
    var html = buildToolbarHtmlByActions(state.toolbarActions);
    $('collapsedBtns').innerHTML = html;
    $('drawerBtns').innerHTML = html;
    bindSearchDnD();
    if (state.activeAction) sel(state.activeAction);
  }

  function revealToolbarSync() {
    if (toolbarVisibleSynced) return;
    toolbarVisibleSynced = true;
    document.body.classList.add('ftb-ready');
  }

  function scheduleToolbarReveal(ms) {
    if (toolbarVisibleSynced) return;
    if (toolbarRevealTimer) clearTimeout(toolbarRevealTimer);
    toolbarRevealTimer = setTimeout(revealToolbarSync, ms);
  }

  function post(m) {
    try {
      if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) window.chrome.webview.postMessage(m);

  function sel(a) {

      setNspick(false);

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function ahk(code) {
    var h = esc(code);
    h = h.replace(/(^|\n)(\s*;.*)/g, function (m, p1, p2) {
      return p1 + '<span class="hl-comment">' + p2 + '</span>';
    });
    h = h.replace(/("(?:[^"\\]|\\.)*")/g, '<span class="hl-string">$1</span>');
    h = h.replace(/('(?:[^'\\]|\\.)*')/g, '<span class="hl-string">$1</span>');
    h = h.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="hl-number">$1</span>');
    h = h.replace(/\b(global|local|static|if|else|try|catch|return|switch|case|default|for|while|loop|break|continue|class|extends|throw)\b/g, '<span class="hl-keyword">$1</span>');
    h = h.replace(/\b(Map|Array|Gui|Error|Integer|Float|String|Trim|Format|RegExMatch|SetTimer|Send|Sleep|FileRead|FileAppend|IniRead|IniWrite)\b/g, '<span class="hl-builtins">$1</span>');
    h = h.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\b(?=\s*:=)/g, '<span class="hl-var">$1</span>');
    return h;
  }

  /** API 常返回 <br> / 已转义的换行，先换成 \n 再走 Markdown，避免屏上显示字面量 <br> */
  function preMarkdownForChat(s) {
    s = String(s || '').replace(/\r\n/g, '\n');
    s = s.replace(/<br\s*\/?>/gi, '\n');
    s = s.replace(/&lt;\s*br\s*\/?\s*&gt;/gi, '\n');
    return s;
  }

  function inline(t) {
    var h = esc(t);
    h = h.replace(/`([^`]+)`/g, '<code class="inline">$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    return h;
  }

  function md(src) {
    src = String(src || '').replace(/\r\n/g, '\n');
    var out = [],
      rx = /```(\w+)?\n([\s\S]*?)```/g,
      last = 0,
      m;
    while ((m = rx.exec(src))) {
      if (m.index > last) out.push({ t: 'text', c: src.slice(last, m.index) });
      out.push({ t: 'code', l: (m[1] || '').toLowerCase(), c: m[2] });
      last = rx.lastIndex;
    }
    if (last < src.length) out.push({ t: 'text', c: src.slice(last) });
    return out
      .map(function (b) {
        if (b.t === 'code') {
          var hi = b.l === 'ahk' || b.l === 'autohotkey' || b.l === 'autohotkeyv2' ? ahk(b.c) : esc(b.c);
          return '<pre><code>' + hi + '</code></pre>';
        }
        return b.c
          .split(/\n{2,}/)
          .map(function (chunk) {
            var t = chunk.trim();
            if (!t) return '';
            if (/^\s*>\s?/.test(t)) return '<blockquote>' + inline(t.replace(/^\s*>\s?/gm, '').replace(/\n/g, '<br>')) + '</blockquote>';
            if (/^\s*[-*]\s+/m.test(t)) {
              var items = t
                .split('\n')
                .map(function (line) {
                  return line.replace(/^\s*[-*]\s+/, '').trim();
                })
                .filter(Boolean);
              return '<ul>' + items.map(function (i) { return '<li>' + inline(i) + '</li>'; }).join('') + '</ul>';
            }
            if (/^#{1,3}\s+/.test(t)) {
              var lv = t.match(/^#+/)[0].length,
                cl = t.replace(/^#{1,3}\s+/, '');
              return '<h' + lv + '>' + inline(cl) + '</h' + lv + '>';
            }
            return '<p>' + inline(t.replace(/\n/g, '<br>')) + '</p>';
          })
          .join('');
      })
      .join('');
  }

  function genId() {
    return 's' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function activeSession() {
    var list = state.sessions,
      id = state.activeSessionId;
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === id) return list[i];
    }
    return list[0] || null;
  }

  function normalizeRole(role) {
    var r = String(role || '').toLowerCase().trim();
    if (r === 'assistant' || r === 'ai') return 'assistant';
    if (r === 'human' || r === 'user') return 'user';
    return '';
  }

  function ensureIsoTime(ts) {
    if (!ts) return new Date().toISOString();
    var t = new Date(ts);
    if (isNaN(t.getTime())) return new Date().toISOString();
    return t.toISOString();
  }

  /** 从 Gateway / 持久化 JSON 中取出可展示正文（含 parts[]、嵌套 content） */
  function ocExtractMessageContentForHistory(m) {
    if (!m || typeof m !== 'object') return '';
    /* 勿在 content==="" 时提前返回：网关常把正文放在 text / parts，content 仅占位空串 */
    var strFields = ['content', 'text', 'message', 'body', 'input', 'output', 'prompt', 'value'];
    for (var si = 0; si < strFields.length; si++) {
      var sf = m[strFields[si]];
      if (typeof sf === 'string' && sf.trim()) return sf.trim();
    }
    var acc = [];
    if (m.content != null && typeof m.content !== 'string') ocCollectTextDeep(m.content, acc);
    if (!acc.length && m.message != null && typeof m.message !== 'string') ocCollectTextDeep(m.message, acc);
    if (!acc.length && Array.isArray(m.parts)) {
      for (var pi = 0; pi < m.parts.length; pi++) {
        var p = m.parts[pi];
        if (p && typeof p === 'object') ocCollectTextDeep(p, acc);
      }
    }
    if (acc.length) return acc.join('\n').trim();
    return '';
  }

  function normalizeHistoryItem(m) {
    if (!m || typeof m !== 'object') return null;
    var role = normalizeRole(m.role || m.type || m.actor);
    if (!role) return null;
    var content = ocExtractMessageContentForHistory(m);
    if (!content) return null;
    return { role: role, content: content, ts: ensureIsoTime(m.ts || m.timestamp || m.createdAt || m.updatedAt) };
  }

  function historyItemKey(m) {
    var sec = '';
    try {
      sec = Math.floor(new Date(m.ts || 0).getTime() / 1000) || '';
    } catch (e) {}
    return [m.role || '', m.content || '', sec].join('|');
  }

  function mergeHistoryList(base, extra) {
    var out = [],
      seen = {};
    (Array.isArray(base) ? base : []).forEach(function (m) {
      var n = normalizeHistoryItem(m);
      if (!n) return;
      var k = historyItemKey(n);
      if (seen[k]) return;
      seen[k] = 1;
      out.push(n);
    });
    (Array.isArray(extra) ? extra : []).forEach(function (m) {
      var n = normalizeHistoryItem(m);
      if (!n) return;
      var k = historyItemKey(n);
      if (seen[k]) return;
      seen[k] = 1;
      out.push(n);
    });
    return out;
  }

  function getOpenClawSessionKey(s) {
    if (s) {
      var own = String(s.gatewaySessionKey || '').trim();
      if (own) return own;
    }
    try {
      var lk = String(localStorage.getItem('openclaw2_lastSessionKey') || '').trim();
      if (lk) return lk;
    } catch (e) {}
    return 'main';
  }

  function historyStoreKeyForSession(s) {
    if (!s) return '';
    if (s.provider === 'openclaw') return 'openclaw:' + getOpenClawSessionKey(s);
    return 'local:' + String(s.id || '');
  }

  function loadNiumaHistoryStoreFromLocal() {
    var raw = null;
    try {
      raw = localStorage.getItem(NIUMA_HISTORY_LS);
    } catch (e) {}
    if (!raw) return { version: 1, sessions: {}, updatedAt: null };
    try {
      var obj = JSON.parse(raw);
      if (!obj || typeof obj !== 'object') throw new Error('invalid');
      if (!obj.sessions || typeof obj.sessions !== 'object') obj.sessions = {};
      return obj;
    } catch (e2) {
      return { version: 1, sessions: {}, updatedAt: null };
    }
  }

  function saveNiumaHistoryStoreToLocal() {
    try {
      localStorage.setItem(NIUMA_HISTORY_LS, JSON.stringify(state.niumaHistoryStore || { version: 1, sessions: {}, updatedAt: null }));
    } catch (e) {}
  }

  function pushSessionHistoryToStore(s) {
    if (!s) return;
    if (!state.niumaHistoryStore || typeof state.niumaHistoryStore !== 'object') state.niumaHistoryStore = { version: 1, sessions: {}, updatedAt: null };
    if (!state.niumaHistoryStore.sessions || typeof state.niumaHistoryStore.sessions !== 'object') state.niumaHistoryStore.sessions = {};
    var key = historyStoreKeyForSession(s);
    if (!key) return;
    var merged = mergeHistoryList(state.niumaHistoryStore.sessions[key] || [], s.history || []);
    state.niumaHistoryStore.sessions[key] = merged.slice(-400);
    state.niumaHistoryStore.updatedAt = new Date().toISOString();
    saveNiumaHistoryStoreToLocal();
    fetch(NIUMA_HISTORY_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: state.niumaHistoryStore })
    }).catch(function () {});
  }

  function pullStoreHistoryToSession(s) {
    if (!s) return;
    if (!state.niumaHistoryStore || !state.niumaHistoryStore.sessions) return;
    var key = historyStoreKeyForSession(s);
    if (!key) return;
    var arr = state.niumaHistoryStore.sessions[key];
    if ((!Array.isArray(arr) || !arr.length) && s.provider === 'openclaw') {
      var sk = getOpenClawSessionKey(s);
      var collected = [];
      state.sessions.forEach(function (x) {
        if (!x || x.id === s.id || x.provider !== 'openclaw') return;
        if (getOpenClawSessionKey(x) !== sk) return;
        collected = mergeHistoryList(collected, x.history || []);
      });
      arr = collected;
    }
    if (!Array.isArray(arr) || !arr.length) return;
    s.history = mergeHistoryList(s.history || [], arr).slice(-400);
  }

  function loadNiumaHistoryStore() {
    state.niumaHistoryStore = loadNiumaHistoryStoreFromLocal();
    state.niumaHistoryLoaded = true;
    fetch(NIUMA_HISTORY_API, { method: 'GET', cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('history api');
        return r.json();
      })
      .then(function (body) {
        var data = body && body.data ? body.data : body;
        if (!data || typeof data !== 'object' || !data.sessions || typeof data.sessions !== 'object') return;
        if (!state.niumaHistoryStore.sessions || typeof state.niumaHistoryStore.sessions !== 'object') state.niumaHistoryStore.sessions = {};
        Object.keys(data.sessions).forEach(function (k) {
          state.niumaHistoryStore.sessions[k] = mergeHistoryList(state.niumaHistoryStore.sessions[k] || [], data.sessions[k] || []).slice(-400);
        });
        state.niumaHistoryStore.updatedAt = data.updatedAt || state.niumaHistoryStore.updatedAt || new Date().toISOString();
        saveNiumaHistoryStoreToLocal();
      })
      .catch(function () {});
  }

  function persistSessions() {
    try {
      localStorage.setItem(
        SESSIONS_LS,
        JSON.stringify({ v: 1, activeSessionId: state.activeSessionId, sessions: state.sessions })
      );
    } catch (e) {
      cstat('本地存储可能已满，请导出后删除部分对话标签。', 'error');
    }
  }

  function loadSessions() {
    var raw = null;
    try {
      raw = localStorage.getItem(SESSIONS_LS);
    } catch (e) {}
    state.sessions = [];
    state.activeSessionId = '';
    if (!raw) return;
    var data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      return;
    }
    if (!data || !Array.isArray(data.sessions)) return;
    state.sessions = data.sessions.map(function (s) {
      var sp = normalizeProviderId(s.provider);
      var pid = sp && P[sp] ? sp : 'openai';
      var gk = String(s.gatewaySessionKey || '').trim();
      return {
        id: s.id || genId(),
        provider: pid,
        model: s.model || '',
        baseUrl: s.baseUrl || '',
        gatewaySessionKey: pid === 'openclaw' ? gk || 'main' : '',
        history: Array.isArray(s.history)
          ? s.history.map(function (m) {
              var n = normalizeHistoryItem(m);
              if (!n) return null;
              return {
                role: n.role,
                content: n.content,
                ts: n.ts
              };
            }).filter(Boolean)
          : []
      };
    });
    state.activeSessionId = data.activeSessionId || (state.sessions[0] && state.sessions[0].id) || '';
  }

  function createSessionFromForm() {
    var pv = normalizeProviderId(provider.value);
    var pid = pv && P[pv] ? pv : 'openai';
    var p = P[pid] || P.openai;
    return {
      id: genId(),
      provider: pid,
      model: model.value.trim() || p.model,
      baseUrl: baseUrl.value.trim(),
      gatewaySessionKey: pid === 'openclaw' ? 'main' : '',
      history: []
    };
  }

  function ensureSessions() {
    if (state.sessions.length === 0) {
      var s = createSessionFromForm();
      state.sessions.push(s);
      state.activeSessionId = s.id;
      persistSessions();
    } else if (!state.activeSessionId || !activeSession()) {
      state.activeSessionId = state.sessions[0].id;
    }
  }

  function syncFormFromSession(s) {
    if (!s) return;
    var sp = normalizeProviderId(s.provider);
    var pid = sp && P[sp] ? sp : 'openai';
    provider.value = pid;
    fillModels(pid, s.model);
    var p = P[pid] || P.openai;
    model.value = s.model || p.model;
    baseUrl.value = (s.baseUrl || '').trim() || p.baseUrl;
    hint(pid);
    apiKey.value = (state.apiKeys && state.apiKeys[pid]) || '';
    refreshApiKeyField(pid);
    provider.dataset.prevProv = pid;
    syncProviderDdUi();
  }

  function syncSessionFromForm(s) {
    if (!s) return;
    var pv = normalizeProviderId(provider.value);
    var pid = pv && P[pv] ? pv : 'openai';
    var p = P[pid] || P.openai;
    s.provider = pid;
    s.model = model.value.trim() || p.model;
    s.baseUrl = baseUrl.value.trim();
    if (pid !== 'openclaw') s.gatewaySessionKey = '';
    else if (!String(s.gatewaySessionKey || '').trim()) s.gatewaySessionKey = 'main';
  }

  function providerIconUrlList(pid) {
    pid = pid && P[pid] ? pid : 'openai';
    var bases = PROVIDER_ICON_BASES[pid];
    if (!bases || !bases.length) bases = [pid];
    var list = [];
    bases.forEach(function (base) {
      PROVIDER_ICON_EXTS.forEach(function (ext) {
        list.push(ICON_SECOND + base + ext);
      });
    });
    list.push(ICON_PRIMARY + pid + '.svg');
    list.push(ICON_SECOND + pid + '.svg');
    list.push(ICON_FALLBACK);
    var seen = {},
      out = [];
    list.forEach(function (u) {
      if (!seen[u]) {
        seen[u] = 1;
        out.push(u);
      }
    });
    return out;
  }

  function bindProviderIconImg(img, pid, extraClass) {
    img.alt = '';
    img.loading = 'lazy';
    img.className = 'stab-ico-img' + (extraClass ? ' ' + extraClass : '');
    var urls = providerIconUrlList(pid);
    var idx = 0;
    img.onerror = function () {
      idx += 1;
      if (idx < urls.length) {
        this.src = urls[idx];
      } else {
        this.onerror = null;
      }
    };
    img.removeAttribute('src');
    img.src = urls[0];
  }

  function refreshApiKeyField(pid) {
    var km = KEYMETA[pid] || {},
      lab = apiKeyLabel,
      kh = apiKeyKeyHint;
    if (lab) lab.textContent = km.keyLabel || 'API Key';
    apiKey.placeholder = km.keyPlaceholder || '填写密钥';
    if (kh) {
      if (km.keyHint) {
        kh.textContent = km.keyHint;
        kh.style.display = '';
      } else {
        kh.textContent = '';
        kh.style.display = 'none';
      }
    }
  }

  function migrateApiKeysFromStorage(d) {
    state.apiKeys = {};
    if (d.apiKeys && typeof d.apiKeys === 'object') {
      Object.keys(d.apiKeys).forEach(function (k) {
        var nk = normalizeProviderId(k);
        if (d.apiKeys[k] != null) state.apiKeys[nk] = String(d.apiKeys[k]);
      });
    }
    if (!Object.keys(state.apiKeys).length && d.apiKey) {
      var dp = normalizeProviderId(d.provider);
      var lk = dp && P[dp] ? dp : 'openai';
      state.apiKeys[lk] = String(d.apiKey);
    }
  }

  function fillPromptBuiltinSelect() {
    if (!promptBuiltin) return;
    var opts = '<option value="">— 内置模版 —</option>';
    PROMPT_BUILTIN.forEach(function (t) {
      opts += '<option value="' + esc(t.id) + '">' + esc(t.name) + '</option>';
    });
    promptBuiltin.innerHTML = opts;
    promptBuiltin.value = '';
  }

  function applySelectedPromptBuiltin() {
    if (!promptBuiltin || !promptBuiltin.value) {
      sstat('请先在列表中选择一个内置模版。', 'error');
      return;
    }
    var id = promptBuiltin.value,
      found = null;
    for (var i = 0; i < PROMPT_BUILTIN.length; i++) {
      if (PROMPT_BUILTIN[i].id === id) {
        found = PROMPT_BUILTIN[i];
        break;
      }
    }
    if (!found) return;
    systemPrompt.value = found.text;
    saveCfg(false);
    sstat('已应用模版：' + found.name, 'success');

  function shortModel(m) {
    m = String(m || '').trim();
    if (!m) return '…';
    var tail = m.replace(/^.*\//, '');
    if (tail.length > 9) return tail.slice(0, 7) + '…';
    return tail;
  }

  function tabTitleForSession(s) {
    var pl = (P[s.provider] || {}).label || s.provider || '';
    return pl + ' · ' + shortModel(s.model);
  }

  function renderSessionTabs() {
    if (!sessionTabsEl) return;
    sessionTabsEl.innerHTML = '';
    state.sessions.forEach(function (s) {
      var wrap = document.createElement('div');
      wrap.className = 'stab' + (s.id === state.activeSessionId ? ' active' : '');
      wrap.setAttribute('role', 'tab');
      wrap.dataset.sessionId = s.id;
      wrap.setAttribute('title', tabTitleForSession(s));
      var ico = document.createElement('span');
      ico.className = 'stab-ico';
      ico.setAttribute('aria-hidden', 'true');
      var im = document.createElement('img');
      bindProviderIconImg(im, s.provider);
      ico.appendChild(im);
      var t = document.createElement('span');
      t.className = 'stab-t';
      t.textContent = shortModel(s.model);
      var x = document.createElement('button');
      x.type = 'button';
      x.className = 'stab-x';
      x.setAttribute('aria-label', '关闭标签');
      x.textContent = '×';
      x.setAttribute('data-close-session', s.id);
      wrap.appendChild(ico);
      wrap.appendChild(t);
      wrap.appendChild(x);
      sessionTabsEl.appendChild(wrap);
    });
    var addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'stab-add';
    addBtn.id = 'sessionTabAdd';
    addBtn.textContent = '+';
    addBtn.setAttribute('title', '选择 AI 新建对话');
    addBtn.setAttribute('aria-label', '选择 AI 新建对话');
    sessionTabsEl.appendChild(addBtn);
    refreshSendUi();
  }

  function emptyState() {
    var s = activeSession();
    empty.style.display = s && s.history.length ? 'none' : '';
  }

  function appendMessageDom(role, content, ts) {
    var w = document.createElement('article');
    w.className = 'm ' + role;
    var title = role === 'user' ? 'User' : 'Assistant';
    var timeStr = ts
      ? (function () {
          try {
            return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          } catch (e) {
            return '';
          }
        })()
      : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    var normalized = preMarkdownForChat(content);
    var bodyHtml = md(normalized);
    if (!String(bodyHtml || '').replace(/\s/g, '') && String(normalized || '').trim())
      bodyHtml = '<p>' + esc(normalized).replace(/\n/g, '<br>') + '</p>';
    w.innerHTML =
      '<div class="mh"><span>' +
      title +
      '</span><span>' +
      timeStr +
      '</span></div><div class="mb">' +
      bodyHtml +
      '</div>';
    msgs.appendChild(w);
  }

  function rebuildMsgList() {
    msgs.querySelectorAll('article.m').forEach(function (n) {
      n.remove();
    });
    var s = activeSession();
    if (!s) {
      emptyState();
      return;
    }
    s.history.forEach(function (item) {
      if (!item || !item.role) return;
      var raw = item.content != null ? String(item.content) : '';
      var disp = raw.trim() ? raw : ocExtractMessageContentForHistory(item);
      if (!String(disp || '').trim()) disp = '（无正文）';
      appendMessageDom(item.role, disp, item.ts);
    });
    emptyState();
    scrollMsgsToLatest();
  }

  function add(role, content) {
    var s = activeSession();
    if (!s) return;
    var ts = new Date().toISOString();
    var n = normalizeHistoryItem({ role: role, content: content, ts: ts });
    if (!n) return;
    s.history.push(n);
    persistSessions();
    pushSessionHistoryToStore(s);
    emptyState();
    appendMessageDom(n.role, n.content, n.ts);
    scrollMsgsToLatest();
    renderSessionTabs();
  }

  function clearChatSearchHit() {
    msgs.querySelectorAll('article.m.search-hit').forEach(function (n) {
      n.classList.remove('search-hit');
    });
  }

  function runChatSearchPrompt() {
    var kw = prompt('搜索聊天记录', state.chatSearchKeyword || '');
    if (kw == null) return;
    kw = String(kw || '').trim();
    if (!kw) {
      state.chatSearchKeyword = '';
      state.chatSearchCursor = -1;
      clearChatSearchHit();
      cstat('已清空搜索关键词');
      return;
    }
    var all = Array.prototype.slice.call(msgs.querySelectorAll('article.m'));
    var matched = all.filter(function (node) {
      return String(node.textContent || '').toLowerCase().indexOf(kw.toLowerCase()) >= 0;
    });
    if (!matched.length) {
      clearChatSearchHit();
      state.chatSearchKeyword = kw;
      state.chatSearchCursor = -1;
      cstat('未找到：' + kw, 'error');
      return;
    }
    if (state.chatSearchKeyword !== kw) state.chatSearchCursor = -1;
    state.chatSearchKeyword = kw;
    state.chatSearchCursor = (state.chatSearchCursor + 1) % matched.length;
    clearChatSearchHit();
    var target = matched[state.chatSearchCursor];
    target.classList.add('search-hit');
    try {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (_) {
      target.scrollIntoView();
    }
    cstat('搜索命中 ' + (state.chatSearchCursor + 1) + '/' + matched.length + '：' + kw, 'success');
  }

  function switchSession(id) {
    if (id === state.activeSessionId) return;
    var cur = activeSession();
    syncSessionFromForm(cur);
    pushSessionHistoryToStore(cur);
    persistSessions();
    state.activeSessionId = id;
    var target = activeSession();
    pullStoreHistoryToSession(target);
    syncFormFromSession(target);
    rebuildMsgList();
    renderSessionTabs();
    updateNeedSetup();
    refreshSendUi();
    if (target && target.provider === 'openclaw') hydrateOpenClawHistoryForSession(target, false);
  }

      btn.type = 'button';

  function createSessionWithProvider(pid) {

  function removeSession(id) {
    if (state.sessions.length <= 1) {
      cstat('至少保留一个对话标签。', 'error');
      return;
    }
    var cur = activeSession();
    if (cur && cur.id === id) syncSessionFromForm(cur);
    var idx = -1;
    for (var i = 0; i < state.sessions.length; i++) {
      if (state.sessions[i].id === id) {
        idx = i;
        break;
      }
    }
    if (idx < 0) return;
    state.sessions.splice(idx, 1);
    if (state.activeSessionId === id) {
      state.activeSessionId = state.sessions[Math.max(0, idx - 1)].id;

  function openClawEndpointFromCfg(cfg) {
    var raw = (cfg.baseUrl || '').trim();
    var token = (cfg.apiKey || '').trim();
    var host = '127.0.0.1';
    var port = 18789;
    try {
      var u = new URL(raw.indexOf('://') >= 0 ? raw : 'http://' + raw);
      host = u.hostname || host;
      if (u.port) port = parseInt(u.port, 10) || port;
      if (u.hash && u.hash.indexOf('token=') >= 0) {
        var sp = new URLSearchParams(u.hash.replace(/^#/, '?'));
        var ht = (sp.get('token') || '').trim();
        if (ht) token = ht;
      }
    } catch (e) {}
    if (!token || !host) return { ok: false };
    return { ok: true, host: host, port: port, token: token };
  }

    var k = getApiKeyForProvider(sp);
    if (p.transport === 'openclaw') {
      state.needSetup = !openClawEndpointFromCfg({ baseUrl: url, apiKey: k, provider: sp }).ok;
      return;

    if (sp === 'ollama') {

  function oaUrl(u) {
    u = String(u || '').replace(/\/+$/, '');
    if (/\/chat\/completions$/i.test(u)) return u;
    if (/\/v\d+(?:\.\d+)?$/i.test(u)) return u + '/chat/completions';
    return u + '/chat/completions';
  }

  function claudeUrl(u) {
    u = String(u || '').replace(/\/+$/, '');
    if (/\/v1\/messages$/i.test(u)) return u;
    if (/\/v1$/i.test(u)) return u + '/messages';
    return u + '/v1/messages';
  }

  function geminiUrl(u, m, k) {
    u = String(u || '').replace(/\/+$/, '');
    var p = '/models/' + encodeURIComponent(m) + ':generateContent?key=' + encodeURIComponent(k);
    if (/\/v1beta$/i.test(u) || /\/v1$/i.test(u)) return u + p;
    return u + '/v1beta' + p;
  }

  function norm(c) {
    if (typeof c === 'string') return c;
    if (Array.isArray(c))
      return c
        .map(function (p) {
          if (typeof p === 'string') return p;
          if (p && typeof p.text === 'string') return p.text;
          return '';
        })
        .join('\n')
        .trim();
    return '';
  }

  function oaMsgs(cfg) {
    var m = [];
    if (cfg.systemPrompt) m.push({ role: 'system', content: cfg.systemPrompt });
    var h = activeSession() ? activeSession().history : [];
    h.forEach(function (i) {
      m.push({ role: i.role, content: i.content });
    });
    return m;
  }

  function claudeMsgs() {
    var h = activeSession() ? activeSession().history : [];
    return h.map(function (i) {
      return { role: i.role === 'assistant' ? 'assistant' : 'user', content: i.content };
    });
  }

  function geminiMsgs() {
    var h = activeSession() ? activeSession().history : [];
    return h.map(function (i) {
      return { role: i.role === 'assistant' ? 'model' : 'user', parts: [{ text: i.content }] };
    });
  }

  async function reqOpenAI(cfg) {
    var h = { 'Content-Type': 'application/json' };
    if (cfg.apiKey) h.Authorization = 'Bearer ' + cfg.apiKey;
    var r = await fetch(oaUrl(cfg.baseUrl), {
      method: 'POST',
      headers: h,
      body: JSON.stringify({ model: cfg.model, messages: oaMsgs(cfg), temperature: 0.7 })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + (await r.text()));
    var d = await r.json(),
      c = '';
    try {
      c = norm(d.choices[0].message.content);
    } catch (e) {
      c = '';
    }
    if (!c) throw new Error('响应中没有可显示的内容。');
    return c;
  }

  async function reqClaude(cfg) {
    var r = await fetch(claudeUrl(cfg.baseUrl), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: cfg.model,
        system: cfg.systemPrompt || '',
        max_tokens: 2048,
        messages: claudeMsgs()
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + (await r.text()));
    var d = await r.json(),
      c = '';
    try {
      c = (d.content || [])
        .map(function (p) {
          return p && p.type === 'text' ? p.text || '' : '';
        })

  async function reqGemini(cfg) {
    var body = { contents: geminiMsgs(), generationConfig: { temperature: 0.7 } };
    if (cfg.systemPrompt) body.systemInstruction = { parts: [{ text: cfg.systemPrompt }] };
    var r = await fetch(geminiUrl(cfg.baseUrl, cfg.model, cfg.apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + (await r.text()));
    var d = await r.json(),
      c = '';
    try {
      var parts = (((d.candidates || [])[0] || {}).content || {}).parts || [];
      c = parts
        .map(function (p) {
          return p && typeof p.text === 'string' ? p.text : '';
        })
        .join('\n')
        .trim();

  function ocExtractText(v) {
    if (v == null) return '';
    if (typeof v === 'object')
      return String(v.text || v.content || v.message || v.body || v.value || '').trim();
    var s = String(v).trim();
    if (!s) return '';
    try {
      var o = JSON.parse(s);
      if (o && typeof o === 'object') return String(o.text || o.content || o.message || s).trim();
    } catch (e) {}
    return s;
  }

  function ocCollectTextDeep(v, out) {
    if (v == null) return;
    if (typeof v === 'string') {
      var t = v.trim();
      if (t) out.push(t);
      return;
    }
    if (Array.isArray(v)) {
      for (var i = 0; i < v.length; i++) ocCollectTextDeep(v[i], out);
      return;
    }
    if (typeof v === 'object') {
      if (typeof v.text === 'string' && v.text.trim()) out.push(v.text.trim());
      if (typeof v.message === 'string' && v.message.trim()) out.push(v.message.trim());
      if (typeof v.content === 'string' && v.content.trim()) out.push(v.content.trim());
      if (typeof v.body === 'string' && v.body.trim()) out.push(v.body.trim());
      if (typeof v.value === 'string' && v.value.trim()) out.push(v.value.trim());
      if (v.content && typeof v.content !== 'string') ocCollectTextDeep(v.content, out);
      if (v.delta) ocCollectTextDeep(v.delta, out);
      if (v.output) ocCollectTextDeep(v.output, out);
      if (v.response) ocCollectTextDeep(v.response, out);
      if (v.result) ocCollectTextDeep(v.result, out);
      if (v.data) ocCollectTextDeep(v.data, out);
      if (v.payload) ocCollectTextDeep(v.payload, out);
      if (v.message && typeof v.message !== 'string') ocCollectTextDeep(v.message, out);
      if (v.parts) ocCollectTextDeep(v.parts, out);
      if (v.output_text) ocCollectTextDeep(v.output_text, out);
      if (v.assistant) ocCollectTextDeep(v.assistant, out);
      if (Array.isArray(v.choices)) {
        for (var c = 0; c < v.choices.length; c++) {
          var ch = v.choices[c];
          if (ch && typeof ch === 'object') {
            ocCollectTextDeep(ch.message || ch.delta || ch, out);
          }
        }
      }
    }
  }

  /** OpenClaw broadcast("chat", payload)：正文在 message.content[].text，而非旧版 response.text */
  function ocExtractChatEventPayload(pl) {
    if (!pl || typeof pl !== 'object') return '';
    if (pl.state === 'error') return '';
    var msg =
      pl.message ||
      pl.assistant ||
      pl.assistantMessage ||
      pl.data ||
      pl.response ||
      pl.result ||
      pl.output ||
      pl.delta ||
      pl.payload;
    if (msg == null) msg = pl;
    if (typeof msg === 'string') return String(msg).trim();
    var acc = [];
    ocCollectTextDeep(msg, acc);
    if (acc.length) return acc.join('\n').trim();
    acc = [];
    ocCollectTextDeep(pl, acc);
    if (acc.length) return acc.join('\n').trim();
    return ocExtractText(msg) || ocExtractText(pl);
  }

  /**
   * 与 openclaw2 控制台一致：顶层常为 type:event + payload.event===chat，
   * 而非 msg.event===chat（否则 NiuMa 永远等不到 final，45s 超时）。
   */
  function ocGetChatBroadcastPayload(msg) {
    if (!msg || typeof msg !== 'object') return null;
    if (msg.payload != null && typeof msg.payload === 'object' && msg.event === 'chat') return msg.payload;
    var t = msg.type,
      e = msg.event;
    var isEventEnvelope =
      t === 'event' ||
      t === 'push' ||
      t === 'notification' ||
      t === 'broadcast' ||
      e === 'event' ||
      e === 'push' ||
      e === 'notification' ||
      e === 'broadcast';
    if (!isEventEnvelope) return null;
    var w = msg.payload || msg.params;
    if (!w || typeof w !== 'object') return null;
    var inner = String(w.event || w.type || '').toLowerCase();
    if (inner !== 'chat') return null;
    if (w.payload != null && typeof w.payload === 'object') return w.payload;
    return w;
  }

  function ocGetChatSideResultPayload(msg) {
    if (!msg || typeof msg !== 'object') return null;
    if (msg.payload != null && typeof msg.payload === 'object' && msg.event === 'chat.side_result') return msg.payload;
    var t = msg.type,
      e = msg.event;
    var isEventEnvelope =
      t === 'event' ||
      t === 'push' ||
      t === 'notification' ||
      t === 'broadcast' ||
      e === 'event' ||
      e === 'push' ||
      e === 'notification' ||
      e === 'broadcast';
    if (!isEventEnvelope) return null;
    var w = msg.payload || msg.params;
    if (!w || typeof w !== 'object') return null;
    var inner = String(w.event || w.type || '').toLowerCase();
    if (inner !== 'chat.side_result') return null;
    if (w.payload != null && typeof w.payload === 'object') return w.payload;
    return w;
  }

  function ocIsChatFinalState(pl) {
    if (!pl || typeof pl !== 'object') return false;
    var s = pl.state;
    if (s === 'final' || s === 'done' || s === 'completed' || s === 'finished') return true;
    if (pl.done === true || pl.finished === true) return true;
    return false;
  }

  function extractGatewayHistoryMessages(res) {
    if (!res) return [];
    if (Array.isArray(res)) return res;
    if (Array.isArray(res.messages)) return res.messages;
    if (Array.isArray(res.history)) return res.history;
    if (Array.isArray(res.data)) return res.data;
    if (Array.isArray(res.items)) return res.items;
    if (res.result && typeof res.result === 'object') return extractGatewayHistoryMessages(res.result);
    if (res.data && typeof res.data === 'object') return extractGatewayHistoryMessages(res.data);
    if (res.payload && typeof res.payload === 'object') return extractGatewayHistoryMessages(res.payload);
    return [];
  }

  function mapGatewayHistoryItem(m) {
    if (!m || typeof m !== 'object') return null;
    var role = normalizeRole(m.role || m.type || m.actor);
    if (!role) return null;
    var content = ocExtractMessageContentForHistory(m);
    if (!content) return null;
    return { role: role, content: content, ts: ensureIsoTime(m.ts || m.timestamp || m.createdAt || m.updatedAt) };
  }

  function openClawRpc(cfg, method, params, timeoutMs) {
    var ep = openClawEndpointFromCfg(cfg);
    if (!ep.ok) return Promise.reject(new Error('Gateway token missing'));
    var wsUrl = 'ws://' + ep.host + ':' + ep.port + '/?token=' + encodeURIComponent(ep.token);
    var to = Math.max(3000, Number(timeoutMs) || 12000);
    return new Promise(function (resolve, reject) {
      var ws;
      try {
        ws = new WebSocket(wsUrl);
      } catch (e) {
        reject(e);
        return;
      }
      var done = false,
        seq = 0,
        connected = false,
        connectSent = false,
        rpcId = '';
      var timer = setTimeout(function () {
        finishErr(new Error('OpenClaw RPC timeout: ' + method));
      }, to);

      function finishOk(val) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        try {
          ws.close();
        } catch (e) {}
        resolve(val);
      }
      function finishErr(err) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        try {
          ws.close();
        } catch (e) {}
        reject(err);
      }
      function sendConnect() {
        if (connectSent) return;
        connectSent = true;
        seq += 1;
        var cid = 'connect-' + seq;
        ws.send(
          JSON.stringify({
            type: 'req',
            id: cid,
            method: 'connect',
            params: {
              minProtocol: 3,
              maxProtocol: 3,
              client: { id: 'openclaw-control-ui', version: 'niuma', platform: 'web', mode: 'webchat', instanceId: 'niuma-rpc-' + Date.now() },
              role: 'operator',
              scopes: ['operator.admin', 'operator.approvals', 'operator.pairing', 'operator.read', 'operator.write'],
              caps: [],
              auth: { token: ep.token }
            }
          })
        );
      }
      function sendRpc() {
        if (!connected || rpcId) return;
        seq += 1;
        rpcId = 'rpc-' + seq;
        ws.send(JSON.stringify({ type: 'req', id: rpcId, method: method, params: params || {} }));
      }
      ws.onopen = function () {
        sendConnect();
      };
      ws.onerror = function () {
        finishErr(new Error('OpenClaw websocket error'));
      };
      ws.onclose = function () {
        if (!done) finishErr(new Error('OpenClaw websocket closed'));
      };
      ws.onmessage = function (e) {
        var msg = null;
        try {
          msg = JSON.parse(e.data);
        } catch (ex) {
          return;
        }
        var ev = msg.event || msg.type || msg.method || '';
        if (ev === 'connect.challenge') {
          connectSent = false;
          sendConnect();
          return;
        }
        if (typeof msg.id === 'string' && msg.id.indexOf('connect-') === 0) {
          if (msg.error || msg.ok === false) {
            finishErr(new Error((msg.error && msg.error.message) || 'connect failed'));
            return;
          }
          connected = true;
          sendRpc();
          return;
        }
        if (!connected && ev === 'hello-ok') {
          connected = true;
          sendRpc();
          return;
        }
        if (rpcId && msg.id === rpcId) {
          if (msg.error || msg.ok === false) {
            finishErr(new Error((msg.error && msg.error.message) || 'rpc failed'));
            return;
          }
          var body = msg.result !== undefined ? msg.result : msg.payload !== undefined ? msg.payload : msg;
          finishOk(body);
        }
      };
    });
  }

  async function hydrateOpenClawHistoryForSession(s, force) {
    if (!s || s.provider !== 'openclaw') return;
    if (s._historyHydrating) return;
    if (s._historyHydrated && !force) return;
    s._historyHydrating = true;
    try {
      pullStoreHistoryToSession(s);
      if (s.id === state.activeSessionId) rebuildMsgList();
      var cfg = {
        provider: s.provider,
        baseUrl: (s.baseUrl || '').trim() || (P.openclaw && P.openclaw.baseUrl) || '',
        apiKey: getApiKeyForProvider('openclaw')
      };
      var ep = openClawEndpointFromCfg(cfg);
      if (ep.ok) {
        var sk = getOpenClawSessionKey(s);
        s.gatewaySessionKey = sk;
        try {
          localStorage.setItem('openclaw2_lastSessionKey', sk);
        } catch (e0) {}
        var rpcRes = await openClawRpc(cfg, 'chat.history', { sessionKey: sk, limit: 100 }, 10000);
        var gw = extractGatewayHistoryMessages(rpcRes).map(mapGatewayHistoryItem).filter(Boolean);
        /* 本地优先：避免网关 chat.history 占位项（content 空、仅有 id）与刚发送条目同 key 时盖住本地正文 */
        if (gw.length) s.history = mergeHistoryList(s.history || [], gw).slice(-400);
      }
      pushSessionHistoryToStore(s);
      persistSessions();
      if (s.id === state.activeSessionId) rebuildMsgList();
      s._historyHydrated = true;
    } catch (e) {
    } finally {
      s._historyHydrating = false;
    }
  }

  async function reqOpenClaw(cfg) {
    var ep = openClawEndpointFromCfg(cfg);
    if (!ep.ok) throw new Error('缺少 Gateway Token：请填写密钥，或将带 #token= 的控制台地址填入 Base URL。');
    var wsUrl = 'ws://' + ep.host + ':' + ep.port + '/?token=' + encodeURIComponent(ep.token);
    var h = activeSession() ? activeSession().history : [];
    var last = h[h.length - 1];
    if (!last || last.role !== 'user') throw new Error('内部错误：缺少用户消息。');
    var msgText = String(last.content != null ? last.content : '');
    if (!msgText.trim()) msgText = ocExtractMessageContentForHistory(last);
    if (!String(msgText || '').trim()) throw new Error('上一条用户消息正文为空，请重新输入后发送。');
    if (cfg.systemPrompt && h.length === 1) {
      msgText = '【系统提示】\n' + cfg.systemPrompt + '\n\n' + msgText;
    }
    var s0 = activeSession();
    var sessionKey = getOpenClawSessionKey(s0);
    if (s0) s0.gatewaySessionKey = sessionKey;
    try {
      localStorage.setItem('openclaw2_lastSessionKey', sessionKey);
    } catch (e) {}
    var instanceId = 'niuma-' + Date.now() + '-' + Math.random().toString(36).slice(2, 11);

    return new Promise(function (resolve, reject) {
      var ws;
      try {
        ws = new WebSocket(wsUrl);
      } catch (e) {
        reject(new Error('无法建立 WebSocket：' + (e && e.message ? e.message : String(e))));
        return;
      }
      var seq = 0;
      var settled = false;
      var authenticated = false;
      var challengeReceived = false;
      var connectSent = false;
      var chatMsgId = '';
      var pendingText = '';
      var finalizeTimer = null;
      var hardTimeout = setTimeout(function () {
        settleReject(new Error('OpenClaw 响应超时（45s）。'));
      }, 45000);

      function cleanup() {
        clearTimeout(hardTimeout);
        if (finalizeTimer) clearTimeout(finalizeTimer);
      }

      function settleResolve(val) {
        if (settled) return;
        settled = true;
        cleanup();
        try {
          ws.close();
        } catch (e) {}
        resolve(val);
      }

      function settleReject(err) {
        if (settled) return;
        settled = true;
        cleanup();
        try {
          ws.close();
        } catch (e) {}
        reject(err);
      }

      function armFinalize() {
        if (finalizeTimer) clearTimeout(finalizeTimer);
        finalizeTimer = setTimeout(function () {
          var t = pendingText.trim();
          if (t) settleResolve(t);
          else settleReject(new Error('响应中没有可显示的内容。'));
        }, 1200);
      }

      function fail(err) {
        settleReject(err);
      }

      function okDone() {
        var t = pendingText.trim();
        if (t) settleResolve(t);
        else settleReject(new Error('响应中没有可显示的内容。'));
      }

      function sendConnectOnce() {
        if (connectSent) return;
        connectSent = true;
        seq += 1;
        var cid = 'connect-' + seq;
        var params = {
          minProtocol: 3,
          maxProtocol: 3,
          client: {
            /* 须与 Gateway 的 openclaw-control-ui 一致：webchat id 会在无设备身份时被 clearUnboundScopes 清空 scopes，导致 chat.send 报 missing scope: operator.write */
            id: 'openclaw-control-ui',
            version: 'niuma',
            platform: typeof navigator !== 'undefined' ? navigator.platform || 'web' : 'web',
            mode: 'webchat',
            instanceId: instanceId
          },
          role: 'operator',
          scopes: ['operator.admin', 'operator.approvals', 'operator.pairing', 'operator.read', 'operator.write'],
          caps: [],
          userAgent: typeof navigator !== 'undefined' ? navigator.userAgent || '' : '',
          locale: typeof navigator !== 'undefined' ? navigator.language || 'zh-CN' : 'zh-CN',
          auth: { token: ep.token }
        };
        try {
          ws.send(JSON.stringify({ type: 'req', id: cid, method: 'connect', params: params }));
        } catch (e) {
          fail(new Error('发送认证请求失败：' + (e && e.message ? e.message : String(e))));
        }
      }

      function sendChatMsg() {
        seq += 1;
        chatMsgId = 'msg-' + seq;
        try {
          ws.send(
            JSON.stringify({
              type: 'req',
              id: chatMsgId,
              method: 'chat.send',
              params: {
                message: msgText,
                idempotencyKey: chatMsgId,
                sessionKey: sessionKey
              }
            })
          );
        } catch (e) {
          fail(new Error('发送对话失败：' + (e && e.message ? e.message : String(e))));
        }
      }

      function onFrame(msg) {
        var ev = msg.event || msg.type || msg.method || '';

        if (ev === 'connect.challenge') {
          challengeReceived = true;
          connectSent = false;
          sendConnectOnce();
          return;
        }

        if (typeof msg.id === 'string' && msg.id.indexOf('connect-') === 0) {
          if (msg.error || msg.ok === false) {
            var em = (msg.error && msg.error.message) || 'Gateway 认证失败';
            fail(new Error(String(em)));
            return;
          }
          if (msg.result !== undefined || msg.ok === true) {
            authenticated = true;
            sendChatMsg();
          }
          return;
        }

        if (!authenticated && ev === 'hello-ok') {
          authenticated = true;
          sendChatMsg();
          return;
        }

        if (!authenticated) return;

        /* chat.send 先返回 type:res（仅 started），助手正文由 broadcast("chat") 推送 */
        if (msg.type === 'res' && msg.id === chatMsgId) {
          if (msg.error || msg.ok === false) {
            var er0 = (msg.error && msg.error.message) || JSON.stringify(msg.error || {});
            fail(new Error(String(er0)));
            return;
          }
          return;
        }

        if (msg.id === chatMsgId && msg.error && msg.type !== 'res') {
          var er = (msg.error && msg.error.message) || JSON.stringify(msg.error);
          fail(new Error(String(er)));
          return;
        }

        var plChat = ocGetChatBroadcastPayload(msg);
        if (plChat) {
          var pl = plChat;
          if (pl.state === 'error') {
            fail(new Error(String(pl.errorMessage || 'OpenClaw 对话出错')));
            return;
          }
          var chatTxt = ocExtractChatEventPayload(pl);
          if (chatTxt) {
            /* delta：可能是增量片段（需拼接）或每帧全量快照（需整段替换） */
            if (pl.state === 'delta') {
              if (pendingText && chatTxt.length >= pendingText.length && chatTxt.indexOf(pendingText) === 0)
                pendingText = chatTxt;
              else pendingText += chatTxt;
            } else pendingText = chatTxt;
          }
          if (ocIsChatFinalState(pl)) {
            if (!pendingText.trim()) {
              var fallback = ocExtractText(
                pl.errorMessage || pl.stopReason || pl.reason || pl.status || pl.message || ''
              );
              if (fallback) pendingText = fallback;
            }
            if (!pendingText.trim()) {
              try {
                var dbg = JSON.stringify(pl);
                if (dbg && dbg.length > 2 && dbg.length < 8000)
                  pendingText =
                    '（Gateway 返回了 final 但未解析出正文，请升级脚本或核对 Gateway 版本。原始 payload 摘要）\n' +
                    dbg.slice(0, 4000);
              } catch (e3) {}
            }
            okDone();
            return;
          }
          if (pl.state === 'delta' && chatTxt) armFinalize();
          /* 部分 Gateway 只推 text/content，无 state */
          if (pl.state == null && chatTxt) armFinalize();
          return;
        }

        var sidePl = ocGetChatSideResultPayload(msg);
        if (sidePl) {
          var side = sidePl;
          var st = ocExtractText(side.text || side.message || side.content || '');
          if (!st && side.btw && typeof side.btw.question === 'string') st = side.btw.question.trim();
          if (st) {
            pendingText = st;
            armFinalize();
          }
          return;
        }

        var respPayload = msg.payload || (msg.result !== undefined && typeof msg.result === 'object' ? msg.result : null);
        /* 与 openclaw2：流式帧常带 msg.result 而非 ev===response，且可能无 id */
        var isResp =
          ev === 'response' ||
          ev === 'chat.response' ||
          (msg.result !== undefined && typeof msg.result === 'object' && respPayload) ||
          (msg.id === chatMsgId && respPayload);

        if (isResp && respPayload) {
          var piece =
            ocExtractText(respPayload.text || respPayload.content || respPayload.message || '') ||
            ocExtractChatEventPayload(respPayload);
          if (piece) pendingText += piece;
          if (respPayload.done || respPayload.finish_reason || respPayload.finished) {
            okDone();
            return;
          }
          if (piece) armFinalize();
          return;
        }

        if (ev === 'error' || msg.error) {
          var emsg = ocExtractText((msg.payload && msg.payload.message) || (msg.error && msg.error.message) || msg.error);
          fail(new Error(emsg || '服务端错误'));
          return;
        }

        var rest = msg.payload || msg.params || {};
        var rt =
          ocExtractText(rest.text || rest.content || rest.message || '') || ocExtractChatEventPayload(rest);
        if (rt && (msg.id === chatMsgId || msg.id == null || msg.id === '')) {
          pendingText += rt;
          armFinalize();
        }

        /* 兜底：信封未标 chat 但 payload 已是流式结构（仅在本连接已发 chat.send 后） */
        if (chatMsgId) {
          var silentEv = { health: 1, tick: 1, ping: 1, pong: 1, heartbeat: 1, typing: 1 };
          if (!silentEv[ev]) {
            var guess = msg.payload || msg.params;
            if (
              guess &&
              typeof guess === 'object' &&
              (guess.state === 'delta' ||
                guess.state === 'final' ||
                guess.state === 'done' ||
                guess.state === 'completed' ||
                guess.state === 'error')
            ) {
              if (guess.state === 'error') {
                fail(new Error(String(guess.errorMessage || 'OpenClaw 对话出错')));
                return;
              }
              var gt = ocExtractChatEventPayload(guess);
              if (gt) {
                if (guess.state === 'delta') {
                  if (pendingText && gt.length >= pendingText.length && gt.indexOf(pendingText) === 0) pendingText = gt;
                  else pendingText += gt;
                } else pendingText = gt;
                if (ocIsChatFinalState(guess)) okDone();
                else armFinalize();
                return;
              }
            }
          }
        }
      }

      ws.onmessage = function (e) {
        var msg;
        try {
          msg = JSON.parse(e.data);
        } catch (ex) {
          return;
        }
        try {
          onFrame(msg);
        } catch (ex2) {
          fail(new Error(ex2 && ex2.message ? ex2.message : String(ex2)));
        }
      };

      ws.onopen = function () {
        setTimeout(function () {
          if (!authenticated && !challengeReceived) sendConnectOnce();
        }, 450);
      };

      ws.onerror = function () {
        settleReject(new Error('WebSocket 错误（请确认 OpenClaw Gateway 已在本机 ' + ep.host + ':' + ep.port + ' 运行）。'));
      };

      ws.onclose = function (e) {
        if (settled) return;
        if (authenticated && pendingText.trim()) {
          settleResolve(pendingText.trim());
          return;
        }
        settleReject(new Error('连接已关闭（code ' + e.code + '）。'));
      };
    });
  }

  async function sendChat() {
    var s = activeSession();
    if (!s || !s.id) return;
    var sid = s.id;
    if (isSessionSending(sid)) {
      cstatForSession(sid, '该标签仍在等待上一次响应，请稍候。', 'error');
      return;
    }
    var text = input.value.trim();
    if (!text) return;
    saveCfg(false);
    var cfg = buildSendCfg();
    if (!cfg || !cfg.baseUrl || !cfg.model) {
      cstatForSession(sid, '请先在设置里填写 Base URL 和 Model。', 'error');
      setSettings(true);
      return;
    }
    var p0 = P[cfg.provider] || P.openai;
    if (p0.transport !== 'openclaw' && cfg.provider !== 'ollama' && !cfg.apiKey) {
      cstatForSession(sid, '请先在设置里填写 API Key、Base URL 和 Model。', 'error');
      setSettings(true);
      return;
    }
    if (p0.transport === 'openclaw' && !openClawEndpointFromCfg(cfg).ok) {
      cstatForSession(sid, 'OpenClaw：请在「Gateway Token」填写 token，或将带 #token= 的完整控制台地址填入 Base URL。', 'error');
      setSettings(true);
      return;
    }
    add('user', text);
    input.value = '';
    setSessionSending(sid, true);
    cstatForSession(sid, '正在请求模型响应...');
    try {
      var p = P[cfg.provider] || P.openai,
        content = '';
      if (p.transport === 'anthropic') content = await reqClaude(cfg);
      else if (p.transport === 'gemini') content = await reqGemini(cfg);
      else if (p.transport === 'openclaw') content = await reqOpenClaw(cfg);
      else content = await reqOpenAI(cfg);
      add('assistant', content);
      cstatForSession(sid, '响应完成。', 'success');
    } catch (err) {
      cstatForSession(sid, '请求失败：' + (err && err.message ? err.message : '未知错误'), 'error');
    } finally {
      setSessionSending(sid, false);
    }
  }
