<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>HubCapsule</title>
<style>
:root {
  --capsule-bg: rgba(17, 22, 33, 0.26);
  --capsule-border: rgba(255, 255, 255, 0.18);
  --capsule-border-strong: rgba(255, 170, 82, 0.5);
  --text: #f4f7ff;
  --text-muted: #a8b2c8;
  --accent: #ff9a2f;
  --accent-soft: rgba(255, 154, 47, 0.22);
  --accent-glow: rgba(255, 154, 47, 0.45);
  --pending-bar: rgba(61, 255, 154, 0.14);
  --pending-border: rgba(61, 255, 154, 0.38);
  --pending-text: #c6ffe4;
  --ease: 180ms cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  /* 涓庡涓?WebView 瀹炶壊鑳屾櫙涓€鑷达紝閬垮厤閫忔槑鍖哄煙涓庢棫鐗?TransColor 鍙犲姞绌块€?*/
  background: #1a1a1a;
  overflow: hidden;
  color: var(--text);
  font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
}

/* 鏁寸獥鍙帴绯荤粺鎷栨斁锛氬繀椤讳负 auto锛屽惁鍒?padding 鍖烘棤娉曟敹鍒?dragover/drop */
#host {
  width: 100%;
  height: 100%;
  padding: 14px 14px 18px;
  pointer-events: auto;
  box-sizing: border-box;
}

#capsule {
  pointer-events: auto;
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 178px;
  border-radius: 24px;
  border: 1px solid var(--capsule-border);
  background:
    linear-gradient(165deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02) 28%, rgba(0, 0, 0, 0.1) 100%),
    var(--capsule-bg);
  backdrop-filter: blur(18px) saturate(165%);
  -webkit-backdrop-filter: blur(18px) saturate(165%);
  box-shadow:
    0 22px 46px rgba(0, 0, 0, 0.34),
    0 0 24px rgba(255, 154, 47, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.26);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: open-flow 380ms cubic-bezier(0.2, 1, 0.3, 1);
  transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease), width var(--ease), opacity var(--ease);
}

/* 鑳跺泭閫忔槑搴︾敱 JS applyVisualState 鎸夈€屼粎棰勮 / 鎷栧姩鎴栧凡鍏ユ爤銆嶈缃紝閬垮厤涓庡凡鏈夊崱鐗囧啿绐?*/

@keyframes open-flow {
  0% {
    opacity: 0;
    transform: translateY(14px) scale(0.72);
    filter: blur(8px);
  }
  55% {
    opacity: 1;
    transform: translateY(0) scale(1.06);
    filter: blur(0);
  }
  100% {
    transform: translateY(0) scale(1);
  }
}

#capsule.dragging {
  transition: none;
  border-color: var(--capsule-border-strong);
  box-shadow:
    0 30px 64px rgba(0, 0, 0, 0.52),
    0 0 42px rgba(255, 154, 47, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.42);
}

/* 楦胯挋寮忥細绯荤粺鎷栧叆鏃堕珮浜兌鍥?+ 棰勮鍖烘彁绀?*/
#capsule.external-drop-hover {
  transform: scale(1.02);
  border-color: var(--capsule-border-strong);
  box-shadow:
    0 28px 56px rgba(0, 0, 0, 0.48),
    0 0 36px rgba(255, 154, 47, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.32);
}

#external-drop-hint {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 160ms var(--ease), transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
  text-align: center;
  padding: 14px 20px;
  border-radius: 16px;
  background: linear-gradient(145deg, rgba(255, 154, 47, 0.28), rgba(255, 120, 40, 0.12));
  border: 1px solid rgba(255, 193, 132, 0.55);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35), 0 0 24px rgba(255, 154, 47, 0.25);
  max-width: 88%;
}

#external-drop-hint .hint-title {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #fff5e8;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

#external-drop-hint .hint-sub {
  display: block;
  font-size: 11px;
  color: rgba(255, 230, 200, 0.88);
  line-height: 1.45;
}

#preview-card.external-drop-target {
  border-color: rgba(255, 170, 82, 0.75);
  background: rgba(40, 32, 22, 0.55);
  animation: external-target-pulse 1.1s ease-in-out infinite;
}

@keyframes external-target-pulse {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(255, 154, 47, 0.2); }
  50% { box-shadow: inset 0 0 0 2px rgba(255, 154, 47, 0.55), 0 0 20px rgba(255, 154, 47, 0.15); }
}

#capsule.external-drop-hover #external-drop-hint {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: hint-float 1.2s ease-in-out infinite;
}

@keyframes hint-float {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -52%) scale(1.02); }
}

#preview.drop-success-flash {
  animation: drop-success 480ms ease-out;
}

@keyframes drop-success {
  0% { filter: brightness(1); transform: scale(1); }
  35% { filter: brightness(1.22); transform: scale(1.02); }
  100% { filter: brightness(1); transform: scale(1); }
}

#capsule.resizing {
  transition: none;
  border-color: var(--capsule-border-strong);
}

#capsule.gravity-active {
  border-color: var(--capsule-border-strong);
}

#capsule.collision-hit {
  box-shadow:
    0 0 0 2px rgba(255, 154, 47, 0.55),
    0 26px 54px rgba(0, 0, 0, 0.48),
    0 0 36px rgba(255, 154, 47, 0.28);
}

/* 浠呴瑙堜笖鏃犲爢鍙犲崱鐗囨椂锛氳兌鍥婂３涓嶆嫤鎴偣鍑伙紝绌虹櫧鍖虹┛閫忓埌 #host锛岀敱鑴氭湰閫氱煡 AHK 绔嬪嵆鍏抽棴 */
#capsule.selection-active:not(.has-content) {
  pointer-events: none;
}
#capsule.selection-active:not(.has-content) #header,
#capsule.selection-active:not(.has-content) #preview-search-wrap,
#capsule.selection-active:not(.has-content) #pending-lane,
#capsule.selection-active:not(.has-content) #stack-row,
#capsule.selection-active:not(.has-content) #slot-rail,
#capsule.selection-active:not(.has-content) #stack-display,
#capsule.selection-active:not(.has-content) #action-bar,
#capsule.selection-active:not(.has-content) #preview-ctx-menu,
#capsule.selection-active:not(.has-content) #resize-handle {
  pointer-events: auto;
}

#capsule.is-docked {
  width: 74px;
  min-width: 74px;
  max-width: 74px;
}

#capsule.is-docked #main,
#capsule.is-docked #trigger-bar,
#capsule.is-docked #action-bar,
#capsule.is-docked #stack-row {
  opacity: 0;
  pointer-events: none;
  transform: translateX(12px);
}

#capsule.is-docked #dock-beacon {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

#dock-beacon {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: radial-gradient(circle at 30% 30%, #ffd3a1, #ff9a2f 58%, #ff7f12);
  box-shadow: 0 0 16px var(--accent-glow), 0 0 34px rgba(255, 154, 47, 0.32);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.72);
  pointer-events: none;
  transition: opacity var(--ease), transform var(--ease);
}

#dock-beacon::after {
  content: "";
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(255, 154, 47, 0.35);
  border-radius: 999px;
  animation: beacon-ripple 1.6s ease-out infinite;
}

@keyframes beacon-ripple {
  0% { transform: scale(0.82); opacity: 0.78; }
  100% { transform: scale(1.75); opacity: 0; }
}

#main {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px;
  min-height: 0;
  flex: 1;
  transition: opacity var(--ease), transform var(--ease);
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 26px;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
body.native-titlebar #header { display: none; }

#drag-handle {
  width: 40px;
  height: 6px;
  border-radius: 999px;
  margin-right: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,.15), rgba(255,186,119,.75), rgba(255,255,255,.15));
  box-shadow: 0 0 10px rgba(255,154,47,.35);
  flex-shrink: 0;
}

#header-left {
  display: inline-flex;
  align-items: center;
}

#header:active { cursor: grabbing; }

#header-title {
  font-size: 11px;
  letter-spacing: 1.3px;
  color: #ffd3a1;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(255, 154, 47, 0.34);
}

#header-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

#header-count {
  min-width: 22px;
  height: 22px;
  padding: 0 7px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  color: #241000;
  background: linear-gradient(145deg, #ffbc73, #ff9124);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(255, 154, 47, 0.45);
}

.hub-close-btn {
  width: 26px;
  height: 26px;
  padding: 0;
  border: 1px solid rgba(255, 193, 132, 0.35);
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  color: #ffe8cc;
  background: rgba(255, 154, 47, 0.18);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease);
}

.hub-close-btn:hover {
  background: rgba(255, 154, 47, 0.38);
  color: #fff;
  border-color: rgba(255, 193, 132, 0.65);
}

.hub-close-btn:active {
  transform: scale(0.94);
}

#pending-lane {
  border-radius: 12px;
  border: 1px solid var(--pending-border);
  background: linear-gradient(145deg, var(--pending-bar), rgba(12, 28, 22, 0.62));
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

#pending-bar {
  border-radius: 0;
  border: none;
  background: transparent;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.pending-bar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

.pending-bar-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--pending-text);
  text-shadow: 0 0 12px rgba(61, 255, 154, 0.25);
}

.pending-bar-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.pending-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
  border: 1px solid rgba(61, 255, 154, 0.42);
  background: rgba(10, 36, 26, 0.55);
  color: #e8fff4;
  cursor: pointer;
  transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease), background var(--ease);
}

.pending-btn:hover {
  border-color: rgba(120, 255, 190, 0.65);
  background: rgba(20, 52, 38, 0.72);
  box-shadow: 0 0 12px rgba(61, 255, 154, 0.22);
}

.pending-btn:active {
  transform: scale(0.97);
}

.pending-btn.primary {
  border-color: rgba(255, 193, 132, 0.65);
  background: rgba(255, 154, 47, 0.18);
  color: #fff5e8;
}

.pending-btn.primary:hover {
  background: rgba(255, 154, 47, 0.28);
  box-shadow: 0 0 14px rgba(255, 154, 47, 0.22);
}

#preview-card.pending-to-stack {
  animation: pending-to-stack 520ms cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes pending-to-stack {
  0% { transform: scale(1); filter: brightness(1); }
  35% { transform: scale(0.97); filter: brightness(1.12); }
  100% { transform: scale(1); filter: brightness(1); }
}

#preview-card {
  border-radius: 10px;
  border: none;
  background: transparent;
  padding: 0;
  position: relative;
  overflow: visible;
  touch-action: none;
}

#preview-card.preview-pulse-image {
  overflow: visible;
}

#preview-card.selection-hint:not(.draft-drag-active) {
  cursor: grab;
}

#preview-card.selection-hint:not(.draft-drag-active):active {
  cursor: grabbing;
}

#preview {
  display: block;
  width: 100%;
  min-height: 72px;
  max-height: 160px;
  resize: vertical;
  font-size: 12px;
  line-height: 1.5;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(8, 12, 20, 0.55);
  color: #edf2ff;
  word-break: break-word;
  font-family: inherit;
  user-select: text;
  -webkit-user-select: text;
  position: relative;
  box-sizing: border-box;
}

#preview-card.draft-drag-active #preview {
  border-color: rgba(255, 193, 132, 0.78);
  box-shadow: 0 0 0 2px rgba(255, 154, 47, 0.22), 0 4px 18px rgba(0, 0, 0, 0.28);
}

#preview.hide-when-image {
  display: none !important;
}

#preview-search-wrap {
  flex-shrink: 0;
}

#hub-stack-filter {
  width: 100%;
  padding: 7px 11px;
  border-radius: 10px;
  border: 1px solid rgba(61, 255, 154, 0.28);
  background: rgba(10, 28, 22, 0.55);
  color: var(--text);
  font-size: 12px;
  outline: none;
}

#hub-stack-filter::placeholder {
  color: var(--text-muted);
}

#hub-stack-filter:focus {
  border-color: rgba(61, 255, 154, 0.55);
  box-shadow: 0 0 0 1px rgba(61, 255, 154, 0.2);
}

#stack-row {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  gap: 10px;
  min-height: 120px;
  flex: 1;
  min-height: 0;
}

#slot-rail {
  flex: 0 0 auto;
  width: 56px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 6px;
  padding-top: 2px;
}

.slot-rail-title {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-align: center;
}

#hub-slot-row.slot-rail-chips {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-x: visible;
  overflow-y: auto;
  max-height: 100%;
  padding-bottom: 4px;
}

#hub-slot-row.slot-rail-chips .hub-chip {
  flex: 0 0 auto;
  min-width: 0;
  width: 100%;
  max-width: none;
}

#preview.preview-pulse::after {
  content: "";
  position: absolute;
  inset: -8px;
  border-radius: 14px;
  background: radial-gradient(circle at center, rgba(255, 178, 93, 0.42), transparent 62%);
  opacity: 0;
  pointer-events: none;
  animation: preview-bloom 560ms ease-out;
}

#preview-card.preview-pulse-image::after {
  content: "";
  position: absolute;
  inset: -12px;
  background: radial-gradient(circle at center, rgba(255, 178, 93, 0.4), transparent 62%);
  opacity: 0;
  pointer-events: none;
  animation: preview-bloom 560ms ease-out;
}

#preview-card.selection-hint:not(.draft-drag-active) #preview {
  user-select: text;
  -webkit-user-select: text;
}

@keyframes preview-bloom {
  0% { opacity: 0.9; transform: scale(0.6); }
  100% { opacity: 0; transform: scale(1.28); }
}

#draft-chip {
  margin-top: 8px;
  width: fit-content;
  max-width: 100%;
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px dashed rgba(255, 193, 132, 0.74);
  color: #ffddb7;
  font-size: 11px;
  background: rgba(255, 154, 47, 0.15);
  cursor: grab;
  user-select: none;
  display: none;
}

#draft-chip.show { display: inline-flex; align-items: center; }
#draft-chip:active { cursor: grabbing; }
#draft-chip { touch-action: none; }

#stack-display {
  flex: 1;
  min-width: 0;
  min-height: 120px;
  margin-top: 0;
  overflow: auto;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(14, 19, 30, 0.34);
  padding: 10px;
  transition: opacity var(--ease), transform var(--ease);
  scrollbar-gutter: stable;
}

#stack-display.stack-pop {
  animation: stack-pop .28s ease-out;
}

@keyframes stack-pop {
  0% { transform: scale(.985); box-shadow: inset 0 0 0 1px rgba(255,154,47,.0); }
  50% { transform: scale(1.01); box-shadow: inset 0 0 0 1px rgba(255,154,47,.55); }
  100% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(255,154,47,.0); }
}

#stack-display::-webkit-scrollbar { width: 8px; }
#stack-display::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 8px; }
#stack-display::-webkit-scrollbar-thumb { background: rgba(255, 170, 95, 0.55); border-radius: 8px; }
#stack-display::-webkit-scrollbar-thumb:hover { background: rgba(255, 170, 95, 0.75); }

#stack-empty {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding-top: 20px;
}

#stack-list {
  position: relative;
  width: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stack-card {
  position: relative;
  width: 100%;
  border-radius: 11px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(31, 40, 56, 0.58);
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
  padding: 8px 10px;
  transition: border-color var(--ease), box-shadow var(--ease);
}

.stack-card-toolbar {
  display: none;
  gap: 4px;
  margin-bottom: 6px;
  flex-wrap: wrap;
  align-items: center;
}

.stack-card.is-selected .stack-card-toolbar {
  display: flex;
}

.stk-icon-btn {
  width: 28px;
  height: 26px;
  padding: 0;
  border-radius: 6px;
  border: 1px solid rgba(255, 193, 132, 0.35);
  background: rgba(255, 154, 47, 0.12);
  color: #ffe8cc;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  line-height: 1;
  transition: background var(--ease), border-color var(--ease);
}

.stk-icon-btn:hover {
  background: rgba(255, 154, 47, 0.22);
  border-color: rgba(255, 193, 132, 0.55);
}

.stk-emoji-btn {
  font-size: 15px;
  line-height: 1;
}

.stack-card-time {
  font-size: 10px;
  color: #7a8499;
  margin: 0 0 6px;
  letter-spacing: 0.02em;
}

.stack-card[draggable="true"] {
  cursor: grab;
}

.stack-card[draggable="true"]:active {
  cursor: grabbing;
}

.stack-card.is-selected {
  border-color: rgba(255, 170, 82, 0.78);
  box-shadow: 0 0 0 2px rgba(255, 154, 47, 0.22), 0 7px 22px rgba(0, 0, 0, 0.38);
}

.stack-card:hover { border-color: rgba(255, 186, 119, 0.55); }

.stack-card-text {
  cursor: inherit;
  font-size: 12px;
  color: #eef3ff;
  line-height: 1.35;
  white-space: pre-wrap;
  word-break: break-word;
  user-select: text;
  -webkit-user-select: text;
}

.stack-card-image {
  display: block;
  width: 100%;
  max-height: 96px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.18);
}

#preview-image-wrap {
  display: none;
}

#preview-image-wrap.show {
  display: block;
}

#preview-image {
  display: block;
  max-width: 100%;
  max-height: 120px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  cursor: grab;
}

#preview-image:active { cursor: grabbing; }

#preview-copy-image {
  margin-top: 8px;
  height: 28px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 154, 47, 0.16);
  color: #ffe7cf;
  font-size: 11px;
  cursor: pointer;
}

.stack-card-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 107, 107, 0.24);
  color: #ffd7d7;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--ease), transform var(--ease);
}

.stack-card:hover .stack-card-remove { opacity: 1; }

  function hubSegHasLocalPath(seg) {
    if (!seg) return false;
    if (seg.kind === 'image') {
      const p = String(seg.imagePath || '').trim();
      return !!p && /^([a-zA-Z]:\\|\\\\)/.test(p);
    }
    if (seg.kind === 'text') {
      const t = String(seg.text || '').trim();
      return !!t && !/[\r\n]/.test(t) && /^([a-zA-Z]:\\|\\\\)/.test(t);
    }
    return false;
  }

  function hubSegHasSpeakableText(seg) {
    if (!seg || seg.kind !== 'text') return false;
    return String(seg.text || '').replace(/\0/g, '').trim().length > 0;
  }

  function applyHubCtxFileDisables() {
    if (!ctxMenu) return;
    const idx = Number(ctxMenu.dataset.index);
    const seg = Number.isInteger(idx) ? asCard(state.segments[idx]) : null;
    const ok = hubSegHasLocalPath(seg);
    ctxMenu.querySelectorAll('button.ctx-item[data-needs-local-file="1"], button.ctx-sub-item[data-needs-local-file="1"]').forEach((el) => {
      el.disabled = !ok;
    });
    const okText = hubSegHasSpeakableText(seg);
    ctxMenu.querySelectorAll('button.ctx-item[data-needs-text="1"], button.ctx-sub-item[data-needs-text="1"]').forEach((el) => {
      el.disabled = !okText;
    });
  }

  function hubAppendCtxLeaf(it, parent, subItem) {
    const act = String(it.act || '').trim();
    if (!act) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = subItem ? 'ctx-item ctx-sub-item' : 'ctx-item';
    btn.dataset.act = act;
    if (HUB_SC_NEEDS_LOCAL_FILE.has(act))
      btn.dataset.needsLocalFile = '1';
    if (it.disableNoText === true || it.disableNoText === 'true')
      btn.dataset.needsText = '1';
    btn.textContent = it.name || act;
    parent.appendChild(btn);
  }

  function rebuildHubCtxMenuDom(items) {
    if (!ctxMenu) return;
    const raw = Array.isArray(items) && items.length ? items : HUB_CTX_FALLBACK;
    const visible = raw.filter((it) => it && it.visible !== false);
    ctxMenu.innerHTML = '';
    visible.forEach((it) => {
      const ch = it.children;
      if (Array.isArray(ch) && ch.length) {
        const wrap = document.createElement('div');
        wrap.className = 'ctx-item ctx-sub-parent';
        wrap.tabIndex = -1;
        const lab = document.createElement('span');
        lab.textContent = it.name || it.t || '';
        wrap.appendChild(lab);
        const panel = document.createElement('div');
        panel.className = 'ctx-sub-panel';
        ch.filter((c) => c && c.visible !== false).forEach((c) => hubAppendCtxLeaf(c, panel, true));
        wrap.appendChild(panel);
        ctxMenu.appendChild(wrap);
        return;
      }
      hubAppendCtxLeaf(it, ctxMenu, false);
    });
  }
  rebuildHubCtxMenuDom(HUB_CTX_FALLBACK);

  const STATIC_HOTKEY_BINDINGS = Object.freeze([
    ['#btnCloseHub', 'g', '关闭'],
    ['#btnPendingSearch', 'f', '搜索'],
    ['#btnPendingAi', 'a', '快速 AI'],
    ['#btnClear', 'backspace', '清空草稿'],
    ['#btnTriggerCapslock', 'c', '触发：CapsLock+C'],
    ['#btnTriggerDoubleCtrl', 'x', '触发：双击 Ctrl+C'],
    ['#preview-copy-image', 'v', '复制图片预览']
  ]);

  if (btnCloseHub) {
    btnCloseHub.addEventListener('click', (e) => {
      e.stopPropagation();
      postToAhk({ type: 'selection_menu_dismiss' });
    });
  }

  previewImage.addEventListener('error', () => {
    previewImage.alt = '图片预览加载失败';
  });

  function postToAhk(obj) {
    try {
      if (!obj || typeof obj !== 'object') return;
      if (!obj.action && obj.type) obj.action = obj.type;
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(obj);
    } catch (_) {}
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function normalizeHintKey(key) {
    const k = String(key || '').trim().toLowerCase();
    if (/^[a-z0-9]$/.test(k)) return k;
    if (k === 'backspace' || k === 'bks') return 'backspace';
    return '';
  }

  function hotkeyHintHtml(hotkey) {
    const hk = normalizeHintKey(hotkey);
    if (!hk) return '<span class="hotkey-hint unbound">可绑定</span>';
    const text = hk === 'backspace' ? 'Caps+Bks' : ('Caps+' + hk.toUpperCase());
    return '<span class="hotkey-hint">' + escapeHtml(text) + '</span>';
  }

  function setElementHotkeyHint(el, hotkey, explicitLabel) {
    if (!el) return;
    const normalized = normalizeHintKey(hotkey);
    const label = (explicitLabel != null ? String(explicitLabel) : (el.dataset.hotkeyBase || el.textContent || '')).trim();
    if (!label) return;
    el.dataset.hotkeyBase = label;
    el.dataset.hotkey = normalized;
    el.classList.add('hub-hotkey-item');
    el.innerHTML = '<span class="hub-chip-main"><span class="hub-chip-label">' + escapeHtml(label) + '</span>' + hotkeyHintHtml(normalized) + '</span>';
  }

  function updateHotkeyHighlights() {
    const nodes = document.querySelectorAll('.hub-hotkey-item');
    nodes.forEach((el) => {
      const hk = normalizeHintKey(el.dataset.hotkey || '');
      const ready = state.capsHintActive && !!hk;
      const hit = ready && state.capsPressedKey === hk;
      el.classList.toggle('caps-hotkey-ready', ready);
      el.classList.toggle('caps-hotkey-hit', hit);
    });
  }

  function setCapsHintActive(active) {
    state.capsHintActive = !!active;
    if (!state.capsHintActive)
      state.capsPressedKey = '';
    updateHotkeyHighlights();
  }

  function setCapsPressedKey(key) {
    state.capsPressedKey = normalizeHintKey(key);
    updateHotkeyHighlights();
  }

  function flashCapsPressedKey(key) {
    const normalized = normalizeHintKey(key);
    if (!normalized) return;
    setCapsPressedKey(normalized);
    if (capsFlashTimer) clearTimeout(capsFlashTimer);
    capsFlashTimer = setTimeout(() => {
      if (state.capsPressedKey === normalized) {
        state.capsPressedKey = '';
        updateHotkeyHighlights();
      }
    }, 260);
  }

  function beginCapsHoldHint() {
    if (capsHoldTimer) clearTimeout(capsHoldTimer);
    capsHoldTimer = setTimeout(() => {
      setCapsHintActive(true);
    }, 220);
  }

  function endCapsHoldHint() {
    if (capsHoldTimer) clearTimeout(capsHoldTimer);
    capsHoldTimer = 0;
    if (capsFlashTimer) clearTimeout(capsFlashTimer);
    capsFlashTimer = 0;
    setCapsHintActive(false);
  }

  function normalizePreviewText(input) {
    if (input == null) return '';
    if (typeof input === 'string' || typeof input === 'number' || typeof input === 'boolean') {
      return String(input);
    }
    if (Array.isArray(input)) {
      return input
        .map((item) => normalizePreviewText(item))
        .filter(Boolean)
        .join(' ');
    }
    if (typeof input === 'object') {
      if (typeof input.text === 'string' || typeof input.text === 'number' || typeof input.text === 'boolean')
        return String(input.text);
      if (typeof input.content === 'string' || typeof input.content === 'number' || typeof input.content === 'boolean')
        return String(input.content);
      if (typeof input.preview === 'string' || typeof input.preview === 'number' || typeof input.preview === 'boolean')
        return String(input.preview);
      if (Array.isArray(input.items))
        return normalizePreviewText(input.items);
      try {
        return JSON.stringify(input);
      } catch (_) {
        return '';
      }
    }
    return '';
  }

  function compactText(text) {
    return normalizePreviewText(text).replace(/\s+/g, ' ').trim();
  }

  function asCard(item) {
    function withAddedAt(base, src) {
      const n = src && typeof src.addedAt === 'number' ? src.addedAt : NaN;
      if (Number.isFinite(n))
        base.addedAt = n;
      return base;
    }
    if (item && typeof item === 'object') {
      if (item.kind === 'image') {
        const imagePath = String(item.imagePath || '').trim();
        const imageDataUrl = String(item.imageDataUrl || '').trim();
        if (!imagePath && !imageDataUrl) return null;
        return withAddedAt({ kind: 'image', imagePath, imageDataUrl }, item);
      }
      const text = compactText(item.text || '');
      if (!text) return null;
      return withAddedAt({ kind: 'text', text }, item);
    }
    const t = compactText(item);
    return t ? { kind: 'text', text: t } : null;
  }

  function textSegments() {
    return state.segments
      .map((it) => asCard(it))
      .filter((it) => it && it.kind === 'text' && it.text)
      .map((it) => it.text);
  }

  function mergedText() {
    return textSegments().join('\n\n');
  }

  function activeText() {
    const selected = getSelectedTextInsideCapsule();
    if (selected) return selected;
    const merged = mergedText();
    if (merged && state.pendingDraft) return merged + '\n\n' + state.pendingDraft;
    return merged || state.pendingDraft || '';
  }

  function hasPendingImage() {
    return !!(state.pendingImagePath || state.pendingImageDataUrl);
  }

  function syncPendingFromTextarea() {
    if (preview && preview.tagName === 'TEXTAREA' && !hasPendingImage())
      state.pendingDraft = preview.value;
  }

  function getPreviewText() {
    if (hasPendingImage()) return '';
    syncPendingFromTextarea();
    return String(state.pendingDraft || '').replace(/\r\n/g, '\n').trim();
  }

  function clearPreviewOnly() {
    state.pendingDraft = '';
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    if (preview && preview.tagName === 'TEXTAREA') preview.value = '';
    refreshAll();
  }

  /** 显式「存入草稿区」或 AHK draft_collect：入 segments 并清空预览 */
  function addToDraft(textOpt, _source) {
    syncPendingFromTextarea();
    let t = textOpt != null ? compactText(textOpt) : '';
    if (!t) t = getPreviewText();

    if (hasPendingImage() && !t) {
      previewCard.classList.remove('pending-to-stack');
      void previewCard.offsetWidth;
      previewCard.classList.add('pending-to-stack');
      pushImageSegment(state.pendingImagePath, state.pendingImageDataUrl);
      setTimeout(() => previewCard.classList.remove('pending-to-stack'), 560);
      return;
    }
    if (!t) {
      previewCard.classList.remove('preview-pulse');
      void previewCard.offsetWidth;
      previewCard.classList.add('preview-pulse');
      return;
    }
    previewCard.classList.remove('pending-to-stack');
    void previewCard.offsetWidth;
    previewCard.classList.add('pending-to-stack');
    pushSegment(t);
    setTimeout(() => previewCard.classList.remove('pending-to-stack'), 560);
  }

  function formatPreviewPlainLines() {
    syncPendingFromTextarea();
    const raw = String(state.pendingDraft || '');
    if (!raw.trim()) return;
    const lines = raw.split(/\r?\n/).map((line) => line.trim()).filter((line) => line.length > 0);
    const out = lines.join('\n');
    if (!out) return;
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.pendingDraft = out;
    refreshAll();
    previewCard.classList.remove('preview-pulse');
    void previewCard.offsetWidth;
    previewCard.classList.add('preview-pulse');
  }

  function textFromPendingOrStack() {
    const p = getPreviewText();
    if (p) return p;
    const sel = selectedCardText();
    if (sel) return sel;
    return mergedText();
  }

  function doPendingSearch() {
    const text = textFromPendingOrStack();
    if (!text) {
      previewCard.classList.remove('preview-pulse');
      void previewCard.offsetWidth;
      previewCard.classList.add('preview-pulse');
      return;
    }
    postToAhk({ type: 'hub_search', text });
  }

  function doPendingAi() {
    const text = textFromPendingOrStack();
    if (!text) {
      previewCard.classList.remove('preview-pulse');
      void previewCard.offsetWidth;
      previewCard.classList.add('preview-pulse');
      return;
    }
    postToAhk({ type: 'hub_ai', text });
  }

  function getSelectedTextInsideCapsule() {
    try {
      if (preview && preview.tagName === 'TEXTAREA' && document.activeElement === preview) {
        const a = preview.selectionStart;
        const b = preview.selectionEnd;
        if (Number.isInteger(a) && Number.isInteger(b) && b > a)
          return String(preview.value.slice(a, b) || '').trim();
      }
      const sel = window.getSelection();
      if (!sel || sel.rangeCount < 1 || sel.isCollapsed) return '';
      const range = sel.getRangeAt(0);
      if (!capsule.contains(range.commonAncestorContainer)) return '';
      return String(sel.toString() || '').trim();
    } catch (_) {
      return '';
    }
  }

  function copyCurrentPreviewImage() {
    if (!hasPendingImage()) return;
    postToAhk({
      type: 'hub_copy_image',
      imagePath: state.pendingImagePath || '',
      imageDataUrl: state.pendingImageDataUrl || ''
    });
  }

  function toFileUrl(path) {
    let p = String(path || '').trim();
    if (!p) return '';
    p = p.replace(/\\/g, '/');
    if (/^[a-zA-Z]:\//.test(p)) p = '/' + p;
    return encodeURI('file://' + p);
  }

  function setCopyTriggerMode(mode) {
    const raw = String(mode || '').toLowerCase();
    const m = (raw === 'double') ? 'double' : 'capslock';
    state.copyTriggerMode = m;
    btnTriggerCapslock.classList.toggle('is-active', m === 'capslock');
    btnTriggerDoubleCtrl.classList.toggle('is-active', m === 'double');
  }

  function selectedCardText() {
    if (!Number.isInteger(state.selectedIndex) || state.selectedIndex < 0 || state.selectedIndex >= state.segments.length)
      return '';
    const item = asCard(state.segments[state.selectedIndex]);
    if (!item || item.kind !== 'text') return '';
    return compactText(item.text || '');
  }

  function listSlotTexts(limit = 5) {
    const out = [];
    for (let i = state.segments.length - 1; i >= 0; i -= 1) {
      const item = asCard(state.segments[i]);
      if (!item || item.kind !== 'text') continue;
      const text = compactText(item.text || '');
      if (!text) continue;
      out.push({ realIndex: i, text });
      if (out.length >= limit) break;
    }
    return out;
  }

  function syncSelectedSlotFromSelectedIndex() {
    const slots = listSlotTexts(5);
    const idx = slots.findIndex((it) => it.realIndex === state.selectedIndex);
    state.selectedSlotOneBased = idx >= 0 ? (idx + 1) : 0;
  }

  function ensureSelectedSlotVisible() {
    if (!hubSlotRow) return;
    if (!state.selectedSlotOneBased) return;
    const target = hubSlotRow.querySelector(`[data-slot="${state.selectedSlotOneBased}"]`);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function selectSlotByIndex(slotOneBased) {
    const slot = Number(slotOneBased);
    if (!Number.isInteger(slot) || slot < 1 || slot > 5) return;
    const slots = listSlotTexts(5);
    const target = slots[slot - 1] || null;
    if (!target) {
      pulsePreviewBloom();
      return;
    }
    state.selectedIndex = target.realIndex;
    state.selectedSlotOneBased = slot;
    refreshAll();
    postToAhk({ type: 'hub_stack_selected', text: target.text, index: target.realIndex });
    requestAnimationFrame(() => {
      ensureSelectedSlotVisible();
      const stackCard = stackList.querySelector(`.stack-card[data-real-index="${target.realIndex}"]`);
      if (stackCard)
        stackCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    });
  }

  function applyStaticHotkeyHints() {
    STATIC_HOTKEY_BINDINGS.forEach(([selector, hotkey, label]) => {
      const el = document.querySelector(selector);
      if (!el) return;
      setElementHotkeyHint(el, hotkey, label);
    });
    updateHotkeyHighlights();
  }

  function renderSlotTags() {
    if (!hubSlotRow) return;
    const slots = listSlotTexts(5);
    hubSlotRow.innerHTML = '';
    for (let i = 1; i <= 5; i += 1) {
      const slot = slots[i - 1] || null;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'hub-chip hub-hotkey-item slot-index-chip';
      b.dataset.hotkey = String(i);
      b.dataset.slot = String(i);
      b.classList.toggle('is-selected', i === state.selectedSlotOneBased);
      b.innerHTML =
        '<span class="hub-chip-main slot-chip-merged"><span class="hub-chip-label">' +
        i +
        '</span><span class="slot-cap-hint">Caps+' +
        i +
        '</span></span>';
      b.addEventListener('click', () => selectSlotByIndex(i));
      hubSlotRow.appendChild(b);
    }
  }

  function renderHubTags() {
    renderSlotTags();
    updateHotkeyHighlights();
  }

  function handleVkAction(actionName) {
    const action = String(actionName || '').trim().toLowerCase();
    switch (action) {
      case 'search':
        doPendingSearch();
        break;
      case 'ai':
        doPendingAi();
        break;
      case 'clear':
        clearAll();
        break;
      case 'close':
        postToAhk({ type: 'selection_menu_dismiss' });
        break;
      case 'copy_image':
        copyCurrentPreviewImage();
        break;
      case 'set_trigger_capslock':
        setCopyTriggerMode('capslock');
        postToAhk({ type: 'hub_set_copy_trigger_mode', mode: 'capslock' });
        break;
      case 'set_trigger_double':
        setCopyTriggerMode('double');
        postToAhk({ type: 'hub_set_copy_trigger_mode', mode: 'double' });
        break;
      case 'select_slot_1':
      case 'select_slot_2':
      case 'select_slot_3':
      case 'select_slot_4':
      case 'select_slot_5': {
        const slot = Number(action.slice(-1));
        selectSlotByIndex(slot);
        break;
      }
      default:
        break;
    }
  }

  function syncSegments() {
    postToAhk({ type: 'hub_segments_sync', segments: textSegments() });
    try {
      localStorage.setItem('hub_capsule_segments', JSON.stringify(state.segments));
    } catch (_) {}
  }

  function loadPersistedSegments() {
    try {
      const raw = localStorage.getItem('hub_capsule_segments');
      if (!raw) return;
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) {
        state.segments = arr
          .map((item) => asCard(item))
          .filter((item) => item && ((item.kind === 'text' && item.text) || (item.kind === 'image' && (item.imagePath || item.imageDataUrl))));
      }
    } catch (_) {}
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('open');
    ctxMenu.removeAttribute('data-index');
    ctxMenu.setAttribute('aria-hidden', 'true');
  }

  function applyVisualState() {
    const syncTa = !!(preview && preview.tagName === 'TEXTAREA');
    const draftLen = syncTa ? String(preview.value || '').trim().length : String(state.pendingDraft || '').trim().length;
    const hasDraft = draftLen > 0 || hasPendingImage();
    const hasContent = state.segments.length > 0;
    const draggingDraft = !!state.draftDrag || externalDragDepth > 0;
    const externalOnly = externalDragDepth > 0 && !state.draftDrag;
    capsule.classList.toggle('selection-active', hasDraft && !draggingDraft);
    capsule.classList.toggle('has-content', hasContent);
    capsule.classList.toggle('draft-dragging', draggingDraft);
    capsule.classList.toggle('external-drop-hover', externalOnly);
    previewCard.classList.toggle('external-drop-target', externalOnly);
    if (externalDropHint)
      externalDropHint.setAttribute('aria-hidden', externalOnly ? 'false' : 'true');

    if (hasDraft && !draggingDraft) {
      capsule.style.setProperty('opacity', '0.68', 'important');
    } else if (draggingDraft || hasContent) {
      capsule.style.setProperty('opacity', '0.88', 'important');
    } else {
      capsule.style.removeProperty('opacity');
    }

    previewCard.classList.toggle('selection-hint', hasDraft);
  }

  function updatePreview() {
    const showingImage = hasPendingImage();
    previewImageWrap.classList.toggle('show', showingImage);
    if (preview && preview.tagName === 'TEXTAREA') {
      preview.classList.toggle('hide-when-image', showingImage);
      preview.style.display = showingImage ? 'none' : '';
    }

    if (showingImage) {
      previewImage.src = state.pendingImageDataUrl || (state.pendingImagePath ? toFileUrl(state.pendingImagePath) : '');
      previewImage.title = state.pendingImagePath || '剪贴板图片预览';
      draftChip.classList.remove('show');
      headerCount.textContent = String(state.segments.length);
      return;
    }

    if (preview && preview.tagName === 'TEXTAREA') {
      const next = state.pendingDraft != null ? String(state.pendingDraft) : '';
      if (preview.value !== next) preview.value = next;
    }
    const showChip = !!(state.pendingDraft && String(state.pendingDraft).trim());
    draftChip.classList.toggle('show', showChip);
    headerCount.textContent = String(state.segments.length);
  }

  function segmentMatchesFilter(rawItem, qLower) {
    if (!qLower) return true;
    const c = asCard(rawItem);
    if (!c) return false;
    if (c.kind === 'text')
      return String(c.text || '').toLowerCase().includes(qLower);
    const p = String(c.imagePath || '').toLowerCase();
    return p.includes(qLower);
  }

  function cloneRawSegment(i) {
    const s = state.segments[i];
    if (!s || typeof s !== 'object') return null;
    try {
      return JSON.parse(JSON.stringify(s));
    } catch (_) {
      return {
        kind: s.kind,
        text: s.text,
        imagePath: s.imagePath,
        imageDataUrl: s.imageDataUrl
      };
    }
  }

  function saveTrashToStorage() {
    try {
      localStorage.setItem('hub_capsule_trash', JSON.stringify(state.trash));
    } catch (_) {}
  }

  function loadPersistedTrash() {
    try {
      const raw = localStorage.getItem('hub_capsule_trash');
      if (!raw) return;
      const arr = JSON.parse(raw);
      if (Array.isArray(arr))
        state.trash = arr.filter((e) => e && e.card);
    } catch (_) {}
  }

  function pushTrashFromIndex(i) {
    const card = cloneRawSegment(i);
    if (!card) return;
    state.trash.push({ card, ts: Date.now() });
    saveTrashToStorage();
  }

  function stackToolbarHtmlFor(kind) {
    const iconAi = '\u{1F9E0}';
    const iconSearch = '\u{1F50D}';
    const iconCopy = '\u{1F4D2}';
    if (kind === 'image') {
      return (
        '<div class="stack-card-toolbar" data-stop-select="1" draggable="false">' +
        '<button type="button" class="stk-icon-btn stk-emoji-btn" data-sact="copy" title="复制" aria-label="复制" draggable="false">' +
        iconCopy +
        '</button>' +
        '</div>'
      );
    }
    return (
      '<div class="stack-card-toolbar" data-stop-select="1" draggable="false">' +
      '<button type="button" class="stk-icon-btn stk-emoji-btn" data-sact="ai" title="AI" aria-label="AI" draggable="false">' +
      iconAi +
      '</button>' +
      '<button type="button" class="stk-icon-btn stk-emoji-btn" data-sact="search" title="搜索" aria-label="搜索" draggable="false">' +
      iconSearch +
      '</button>' +
      '<button type="button" class="stk-icon-btn stk-emoji-btn" data-sact="copy" title="复制" aria-label="复制" draggable="false">' +
      iconCopy +
      '</button>' +
      '</div>'
    );
  }

  function renderStack() {
    stackList.innerHTML = '';
    const qLower = String(state.stackFilter || '').trim().toLowerCase();
    const orderedIndices = [];
    for (let i = 0; i < state.segments.length; i += 1) {
      if (segmentMatchesFilter(state.segments[i], qLower))
        orderedIndices.push(i);
    }
    orderedIndices.reverse();

    if (!orderedIndices.length) {
      stackEmpty.style.display = 'block';
      if (state.segments.length && qLower)
        stackEmpty.textContent = '无匹配过滤条件的草稿';
      else
        stackEmpty.textContent = '草稿条目将纵向排列在此（最新在上）';
      return;
    }

    stackEmpty.style.display = 'none';

    orderedIndices.forEach((realIdx) => {
      const rawItem = state.segments[realIdx];
      const item = asCard(rawItem);
      if (!item) return;
      const card = document.createElement('div');
      card.className = 'stack-card';
      card.dataset.realIndex = String(realIdx);
      card.dataset.kind = item.kind;
      if (realIdx === state.selectedIndex)
        card.classList.add('is-selected');

      const tb = stackToolbarHtmlFor(item.kind);
      let timeRow = '';
      if (realIdx === state.selectedIndex && rawItem && typeof rawItem.addedAt === 'number' && Number.isFinite(rawItem.addedAt)) {
        timeRow = `<div class="stack-card-time" draggable="false">${escapeHtml(new Date(rawItem.addedAt).toLocaleString())}</div>`;
      }
      if (item.kind === 'image') {
        const src = item.imageDataUrl || (item.imagePath ? toFileUrl(item.imagePath) : '');
        card.innerHTML =
          tb +
          timeRow +
          `<img class="stack-card-image" src="${escapeHtml(src)}" alt="图片卡片" draggable="false">` +
          `<button class="stack-card-remove" type="button" data-remove-index="${realIdx}" aria-label="删除" draggable="false">×</button>`;
      } else {
        const rawT = String((rawItem && rawItem.text != null) ? rawItem.text : (item.text || ''));
        card.innerHTML =
          tb +
          timeRow +
          `<div class="stack-card-text" data-real-index="${realIdx}">${escapeHtml(rawT)}</div>` +
          `<button class="stack-card-remove" type="button" data-remove-index="${realIdx}" aria-label="删除" draggable="false">×</button>`;
      }

      if (item.kind === 'text')
        card.setAttribute('draggable', 'true');
      else
        card.setAttribute('draggable', 'false');

      stackList.appendChild(card);
    });
  }

  let resizeRafId = 0;
  function scheduleResponsiveRelayout() {
    if (resizeRafId) cancelAnimationFrame(resizeRafId);
    resizeRafId = requestAnimationFrame(() => {
      resizeRafId = 0;
      renderStack();
      renderHubTags();
      applyVisualState();

  function refreshAll() {
    updatePreview();
    renderStack();
    syncSelectedSlotFromSelectedIndex();
    renderHubTags();
    applyVisualState();
  }

  function pushSegment(text) {
    const t = compactText(text);
    if (!t) return;
    state.segments.push({ kind: 'text', text: t, addedAt: Date.now() });
    state.pendingDraft = '';
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    if (preview && preview.tagName === 'TEXTAREA') preview.value = '';
    state.selectedIndex = state.segments.length - 1;
    refreshAll();
    syncSegments();
    postToAhk({ type: 'hub_stack_selected', text: t, index: state.selectedIndex });
    stackDisplay.classList.remove('stack-pop');
    void stackDisplay.offsetWidth;
    stackDisplay.classList.add('stack-pop');
  }

  function pushImageSegment(imagePath, imageDataUrl) {
    const p = String(imagePath || '').trim();
    const d = String(imageDataUrl || '').trim();
    if (!p && !d) return;
    state.segments.push({ kind: 'image', imagePath: p, imageDataUrl: d, addedAt: Date.now() });
    state.pendingDraft = '';
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    if (preview && preview.tagName === 'TEXTAREA') preview.value = '';
    state.selectedIndex = state.segments.length - 1;
    refreshAll();
    syncSegments();
    stackDisplay.classList.remove('stack-pop');
    void stackDisplay.offsetWidth;
    stackDisplay.classList.add('stack-pop');
  }

  function clearAll() {
    for (let i = state.segments.length - 1; i >= 0; i -= 1)
      pushTrashFromIndex(i);
    state.segments = [];
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.pendingDraft = '';
    if (preview && preview.tagName === 'TEXTAREA') preview.value = '';
    state.selectedIndex = -1;
    state.selectedSlotOneBased = 0;
    refreshAll();
    syncSegments();
    renderTrashList();
    postToAhk({ type: 'hub_stack_selected', text: '', index: -1 });
    postToAhk({ type: 'hub_cleared' });
  }

  function removeAt(i) {
    if (i < 0 || i >= state.segments.length) return;
    const removedSelected = (state.selectedIndex === i);
    pushTrashFromIndex(i);
    state.segments.splice(i, 1);
    if (state.selectedIndex === i) state.selectedIndex = -1;
    if (state.selectedIndex > i) state.selectedIndex -= 1;
    refreshAll();
    syncSegments();
    renderTrashList();
    if (removedSelected) {
      postToAhk({ type: 'hub_stack_selected', text: '', index: -1 });
    }
  }

  function restoreTrashAt(trashIdx) {
    if (trashIdx < 0 || trashIdx >= state.trash.length) return;
    const entry = state.trash[trashIdx];
    const raw = entry.card;
    let card;
    if (raw && raw.kind === 'image') {
      const p = String(raw.imagePath || '').trim();
      const d = String(raw.imageDataUrl || '').trim();
      if (!p && !d) return;
      card = { kind: 'image', imagePath: p, imageDataUrl: d };
      if (typeof raw.addedAt === 'number' && Number.isFinite(raw.addedAt)) card.addedAt = raw.addedAt;
    } else {
      const t = compactText(raw.text || '');
      if (!t) return;
      card = { kind: 'text', text: t };
      if (raw && typeof raw.addedAt === 'number' && Number.isFinite(raw.addedAt)) card.addedAt = raw.addedAt;
    }
    state.trash.splice(trashIdx, 1);
    state.segments.push(card);
    state.selectedIndex = state.segments.length - 1;
    saveTrashToStorage();
    syncSegments();
    refreshAll();
    renderTrashList();
  }

  function openTrashPanel() {
    if (hubTrashOverlay) {
      hubTrashOverlay.classList.add('open');
      hubTrashOverlay.setAttribute('aria-hidden', 'false');

    renderTrashList();
  }

  function closeTrashPanel() {
    if (hubTrashOverlay) {
      hubTrashOverlay.classList.remove('open');
      hubTrashOverlay.setAttribute('aria-hidden', 'true');
    }
  }

  function renderTrashList() {
    if (!hubTrashList) return;
    hubTrashList.innerHTML = '';
    if (!state.trash.length) {
      const empty = document.createElement('div');
      empty.className = 'hub-trash-item-meta';
      empty.style.textAlign = 'center';
      empty.style.padding = '16px';
      empty.textContent = '回收站为空';
      hubTrashList.appendChild(empty);
      return;
    }
    for (let i = state.trash.length - 1; i >= 0; i -= 1) {
      const entry = state.trash[i];
      const c = entry.card || {};
      const wrap = document.createElement('div');
      wrap.className = 'hub-trash-item';
      const meta = document.createElement('div');
      meta.className = 'hub-trash-item-meta';
      meta.textContent = new Date(entry.ts || Date.now()).toLocaleString() + ' · ' + (c.kind === 'image' ? '图片' : '文本');
      const body = document.createElement('div');
      if (c.kind === 'image')
        body.textContent = (c.imagePath || '').slice(0, 120) || '[图片]';
      else
        body.textContent = String(c.text || '').slice(0, 280);
      const actions = document.createElement('div');
      actions.className = 'hub-trash-item-actions';
      const bRestore = document.createElement('button');
      bRestore.type = 'button';
      bRestore.textContent = '恢复';
      const idx = i;
      bRestore.addEventListener('click', () => restoreTrashAt(idx));
      const bDel = document.createElement('button');
      bDel.type = 'button';
      bDel.textContent = '销毁';
      bDel.addEventListener('click', () => {
        state.trash.splice(idx, 1);
        saveTrashToStorage();
        renderTrashList();
      });
      actions.appendChild(bRestore);
      actions.appendChild(bDel);
      wrap.appendChild(meta);
      wrap.appendChild(body);
      wrap.appendChild(actions);
      hubTrashList.appendChild(wrap);
    }
  }

  function beginResize(e) {
    if (e.button !== 0) return;
    // 涓?AHK Gui 瀹㈡埛鍖轰竴鑷达細鏁撮〉瑙嗗彛灏哄锛?capsule 鍦?#host 鍐呬細鍋忓皬锛?    const startW = document.documentElement.clientWidth;
    const startH = document.documentElement.clientHeight;
    state.resize = {
      pointerId: e.pointerId,
      startX: e.screenX,
      startY: e.screenY,
      startW,
      startH
    };
    capsule.classList.add('resizing');
    postToAhk({ type: 'hub_resize_start', width: Math.round(startW), height: Math.round(startH) });
    window.addEventListener('pointermove', onResizeMove);
    window.addEventListener('pointerup', endResize);
    window.addEventListener('pointercancel', endResize);
    e.preventDefault();
    e.stopPropagation();
  }

  function onResizeMove(e) {
    if (!state.resize || state.resize.pointerId !== e.pointerId) return;
    const width = Math.max(280, Math.round(state.resize.startW + (e.screenX - state.resize.startX)));
    const height = Math.max(220, Math.round(state.resize.startH + (e.screenY - state.resize.startY)));
    postToAhk({ type: 'hub_resize_move', width, height });
  }

  function endResize(e) {
    if (!state.resize || state.resize.pointerId !== e.pointerId) return;
    const width = Math.max(280, Math.round(state.resize.startW + (e.screenX - state.resize.startX)));
    const height = Math.max(220, Math.round(state.resize.startH + (e.screenY - state.resize.startY)));
    capsule.classList.remove('resizing');
    postToAhk({ type: 'hub_resize_end', width, height });
    window.removeEventListener('pointermove', onResizeMove);
    window.removeEventListener('pointerup', endResize);
    window.removeEventListener('pointercancel', endResize);
    state.resize = null;
    e.preventDefault();
    e.stopPropagation();
  }

  function beginDrag(e) {
    if (e.button !== 0) return;
    const badTarget = e.target.closest('button');
    if (badTarget) return;

    const rect = capsule.getBoundingClientRect();
    state.drag = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      moved: false
    };

    state.justDragged = false;
    capsule.classList.add('dragging');
    postToAhk({ type: 'hub_mousedown', x: e.screenX, y: e.screenY });
    postToAhk({ type: 'hub_drag_start' });
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);
  }

  function onDragMove(e) {
    if (!state.drag) return;
    if (state.drag.pointerId !== e.pointerId) return;
    const dx = Math.abs(e.clientX - state.drag.startX);
    const dy = Math.abs(e.clientY - state.drag.startY);
    if (dx > 3 || dy > 3) {
      state.drag.moved = true;
      state.justDragged = true;
    }
    postToAhk({
      type: 'hub_drag_move',
      x: e.screenX,
      y: e.screenY,
      offsetX: state.drag.offsetX,
      offsetY: state.drag.offsetY
    });
  }

  function endDrag(e) {
    if (!state.drag) return;
    if (state.drag.pointerId !== e.pointerId) return;
    state.drag = null;
    capsule.classList.remove('dragging');
    postToAhk({ type: 'hub_drag_end', x: e.screenX, y: e.screenY });
    window.removeEventListener('pointermove', onDragMove);
    window.removeEventListener('pointerup', endDrag);
    window.removeEventListener('pointercancel', endDrag);
    setTimeout(() => { state.justDragged = false; }, 0);
  }

  function onFusion(action) {

    setTimeout(() => {
      postToAhk({ type: 'hub_fusion_complete', action: String(action || ''), text: mergedText() });
      capsule.style.transform = '';
      capsule.style.removeProperty('opacity');
      applyVisualState();

  stackList.addEventListener('click', (e) => {
    const sBtn = e.target.closest('[data-sact]');
    if (sBtn) {
      e.stopPropagation();
      const card = sBtn.closest('.stack-card');
      const idx = Number(card?.dataset.realIndex ?? -1);
      if (!Number.isInteger(idx) || idx < 0 || idx >= state.segments.length) return;
      const raw = state.segments[idx];
      const item = asCard(raw);
      const act = sBtn.getAttribute('data-sact');
      if (act === 'remove') {
        removeAt(idx);
        return;
      }
      if (item && item.kind === 'image') {
        if (act === 'copy')
          postToAhk({ type: 'hub_copy_image', imagePath: item.imagePath || '', imageDataUrl: item.imageDataUrl || '' });
        return;
      }
      const tFull = raw && raw.kind === 'text' ? String(raw.text || '') : String(item.text || '');
      const tSend = tFull.trim() ? tFull : (item.text || '');
      if (act === 'copy') postToAhk({ type: 'hub_copy', text: tSend });
      else if (act === 'search') postToAhk({ type: 'hub_search', text: tSend });
      else if (act === 'ai') postToAhk({ type: 'hub_ai', text: tSend });
      return;
    }
    const rm = e.target.closest('[data-remove-index]');
    if (!rm) return;
    const i = parseInt(rm.getAttribute('data-remove-index'), 10);
    if (!Number.isNaN(i)) removeAt(i);
    e.stopPropagation();
  });

  stackList.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.stack-card');
    if (!card) return;
    if (e.target.closest('.stack-card-toolbar') || e.target.closest('[data-remove-index]')) {
      e.preventDefault();
      return;
    }
    const idx = Number(card.dataset.realIndex ?? -1);
    const raw = state.segments[idx];
    const item = asCard(raw);
    if (item && item.kind === 'text') {
      const payload = raw && raw.text != null ? String(raw.text) : String(item.text || '');
      e.dataTransfer.setData('text/plain', payload);
      e.dataTransfer.effectAllowed = 'copy';
    } else {
      e.preventDefault();
    }
  });

  function armDraftDragFromTextarea(e) {
    if (e.button !== 0) return;
    if (hasPendingImage()) return;
    const startX = e.clientX;
    const startY = e.clientY;
    let live = true;
    function cleanup() {
      if (!live) return;
      live = false;
      window.removeEventListener('mousemove', onMove, true);
      window.removeEventListener('mouseup', onUp, true);
      window.removeEventListener('pointermove', onMove, true);
      window.removeEventListener('pointerup', onUp, true);
    }
    function onUp() {
      cleanup();
    }
    function onMove(mv) {
      if (!live) return;
      if (mv.type === 'mousemove' && mv.buttons !== undefined && mv.buttons !== 1) {
        cleanup();
        return;
      }
      const dx = mv.clientX - startX;
      const dy = mv.clientY - startY;
      if (Math.hypot(dx, dy) < DRAFT_DRAG_MIN_PX) return;
      if (preview && preview.tagName === 'TEXTAREA') {
        const a = preview.selectionStart;
        const b = preview.selectionEnd;
        if (b > a) return;
      }
      cleanup();
      syncPendingFromTextarea();
      if (!String(state.pendingDraft || '').trim()) return;
      mv.preventDefault();
      beginDraftDrag(mv);
    }
    window.addEventListener('mousemove', onMove, true);
    window.addEventListener('mouseup', onUp, true);
    window.addEventListener('pointermove', onMove, true);
    window.addEventListener('pointerup', onUp, true);
  }

  function pointInStackDisplay(clientX, clientY) {
    if (!stackDisplay) return false;
    const r = stackDisplay.getBoundingClientRect();
    return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
  }

  function clearDraftHoldTimer(dd) {
    if (dd && dd.holdTimerId) {
      clearTimeout(dd.holdTimerId);
      dd.holdTimerId = 0;
    }
  }

  /** 鎻愪氦鍓嶅菇鐏甸鍏ュ爢鍙犲尯 */
  function animateGhostToStackThen(ghost, callback) {
    if (!ghost || !ghost.parentNode) {
      try { if (callback) callback(); } catch (_) {}
      return;
    }
    const r = stackDisplay.getBoundingClientRect();
    const tx = r.left + r.width / 2 - 48;
    const ty = r.top + Math.min(56, Math.max(20, r.height / 2));
    ghost.style.transition = 'left 0.3s cubic-bezier(0.22,1,0.36,1), top 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease-out, transform 0.3s cubic-bezier(0.22,1,0.36,1)';
    ghost.style.transform = 'scale(0.82)';
    requestAnimationFrame(() => {
      ghost.style.left = tx + 'px';
      ghost.style.top = ty + 'px';
      ghost.style.opacity = '0.18';
    });
    let done = false;
    function finish() {
      if (done) return;
      done = true;
      ghost.removeEventListener('transitionend', onEnd);
      try { if (callback) callback(); } catch (_) {}
      if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
    }
    function onEnd(e) {
      if (e.propertyName === 'opacity' || e.propertyName === 'left') finish();
    }
    ghost.addEventListener('transitionend', onEnd);
    setTimeout(finish, 400);
  }

  function removeDraftDragListeners(moveFn, upFn) {
    document.removeEventListener('mousemove', moveFn, true);
    document.removeEventListener('mouseup', upFn, true);
    document.removeEventListener('pointermove', moveFn, true);
    document.removeEventListener('pointerup', upFn, true);
    document.removeEventListener('pointercancel', upFn, true);
  }

  function beginDraftDrag(e) {
    syncPendingFromTextarea();
    if (state.draftDrag || !String(state.pendingDraft || '').trim()) return;
    if (e.button !== undefined && e.button !== 0) return;

    const ghost = document.createElement('div');
    ghost.style.position = 'fixed';
    ghost.style.zIndex = '99999';
    ghost.style.pointerEvents = 'none';
    ghost.style.maxWidth = '300px';
    ghost.style.padding = '6px 12px';
    ghost.style.borderRadius = '999px';
    ghost.style.border = '1px dashed rgba(255,193,132,.8)';
    ghost.style.background = 'rgba(255,154,47,.22)';
    ghost.style.color = '#ffe6cc';
    ghost.style.fontSize = '11px';
    ghost.style.boxShadow = '0 6px 16px rgba(0,0,0,.35)';
    ghost.textContent = '\u677e\u624b\u52a0\u5165\u8349\u7a3f\u5361\u7247';
    document.body.appendChild(ghost);

    state.draftDrag = {
      ghost,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      finished: false,
      holdTimerId: 0
    };
    state.draftDrag.holdTimerId = setTimeout(() => {
      if (!state.draftDrag || state.draftDrag.finished) return;
      state.draftDrag.moved = true;
    }, DRAFT_HOLD_MS);
    previewCard.classList.add('draft-drag-active');
    applyVisualState();

    function onDraftMove(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.type === 'mousemove' && ev.buttons !== undefined && ev.buttons !== 1) return;
      const dx = ev.clientX - state.draftDrag.startX;
      const dy = ev.clientY - state.draftDrag.startY;
      if (Math.hypot(dx, dy) >= DRAFT_DRAG_MIN_PX) state.draftDrag.moved = true;
      ghost.style.left = (ev.clientX + 12) + 'px';
      ghost.style.top = (ev.clientY + 12) + 'px';
    }

    function onDraftUp(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.button !== undefined && ev.button !== 0) return;
      syncPendingFromTextarea();
      const dd = state.draftDrag;
      const moved = dd.moved;
      const g = dd.ghost;
      const textToCommit = state.pendingDraft;
      clearDraftHoldTimer(dd);
      dd.finished = true;
      removeDraftDragListeners(onDraftMove, onDraftUp);

      const inStack = pointInStackDisplay(ev.clientX, ev.clientY);
      const shouldCommit = !!textToCommit && (moved || inStack);

      state.draftDrag = null;
      previewCard.classList.remove('draft-drag-active');

      if (shouldCommit) {
        animateGhostToStackThen(g, () => {
          pushSegment(textToCommit);
          applyVisualState();
        });
      } else {
        if (g && g.parentNode) g.parentNode.removeChild(g);
        applyVisualState();
      }
      ev.preventDefault();
      ev.stopPropagation();
    }

    document.addEventListener('mousemove', onDraftMove, true);
    document.addEventListener('mouseup', onDraftUp, true);
    document.addEventListener('pointermove', onDraftMove, true);
    document.addEventListener('pointerup', onDraftUp, true);
    document.addEventListener('pointercancel', onDraftUp, true);

    onDraftMove(e);
    e.preventDefault();
    e.stopPropagation();
  }

  function beginImageDraftDrag(e) {
    if (state.draftDrag || !hasPendingImage()) return;
    if (e.button !== undefined && e.button !== 0) return;

    const ghost = document.createElement('div');
    ghost.style.position = 'fixed';
    ghost.style.zIndex = '99999';
    ghost.style.pointerEvents = 'none';
    ghost.style.maxWidth = '300px';
    ghost.style.padding = '6px 12px';
    ghost.style.borderRadius = '999px';
    ghost.style.border = '1px dashed rgba(255,193,132,.8)';
    ghost.style.background = 'rgba(255,154,47,.22)';
    ghost.style.color = '#ffe6cc';
    ghost.style.fontSize = '11px';
    ghost.style.boxShadow = '0 6px 16px rgba(0,0,0,.35)';
    ghost.textContent = '\u677e\u624b\u52a0\u5165\u56fe\u7247\u5361\u7247';
    document.body.appendChild(ghost);

    state.draftDrag = {
      ghost,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      finished: false,
      holdTimerId: 0
    };
    state.draftDrag.holdTimerId = setTimeout(() => {
      if (!state.draftDrag || state.draftDrag.finished) return;
      state.draftDrag.moved = true;
    }, DRAFT_HOLD_MS);
    previewCard.classList.add('draft-drag-active');
    applyVisualState();

    function onDraftMove(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.type === 'mousemove' && ev.buttons !== undefined && ev.buttons !== 1) return;
      const dx = ev.clientX - state.draftDrag.startX;
      const dy = ev.clientY - state.draftDrag.startY;
      if (Math.hypot(dx, dy) >= DRAFT_DRAG_MIN_PX) state.draftDrag.moved = true;
      ghost.style.left = (ev.clientX + 12) + 'px';
      ghost.style.top = (ev.clientY + 12) + 'px';
    }

    function onDraftUp(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.button !== undefined && ev.button !== 0) return;
      const dd = state.draftDrag;
      const moved = dd.moved;
      const g = dd.ghost;
      const pPath = state.pendingImagePath;
      const pData = state.pendingImageDataUrl;
      clearDraftHoldTimer(dd);
      dd.finished = true;
      removeDraftDragListeners(onDraftMove, onDraftUp);

      const inStack = pointInStackDisplay(ev.clientX, ev.clientY);
      const shouldCommit = (moved || inStack) && (pPath || pData);

      state.draftDrag = null;
      previewCard.classList.remove('draft-drag-active');

      if (shouldCommit) {
        animateGhostToStackThen(g, () => {
          pushImageSegment(pPath, pData);
          applyVisualState();
        });
      } else {
        if (g && g.parentNode) g.parentNode.removeChild(g);
        applyVisualState();
      }
      ev.preventDefault();
      ev.stopPropagation();
    }

    document.addEventListener('mousemove', onDraftMove, true);
    document.addEventListener('mouseup', onDraftUp, true);
    document.addEventListener('pointermove', onDraftMove, true);
    document.addEventListener('pointerup', onDraftUp, true);
    document.addEventListener('pointercancel', onDraftUp, true);

    onDraftMove(e);
    e.preventDefault();
    e.stopPropagation();
  }

  function clearExternalDropVisual() {
    if (externalDragLeaveTimer) {
      clearTimeout(externalDragLeaveTimer);
      externalDragLeaveTimer = null;
    }
    externalDragDepth = 0;
    applyVisualState();
    postToAhk({ type: 'hub_external_drag', phase: 'leave' });
  }

  let externalDragLeaveTimer = null;

  function bumpExternalDragVisual() {
    if (externalDragLeaveTimer) {
      clearTimeout(externalDragLeaveTimer);
      externalDragLeaveTimer = null;
    }
    if (externalDragDepth < 1) {
      externalDragDepth = 1;
      postToAhk({ type: 'hub_external_drag', phase: 'enter' });
      applyVisualState();
    }
  }

  function scheduleExternalDragEnd() {
    if (externalDragLeaveTimer) clearTimeout(externalDragLeaveTimer);
    externalDragLeaveTimer = setTimeout(() => {
      externalDragLeaveTimer = null;
      externalDragDepth = 0;
      applyVisualState();
      postToAhk({ type: 'hub_external_drag', phase: 'leave' });
    }, 160);
  }

  function flashDropSuccessOnPreview() {
    const el = hasPendingImage() ? previewCard : preview;
    el.classList.remove('drop-success-flash');
    void el.offsetWidth;
    el.classList.add('drop-success-flash');
    const onEnd = () => {
      el.removeEventListener('animationend', onEnd);
      el.classList.remove('drop-success-flash');
    };
    el.addEventListener('animationend', onEnd);
  }

  function readExternalDropText(e) {
    const dt = e && e.dataTransfer;
    if (!dt) return '';
    const types = ['text/plain', 'Text', 'text/uri-list'];
    for (let i = 0; i < types.length; i++) {
      try {
        const raw = dt.getData(types[i]);
        if (raw && String(raw).trim()) {
          let t = String(raw).replace(/\r\n/g, '\n').trim();
          if (types[i] === 'text/uri-list') t = t.split('\n')[0].trim();
          return compactText(t);
        }
      } catch (_) {}
    }
    try {
      const html = dt.getData('text/html');
      if (html && html.trim()) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const t = (div.textContent || '').trim();
        if (t) return compactText(t);
      }
    } catch (_) {}
    return '';
  }

  /** 鏁撮〉 WebView 浣滀负鎷栨斁鐩爣锛氫粠 Cursor 绛夊閮ㄧ獥鍙ｆ嫋鍏ュ嵆鍔犲叆鍗＄墖 */
  /** 鐐瑰嚮 #host 鐣欑櫧鍖猴紙鍚粠鑳跺泭绌块€忕殑绌虹櫧锛夌珛鍗抽€氱煡 AHK 鍏抽棴锛岄伩鍏嶄粎棰勮鏃舵暣绐楃煩褰㈣鍒や负銆屽唴閮ㄣ€?*/
  function installDismissOnHostPadding() {
    if (!host) return;
    host.addEventListener('pointerdown', (e) => {
      if (e.target !== host) return;
      if (e.button !== 0 && e.button !== 2) return;
      postToAhk({ type: 'selection_menu_dismiss' });
    }, true);
  }

  /** 鏁撮〉 WebView 浣滀负鎷栨斁鐩爣锛氫粠 Cursor 绛夊閮ㄧ獥鍙ｆ嫋鍏ュ嵆鍔犲叆鍗＄墖 */
  function installGlobalDropTarget() {
    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      bumpExternalDragVisual();
    }, true);

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      try {
        e.dataTransfer.dropEffect = 'copy';
      } catch (_) {}
      bumpExternalDragVisual();
    }, false);

    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      scheduleExternalDragEnd();
    }, true);

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      if (externalDragLeaveTimer) {
        clearTimeout(externalDragLeaveTimer);
        externalDragLeaveTimer = null;
      }
      externalDragDepth = 0;
      const dropped = readExternalDropText(e);
      if (dropped) {
        setDraftPreview(dropped);
        flashDropSuccessOnPreview();
      }
      applyVisualState();
      postToAhk({ type: 'hub_external_drag', phase: 'leave' });
    }, false);
  }

  /* WebView2 涓?mouse 浜嬩欢姣?pointer 鏇寸ǔ瀹氾細鎹曡幏闃舵鐩戝惉锛岄伩鍏嶈鍐呴儴鍚炴帀 */
  draftChip.addEventListener('mousedown', (e) => {
    syncPendingFromTextarea();
    if (!String(state.pendingDraft || '').trim() || e.button !== 0) return;
    if (e.target.closest('button')) return;
    beginDraftDrag(e);
  }, true);

  draftChip.addEventListener('pointerdown', (e) => {
    syncPendingFromTextarea();
    if (!String(state.pendingDraft || '').trim() || e.button !== 0) return;
    if (e.pointerType === 'mouse') return;
    if (e.target.closest('button')) return;
    beginDraftDrag(e);
  }, true);

  function tryBeginDraftFromPreviewCard(e) {
    if (e.button !== 0) return;
    if (e.target.closest('button')) return;
    if (e.target.closest('#draft-chip')) return;
    if (e.target.closest('#external-drop-hint')) return;
    if (hasPendingImage()) return;
    syncPendingFromTextarea();
    if (!String(state.pendingDraft || '').trim()) return;
    if (preview && preview.tagName === 'TEXTAREA' && (e.target === preview || preview.contains(e.target)))
      return;
    if (window.getSelection && String(window.getSelection().toString()).trim()) return;
    if (e.target === previewImage || (previewImage && previewImage.contains(e.target))) return;
    beginDraftDrag(e);
  }

  previewCard.addEventListener('mousedown', tryBeginDraftFromPreviewCard, true);
  previewCard.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse') return;
    tryBeginDraftFromPreviewCard(e);
  }, true);

  previewImage.addEventListener('mousedown', (e) => {
    if (!hasPendingImage() || e.button !== 0) return;
    beginImageDraftDrag(e);
  }, true);

  previewImage.addEventListener('pointerdown', (e) => {
    if (!hasPendingImage() || e.button !== 0) return;
    if (e.pointerType === 'mouse') return;
    beginImageDraftDrag(e);
  }, true);

  window.addEventListener('keydown', (e) => {
    if (e.key === 'CapsLock') {
      beginCapsHoldHint();
    } else if (state.capsHintActive) {
      const pressed = normalizeHintKey(e.key);
      if (pressed) setCapsPressedKey(pressed);
    }
    if (e.key === 'Escape') {
      hideContextMenu();
      hidePreviewCtxMenu();
      if (hubTrashOverlay && hubTrashOverlay.classList.contains('open')) {
        closeTrashPanel();
        e.preventDefault();
        return;
      }
      postToAhk({ type: 'selection_menu_dismiss' });
      e.preventDefault();
      return;
    }
    const isCopy = (e.key === 'c' || e.key === 'C') && (e.ctrlKey || e.metaKey);
    if (!isCopy) return;

    const selected = getSelectedTextInsideCapsule();
    if (selected) {
      postToAhk({ type: 'hub_copy', text: selected });
      /* 涓嶅彲 preventDefault锛氬惁鍒?WebView 涓嶄細鎶婇€夊尯鍐欏叆绯荤粺鍓创鏉匡紝澶栭儴缂栬緫鍣ㄦ棤娉曠矘璐淬€?         AHK 渚ц嫢鏈鐞?hub_copy锛屽師鍏堢瓑浜庡彧鎷︽帀榛樿澶嶅埗銆?*/
      return;
    }
    if (hasPendingImage()) {
      copyCurrentPreviewImage();
      e.preventDefault();
    }
  }, true);

  window.addEventListener('keyup', (e) => {
    if (e.key === 'CapsLock') {
      endCapsHoldHint();
      return;
    }
    if (!state.capsHintActive) return;
    const released = normalizeHintKey(e.key);
    if (released && state.capsPressedKey === released) {
      state.capsPressedKey = '';
      updateHotkeyHighlights();
    }
  }, true);

  window.addEventListener('blur', () => {
    endCapsHoldHint();
    clearPreviewOnly();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      endCapsHoldHint();
      clearPreviewOnly();
    }
  });

  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener('message', (event) => {
      let d = event.data;
      if (typeof d === 'string') {
        try { d = JSON.parse(d); } catch (_) { return; }
      }
      if (!d || !d.type) return;

      switch (d.type) {
        case 'capsHint':
          setCapsHintActive(!!d.active);
          break;
        case 'capsHintPress':
          flashCapsPressedKey(d.key || '');
          break;
        case 'vk_action':
          handleVkAction(d.action || '');
          break;
        case 'preview_update':
          if (d.imagePath || d.imageDataUrl)
            setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          else
            setDraftPreview(normalizePreviewText(d.text));
          break;
        case 'draft_collect':
          addToDraft(normalizePreviewText(d.text), d.source || '');
          break;
        case 'push_segment':
          addToDraft(normalizePreviewText(d.text), 'legacy_push_segment');
          break;
        case 'hub_preview_selection':
          if (d.imagePath || d.imageDataUrl)
            setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          else
            setDraftPreview(normalizePreviewText(d.text));
          break;
        case 'selection_menu_init':
          if (d.imagePath || d.imageDataUrl)
            setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          else
            setDraftPreview(normalizePreviewText(d.text));
          break;
        case 'hub_preview_image':
          setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          break;
        case 'hub_preview_state':
          setCopyTriggerMode(d.copyTriggerMode || 'capslock');
          break;
        case 'clear_segments':
          clearAll();
          break;
        case 'hub_restore_segments':
          state.segments = Array.isArray(d.segments)
            ? d.segments
                .map((item) => asCard(item))
                .filter(
                  (item) =>
                    item &&
                    ((item.kind === 'text' && item.text) || (item.kind === 'image' && (item.imagePath || item.imageDataUrl)))
                )
            : [];
          refreshAll();
          syncSegments();
          break;
        case 'get_segments':
          postToAhk({ type: 'hub_segments_data', segments: textSegments(), merged: mergedText() });
          break;
        case 'set_dock':
          setDocked(true);
          break;
        case 'undock':
          setDocked(false);
          break;
        case 'gravity_update':
          setGravity(!!d.active, d.targetName || '');
          break;
        case 'hub_collision_feedback':
          setCollision(!!d.active, d.buttonId || '');
          break;
        case 'fusion_trigger':
          onFusion(d.action || '');
          break;
        case 'hub_dismiss_reset':
          state.pendingDraft = '';
          state.pendingImagePath = '';
          state.pendingImageDataUrl = '';
          if (preview && preview.tagName === 'TEXTAREA') preview.value = '';
          hideContextMenu();
          hidePreviewCtxMenu();
          refreshAll();
          break;
        case 'hub_remove_at': {
          const i = Number(d.index);
          if (Number.isInteger(i) && i >= 0 && i < state.segments.length)
            removeAt(i);
          break;
        }
        case 'hub_ctx_menu_spec':
          rebuildHubCtxMenuDom(d.items);
          break;
      }
    });
  }

  loadPersistedSegments();
  loadPersistedTrash();
  setCopyTriggerMode('capslock');
  applyStaticHotkeyHints();
  refreshAll();
  syncSegments();
  window.addEventListener('resize', scheduleResponsiveRelayout);
  installDismissOnHostPadding();
  installGlobalDropTarget();
  postToAhk({ type: 'hub_ready' });
  postToAhk({ type: 'selection_menu_ready' });
})();
</script>
</body>
