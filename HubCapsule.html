<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>HubCapsule</title>
<style>
:root {
  --capsule-bg: rgba(17, 22, 33, 0.26);
  --capsule-border: rgba(255, 255, 255, 0.18);
  --capsule-border-strong: rgba(255, 170, 82, 0.5);
  --text: #f4f7ff;
  --text-muted: #a8b2c8;
  --accent: #ff9a2f;
  --accent-soft: rgba(255, 154, 47, 0.22);
  --accent-glow: rgba(255, 154, 47, 0.45);
  --ease: 180ms cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  /* 与宿主 WebView 实色背景一致，避免透明区域与旧版 TransColor 叠加穿透 */
  background: #1a1a1a;
  overflow: hidden;
  color: var(--text);
  font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
}

/* 整窗可接系统拖放：必须为 auto，否则 padding 区无法收到 dragover/drop */
#host {
  width: 100%;
  height: 100%;
  padding: 14px 14px 18px;
  pointer-events: auto;
  box-sizing: border-box;
}

#capsule {
  pointer-events: auto;
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 178px;
  border-radius: 24px;
  border: 1px solid var(--capsule-border);
  background:
    linear-gradient(165deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02) 28%, rgba(0, 0, 0, 0.1) 100%),
    var(--capsule-bg);
  backdrop-filter: blur(18px) saturate(165%);
  -webkit-backdrop-filter: blur(18px) saturate(165%);
  box-shadow:
    0 22px 46px rgba(0, 0, 0, 0.34),
    0 0 24px rgba(255, 154, 47, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.26);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: open-flow 380ms cubic-bezier(0.2, 1, 0.3, 1);
  transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease), width var(--ease), opacity var(--ease);
}

/* 胶囊透明度由 JS applyVisualState 按「仅预览 / 拖动或已入栈」设置，避免与已有卡片冲突 */

@keyframes open-flow {
  0% {
    opacity: 0;
    transform: translateY(14px) scale(0.72);
    filter: blur(8px);
  }
  55% {
    opacity: 1;
    transform: translateY(0) scale(1.06);
    filter: blur(0);
  }
  100% {
    transform: translateY(0) scale(1);
  }
}

#capsule.dragging {
  transition: none;
  border-color: var(--capsule-border-strong);
  box-shadow:
    0 30px 64px rgba(0, 0, 0, 0.52),
    0 0 42px rgba(255, 154, 47, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.42);
}

/* 鸿蒙式：系统拖入时高亮胶囊 + 预览区提示 */
#capsule.external-drop-hover {
  transform: scale(1.02);
  border-color: var(--capsule-border-strong);
  box-shadow:
    0 28px 56px rgba(0, 0, 0, 0.48),
    0 0 36px rgba(255, 154, 47, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.32);
}

#external-drop-hint {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 160ms var(--ease), transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
  text-align: center;
  padding: 14px 20px;
  border-radius: 16px;
  background: linear-gradient(145deg, rgba(255, 154, 47, 0.28), rgba(255, 120, 40, 0.12));
  border: 1px solid rgba(255, 193, 132, 0.55);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35), 0 0 24px rgba(255, 154, 47, 0.25);
  max-width: 88%;
}

#external-drop-hint .hint-title {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #fff5e8;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

#external-drop-hint .hint-sub {
  display: block;
  font-size: 11px;
  color: rgba(255, 230, 200, 0.88);
  line-height: 1.45;
}

#preview-card.external-drop-target {
  border-color: rgba(255, 170, 82, 0.75);
  background: rgba(40, 32, 22, 0.55);
  animation: external-target-pulse 1.1s ease-in-out infinite;
}

@keyframes external-target-pulse {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(255, 154, 47, 0.2); }
  50% { box-shadow: inset 0 0 0 2px rgba(255, 154, 47, 0.55), 0 0 20px rgba(255, 154, 47, 0.15); }
}

#capsule.external-drop-hover #external-drop-hint {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: hint-float 1.2s ease-in-out infinite;
}

@keyframes hint-float {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -52%) scale(1.02); }
}

#preview-card.drop-success-flash {
  animation: drop-success 480ms ease-out;
}

@keyframes drop-success {
  0% { filter: brightness(1); transform: scale(1); }
  35% { filter: brightness(1.25); transform: scale(1.03); }
  100% { filter: brightness(1); transform: scale(1); }
}

#capsule.resizing {
  transition: none;
  border-color: var(--capsule-border-strong);
}

#capsule.gravity-active {
  border-color: var(--capsule-border-strong);
}

#capsule.collision-hit {
  box-shadow:
    0 0 0 2px rgba(255, 154, 47, 0.55),
    0 26px 54px rgba(0, 0, 0, 0.48),
    0 0 36px rgba(255, 154, 47, 0.28);
}

/* 仅预览且无堆叠卡片时：胶囊壳不拦截点击，空白区穿透到 #host，由脚本通知 AHK 立即关闭 */
#capsule.selection-active:not(.has-content) {
  pointer-events: none;
}
#capsule.selection-active:not(.has-content) #header,
#capsule.selection-active:not(.has-content) #preview-card,
#capsule.selection-active:not(.has-content) #action-bar,
#capsule.selection-active:not(.has-content) #resize-handle {
  pointer-events: auto;
}

#capsule.is-docked {
  width: 74px;
  min-width: 74px;
  max-width: 74px;
}

#capsule.is-docked #main,
#capsule.is-docked #trigger-bar,
#capsule.is-docked #action-bar,
#capsule.is-docked #stack-display {
  opacity: 0;
  pointer-events: none;
  transform: translateX(12px);
}

#capsule.is-docked #dock-beacon {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

#dock-beacon {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: radial-gradient(circle at 30% 30%, #ffd3a1, #ff9a2f 58%, #ff7f12);
  box-shadow: 0 0 16px var(--accent-glow), 0 0 34px rgba(255, 154, 47, 0.32);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.72);
  pointer-events: none;
  transition: opacity var(--ease), transform var(--ease);
}

#dock-beacon::after {
  content: "";
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(255, 154, 47, 0.35);
  border-radius: 999px;
  animation: beacon-ripple 1.6s ease-out infinite;
}

@keyframes beacon-ripple {
  0% { transform: scale(0.82); opacity: 0.78; }
  100% { transform: scale(1.75); opacity: 0; }
}

#main {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px;
  min-height: 0;
  flex: 1;
  transition: opacity var(--ease), transform var(--ease);
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 26px;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
body.native-titlebar #header { display: none; }

#drag-handle {
  width: 40px;
  height: 6px;
  border-radius: 999px;
  margin-right: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,.15), rgba(255,186,119,.75), rgba(255,255,255,.15));
  box-shadow: 0 0 10px rgba(255,154,47,.35);
  flex-shrink: 0;
}

#header-left {
  display: inline-flex;
  align-items: center;
}

#header:active { cursor: grabbing; }

#header-title {
  font-size: 11px;
  letter-spacing: 1.3px;
  color: #ffd3a1;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(255, 154, 47, 0.34);
}

#header-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

#header-count {
  min-width: 22px;
  height: 22px;
  padding: 0 7px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  color: #241000;
  background: linear-gradient(145deg, #ffbc73, #ff9124);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(255, 154, 47, 0.45);
}

.hub-close-btn {
  width: 26px;
  height: 26px;
  padding: 0;
  border: 1px solid rgba(255, 193, 132, 0.35);
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  color: #ffe8cc;
  background: rgba(255, 154, 47, 0.18);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  transition: background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease);
}

.hub-close-btn:hover {
  background: rgba(255, 154, 47, 0.38);
  color: #fff;
  border-color: rgba(255, 193, 132, 0.65);
}

.hub-close-btn:active {
  transform: scale(0.94);
}

#preview-card {
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  background: rgba(20, 27, 40, 0.48);
  padding: 10px 11px;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

#preview-card.selection-hint {
  cursor: grab;
}

#preview-card.selection-hint:active {
  cursor: grabbing;
}

#preview {
  font-size: 12px;
  line-height: 1.5;
  max-height: 52px;
  overflow: hidden;
  color: #edf2ff;
  word-break: break-word;
  user-select: text;
  -webkit-user-select: text;
}

#preview-card.preview-pulse::after {
  content: "";
  position: absolute;
  inset: -18px;
  background: radial-gradient(circle at center, rgba(255, 178, 93, 0.4), transparent 62%);
  opacity: 0;
  pointer-events: none;
  animation: preview-bloom 560ms ease-out;
}

#preview-card.selection-hint:not(.draft-drag-active) #preview {
  user-select: text;
  -webkit-user-select: text;
}

#preview-card.selection-hint:not(.draft-drag-active) {
  animation: hint-glow 1.6s ease-in-out infinite;
}

@keyframes hint-glow {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,154,47,0.08); }
  50% { box-shadow: inset 0 0 0 1px rgba(255,154,47,0.45); }
}

@keyframes preview-bloom {
  0% { opacity: 0.9; transform: scale(0.6); }
  100% { opacity: 0; transform: scale(1.28); }
}

#draft-chip {
  margin-top: 8px;
  width: fit-content;
  max-width: 100%;
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px dashed rgba(255, 193, 132, 0.74);
  color: #ffddb7;
  font-size: 11px;
  background: rgba(255, 154, 47, 0.15);
  cursor: grab;
  user-select: none;
  display: none;
}

#draft-chip.show { display: inline-flex; align-items: center; }
#draft-chip:active { cursor: grabbing; }
#draft-chip { touch-action: none; }

#stack-display {
  margin-top: 2px;
  flex: 1;
  min-height: 72px;
  overflow: auto;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(14, 19, 30, 0.34);
  padding: 10px;
  perspective: 1000px;
  transition: opacity var(--ease), transform var(--ease);
  scrollbar-gutter: stable;
}

#stack-display.stack-pop {
  animation: stack-pop .28s ease-out;
}

@keyframes stack-pop {
  0% { transform: scale(.985); box-shadow: inset 0 0 0 1px rgba(255,154,47,.0); }
  50% { transform: scale(1.01); box-shadow: inset 0 0 0 1px rgba(255,154,47,.55); }
  100% { transform: scale(1); box-shadow: inset 0 0 0 1px rgba(255,154,47,.0); }
}

#stack-display::-webkit-scrollbar { width: 8px; }
#stack-display::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 8px; }
#stack-display::-webkit-scrollbar-thumb { background: rgba(255, 170, 95, 0.55); border-radius: 8px; }
#stack-display::-webkit-scrollbar-thumb:hover { background: rgba(255, 170, 95, 0.75); }

#stack-empty {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding-top: 20px;
}

#stack-list {
  position: relative;
  width: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stack-card {
  position: relative;
  width: 100%;
  border-radius: 11px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(31, 40, 56, 0.58);
  box-shadow: 0 7px 22px rgba(0, 0, 0, 0.38);
  padding: 9px 10px;
  transform-origin: center top;
  transition: transform var(--ease), opacity var(--ease), border-color var(--ease);
}

.stack-card.is-selected {
  border-color: rgba(255, 170, 82, 0.78);
  box-shadow: 0 0 0 2px rgba(255, 154, 47, 0.22), 0 7px 22px rgba(0, 0, 0, 0.38);
}

.stack-card:hover { border-color: rgba(255, 186, 119, 0.55); }

.stack-card-text {
  font-size: 12px;
  color: #eef3ff;
  line-height: 1.35;
  white-space: pre-wrap;
  word-break: break-word;
  user-select: text;
  -webkit-user-select: text;
}

.stack-card-image {
  display: block;
  width: 100%;
  max-height: 96px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.18);
}

#preview-image-wrap {
  display: none;
}

#preview-image-wrap.show {
  display: block;
}

#preview-image {
  display: block;
  max-width: 100%;
  max-height: 120px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  cursor: grab;
}

#preview-image:active { cursor: grabbing; }

#preview-copy-image {
  margin-top: 8px;
  height: 28px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 154, 47, 0.16);
  color: #ffe7cf;
  font-size: 11px;
  cursor: pointer;
}

.stack-card-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 107, 107, 0.24);
  color: #ffd7d7;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--ease), transform var(--ease);
}

.stack-card:hover .stack-card-remove { opacity: 1; }
.stack-card-remove:hover { transform: scale(1.1); }

#ctx-menu {
  position: fixed;
  z-index: 99999;
  min-width: 132px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.16);
  background: rgba(18, 24, 36, 0.94);
  box-shadow: 0 16px 34px rgba(0,0,0,0.34);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 6px;
  display: none;
}

#ctx-menu.open { display: block; }

.ctx-item {
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--text);
  text-align: left;
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.ctx-item:hover { background: rgba(255,154,47,0.14); }

#resize-handle {
  position: absolute;
  right: 4px;
  bottom: 4px;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: nwse-resize;
  touch-action: none;
  background:
    linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.16) 45%, rgba(255,255,255,0.16) 55%, transparent 55%),
    linear-gradient(135deg, transparent 62%, rgba(255,170,95,0.75) 62%, rgba(255,170,95,0.75) 72%, transparent 72%);
  opacity: 0.85;
}

#action-bar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  padding: 0 12px 11px;
}

#trigger-bar {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  padding: 0 12px 8px;
}

.trigger-btn {
  height: 28px;
  border-radius: 9px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(20, 26, 38, 0.5);
  color: #d8e0f5;
  font-size: 11px;
  cursor: pointer;
}

.trigger-btn.is-active {
  border-color: rgba(255, 193, 132, 0.78);
  background: rgba(255, 154, 47, 0.2);
  color: #fff1e1;
}

.action-btn {
  height: 34px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: rgba(21, 28, 42, 0.5);
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease), background var(--ease);
}

.action-btn:hover {
  border-color: rgba(255, 193, 132, 0.72);
  background: rgba(255, 154, 47, 0.14);
  box-shadow: 0 0 14px rgba(255, 154, 47, 0.24);
}

.action-btn:active { transform: scale(0.97); }

#gravity-tip {
  position: absolute;
  left: 50%;
  top: 8px;
  transform: translateX(-50%);
  background: rgba(255, 154, 47, 0.2);
  border: 1px solid rgba(255, 154, 47, 0.45);
  color: #ffdcb2;
  font-size: 10px;
  border-radius: 999px;
  padding: 3px 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--ease);
}

#gravity-tip.visible { opacity: 1; }
</style>
</head>
<body class="native-titlebar">
<div id="ctx-menu">
  <button class="ctx-item" type="button" data-act="copy">Copy</button>
  <button class="ctx-item" type="button" data-act="remove">Remove</button>
  <button class="ctx-item" type="button" data-act="clear">Clear All</button>
</div>
<div id="host">
  <div id="capsule" role="region" aria-label="Hub Capsule">
    <div id="dock-beacon"></div>
    <div id="gravity-tip">靠近目标</div>

    <div id="main">
      <div id="header" class="window-titlebar" data-drag-handle="1">
        <div id="header-left">
          <div id="drag-handle"></div>
          <div id="header-title">HUB CAPSULE</div>
        </div>
        <div id="header-right">
          <div id="header-count">0</div>
          <button type="button" class="hub-close-btn" id="btnCloseHub" title="关闭" aria-label="关闭">×</button>
        </div>
      </div>

      <div id="preview-card">
        <div id="preview">等待选中文本...</div>
        <div id="preview-image-wrap">
          <img id="preview-image" alt="预览图片">
          <button type="button" id="preview-copy-image">复制图片预览</button>
        </div>
        <div id="draft-chip">从 Cursor 等窗口把选中文本拖入本窗口任意处松手，即可加入卡片（约 80% 不透明）</div>
        <div id="external-drop-hint" aria-hidden="true">
          <span class="hint-title">拖放至此</span>
          <span class="hint-sub">松手后内容将加入预览与卡片堆叠</span>
        </div>
      </div>

      <div id="stack-display">
        <div id="stack-empty">选中内容会按卡片堆叠在这里</div>
        <div id="stack-list"></div>
      </div>
    </div>

    <div id="trigger-bar">
      <button type="button" class="trigger-btn" id="btnTriggerCapslock">触发：CapsLock+C</button>
      <button type="button" class="trigger-btn" id="btnTriggerDoubleCtrl">触发：双击 Ctrl+C</button>
    </div>

    <div id="action-bar">
      <button type="button" class="action-btn" id="btnSearch">搜索</button>
      <button type="button" class="action-btn" id="btnAi">AI</button>
      <button type="button" class="action-btn" id="btnClear">清空</button>
    </div>
    <div id="resize-handle" title="Resize"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const state = {
    segments: [],
    copyTriggerMode: 'capslock',
    drag: null,
    draftDrag: null,
    pendingDraft: '',
    pendingImagePath: '',
    pendingImageDataUrl: '',
    docked: false,
    gravityActive: false,
    collisionBtn: '',
    actionPinned: false,
    justDragged: false,
    selectedIndex: -1
  };
  let externalDragDepth = 0;

  const capsule = document.getElementById('capsule');
  const host = document.getElementById('host');
  const header = document.getElementById('header');
  const preview = document.getElementById('preview');
  const previewCard = document.getElementById('preview-card');
  const previewImageWrap = document.getElementById('preview-image-wrap');
  const previewImage = document.getElementById('preview-image');
  const previewCopyImage = document.getElementById('preview-copy-image');
  const externalDropHint = document.getElementById('external-drop-hint');
  const draftChip = document.getElementById('draft-chip');
  const stackDisplay = document.getElementById('stack-display');
  const headerCount = document.getElementById('header-count');
  const stackEmpty = document.getElementById('stack-empty');
  const stackList = document.getElementById('stack-list');
  const gravityTip = document.getElementById('gravity-tip');
  const btnSearch = document.getElementById('btnSearch');
  const btnAi = document.getElementById('btnAi');
  const btnClear = document.getElementById('btnClear');
  const btnTriggerCapslock = document.getElementById('btnTriggerCapslock');
  const btnTriggerDoubleCtrl = document.getElementById('btnTriggerDoubleCtrl');
  const resizeHandle = document.getElementById('resize-handle');
  const ctxMenu = document.getElementById('ctx-menu');
  const btnCloseHub = document.getElementById('btnCloseHub');

  if (btnCloseHub) {
    btnCloseHub.addEventListener('click', (e) => {
      e.stopPropagation();
      postToAhk({ type: 'selection_menu_dismiss' });
    });
  }

  previewImage.addEventListener('error', () => {
    previewImage.alt = '图片预览加载失败';
  });

  function postToAhk(obj) {
    try {
      if (!obj || typeof obj !== 'object') return;
      if (!obj.action && obj.type) obj.action = obj.type;
      if (window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage(obj);
    } catch (_) {}
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function normalizePreviewText(input) {
    if (input == null) return '';
    if (typeof input === 'string' || typeof input === 'number' || typeof input === 'boolean') {
      return String(input);
    }
    if (Array.isArray(input)) {
      return input
        .map((item) => normalizePreviewText(item))
        .filter(Boolean)
        .join(' ');
    }
    if (typeof input === 'object') {
      if (typeof input.text === 'string' || typeof input.text === 'number' || typeof input.text === 'boolean')
        return String(input.text);
      if (typeof input.content === 'string' || typeof input.content === 'number' || typeof input.content === 'boolean')
        return String(input.content);
      if (typeof input.preview === 'string' || typeof input.preview === 'number' || typeof input.preview === 'boolean')
        return String(input.preview);
      if (Array.isArray(input.items))
        return normalizePreviewText(input.items);
      try {
        return JSON.stringify(input);
      } catch (_) {
        return '';
      }
    }
    return '';
  }

  function compactText(text) {
    return normalizePreviewText(text).replace(/\s+/g, ' ').trim();
  }

  function asCard(item) {
    if (item && typeof item === 'object') {
      if (item.kind === 'image')
        return { kind: 'image', imagePath: String(item.imagePath || '').trim(), imageDataUrl: String(item.imageDataUrl || '').trim() };
      return { kind: 'text', text: compactText(item.text || '') };
    }
    const t = compactText(item);
    return t ? { kind: 'text', text: t } : null;
  }

  function textSegments() {
    return state.segments
      .map((it) => asCard(it))
      .filter((it) => it && it.kind === 'text' && it.text)
      .map((it) => it.text);
  }

  function mergedText() {
    return textSegments().join('\n\n');
  }

  function activeText() {
    const selected = getSelectedTextInsideCapsule();
    if (selected) return selected;
    const merged = mergedText();
    if (merged && state.pendingDraft) return merged + '\n\n' + state.pendingDraft;
    return merged || state.pendingDraft || '';
  }

  function hasPendingImage() {
    return !!(state.pendingImagePath || state.pendingImageDataUrl);
  }

  function getSelectedTextInsideCapsule() {
    try {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount < 1 || sel.isCollapsed) return '';
      const range = sel.getRangeAt(0);
      if (!capsule.contains(range.commonAncestorContainer)) return '';
      return String(sel.toString() || '').trim();
    } catch (_) {
      return '';
    }
  }

  function copyCurrentPreviewImage() {
    if (!hasPendingImage()) return;
    postToAhk({
      type: 'hub_copy_image',
      imagePath: state.pendingImagePath || '',
      imageDataUrl: state.pendingImageDataUrl || ''
    });
  }

  function toFileUrl(path) {
    let p = String(path || '').trim();
    if (!p) return '';
    p = p.replace(/\\/g, '/');
    if (/^[a-zA-Z]:\//.test(p)) p = '/' + p;
    return encodeURI('file://' + p);
  }

  function setCopyTriggerMode(mode) {
    const raw = String(mode || '').toLowerCase();
    const m = (raw === 'double') ? 'double' : 'capslock';
    state.copyTriggerMode = m;
    btnTriggerCapslock.classList.toggle('is-active', m === 'capslock');
    btnTriggerDoubleCtrl.classList.toggle('is-active', m === 'double');
  }

  function selectedCardText() {
    if (!Number.isInteger(state.selectedIndex) || state.selectedIndex < 0 || state.selectedIndex >= state.segments.length)
      return '';
    const item = asCard(state.segments[state.selectedIndex]);
    if (!item || item.kind !== 'text') return '';
    return compactText(item.text || '');
  }

  function syncSegments() {
    postToAhk({ type: 'hub_segments_sync', segments: textSegments() });
    try {
      localStorage.setItem('hub_capsule_segments', JSON.stringify(state.segments));
    } catch (_) {}
  }

  function loadPersistedSegments() {
    try {
      const raw = localStorage.getItem('hub_capsule_segments');
      if (!raw) return;
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) {
        state.segments = arr
          .map((item) => asCard(item))
          .filter((item) => item && ((item.kind === 'text' && item.text) || (item.kind === 'image' && (item.imagePath || item.imageDataUrl))));
      }
    } catch (_) {}
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('open');
    ctxMenu.removeAttribute('data-index');
  }

  function applyVisualState() {
    const hasDraft = !!state.pendingDraft || hasPendingImage();
    const hasContent = state.segments.length > 0;
    const draggingDraft = !!state.draftDrag || externalDragDepth > 0;
    const externalOnly = externalDragDepth > 0 && !state.draftDrag;
    capsule.classList.toggle('selection-active', hasDraft && !draggingDraft);
    capsule.classList.toggle('has-content', hasContent);
    capsule.classList.toggle('draft-dragging', draggingDraft);
    capsule.classList.toggle('external-drop-hover', externalOnly);
    previewCard.classList.toggle('external-drop-target', externalOnly);
    if (externalDropHint)
      externalDropHint.setAttribute('aria-hidden', externalOnly ? 'false' : 'true');

    // 规则：仅有未提交的选区预览且未在拖动 → 20%；拖动预览中 / 已有卡片 → 80%；空窗 → 不强制
    if (hasDraft && !draggingDraft) {
      capsule.style.setProperty('opacity', '0.2', 'important');
    } else if (draggingDraft || hasContent) {
      capsule.style.setProperty('opacity', '0.8', 'important');
    } else {
      capsule.style.removeProperty('opacity');
    }

    previewCard.classList.toggle('selection-hint', hasDraft);
  }

  function updatePreview() {
    const showingImage = hasPendingImage();
    previewImageWrap.classList.toggle('show', showingImage);
    preview.style.display = showingImage ? 'none' : 'block';

    if (showingImage) {
      previewImage.src = state.pendingImageDataUrl || (state.pendingImagePath ? toFileUrl(state.pendingImagePath) : '');
      previewImage.title = state.pendingImagePath || '剪贴板图片预览';
      draftChip.classList.remove('show');
      headerCount.textContent = String(state.segments.length);
      return;
    }

    const src = state.pendingDraft !== ''
      ? state.pendingDraft
      : (state.segments.length ? state.segments[state.segments.length - 1] : '');
    const text = compactText(src);
    preview.textContent = text ? (text.length > 120 ? text.slice(0, 120) + '...' : text) : '等待选中文本...';
    draftChip.classList.toggle('show', !!state.pendingDraft);
    headerCount.textContent = String(state.segments.length);
  }

  function renderStack() {
    stackList.innerHTML = '';
    const visible = state.segments.slice(-4).reverse();

    if (!visible.length) {
      stackEmpty.style.display = 'block';
      return;
    }

    stackEmpty.style.display = 'none';

    visible.forEach((rawItem, idx) => {
      const item = asCard(rawItem);
      if (!item) return;
      const card = document.createElement('div');
      card.className = 'stack-card';
      const z = 10 - idx;
      const scale = 1 - idx * 0.025;
      const rot = idx * 1.6;
      card.style.zIndex = String(z);
      card.style.transform = `translateZ(${-idx * 18}px) scale(${scale}) rotateX(${rot}deg)`;
      card.style.marginTop = '0';
      card.dataset.realIndex = String(state.segments.length - 1 - idx);
      card.dataset.kind = item.kind;
      if (Number(card.dataset.realIndex) === state.selectedIndex) {
        card.classList.add('is-selected');
      }

      if (item.kind === 'image') {
        const src = item.imageDataUrl || (item.imagePath ? toFileUrl(item.imagePath) : '');
        card.innerHTML =
          `<img class="stack-card-image" src="${escapeHtml(src)}" alt="图片卡片">` +
          `<button class="stack-card-remove" type="button" data-remove-index="${card.dataset.realIndex}" aria-label="删除">×</button>`;
      } else {
        const t = compactText(item.text);
        card.innerHTML =
          `<div class="stack-card-text">${escapeHtml(t)}</div>` +
          `<button class="stack-card-remove" type="button" data-remove-index="${card.dataset.realIndex}" aria-label="删除">×</button>`;
      }

      stackList.appendChild(card);
    });
  }

  function refreshAll() {
    updatePreview();
    renderStack();
    applyVisualState();
  }

  function pushSegment(text) {
    const t = compactText(text);
    if (!t) return;
    state.segments.push({ kind: 'text', text: t });
    state.pendingDraft = '';
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.selectedIndex = state.segments.length - 1;
    refreshAll();
    syncSegments();
    postToAhk({ type: 'hub_stack_selected', text: t, index: state.selectedIndex });
    stackDisplay.classList.remove('stack-pop');
    void stackDisplay.offsetWidth;
    stackDisplay.classList.add('stack-pop');
  }

  function pushImageSegment(imagePath, imageDataUrl) {
    const p = String(imagePath || '').trim();
    const d = String(imageDataUrl || '').trim();
    if (!p && !d) return;
    state.segments.push({ kind: 'image', imagePath: p, imageDataUrl: d });
    state.pendingDraft = '';
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.selectedIndex = state.segments.length - 1;
    refreshAll();
    syncSegments();
    stackDisplay.classList.remove('stack-pop');
    void stackDisplay.offsetWidth;
    stackDisplay.classList.add('stack-pop');
  }

  function clearAll() {
    state.segments = [];
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.pendingDraft = '';
    state.selectedIndex = -1;
    refreshAll();
    syncSegments();
    postToAhk({ type: 'hub_stack_selected', text: '', index: -1 });
    postToAhk({ type: 'hub_cleared' });
  }

  function removeAt(i) {
    if (i < 0 || i >= state.segments.length) return;
    const removedSelected = (state.selectedIndex === i);
    state.segments.splice(i, 1);
    if (state.selectedIndex === i) state.selectedIndex = -1;
    if (state.selectedIndex > i) state.selectedIndex -= 1;
    refreshAll();
    syncSegments();
    if (removedSelected) {
      postToAhk({ type: 'hub_stack_selected', text: '', index: -1 });
    }
  }

  function setDocked(on) {
    state.docked = !!on;
    capsule.classList.toggle('is-docked', state.docked);
  }

  function setGravity(active, name) {
    state.gravityActive = !!active;
    capsule.classList.toggle('gravity-active', state.gravityActive);
    if (state.gravityActive) {
      gravityTip.textContent = name ? `吸附: ${name}` : '靠近目标';
      gravityTip.classList.add('visible');
    } else {
      gravityTip.classList.remove('visible');
    }
  }

  function setCollision(active, btnId) {
    state.collisionBtn = active ? String(btnId || '') : '';
    capsule.classList.toggle('collision-hit', !!active);
  }

  function setDraftPreview(text) {
    const t = compactText(text);
    if (!t) return;
    state.pendingImagePath = '';
    state.pendingImageDataUrl = '';
    state.pendingDraft = t;
    refreshAll();
    previewCard.classList.remove('preview-pulse');
    void previewCard.offsetWidth;
    previewCard.classList.add('preview-pulse');
  }

  function setImagePreview(imagePath, imageDataUrl) {
    const p = String(imagePath || '').trim();
    const d = String(imageDataUrl || '').trim();
    if (!p && !d) return;
    state.pendingDraft = '';
    state.pendingImagePath = p;
    state.pendingImageDataUrl = d;
    refreshAll();
    previewCard.classList.remove('preview-pulse');
    void previewCard.offsetWidth;
    previewCard.classList.add('preview-pulse');
  }

  function beginResize(e) {
    if (e.button !== 0) return;
    // 与 AHK Gui 客户区一致：整页视口尺寸（#capsule 在 #host 内会偏小）
    const startW = document.documentElement.clientWidth;
    const startH = document.documentElement.clientHeight;
    state.resize = {
      pointerId: e.pointerId,
      startX: e.screenX,
      startY: e.screenY,
      startW,
      startH
    };
    capsule.classList.add('resizing');
    postToAhk({ type: 'hub_resize_start', width: Math.round(startW), height: Math.round(startH) });
    window.addEventListener('pointermove', onResizeMove);
    window.addEventListener('pointerup', endResize);
    window.addEventListener('pointercancel', endResize);
    e.preventDefault();
    e.stopPropagation();
  }

  function onResizeMove(e) {
    if (!state.resize || state.resize.pointerId !== e.pointerId) return;
    const width = Math.max(280, Math.round(state.resize.startW + (e.screenX - state.resize.startX)));
    const height = Math.max(220, Math.round(state.resize.startH + (e.screenY - state.resize.startY)));
    postToAhk({ type: 'hub_resize_move', width, height });
  }

  function endResize(e) {
    if (!state.resize || state.resize.pointerId !== e.pointerId) return;
    const width = Math.max(280, Math.round(state.resize.startW + (e.screenX - state.resize.startX)));
    const height = Math.max(220, Math.round(state.resize.startH + (e.screenY - state.resize.startY)));
    capsule.classList.remove('resizing');
    postToAhk({ type: 'hub_resize_end', width, height });
    window.removeEventListener('pointermove', onResizeMove);
    window.removeEventListener('pointerup', endResize);
    window.removeEventListener('pointercancel', endResize);
    state.resize = null;
    e.preventDefault();
    e.stopPropagation();
  }

  function beginDrag(e) {
    if (e.button !== 0) return;
    const badTarget = e.target.closest('button');
    if (badTarget) return;

    const rect = capsule.getBoundingClientRect();
    state.drag = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      moved: false
    };

    state.justDragged = false;
    capsule.classList.add('dragging');
    postToAhk({ type: 'hub_mousedown', x: e.screenX, y: e.screenY });
    postToAhk({ type: 'hub_drag_start' });
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);
  }

  function onDragMove(e) {
    if (!state.drag) return;
    if (state.drag.pointerId !== e.pointerId) return;
    const dx = Math.abs(e.clientX - state.drag.startX);
    const dy = Math.abs(e.clientY - state.drag.startY);
    if (dx > 3 || dy > 3) {
      state.drag.moved = true;
      state.justDragged = true;
    }
    postToAhk({
      type: 'hub_drag_move',
      x: e.screenX,
      y: e.screenY,
      offsetX: state.drag.offsetX,
      offsetY: state.drag.offsetY
    });
  }

  function endDrag(e) {
    if (!state.drag) return;
    if (state.drag.pointerId !== e.pointerId) return;
    state.drag = null;
    capsule.classList.remove('dragging');
    postToAhk({ type: 'hub_drag_end', x: e.screenX, y: e.screenY });
    window.removeEventListener('pointermove', onDragMove);
    window.removeEventListener('pointerup', endDrag);
    window.removeEventListener('pointercancel', endDrag);
    setTimeout(() => { state.justDragged = false; }, 0);
  }

  function onFusion(action) {
    if (!mergedText()) return;
    capsule.style.transition = 'transform 160ms ease, opacity 160ms ease';
    capsule.style.transform = 'scale(1.04)';
    capsule.style.opacity = '0.84';
    setTimeout(() => {
      postToAhk({ type: 'hub_fusion_complete', action: String(action || ''), text: mergedText() });
      capsule.style.transform = '';
      capsule.style.removeProperty('opacity');
      applyVisualState();
    }, 170);
  }

  header.addEventListener('pointerdown', beginDrag);
  resizeHandle.addEventListener('pointerdown', beginResize);

  capsule.addEventListener('click', (e) => {
    if (state.justDragged) return;
    if (e.target.closest('#action-bar')) return;
    if (getSelectedTextInsideCapsule()) return;
    state.actionPinned = !state.actionPinned;
    capsule.classList.toggle('actions-open', state.actionPinned);
  });

  stackList.addEventListener('click', (e) => {
    const rm = e.target.closest('[data-remove-index]');
    if (!rm) return;
    const i = parseInt(rm.getAttribute('data-remove-index'), 10);
    if (!Number.isNaN(i)) removeAt(i);
    e.stopPropagation();
  });

  stackList.addEventListener('pointerdown', (e) => {
    if (e.target.closest('[data-remove-index]')) return;
    const card = e.target.closest('.stack-card');
    if (!card) return;
    const realIndex = Number(card.dataset.realIndex || '-1');
    if (!Number.isFinite(realIndex) || realIndex < 0) return;
    const item = asCard(state.segments[realIndex]);
    state.selectedIndex = realIndex;
    refreshAll();
    if (item && item.kind === 'text') {
      postToAhk({ type: 'hub_stack_selected', text: item.text || '', index: realIndex });
    } else {
      postToAhk({ type: 'hub_stack_selected', text: '', index: realIndex });
    }
  }, true);

  stackList.addEventListener('contextmenu', (e) => {
    const card = e.target.closest('.stack-card');
    if (!card) return;
    e.preventDefault();
    ctxMenu.dataset.index = card.dataset.realIndex || '';
    ctxMenu.style.left = `${e.clientX}px`;
    ctxMenu.style.top = `${e.clientY}px`;
    ctxMenu.classList.add('open');
  });

  ctxMenu.addEventListener('click', (e) => {
    const item = e.target.closest('.ctx-item');
    if (!item) return;
    const idx = Number(ctxMenu.dataset.index);
    const seg = Number.isInteger(idx) ? asCard(state.segments[idx]) : null;
    switch (item.dataset.act) {
      case 'copy':
        if (seg && seg.kind === 'image') {
          postToAhk({ type: 'hub_copy_image', imagePath: seg.imagePath || '', imageDataUrl: seg.imageDataUrl || '' });
        } else if (seg && seg.kind === 'text') {
          postToAhk({ type: 'hub_copy', text: seg.text || '' });
        }
        break;
      case 'remove':
        if (Number.isInteger(idx))
          removeAt(idx);
        break;
      case 'clear':
        clearAll();
        break;
    }
    hideContextMenu();
  });

  document.addEventListener('pointerdown', (e) => {
    if (!e.target.closest('#ctx-menu'))
      hideContextMenu();
  });

  btnSearch.addEventListener('click', () => {
    const text = selectedCardText() || activeText() || mergedText();
    if (!text) {
      previewCard.classList.remove('preview-pulse');
      void previewCard.offsetWidth;
      previewCard.classList.add('preview-pulse');
      return;
    }
    postToAhk({ type: 'hub_search', text });
  });

  btnAi.addEventListener('click', () => {
    const text = selectedCardText() || activeText() || mergedText();
    if (!text) {
      previewCard.classList.remove('preview-pulse');
      void previewCard.offsetWidth;
      previewCard.classList.add('preview-pulse');
      return;
    }
    postToAhk({ type: 'hub_ai', text });
  });

  btnClear.addEventListener('click', clearAll);
  btnTriggerCapslock.addEventListener('click', () => {
    setCopyTriggerMode('capslock');
    postToAhk({ type: 'hub_set_copy_trigger_mode', mode: 'capslock' });
  });
  btnTriggerDoubleCtrl.addEventListener('click', () => {
    setCopyTriggerMode('double');
    postToAhk({ type: 'hub_set_copy_trigger_mode', mode: 'double' });
  });
  previewCopyImage.addEventListener('click', () => {
    copyCurrentPreviewImage();
  });

  const DRAFT_DRAG_MIN_PX = 6;
  const DRAFT_HOLD_MS = 320;

  function pointInStackDisplay(clientX, clientY) {
    if (!stackDisplay) return false;
    const r = stackDisplay.getBoundingClientRect();
    return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
  }

  function clearDraftHoldTimer(dd) {
    if (dd && dd.holdTimerId) {
      clearTimeout(dd.holdTimerId);
      dd.holdTimerId = 0;
    }
  }

  /** 提交前幽灵飞入堆叠区 */
  function animateGhostToStackThen(ghost, callback) {
    if (!ghost || !ghost.parentNode) {
      try { if (callback) callback(); } catch (_) {}
      return;
    }
    const r = stackDisplay.getBoundingClientRect();
    const tx = r.left + r.width / 2 - 48;
    const ty = r.top + Math.min(56, Math.max(20, r.height / 2));
    ghost.style.transition = 'left 0.3s cubic-bezier(0.22,1,0.36,1), top 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease-out, transform 0.3s cubic-bezier(0.22,1,0.36,1)';
    ghost.style.transform = 'scale(0.82)';
    requestAnimationFrame(() => {
      ghost.style.left = tx + 'px';
      ghost.style.top = ty + 'px';
      ghost.style.opacity = '0.18';
    });
    let done = false;
    function finish() {
      if (done) return;
      done = true;
      ghost.removeEventListener('transitionend', onEnd);
      try { if (callback) callback(); } catch (_) {}
      if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
    }
    function onEnd(e) {
      if (e.propertyName === 'opacity' || e.propertyName === 'left') finish();
    }
    ghost.addEventListener('transitionend', onEnd);
    setTimeout(finish, 400);
  }

  function removeDraftDragListeners(moveFn, upFn) {
    document.removeEventListener('mousemove', moveFn, true);
    document.removeEventListener('mouseup', upFn, true);
    document.removeEventListener('pointermove', moveFn, true);
    document.removeEventListener('pointerup', upFn, true);
    document.removeEventListener('pointercancel', upFn, true);
  }

  function beginDraftDrag(e) {
    if (state.draftDrag || !state.pendingDraft) return;
    if (e.button !== undefined && e.button !== 0) return;

    const ghost = document.createElement('div');
    ghost.style.position = 'fixed';
    ghost.style.zIndex = '99999';
    ghost.style.pointerEvents = 'none';
    ghost.style.maxWidth = '300px';
    ghost.style.padding = '6px 12px';
    ghost.style.borderRadius = '999px';
    ghost.style.border = '1px dashed rgba(255,193,132,.8)';
    ghost.style.background = 'rgba(255,154,47,.22)';
    ghost.style.color = '#ffe6cc';
    ghost.style.fontSize = '11px';
    ghost.style.boxShadow = '0 6px 16px rgba(0,0,0,.35)';
    ghost.textContent = '松手加入卡片';
    document.body.appendChild(ghost);

    state.draftDrag = {
      ghost,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      finished: false,
      holdTimerId: 0
    };
    state.draftDrag.holdTimerId = setTimeout(() => {
      if (!state.draftDrag || state.draftDrag.finished) return;
      state.draftDrag.moved = true;
    }, DRAFT_HOLD_MS);
    previewCard.classList.add('draft-drag-active');
    applyVisualState();

    function onDraftMove(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.type === 'mousemove' && ev.buttons !== undefined && ev.buttons !== 1) return;
      const dx = ev.clientX - state.draftDrag.startX;
      const dy = ev.clientY - state.draftDrag.startY;
      if (Math.hypot(dx, dy) >= DRAFT_DRAG_MIN_PX) state.draftDrag.moved = true;
      ghost.style.left = (ev.clientX + 12) + 'px';
      ghost.style.top = (ev.clientY + 12) + 'px';
    }

    function onDraftUp(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.button !== undefined && ev.button !== 0) return;
      const dd = state.draftDrag;
      const moved = dd.moved;
      const g = dd.ghost;
      const textToCommit = state.pendingDraft;
      clearDraftHoldTimer(dd);
      dd.finished = true;
      removeDraftDragListeners(onDraftMove, onDraftUp);

      const inStack = pointInStackDisplay(ev.clientX, ev.clientY);
      const shouldCommit = !!textToCommit && (moved || inStack);

      state.draftDrag = null;
      previewCard.classList.remove('draft-drag-active');

      if (shouldCommit) {
        animateGhostToStackThen(g, () => {
          pushSegment(textToCommit);
          applyVisualState();
        });
      } else {
        if (g && g.parentNode) g.parentNode.removeChild(g);
        applyVisualState();
      }
      ev.preventDefault();
      ev.stopPropagation();
    }

    document.addEventListener('mousemove', onDraftMove, true);
    document.addEventListener('mouseup', onDraftUp, true);
    document.addEventListener('pointermove', onDraftMove, true);
    document.addEventListener('pointerup', onDraftUp, true);
    document.addEventListener('pointercancel', onDraftUp, true);

    onDraftMove(e);
    e.preventDefault();
    e.stopPropagation();
  }

  function beginImageDraftDrag(e) {
    if (state.draftDrag || !hasPendingImage()) return;
    if (e.button !== undefined && e.button !== 0) return;

    const ghost = document.createElement('div');
    ghost.style.position = 'fixed';
    ghost.style.zIndex = '99999';
    ghost.style.pointerEvents = 'none';
    ghost.style.maxWidth = '300px';
    ghost.style.padding = '6px 12px';
    ghost.style.borderRadius = '999px';
    ghost.style.border = '1px dashed rgba(255,193,132,.8)';
    ghost.style.background = 'rgba(255,154,47,.22)';
    ghost.style.color = '#ffe6cc';
    ghost.style.fontSize = '11px';
    ghost.style.boxShadow = '0 6px 16px rgba(0,0,0,.35)';
    ghost.textContent = '松手加入图片卡片';
    document.body.appendChild(ghost);

    state.draftDrag = {
      ghost,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      finished: false,
      holdTimerId: 0
    };
    state.draftDrag.holdTimerId = setTimeout(() => {
      if (!state.draftDrag || state.draftDrag.finished) return;
      state.draftDrag.moved = true;
    }, DRAFT_HOLD_MS);
    previewCard.classList.add('draft-drag-active');
    applyVisualState();

    function onDraftMove(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.type === 'mousemove' && ev.buttons !== undefined && ev.buttons !== 1) return;
      const dx = ev.clientX - state.draftDrag.startX;
      const dy = ev.clientY - state.draftDrag.startY;
      if (Math.hypot(dx, dy) >= DRAFT_DRAG_MIN_PX) state.draftDrag.moved = true;
      ghost.style.left = (ev.clientX + 12) + 'px';
      ghost.style.top = (ev.clientY + 12) + 'px';
    }

    function onDraftUp(ev) {
      if (!state.draftDrag || state.draftDrag.finished) return;
      if (ev.button !== undefined && ev.button !== 0) return;
      const dd = state.draftDrag;
      const moved = dd.moved;
      const g = dd.ghost;
      const pPath = state.pendingImagePath;
      const pData = state.pendingImageDataUrl;
      clearDraftHoldTimer(dd);
      dd.finished = true;
      removeDraftDragListeners(onDraftMove, onDraftUp);

      const inStack = pointInStackDisplay(ev.clientX, ev.clientY);
      const shouldCommit = (moved || inStack) && (pPath || pData);

      state.draftDrag = null;
      previewCard.classList.remove('draft-drag-active');

      if (shouldCommit) {
        animateGhostToStackThen(g, () => {
          pushImageSegment(pPath, pData);
          applyVisualState();
        });
      } else {
        if (g && g.parentNode) g.parentNode.removeChild(g);
        applyVisualState();
      }
      ev.preventDefault();
      ev.stopPropagation();
    }

    document.addEventListener('mousemove', onDraftMove, true);
    document.addEventListener('mouseup', onDraftUp, true);
    document.addEventListener('pointermove', onDraftMove, true);
    document.addEventListener('pointerup', onDraftUp, true);
    document.addEventListener('pointercancel', onDraftUp, true);

    onDraftMove(e);
    e.preventDefault();
    e.stopPropagation();
  }

  function clearExternalDropVisual() {
    if (externalDragLeaveTimer) {
      clearTimeout(externalDragLeaveTimer);
      externalDragLeaveTimer = null;
    }
    externalDragDepth = 0;
    applyVisualState();
    postToAhk({ type: 'hub_external_drag', phase: 'leave' });
  }

  let externalDragLeaveTimer = null;

  function bumpExternalDragVisual() {
    if (externalDragLeaveTimer) {
      clearTimeout(externalDragLeaveTimer);
      externalDragLeaveTimer = null;
    }
    if (externalDragDepth < 1) {
      externalDragDepth = 1;
      postToAhk({ type: 'hub_external_drag', phase: 'enter' });
      applyVisualState();
    }
  }

  function scheduleExternalDragEnd() {
    if (externalDragLeaveTimer) clearTimeout(externalDragLeaveTimer);
    externalDragLeaveTimer = setTimeout(() => {
      externalDragLeaveTimer = null;
      externalDragDepth = 0;
      applyVisualState();
      postToAhk({ type: 'hub_external_drag', phase: 'leave' });
    }, 160);
  }

  function flashDropSuccessOnPreview() {
    previewCard.classList.remove('drop-success-flash');
    void previewCard.offsetWidth;
    previewCard.classList.add('drop-success-flash');
    const onEnd = () => {
      previewCard.removeEventListener('animationend', onEnd);
      previewCard.classList.remove('drop-success-flash');
    };
    previewCard.addEventListener('animationend', onEnd);
  }

  function readExternalDropText(e) {
    const dt = e && e.dataTransfer;
    if (!dt) return '';
    const types = ['text/plain', 'Text', 'text/uri-list'];
    for (let i = 0; i < types.length; i++) {
      try {
        const raw = dt.getData(types[i]);
        if (raw && String(raw).trim()) {
          let t = String(raw).replace(/\r\n/g, '\n').trim();
          if (types[i] === 'text/uri-list') t = t.split('\n')[0].trim();
          return compactText(t);
        }
      } catch (_) {}
    }
    try {
      const html = dt.getData('text/html');
      if (html && html.trim()) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const t = (div.textContent || '').trim();
        if (t) return compactText(t);
      }
    } catch (_) {}
    return '';
  }

  /** 整页 WebView 作为拖放目标：从 Cursor 等外部窗口拖入即加入卡片 */
  /** 点击 #host 留白区（含从胶囊穿透的空白）立即通知 AHK 关闭，避免仅预览时整窗矩形误判为「内部」 */
  function installDismissOnHostPadding() {
    if (!host) return;
    host.addEventListener('pointerdown', (e) => {
      if (e.target !== host) return;
      if (e.button !== 0 && e.button !== 2) return;
      postToAhk({ type: 'selection_menu_dismiss' });
    }, true);
  }

  /** 整页 WebView 作为拖放目标：从 Cursor 等外部窗口拖入即加入卡片 */
  function installGlobalDropTarget() {
    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      bumpExternalDragVisual();
    }, true);

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      try {
        e.dataTransfer.dropEffect = 'copy';
      } catch (_) {}
      bumpExternalDragVisual();
    }, true);

    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      scheduleExternalDragEnd();
    }, true);

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      if (externalDragLeaveTimer) {
        clearTimeout(externalDragLeaveTimer);
        externalDragLeaveTimer = null;
      }
      externalDragDepth = 0;
      const segLenBefore = state.segments.length;
      const dropped = readExternalDropText(e);
      if (dropped) {
        pushSegment(dropped);
      } else if (hasPendingImage()) {
        pushImageSegment(state.pendingImagePath, state.pendingImageDataUrl);
      } else if (state.pendingDraft) {
        pushSegment(state.pendingDraft);
      }
      applyVisualState();
      postToAhk({ type: 'hub_external_drag', phase: 'leave' });
      if (state.segments.length > segLenBefore) {
        flashDropSuccessOnPreview();
      }
    }, true);
  }

  /* WebView2 下 mouse 事件比 pointer 更稳定：捕获阶段监听，避免被内部吞掉 */
  draftChip.addEventListener('mousedown', (e) => {
    if (!state.pendingDraft || e.button !== 0) return;
    if (e.target.closest('button')) return;
    beginDraftDrag(e);
  }, true);

  draftChip.addEventListener('pointerdown', (e) => {
    if (!state.pendingDraft || e.button !== 0) return;
    if (e.pointerType === 'mouse') return;
    if (e.target.closest('button')) return;
    beginDraftDrag(e);
  }, true);

  function tryBeginDraftFromPreviewCard(e) {
    if (e.button !== 0) return;
    if (e.target.closest('button')) return;
    if (e.target.closest('#draft-chip')) return;
    if (e.target.closest('#external-drop-hint')) return;
    if (hasPendingImage()) return;
    if (!state.pendingDraft) return;
    if (window.getSelection && String(window.getSelection().toString()).trim()) return;
    if (e.target === previewImage || (previewImage && previewImage.contains(e.target))) return;
    beginDraftDrag(e);
  }

  previewCard.addEventListener('mousedown', tryBeginDraftFromPreviewCard, true);
  previewCard.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse') return;
    tryBeginDraftFromPreviewCard(e);
  }, true);

  previewImage.addEventListener('mousedown', (e) => {
    if (!hasPendingImage() || e.button !== 0) return;
    beginImageDraftDrag(e);
  }, true);

  previewImage.addEventListener('pointerdown', (e) => {
    if (!hasPendingImage() || e.button !== 0) return;
    if (e.pointerType === 'mouse') return;
    beginImageDraftDrag(e);
  }, true);

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      hideContextMenu();
      postToAhk({ type: 'selection_menu_dismiss' });
      e.preventDefault();
      return;
    }
    const isCopy = (e.key === 'c' || e.key === 'C') && (e.ctrlKey || e.metaKey);
    if (!isCopy) return;

    const selected = getSelectedTextInsideCapsule();
    if (selected) {
      postToAhk({ type: 'hub_copy', text: selected });
      /* 不可 preventDefault：否则 WebView 不会把选区写入系统剪贴板，外部编辑器无法粘贴。
         AHK 侧若未处理 hub_copy，原先等于只拦掉默认复制。 */
      return;
    }
    if (hasPendingImage()) {
      copyCurrentPreviewImage();
      e.preventDefault();
    }
  }, true);

  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener('message', (event) => {
      let d = event.data;
      if (typeof d === 'string') {
        try { d = JSON.parse(d); } catch (_) { return; }
      }
      if (!d || !d.type) return;

      switch (d.type) {
        case 'push_segment':
          pushSegment(normalizePreviewText(d.text));
          break;
        case 'hub_preview_selection':
          if (d.imagePath || d.imageDataUrl)
            setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          else
            setDraftPreview(normalizePreviewText(d.text));
          break;
        case 'selection_menu_init':
          if (d.imagePath || d.imageDataUrl)
            setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          else
            setDraftPreview(normalizePreviewText(d.text));
          break;
        case 'hub_preview_image':
          setImagePreview(d.imagePath || '', d.imageDataUrl || '');
          break;
        case 'hub_preview_state':
          setCopyTriggerMode(d.copyTriggerMode || 'capslock');
          break;
        case 'clear_segments':
          clearAll();
          break;
        case 'hub_restore_segments':
          state.segments = Array.isArray(d.segments)
            ? d.segments.map((item) => asCard(item)).filter((item) => item && item.kind === 'text' && item.text)
            : [];
          refreshAll();
          syncSegments();
          break;
        case 'get_segments':
          postToAhk({ type: 'hub_segments_data', segments: textSegments(), merged: mergedText() });
          break;
        case 'set_dock':
          setDocked(true);
          break;
        case 'undock':
          setDocked(false);
          break;
        case 'gravity_update':
          setGravity(!!d.active, d.targetName || '');
          break;
        case 'hub_collision_feedback':
          setCollision(!!d.active, d.buttonId || '');
          break;
        case 'fusion_trigger':
          onFusion(d.action || '');
          break;
        case 'hub_dismiss_reset':
          state.pendingDraft = '';
          state.pendingImagePath = '';
          state.pendingImageDataUrl = '';
          hideContextMenu();
          refreshAll();
          break;
      }
    });
  }

  loadPersistedSegments();
  setCopyTriggerMode('capslock');
  refreshAll();
  syncSegments();
  installDismissOnHostPadding();
  installGlobalDropTarget();
  postToAhk({ type: 'hub_ready' });
  postToAhk({ type: 'selection_menu_ready' });
})();
</script>
</body>
</html>
