<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索中心</title>
<style>
:root {
  --bg: #111315;
  --panel: #171a1e;
  --panel-2: #1f2429;
  --border: #313941;
  --glass-edge: rgba(255,255,255,.28);
  --glass-edge-soft: rgba(255,255,255,.08);
  --glass-warm: rgba(255,171,92,.2);
  --text: #e7ebef;
  --muted: #93a0ad;
  --accent: #ff8d2a;
  --accent-2: #ffb347;
  --shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
  --font-ui: "Segoe UI", "Microsoft YaHei UI", sans-serif;
  --font-mono: Consolas, "Cascadia Mono", monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  min-height: 0;
  background: radial-gradient(circle at top right, rgba(255,141,42,.08), transparent 26%), linear-gradient(180deg, #0f1113 0%, #15181c 100%);
  color: var(--text);
  font-family: var(--font-ui);
  overflow: hidden;
}
button, input, select, textarea { font: inherit; }
#app {
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  width: 100%;
  height: 100%;
  min-height: 0;
  gap: 12px;
  padding: 14px 26px 18px;
}
#chrome-header {
  display: none;
}
.chrome-header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  margin: -6px -10px 2px;
  padding: 6px 12px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.01)), rgba(26,31,38,.45);
  border: 1px solid rgba(255,255,255,.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
  user-select: none;
  -webkit-user-select: none;
  cursor: grab;
}
.chrome-header:active { cursor: grabbing; }
.chrome-drag {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.02em;
  cursor: grab;
  padding: 4px 8px;
  border-radius: 8px;
}
.chrome-drag:active { cursor: grabbing; }
.chrome-controls {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.chrome-btn {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}
.chrome-btn:hover {
  border-color: rgba(255,179,71,.5);
  background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
  color: #fff;
}
.chrome-btn.close:hover {
  border-color: rgba(255,122,122,.6);
  background: linear-gradient(180deg, rgba(255,122,122,.22), rgba(255,122,122,.12));
}
.bar {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.card {
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
}
.card::after,
.chrome-header::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, var(--glass-edge), var(--glass-edge-soft) 45%, var(--glass-warm));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.72;
}
#search-bar {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
}
#search-icon-inline {
  color: var(--accent);
  font-size: 16px;
  flex-shrink: 0;
}
#search {
  width: 100%;
  display: block;
  min-width: 0;
  height: 44px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 0 14px;
  outline: none;
  caret-color: var(--accent);
  user-select: text;
  -webkit-user-select: text;
}
#search::placeholder { color: #6f7d8b; }
#search:focus, #limit:focus { border-color: var(--accent); }
.search-input-wrap {
  flex: 1 1 auto;
  width: 100%;
  min-width: 0;
}
.search-status-inline {
  margin-top: 6px;
  padding-left: 2px;
  font-size: 11px;
  color: #7f8a95;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-actions {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  gap: 6px 8px;
  flex: 0 0 auto;
  margin-left: auto;
}
#limit {
  width: 122px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-2);
  color: var(--text);
  padding: 0 10px;
  outline: none;
}
.search-actions .btn {
  height: 36px;
  padding: 0 12px;
}
#results-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
}
#head-filters {
  min-width: 0;
}
#filters {
  display: flex;
  gap: 8px;
  overflow: auto hidden;
  padding: 2px 0;
}
#categories,
#engines {
  display: flex;
  gap: 10px;
  overflow: auto hidden;
  padding: 8px 10px;
}
#categories::-webkit-scrollbar,
#engines::-webkit-scrollbar,
#filters::-webkit-scrollbar,
#result-list::-webkit-scrollbar,
#preview::-webkit-scrollbar {
  height: 8px;
  width: 8px;
}
#categories::-webkit-scrollbar-thumb,
#engines::-webkit-scrollbar-thumb,
#filters::-webkit-scrollbar-thumb,
#result-list::-webkit-scrollbar-thumb,
#preview::-webkit-scrollbar-thumb {
  background: #3a434d;
  border-radius: 999px;
}
#category-card, #engine-card, #filter-card { padding: 10px 12px; }
#tag-card {
  padding: 10px 12px;
  display: grid;
  grid-template-rows: auto auto;
  gap: 10px;
}
.chip, .engine-chip, .filter-chip {
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--muted);
  border-radius: 999px;
  cursor: pointer;
  transition: .16s ease;
}
.chip {
  padding: 10px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.chip .chip-main {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  min-width: 0;
}
.chip .chip-title {
  line-height: 1.05;
}
.chip.active, .filter-chip.active, .engine-chip.active {
  background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
  border-color: rgba(255,179,71,.5);
  color: #fff;
}
.chip .count {
  min-width: 22px;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.06);
  color: inherit;
  font-size: 11px;
  text-align: center;
}
.engine-chip {
  min-width: 64px;
  max-width: 92px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  border-radius: 14px;
}
.engine-chip .engine-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}
.engine-chip img, .engine-fallback {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  flex: 0 0 auto;
  display: block;
}
.engine-fallback {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #303842;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
}
.engine-chip .label {
  width: 100%;
  text-align: center;
  font-size: 11px;
  line-height: 1.25;
  color: var(--muted);
  white-space: normal;
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.engine-chip.active .label { color: #fff; }
.filter-chip {
  padding: 5px 10px;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.filter-chip .filter-label { line-height: 1; }
.hotkey-hint {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 14px;
  padding: 0 6px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  color: #7f8a95;
  font-size: 10px;
  line-height: 1.2;
  letter-spacing: .02em;
}
.hotkey-hint.unbound {
  border-style: dashed;
  opacity: .72;
}
.engine-chip .hotkey-hint {
  margin-top: 1px;
}
.caps-hotkey-ready {
  border-color: rgba(255,179,71,.45) !important;
  box-shadow: 0 0 0 1px rgba(255,179,71,.16) inset;
}
.caps-hotkey-hit {
  border-color: rgba(255,179,71,.82) !important;
  box-shadow: 0 0 0 1px rgba(255,179,71,.42) inset, 0 0 18px rgba(255,141,42,.28);
  transform: translateY(-1px);
}
.caps-hotkey-hit .hotkey-hint {
  color: #fff;
  border-color: rgba(255,200,120,.72);
  background: rgba(255,141,42,.24);
}
#layout {
  display: grid;
  grid-template-columns: minmax(380px, 1.1fr) minmax(320px, .9fr);
  gap: 16px;
  min-height: 0;
}
#results-card, #preview-card {
  min-height: 0;
  overflow: hidden;
}
#results-head, #preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,.02);
}
.head-title {
  font-size: 14px;
  font-weight: 700;
}
.head-sub {
  font-size: 12px;
  color: var(--muted);
}
#result-list {
  height: calc(100% - 59px);
  overflow: auto;
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
}
.result-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 9px 10px;
  border: 1px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  transition: .14s ease;
}
.result-item + .result-item { margin-top: 5px; }
.result-item:hover {
  background: rgba(255,255,255,.03);
  border-color: rgba(255,255,255,.05);
}
.result-item.active {
  background: linear-gradient(180deg, rgba(255,141,42,.16), rgba(255,141,42,.06));
  border-color: rgba(255,179,71,.45);
}
.result-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.pin-ico {
  display: inline-block;
  margin-right: 5px;
  font-size: 12px;
  vertical-align: middle;
  opacity: 0.95;
  user-select: none;
}
.result-sub {
  margin-top: 3px;
  font-size: 11px;
  color: var(--muted);
}
.result-preview {
  margin-top: 4px;
  color: #ccd5dd;
  font-size: 11px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.result-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  min-width: 92px;
}
.pill {
  padding: 3px 7px;
  border-radius: 999px;
  background: #2a3239;
  color: #d7dee6;
  font-size: 10px;
}
.time {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}
#preview {
  height: calc(100% - 59px);
  overflow: auto;
  padding: 16px 18px 18px;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  line-height: 1.65;
  font-size: 12px;
  color: #d6dde5;
}
#footer {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  padding: 4px 4px 0;
  font-size: 12px;
  color: var(--muted);
}
.footer-row-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.footer-inline-btns {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.footer-inline-btns .btn {
  height: 32px;
  padding: 0 12px;
  font-size: 12px;
}
.recycle-badge {
  display: inline-block;
  min-width: 18px;
  margin-left: 4px;
  padding: 0 6px;
  border-radius: 999px;
  background: rgba(255,141,42,.25);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.recycle-badge:empty,
.recycle-badge.muted {
  background: rgba(255,255,255,.08);
  color: var(--muted);
  font-weight: 600;
}
.recycle-overlay {
  position: fixed;
  inset: 0;
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.55);
  padding: 20px;
}
.recycle-overlay.open {
  display: flex;
}
.recycle-dialog {
  width: min(520px, 96vw);
  max-height: min(72vh, 560px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}
.recycle-dialog-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 14px;
}
.recycle-list {
  flex: 1 1 auto;
  min-height: 120px;
  max-height: 44vh;
  overflow: auto;
  padding: 10px 12px;
}
.recycle-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: start;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  margin-bottom: 8px;
}
.recycle-row .t {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.recycle-row .p {
  margin-top: 4px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  word-break: break-all;
}
.recycle-dialog-foot {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.btn {
  height: 40px;
  padding: 0 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  transition: .16s ease;
}
.btn:hover { border-color: rgba(255,179,71,.45); }
.btn.primary {
  background: linear-gradient(180deg, #ff9b38, #e5791e);
  color: #101214;
  border-color: rgba(255,179,71,.7);
  font-weight: 700;
}
.btn.ghost { background: transparent; }
.empty {
  padding: 22px;
  color: var(--muted);
  line-height: 1.7;
  min-height: 72px;
}
.skeleton-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1 1 auto;
}
.skeleton-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.04);
  background: rgba(255,255,255,.015);
}
.sk-line {
  height: 9px;
  border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
  background-size: 220% 100%;
  animation: sk-shimmer 1.3s linear infinite;
}
.sk-line + .sk-line { margin-top: 5px; }
.sk-line.w1 { width: 64%; }
.sk-line.w2 { width: 44%; }
.sk-line.w3 { width: 78%; }
.sk-meta {
  width: 64px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
  background-size: 220% 100%;
  animation: sk-shimmer 1.3s linear infinite;
}
.preview-empty {
  min-height: 100%;
}
@keyframes sk-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
mark {
  background: rgba(255,179,71,.9);
  color: #111;
  padding: 0 2px;
  border-radius: 3px;
}
@media (max-width: 980px) {
  #layout { grid-template-columns: 1fr; }
  #preview-card { min-height: 240px; }
}
</style>
<script src="https://app.local/assets/js/BasePanel.js"></script>
</head>
<body>
<div id="app">
    <header id="chrome-header" class="chrome-header window-titlebar">
    <div class="chrome-drag" id="chrome-drag" title="拖动窗口">搜索中心</div>
    <div class="chrome-controls">
      <button type="button" id="chrome-minimize" class="chrome-btn" title="Minimize">-</button>
      <button type="button" id="chrome-maximize" class="chrome-btn" title="Maximize">[]</button>
      <button type="button" id="chrome-close" class="chrome-btn close" title="Close">X</button>
    </div>
  </header>

  <div id="tag-card" class="card">
    <div id="categories"></div>
    <div id="engines">    </div>
  </div>

  <div id="search-bar" class="card">
    <span id="search-icon-inline">&#128269;</span>
    <div class="search-input-wrap">
      <input id="search" type="text" placeholder="搜索本地结果，或直接作为网络搜索 / CLI 提示词发送">
      <div id="status" class="search-status-inline">准备中...</div>
    </div>
    <div class="search-actions">
      <select id="limit">
        <option value="10">10 条</option>
          <option value="20">20 条</option>
          <option value="30">30 条</option>
          <option value="50">50 条</option>
        <option value="100">100 条</option>
        <option value="200">200 条</option>
        <option value="500">全部搜索结果</option>
      </select>
      <button id="btn-run" class="btn primary">搜索</button>
      <button id="btn-web-search" class="btn">网页搜索</button>
      <button id="btn-open-cli" class="btn">打开所选终端</button>
    </div>
  </div>

  <div id="layout">
    <div id="results-card" class="card">
      <div id="results-head">
        <div>
          <div class="head-title">本地结果</div>
        </div>
        <div id="head-filters"><div id="filters"></div></div>
        <div class="head-sub" id="result-count">0 条</div>
      </div>
      <div id="result-list"></div>
    </div>
    <div id="preview-card" class="card">
      <div id="preview-head">
        <div>
          <div class="head-title">预览</div>
          <div class="head-sub" id="preview-meta">未选中结果</div>
        </div>
      </div>
      <div id="preview">当前未选中本地结果。

在输入框中输入内容可实时过滤数据，点击列表项后会在这里显示详细预览。</div>
    </div>
  </div>

  <div id="footer">
    <div class="footer-row-main">
      <span>Enter 执行主操作 · Esc 关闭 · 双击结果立即处理</span>
      <div class="footer-inline-btns">
        <button type="button" id="btn-sc-recycle" class="btn ghost">搜索回收站<span class="recycle-badge muted" id="recycle-badge">0</span></button>
        <button type="button" id="btn-win-recycle-sc" class="btn ghost">系统回收站</button>
      </div>
    </div>
    <div id="footer-hint">WebView2 模式</div>
  </div>

  <div id="recycle-overlay" class="recycle-overlay" aria-hidden="true">
    <div class="recycle-dialog card" role="dialog" aria-modal="true" aria-labelledby="recycle-dlg-title">
      <div class="recycle-dialog-head">
        <span id="recycle-dlg-title">搜索中心回收站</span>
        <button type="button" id="recycle-close" class="chrome-btn" title="关闭">×</button>
      </div>
      <div id="recycle-list" class="recycle-list"></div>
      <div class="recycle-dialog-foot">
        <button type="button" id="recycle-empty-all" class="btn">全部清空</button>
      </div>
    </div>
  </div>
</div>

<script>
if (typeof BasePanel === 'undefined') {
  window.BasePanel = {
    PROTO_VERSION: 1,
    postToAhk(obj) {
      if (!window.chrome || !window.chrome.webview) return;
      const src = (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
      const p = Object.assign({ v: 1, timestamp: Date.now() }, src);
      if (p.action === undefined && p.type !== undefined) p.action = p.type;
      window.chrome.webview.postMessage(p);
    }
  };
}
const state = {
  keyword: "",
  limit: 30,
  categories: [],
  currentCategoryKey: "ai",
  engines: [],
  selectedEngines: [],
  filters: [],
  filterType: "",
  results: [],
  hasMore: false,
  loading: false,
  loadMoreCooldownUntil: 0,
  isCliCategory: false,
  statusLine: "",
  selectedRow: 1,
  capsHintActive: false,
  capsPressedKey: "",
  recycleBin: [],
  recycleCount: 0
};

const postToAhk = (obj) => BasePanel.postToAhk(obj);
const HOTKEY_HINT_MAP = Object.freeze({
  category: Object.freeze({
    ai: "q",
    cli: "w",
    academic: "e",
    baidu: "r"
  }),
  engine: Object.freeze({
    deepseek: "a",
    yuanbao: "s",
    doubao: "d"
  }),
  filter: Object.freeze({
    File: "z",
    clipboard: "x",
    template: "c",
    config: "v",
    pinned: "p"
  })
});
let capsHoldTimer = 0;
let capsFlashTimer = 0;

function escapeHtml(text) {
  if (text === null || text === undefined) return "";
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function highlight(text, keyword) {
  const safe = escapeHtml(text);
  if (!keyword) return safe;
  try {
    const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp("(" + escaped + ")", "ig");
    return safe.replace(re, "<mark>$1</mark>");
  } catch {
    return safe;
  }
}

function getHintHotkey(group, value) {
  if (!group || !value) return "";
  const src = HOTKEY_HINT_MAP[group];
  if (!src) return "";
  return src[value] || "";
}

function normalizeHintKey(key) {
  const k = String(key || "").trim().toLowerCase();
  return /^[a-z0-9]$/.test(k) ? k : "";
}

function hotkeyHintHtml(hotkey) {
  if (hotkey) {
    return "<span class=\"hotkey-hint\">Caps+" + escapeHtml(String(hotkey).toUpperCase()) + "</span>";
  }
  return "<span class=\"hotkey-hint unbound\">可绑定</span>";
}

function getFooterHintText() {
  return state.isCliCategory
    ? "CLI 分类：输入内容后可直接发送到选中的终端"
    : "网络分类：输入内容后会并发打开选中的搜索引擎";
}

function syncFooterHint() {
  const footer = document.getElementById("footer-hint");
  if (!footer) return;
  if (state.capsHintActive) {
    footer.textContent = "CapsLock 热键提示中：按对应字母可快速定位";
    return;
  }
  footer.textContent = getFooterHintText();
}

function updateHotkeyHighlights() {
  const nodes = document.querySelectorAll(".hotkey-item");
  nodes.forEach((el) => {
    const hk = normalizeHintKey(el.dataset.hotkey || "");
    const ready = state.capsHintActive && !!hk;
    const hit = ready && state.capsPressedKey === hk;
    el.classList.toggle("caps-hotkey-ready", ready);
    el.classList.toggle("caps-hotkey-hit", hit);
  });
}

function setCapsHintActive(active) {
  const next = !!active;
  if (state.capsHintActive === next) return;
  state.capsHintActive = next;
  if (!next) state.capsPressedKey = "";
  updateHotkeyHighlights();
  syncFooterHint();
}

function setCapsPressedKey(key) {
  state.capsPressedKey = normalizeHintKey(key);
  updateHotkeyHighlights();
}

function flashCapsPressedKey(key) {
  const normalized = normalizeHintKey(key);
  if (!normalized) return;
  setCapsPressedKey(normalized);
  if (capsFlashTimer) clearTimeout(capsFlashTimer);
  capsFlashTimer = setTimeout(() => {
    if (state.capsPressedKey === normalized) {
      state.capsPressedKey = "";
      updateHotkeyHighlights();
    }
  }, 260);
}

function beginCapsHoldHint() {
  if (capsHoldTimer) clearTimeout(capsHoldTimer);
  capsHoldTimer = setTimeout(() => {
    setCapsHintActive(true);
  }, 220);
}

function endCapsHoldHint() {
  if (capsHoldTimer) clearTimeout(capsHoldTimer);
  capsHoldTimer = 0;
  if (capsFlashTimer) clearTimeout(capsFlashTimer);
  capsFlashTimer = 0;
  setCapsHintActive(false);
}

function renderCategories() {
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  state.categories.forEach((cat) => {
    const hotkey = getHintHotkey("category", cat.key);
    const el = document.createElement("button");
    el.className = "chip hotkey-item" + (cat.key === state.currentCategoryKey ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    el.innerHTML = "<span class=\"chip-main\"><span class=\"chip-title\">" + escapeHtml(cat.text) + "</span>" + hotkeyHintHtml(hotkey) + "</span><span class=\"count\">" + (cat.selectedCount || 0) + "</span>";
    el.onclick = () => postToAhk({ type: "setCategory", category: cat.key });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderEngines() {
  const wrap = document.getElementById("engines");
  wrap.innerHTML = "";
  state.engines.forEach((engine) => {
    const hotkey = getHintHotkey("engine", engine.value);
    const active = state.selectedEngines.includes(engine.value);
    const el = document.createElement("button");
    el.className = "engine-chip hotkey-item" + (active ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    const icon = engine.iconUrl
      ? "<span class=\"engine-icon-wrap\"><img src=\"" + engine.iconUrl + "\" alt=\"\"></span>"
      : "<span class=\"engine-icon-wrap\"><span class=\"engine-fallback\">" + escapeHtml((engine.name || "?").slice(0, 1).toUpperCase()) + "</span></span>";
    el.innerHTML = icon + "<span class=\"label\">" + escapeHtml(engine.name) + "</span>" + hotkeyHintHtml(hotkey);
    el.onclick = () => postToAhk({ type: "toggleEngine", engine: engine.value });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderFilters() {
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  state.filters.forEach((filter) => {
    const hotkey = getHintHotkey("filter", filter.key);
    const el = document.createElement("button");
    el.className = "filter-chip hotkey-item" + (filter.key === state.filterType ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    el.innerHTML = "<span class=\"filter-label\">" + escapeHtml(filter.text) + "</span>" + hotkeyHintHtml(hotkey);
    el.onclick = () => postToAhk({ type: "setFilter", filterType: filter.key });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderResults() {
  const list = document.getElementById("result-list");
  list.innerHTML = "";
  disconnectLoadMoreObserver();

  if (!state.results.length) {
    list.innerHTML =
      "<div class=\"empty\">暂无结果。<br>你可以在输入框输入关键词搜索本地内容，或选择引擎后执行网络搜索 / CLI 发送。</div>" +
      buildSkeletonListHtml(7);
    renderPreview();
    return;
  }

  if (state.selectedRow < 1 || state.selectedRow > state.results.length) {
    state.selectedRow = 1;
  }

  state.results.forEach((item) => {
    const row = document.createElement("div");
    row.className = "result-item" + (item.row === state.selectedRow ? " active" : "");
    const pinMark = item.pinned ? "<span class=\"pin-ico\" title=\"置顶\">🔝</span>" : "";
    row.innerHTML =
      "<div>" +
        "<div class=\"result-title\">" + pinMark + highlight(item.title, state.keyword) + "</div>" +
        "<div class=\"result-sub\">" + escapeHtml(item.subtitle || "") + "</div>" +
        "<div class=\"result-preview\">" + highlight(item.preview || "", state.keyword) + "</div>" +
      "</div>" +
      "<div class=\"result-meta\">" +
        "<span class=\"pill\">" + escapeHtml(item.type || "") + "</span>" +
        "<span class=\"time\">" + escapeHtml(item.time || "") + "</span>" +
      "</div>";
    row.onclick = () => {
      state.selectedRow = item.row;
      renderResults();
    };
    row.oncontextmenu = (ev) => {
      ev.preventDefault();
      state.selectedRow = item.row;
      renderResults();
      postToAhk({
        type: "searchCenterContextMenu",
        row: item.row,
        screenX: ev.screenX,
        screenY: ev.screenY,
      });
    };
    row.ondblclick = () => {
      postToAhk({ type: "activateResult", row: item.row });
    };
    list.appendChild(row);
  });

  if (state.results.length < 7) {
    list.insertAdjacentHTML("beforeend", buildSkeletonListHtml(7 - state.results.length));
  }

  if (state.hasMore) {
    const sent = document.createElement("div");
    sent.id = "load-sentinel";
    sent.style.height = "2px";
    sent.style.width = "100%";
    sent.style.pointerEvents = "none";
    list.appendChild(sent);
    setupLoadMoreObserver();
  }

  renderPreview();
}

function renderPreview() {
  const preview = document.getElementById("preview");
  const meta = document.getElementById("preview-meta");
  const item = state.results.find((entry) => entry.row === state.selectedRow);
  if (!item) {
    meta.textContent = "未选中结果";
    preview.innerHTML =
      "<div class=\"preview-empty\">当前未选中本地结果。<br><br>在输入框中输入内容可实时过滤数据，点击列表项后会在这里显示详细预览。<br><br>" +
      "<div class=\"sk-line w1\"></div><div class=\"sk-line w3\"></div><div class=\"sk-line w2\"></div></div>";
    return;
  }
  meta.textContent = [item.source || item.subtitle || "", item.type || "", item.time || ""].filter(Boolean).join(" · ");
  preview.textContent = item.previewText || item.content || item.title || "";
}

function buildSkeletonListHtml(count) {
  let html = "<div class=\"skeleton-list\" aria-hidden=\"true\">";
  for (let i = 0; i < count; i += 1) {
    html += "<div class=\"skeleton-item\"><div><div class=\"sk-line w1\"></div><div class=\"sk-line w2\"></div><div class=\"sk-line w3\"></div></div><div class=\"sk-meta\"></div></div>";
  }
  html += "</div>";
  return html;
}

function syncRecycleBadge() {
  const badge = document.getElementById("recycle-badge");
  if (!badge) return;
  const n = Number(state.recycleCount) || 0;
  badge.textContent = String(n);
  badge.classList.toggle("muted", n < 1);
}

function renderRecycleModalList() {
  const list = document.getElementById("recycle-list");
  if (!list) return;
  const rows = state.recycleBin || [];
  if (!rows.length) {
    list.innerHTML = "<div class=\"empty\" style=\"min-height:100px\">暂无已移除项。在结果行使用「回收」命令可将条目暂存于此。</div>";
    return;
  }
  list.innerHTML = "";
  rows.forEach((it) => {
    const wrap = document.createElement("div");
    wrap.className = "recycle-row";
    const idx = Number(it.index) || 0;
    wrap.innerHTML =
      "<div><div class=\"t\">" + escapeHtml(it.title || "（无标题）") + "</div>" +
      "<div class=\"p\">" + escapeHtml(it.preview || "") + "</div></div>";
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "btn ghost";
    btn.textContent = "还原";
    btn.onclick = () => postToAhk({ type: "searchCenterRestoreRecycle", index: idx });
    wrap.appendChild(btn);
    list.appendChild(wrap);
  });
}

function openRecycleModal() {
  const ov = document.getElementById("recycle-overlay");
  if (!ov) return;
  renderRecycleModalList();
  ov.classList.add("open");
  ov.setAttribute("aria-hidden", "false");
}

function closeRecycleModal() {
  const ov = document.getElementById("recycle-overlay");
  if (!ov) return;
  ov.classList.remove("open");
  ov.setAttribute("aria-hidden", "true");
}

function applyState(payload) {
  state.keyword = payload.keyword || "";
  state.limit = payload.limit || 50;
  state.categories = payload.categories || [];
  state.currentCategoryKey = payload.currentCategoryKey || "ai";
  state.engines = payload.engines || [];
  state.selectedEngines = payload.selectedEngines || [];
  state.filters = payload.filters || [];
  state.filterType = payload.filterType || "";
  state.results = payload.results || [];
  state.hasMore = !!payload.hasMore;
  state.loading = false;
  state.isCliCategory = !!payload.isCliCategory;
  state.statusLine = payload.statusLine || "";
  state.recycleBin = Array.isArray(payload.recycleBin) ? payload.recycleBin : [];
  state.recycleCount = typeof payload.recycleCount === "number" ? payload.recycleCount : state.recycleBin.length;

  const wasSelected = state.selectedRow;
  if (!state.results.some((item) => item.row === wasSelected)) {
    state.selectedRow = state.results.length ? state.results[0].row : 1;
  }

  document.getElementById("search").value = state.keyword;
  document.getElementById("limit").value = String(state.limit);
  document.getElementById("status").textContent = state.statusLine || "已同步";
  document.getElementById("result-count").textContent = String(state.results.length) + " 条";
  document.getElementById("btn-run").textContent = "搜索";
  document.getElementById("btn-open-cli").style.display = state.isCliCategory ? "inline-flex" : "none";
  syncFooterHint();
  syncRecycleBadge();
  if (document.getElementById("recycle-overlay") && document.getElementById("recycle-overlay").classList.contains("open")) {
    renderRecycleModalList();
  }

  renderCategories();
  renderEngines();
  renderFilters();
  renderResults();
  requestAnimationFrame(() => {
    window.dispatchEvent(new Event("resize"));
  });
}

let searchDebounceTimer = 0;
function triggerSearch() {
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    postToAhk({ type: "search", keyword: state.keyword });
  }, 400);
}

let loadMoreObserver = null;
function disconnectLoadMoreObserver() {
  if (loadMoreObserver) {
    loadMoreObserver.disconnect();
    loadMoreObserver = null;
  }
}

function requestLoadMore() {
  if (!state.hasMore || state.loading) return;
  if (Date.now() < state.loadMoreCooldownUntil) return;
  state.loading = true;
  state.loadMoreCooldownUntil = Date.now() + 350;
  postToAhk({ type: "loadMore", offset: state.results.length });
}

function setupLoadMoreObserver() {
  const list = document.getElementById("result-list");
  const sent = document.getElementById("load-sentinel");
  if (!list || !sent || !state.hasMore) return;
  loadMoreObserver = new IntersectionObserver((entries) => {
    const e = entries[0];
    if (!e || !e.isIntersecting) return;
    requestLoadMore();
  }, { root: list, rootMargin: "0px 0px 320px 0px", threshold: 0 });
  loadMoreObserver.observe(sent);
}

document.getElementById("search").addEventListener("input", (event) => {
  state.keyword = event.target.value;
  triggerSearch();
});

document.getElementById("limit").addEventListener("change", (event) => {
  postToAhk({ type: "setLimit", limit: Number(event.target.value) || 50 });
});

document.getElementById("btn-run").addEventListener("click", () => {
  const keyword = document.getElementById("search").value;
  postToAhk({ type: "search", keyword });
});

document.getElementById("btn-web-search").addEventListener("click", () => {
  postToAhk({ type: "webSearch" });
});

document.getElementById("btn-open-cli").addEventListener("click", () => {
  postToAhk({ type: "cliOpen" });
});

const btnScRecycle = document.getElementById("btn-sc-recycle");
if (btnScRecycle) {
  btnScRecycle.addEventListener("click", () => openRecycleModal());
}
const btnWinRecycleSc = document.getElementById("btn-win-recycle-sc");
if (btnWinRecycleSc) {
  btnWinRecycleSc.addEventListener("click", () => postToAhk({ type: "openWindowsRecycleBin" }));
}
const recycleClose = document.getElementById("recycle-close");
if (recycleClose) {
  recycleClose.addEventListener("click", () => closeRecycleModal());
}
const recycleEmptyAll = document.getElementById("recycle-empty-all");
if (recycleEmptyAll) {
  recycleEmptyAll.addEventListener("click", () => {
    if (!state.recycleCount) return;
    if (!window.confirm("清空搜索中心回收站？已移除的条目将无法从此处还原。")) return;
    postToAhk({ type: "searchCenterEmptyRecycle" });
  });
}
const recycleOverlay = document.getElementById("recycle-overlay");
if (recycleOverlay) {
  recycleOverlay.addEventListener("click", (e) => {
    if (e.target === recycleOverlay) closeRecycleModal();
  });
}

const chromeCloseBtn = document.getElementById("chrome-close");
const chromeMinimizeBtn = document.getElementById("chrome-minimize");
const chromeMaximizeBtn = document.getElementById("chrome-maximize");
if (chromeMinimizeBtn) {
  chromeMinimizeBtn.addEventListener("click", () => {
    postToAhk({ type: "windowMinimize" });
  });
}
if (chromeMaximizeBtn) {
  chromeMaximizeBtn.addEventListener("click", () => {
    postToAhk({ type: "windowToggleMaximize" });
  });
}
if (chromeCloseBtn) {
  chromeCloseBtn.addEventListener("click", () => {
    postToAhk({ type: "close" });
  });
}

(function initChromeDrag() {
  const dragHost = document.getElementById("chrome-header");
  const dragTitle = document.getElementById("chrome-drag");
  const startHostDrag = (e) => {
    if (e.target && e.target.closest(".chrome-btn")) return;
    if (e.button !== 0) return;
    e.preventDefault();
    postToAhk({ type: "dragHost" });
  };
  const bindDragStart = (el) => {
    if (!el) return;
    if (window.PointerEvent) {
      el.addEventListener("pointerdown", startHostDrag);
    } else {
      el.addEventListener("mousedown", startHostDrag);
    }
  };
  bindDragStart(dragHost);
  if (dragTitle && dragTitle !== dragHost) bindDragStart(dragTitle);
})();

document.addEventListener("keydown", (event) => {
  if (event.key === "CapsLock") {
    beginCapsHoldHint();
  } else if (state.capsHintActive) {
    const pressed = normalizeHintKey(event.key);
    if (pressed) setCapsPressedKey(pressed);
  }

  const activeTag = document.activeElement ? document.activeElement.tagName : "";
  const isTyping = activeTag === "INPUT" || activeTag === "TEXTAREA" || activeTag === "SELECT";

  if (event.key === "Escape") {
    event.preventDefault();
    postToAhk({ type: "close" });
    return;
  }

  if (event.key === "Enter" && document.activeElement && document.activeElement.id === "search") {
    event.preventDefault();
    const keyword = document.getElementById("search").value;
    postToAhk({ type: "search", keyword });
    return;
  }

  if (isTyping) return;

  if (event.key === "ArrowDown" && state.results.length) {
    event.preventDefault();
    const current = state.results.findIndex((item) => item.row === state.selectedRow);
    const next = Math.min(state.results.length - 1, Math.max(0, current + 1));
    state.selectedRow = state.results[next].row;
    renderResults();
  }

  if (event.key === "ArrowUp" && state.results.length) {
    event.preventDefault();
    const current = state.results.findIndex((item) => item.row === state.selectedRow);
    const next = Math.max(0, (current < 0 ? 0 : current) - 1);
    state.selectedRow = state.results[next].row;
    renderResults();
  }

  if (event.key === "Enter" && state.results.length) {
    event.preventDefault();
    postToAhk({ type: "activateResult", row: state.selectedRow });
  }
});

document.addEventListener("keyup", (event) => {
  if (event.key === "CapsLock") {
    endCapsHoldHint();
    return;
  }
  if (!state.capsHintActive) return;
  const released = normalizeHintKey(event.key);
  if (released && state.capsPressedKey === released) {
    state.capsPressedKey = "";
    updateHotkeyHighlights();
  }
});

window.addEventListener("blur", () => {
  endCapsHoldHint();
});

document.addEventListener("visibilitychange", () => {
  if (document.hidden) endCapsHoldHint();
});

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener("message", (event) => {
    const payload = event.data;
    if (!payload || !payload.type) return;
    if (payload.type === "capsHint") {
      setCapsHintActive(!!payload.active);
      return;
    }
    if (payload.type === "capsHintPress") {
      flashCapsPressedKey(payload.key || "");
      return;
    }
    if (payload.type === "setCategory") {
      postToAhk({ type: "setCategory", category: payload.category || "" });
      return;
    }
    if (payload.type === "toggleEngine") {
      postToAhk({ type: "toggleEngine", engine: payload.engine || "" });
      return;
    }
    if (payload.type === "setFilter") {
      postToAhk({ type: "setFilter", filterType: payload.filterType || "" });
      return;
    }
    if (payload.type === "setLimit") {
      postToAhk({ type: "setLimit", limit: Number(payload.limit) || 50 });
      return;
    }
    if (payload.type === "activateResult") {
      postToAhk({ type: "activateResult", row: Number(payload.row) || state.selectedRow || 1 });
      return;
    }
    if (payload.type === "focus_input") {
      const input = document.getElementById("search");
      if (input) input.focus();
      return;
    }
    if (payload.type === "set_input") {
      const input = document.getElementById("search");
      if (input) {
        state.keyword = payload.keyword || "";
        input.value = state.keyword;
        input.focus();
        input.select();
      }
      return;
    }
    if (payload.type === "init" || payload.type === "state") {
      applyState(payload);
    }
  });
  postToAhk({ type: "ready" });
}
</script>
