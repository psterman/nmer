<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索中心</title>
<link rel="stylesheet" href="https://app.local/assets/vendor/prism/prism-tomorrow.min.css">
<style>
:root {
  --bg: #111315;
  --panel: #171a1e;
  --panel-2: #1f2429;
  --border: #313941;
  --glass-edge: rgba(255,255,255,.28);
  --glass-edge-soft: rgba(255,255,255,.08);
  --glass-warm: rgba(255,171,92,.2);
  --text: #e7ebef;
  --muted: #93a0ad;
  --accent: #ff8d2a;
  --accent-2: #ffb347;
  --shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
  --font-ui: "Segoe UI", "Microsoft YaHei UI", sans-serif;
  --font-mono: Consolas, "Cascadia Mono", monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  min-height: 0;
  background: radial-gradient(circle at top right, rgba(255,141,42,.08), transparent 26%), linear-gradient(180deg, #0f1113 0%, #15181c 100%);
  color: var(--text);
  font-family: var(--font-ui);
  overflow: hidden;
}
button, input, select, textarea { font: inherit; }
#app {
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  width: 100%;
  height: 100%;
  min-height: 0;
  gap: 12px;
  padding: 14px 26px 18px;
}
#chrome-header {
  display: none;
}
.chrome-header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  margin: -6px -10px 2px;
  padding: 6px 12px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.01)), rgba(26,31,38,.45);
  border: 1px solid rgba(255,255,255,.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
  user-select: none;
  -webkit-user-select: none;
  cursor: grab;
}
.chrome-header:active { cursor: grabbing; }
.chrome-drag {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.02em;
  cursor: grab;
  padding: 4px 8px;
  border-radius: 8px;
}
.chrome-drag:active { cursor: grabbing; }
.chrome-controls {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.chrome-btn {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}
.chrome-btn:hover {
  border-color: rgba(255,179,71,.5);
  background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
  color: #fff;
}
.chrome-btn.close:hover {
  border-color: rgba(255,122,122,.6);
  background: linear-gradient(180deg, rgba(255,122,122,.22), rgba(255,122,122,.12));
}
.bar {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.card {
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
}
.card::after,
.chrome-header::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, var(--glass-edge), var(--glass-edge-soft) 45%, var(--glass-warm));
  -webkit-mask: linear-gradient(180deg, #000 0%, #000 80%, transparent);
  mask: linear-gradient(180deg, #000 0%, #000 80%, transparent);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.72;
}
#search-bar {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)), var(--panel);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
}
#search-icon-inline {
  color: var(--accent);
  font-size: 16px;
  flex-shrink: 0;
}
#search {
  width: 100%;
  display: block;
  min-width: 0;
  height: 44px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 0 14px;
  outline: none;
  caret-color: var(--accent);
  user-select: text;
  -webkit-user-select: text;
}
#search::placeholder { color: #6f7d8b; }
#search:focus, #limit:focus { border-color: var(--accent); }
.search-input-wrap {
  flex: 1 1 auto;
  width: 100%;
  min-width: 0;
}
.search-status-inline {
  margin-top: 6px;
  padding-left: 2px;
  font-size: 11px;
  color: #7f8a95;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-actions {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  gap: 6px 8px;
  flex: 0 0 auto;
  margin-left: auto;
}
#limit {
  width: 122px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-2);
  color: var(--text);
  padding: 0 10px;
  outline: none;
}
.search-actions .btn {
  height: 36px;
  padding: 0 12px;
}
#results-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
}
#head-filters {
  min-width: 0;
}
#filters {
  display: flex;
  gap: 8px;
  overflow: auto hidden;
  padding: 2px 0;
}
#categories,
#engines {
  display: flex;
  gap: 10px;
  overflow: auto hidden;
  padding: 8px 10px;
}
#categories::-webkit-scrollbar,
#engines::-webkit-scrollbar,
#filters::-webkit-scrollbar,
#result-list::-webkit-scrollbar,
#preview-web-scroll::-webkit-scrollbar {
  height: 8px;
  width: 8px;
}
#categories::-webkit-scrollbar-thumb,
#engines::-webkit-scrollbar-thumb,
#filters::-webkit-scrollbar-thumb,
#result-list::-webkit-scrollbar-thumb,
#preview-web-scroll::-webkit-scrollbar-thumb {
  background: #3a434d;
  border-radius: 999px;
}
#category-card, #engine-card, #filter-card { padding: 10px 12px; }
#tag-card {
  padding: 10px 12px;
  display: grid;
  grid-template-rows: auto auto;
  gap: 10px;
}
.chip, .engine-chip, .filter-chip {
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--muted);
  border-radius: 999px;
  cursor: pointer;
  transition: .16s ease;
}
.chip {
  padding: 10px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.chip .chip-main {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  min-width: 0;
}
.chip .chip-title {
  line-height: 1.05;
}
.chip.active, .filter-chip.active, .engine-chip.active {
  background: linear-gradient(180deg, rgba(255,179,71,.16), rgba(255,141,42,.12));
  border-color: rgba(255,179,71,.5);
  color: #fff;
}
.chip .count {
  min-width: 22px;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.06);
  color: inherit;
  font-size: 11px;
  text-align: center;
}
.engine-chip {
  min-width: 64px;
  max-width: 92px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  border-radius: 14px;
}
.engine-chip .engine-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}
.engine-chip img, .engine-fallback {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  flex: 0 0 auto;
  display: block;
}
.engine-fallback {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #303842;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
}
.engine-chip .label {
  width: 100%;
  text-align: center;
  font-size: 11px;
  line-height: 1.25;
  color: var(--muted);
  white-space: normal;
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.engine-chip.active .label { color: #fff; }
.filter-chip {
  padding: 5px 10px;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.filter-chip .filter-label { line-height: 1; }
.hotkey-hint {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 14px;
  padding: 0 6px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  color: #7f8a95;
  font-size: 10px;
  line-height: 1.2;
  letter-spacing: .02em;
}
.hotkey-hint.unbound {
  border-style: dashed;
  opacity: .72;
}
.engine-chip .hotkey-hint {
  margin-top: 1px;
}
.caps-hotkey-ready {
  border-color: rgba(255,179,71,.45) !important;
  box-shadow: 0 0 0 1px rgba(255,179,71,.16) inset;
}
.caps-hotkey-hit {
  border-color: rgba(255,179,71,.82) !important;
  box-shadow: 0 0 0 1px rgba(255,179,71,.42) inset, 0 0 18px rgba(255,141,42,.28);
  transform: translateY(-1px);
}
.caps-hotkey-hit .hotkey-hint {
  color: #fff;
  border-color: rgba(255,200,120,.72);
  background: rgba(255,141,42,.24);
}
#layout {
  display: grid;
  grid-template-columns: minmax(380px, 1.1fr) minmax(320px, .9fr);
  gap: 16px;
  min-height: 0;
}
#results-card, #preview-card {
  min-height: 0;
  overflow: hidden;
}
#results-head, #preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,.02);
}
.head-title {
  font-size: 14px;
  font-weight: 700;
}
.head-sub {
  font-size: 12px;
  color: var(--muted);
}
#result-list {
  height: calc(100% - 59px);
  overflow: auto;
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
}
.result-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 9px 10px;
  border: 1px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  transition: .14s ease;
}
.result-item + .result-item { margin-top: 5px; }
.result-item:hover {
  background: rgba(255,255,255,.03);
  border-color: rgba(255,255,255,.05);
}
.result-item.active {
  background: linear-gradient(180deg, rgba(255,141,42,.16), rgba(255,141,42,.06));
  border-color: rgba(255,179,71,.45);
}
.result-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.pin-ico {
  display: inline-block;
  margin-right: 5px;
  font-size: 12px;
  vertical-align: middle;
  opacity: 0.95;
  user-select: none;
}
.result-sub {
  margin-top: 3px;
  font-size: 11px;
  color: var(--muted);
}
.result-preview {
  margin-top: 4px;
  color: #ccd5dd;
  font-size: 11px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.result-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  min-width: 92px;
}
.pill {
  padding: 3px 7px;
  border-radius: 999px;
  background: #2a3239;
  color: #d7dee6;
  font-size: 10px;
}
.time {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}
#preview-panel {
  height: calc(100% - 59px);
  min-height: 0;
  display: flex;
  flex-direction: column;
  position: relative;
}
#preview-main {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  position: relative;
}
#preview-web-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  padding: 16px 18px 18px;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  line-height: 1.65;
  font-size: 12px;
  color: #d6dde5;
}
#preview-web-scroll.mode-hidden {
  display: none !important;
}
#preview-host {
  flex: 1 1 auto;
  min-height: 120px;
  display: none;
  margin: 0 12px 8px;
  border-radius: 10px;
  border: 1px dashed rgba(255,255,255,.12);
  background: rgba(0,0,0,.12);
  box-sizing: border-box;
}
#preview-host.mode-native {
  display: block;
}
#preview-ql-hint {
  flex-shrink: 0;
  padding: 8px 14px 12px;
  font-size: 11px;
  color: #7f8a95;
  border-top: 1px solid rgba(255,255,255,.06);
  background: rgba(0,0,0,.12);
}
#preview-ql-hint.hidden {
  display: none;
}
#preview-ql-hint .ql-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
#preview-ql-btn, .preview-ctrl-btn {
  flex-shrink: 0;
  height: 28px;
  padding: 0 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,179,71,.25);
  background: rgba(255,255,255,.05);
  color: #fff;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s ease;
}
#preview-ql-btn:hover, .preview-ctrl-btn:hover {
  background: rgba(255,255,255,.1);
  border-color: rgba(255,179,71,.45);
}
#preview-ql-btn.btn-highlight, .preview-ctrl-btn.btn-highlight {
  background: rgba(255,141,42,.22);
  border-color: rgba(255,141,42,.7);
  box-shadow: 0 0 8px rgba(255,141,42,0.15);
  font-weight: bold;
}
#preview-ql-btn.btn-highlight:hover {
  background: rgba(255,141,42,.35);
}
#preview-ql-btn:disabled, .preview-ctrl-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
#preview-web-scroll pre[class*="language-"] {
  margin: 0;
  padding: 12px;
  border-radius: 10px;
  background: rgba(0,0,0,.35) !important;
  overflow: auto;
  max-height: none;
}
#preview-web-scroll img.preview-img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 8px;
}
.preview-plain {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  line-height: 1.65;
  font-size: 12px;
}
.preview-truncate-note {
  margin-bottom: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(255,141,42,.12);
  border: 1px solid rgba(255,179,71,.28);
  color: #e7c4a0;
  font-size: 11px;
}
.preview-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px 16px;
  margin-top: 4px;
}
.preview-meta-item {
  display: flex;
  align-items: center;
  font-size: 11px;
  color: #7f8a95;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.preview-meta-key {
  color: #555;
  margin-right: 6px;
  flex-shrink: 0;
}
.preview-meta-val {
  color: #aaa;
  overflow: hidden;
  text-overflow: ellipsis;
}
#footer {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  padding: 4px 4px 0;
  font-size: 12px;
  color: var(--muted);
}
.footer-row-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.footer-inline-btns {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.footer-inline-btns .btn {
  height: 32px;
  padding: 0 12px;
  font-size: 12px;
}
.recycle-badge {
  display: inline-block;
  min-width: 18px;
  margin-left: 4px;
  padding: 0 6px;
  border-radius: 999px;
  background: rgba(255,141,42,.25);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.recycle-badge:empty,
.recycle-badge.muted {
  background: rgba(255,255,255,.08);
  color: var(--muted);
  font-weight: 600;
}
.recycle-overlay {
  position: fixed;
  inset: 0;
  z-index: 5000;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.55);
  padding: 20px;
}
.recycle-overlay.open {
  display: flex;
}
.recycle-dialog {
  width: min(520px, 96vw);
  max-height: min(72vh, 560px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
}
.recycle-dialog-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 14px;
}
.recycle-list {
  flex: 1 1 auto;
  min-height: 120px;
  max-height: 44vh;
  overflow: auto;
  padding: 10px 12px;
}
.recycle-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: start;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  margin-bottom: 8px;
}
.recycle-row .t {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.recycle-row .p {
  margin-top: 4px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  word-break: break-all;
}
.recycle-dialog-foot {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.btn {
  height: 40px;
  padding: 0 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  transition: .16s ease;
}
.btn:hover { border-color: rgba(255,179,71,.45); }
.btn.primary {
  background: linear-gradient(180deg, #ff9b38, #e5791e);
  color: #101214;
  border-color: rgba(255,179,71,.7);
  font-weight: 700;
}
.btn.ghost { background: transparent; }
.empty {
  padding: 22px;
  color: var(--muted);
  line-height: 1.7;
  min-height: 72px;
}
.skeleton-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1 1 auto;
}
.skeleton-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.04);
  background: rgba(255,255,255,.015);
}
.sk-line {
  height: 9px;
  border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
  background-size: 220% 100%;
  animation: sk-shimmer 1.3s linear infinite;
}
.sk-line + .sk-line { margin-top: 5px; }
.sk-line.w1 { width: 64%; }
.sk-line.w2 { width: 44%; }
.sk-line.w3 { width: 78%; }
.sk-meta {
  width: 64px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
  background-size: 220% 100%;
  animation: sk-shimmer 1.3s linear infinite;
}
.preview-empty {
  min-height: 100%;
}
@keyframes sk-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
mark {
  background: rgba(255,179,71,.9);
  color: #111;
  padding: 0 2px;
  border-radius: 3px;
}
@media (max-width: 980px) {
  #layout { grid-template-columns: 1fr; }
  #preview-card { min-height: 240px; }
}
.preview-video-container, .preview-audio-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  margin-top: 20px;
}
.preview-video {
  max-width: 100%;
  max-height: 480px;
  border-radius: 4px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

<script>
if (typeof BasePanel === 'undefined') {
  window.BasePanel = {
    PROTO_VERSION: 1,
    postToAhk(obj) {
      if (!window.chrome || !window.chrome.webview) return;
      const src = (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
      const p = Object.assign({ v: 1, timestamp: Date.now() }, src);
      if (p.action === undefined && p.type !== undefined) p.action = p.type;
      window.chrome.webview.postMessage(p);
    }
  };
}
const state = {
  keyword: "",
  limit: 30,
  categories: [],
  currentCategoryKey: "ai",
  engines: [],
  selectedEngines: [],
  filters: [],
  filterType: "",
  results: [],
  hasMore: false,
  loading: false,
  loadMoreCooldownUntil: 0,
  isCliCategory: false,
  statusLine: "",
  selectedRow: 1,
  capsHintActive: false,
  capsPressedKey: "",
  recycleBin: [],
  recycleCount: 0,
  previewTimer: 0,
  previewSeq: 0,
  previewPath: "",
  iPreviewFailed: false,
  iPreviewActive: false
};

const postToAhk = (obj) => BasePanel.postToAhk(obj);
const PREVIEW_DEBOUNCE_MS = 150;
const PREVIEW_TEXT_EXT = new Set(["txt", "ahk", "py", "js", "md", "json", "log"]);
const PREVIEW_IMAGE_EXT = new Set(["png", "jpg", "jpeg", "gif", "svg"]);
const PREVIEW_VIDEO_EXT = new Set(["mp4", "mkv", "avi", "mov", "wmv", "flv", "webm"]);
const PREVIEW_AUDIO_EXT = new Set(["mp3", "wav", "m4a", "flac", "ogg", "wma"]);
const PREVIEW_WEB_VIDEO_EXT = new Set(["mp4", "webm"]);
const PREVIEW_WEB_AUDIO_EXT = new Set(["mp3", "wav", "ogg"]);
const ONE_MB = 1048576;
const HOTKEY_HINT_MAP = Object.freeze({
  category: Object.freeze({
    ai: "q",
    cli: "w",
    academic: "e",
    baidu: "r"
  }),
  engine: Object.freeze({
    deepseek: "a",
    yuanbao: "s",
    doubao: "d"
  }),
  filter: Object.freeze({
    File: "z",
    clipboard: "x",
    template: "c",
    config: "v",
    pinned: "p"
  })
});
let capsHoldTimer = 0;
let capsFlashTimer = 0;

function escapeHtml(text) {
  if (text === null || text === undefined) return "";
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function highlight(text, keyword) {
  const safe = escapeHtml(text);
  if (!keyword) return safe;
  try {
    const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp("(" + escaped + ")", "ig");
    return safe.replace(re, "<mark>$1</mark>");
  } catch {
    return safe;
  }
}

function getHintHotkey(group, value) {
  if (!group || !value) return "";
  const src = HOTKEY_HINT_MAP[group];
  if (!src) return "";
  return src[value] || "";
}

function normalizeHintKey(key) {
  const k = String(key || "").trim().toLowerCase();
  return /^[a-z0-9]$/.test(k) ? k : "";
}

function hotkeyHintHtml(hotkey) {
  if (hotkey) {
    return "<span class=\"hotkey-hint\">Caps+" + escapeHtml(String(hotkey).toUpperCase()) + "</span>";
  }
  return "<span class=\"hotkey-hint unbound\">可绑定</span>";
}

function getFooterHintText() {
  return state.isCliCategory
    ? "CLI 分类：输入内容后可直接发送到选中的终端"
    : "网络分类：输入内容后会并发打开选中的搜索引擎";
}

function syncFooterHint() {
  const footer = document.getElementById("footer-hint");
  if (!footer) return;
  if (state.capsHintActive) {
    footer.textContent = "CapsLock 热键提示中：按对应字母可快速定位";
    return;
  }
  footer.textContent = getFooterHintText();
}

function updateHotkeyHighlights() {
  const nodes = document.querySelectorAll(".hotkey-item");
  nodes.forEach((el) => {
    const hk = normalizeHintKey(el.dataset.hotkey || "");
    const ready = state.capsHintActive && !!hk;
    const hit = ready && state.capsPressedKey === hk;
    el.classList.toggle("caps-hotkey-ready", ready);
    el.classList.toggle("caps-hotkey-hit", hit);
  });
}

function setCapsHintActive(active) {
  const next = !!active;
  if (state.capsHintActive === next) return;
  state.capsHintActive = next;
  if (!next) state.capsPressedKey = "";
  updateHotkeyHighlights();
  syncFooterHint();
}

function setCapsPressedKey(key) {
  state.capsPressedKey = normalizeHintKey(key);
  updateHotkeyHighlights();
}

function flashCapsPressedKey(key) {
  const normalized = normalizeHintKey(key);
  if (!normalized) return;
  setCapsPressedKey(normalized);
  if (capsFlashTimer) clearTimeout(capsFlashTimer);
  capsFlashTimer = setTimeout(() => {
    if (state.capsPressedKey === normalized) {
      state.capsPressedKey = "";
      updateHotkeyHighlights();
    }
  }, 260);
}

function beginCapsHoldHint() {
  if (capsHoldTimer) clearTimeout(capsHoldTimer);
  capsHoldTimer = setTimeout(() => {
    setCapsHintActive(true);
  }, 220);
}

function endCapsHoldHint() {
  if (capsHoldTimer) clearTimeout(capsHoldTimer);
  capsHoldTimer = 0;
  if (capsFlashTimer) clearTimeout(capsFlashTimer);
  capsFlashTimer = 0;
  setCapsHintActive(false);
}

function renderCategories() {
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  state.categories.forEach((cat) => {
    const hotkey = getHintHotkey("category", cat.key);
    const el = document.createElement("button");
    el.className = "chip hotkey-item" + (cat.key === state.currentCategoryKey ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    el.innerHTML = "<span class=\"chip-main\"><span class=\"chip-title\">" + escapeHtml(cat.text) + "</span>" + hotkeyHintHtml(hotkey) + "</span><span class=\"count\">" + (cat.selectedCount || 0) + "</span>";
    el.onclick = () => postToAhk({ type: "setCategory", category: cat.key });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderEngines() {
  const wrap = document.getElementById("engines");
  wrap.innerHTML = "";
  state.engines.forEach((engine) => {
    const hotkey = getHintHotkey("engine", engine.value);
    const active = state.selectedEngines.includes(engine.value);
    const el = document.createElement("button");
    el.className = "engine-chip hotkey-item" + (active ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    const icon = engine.iconUrl
      ? "<span class=\"engine-icon-wrap\"><img src=\"" + engine.iconUrl + "\" alt=\"\"></span>"
      : "<span class=\"engine-icon-wrap\"><span class=\"engine-fallback\">" + escapeHtml((engine.name || "?").slice(0, 1).toUpperCase()) + "</span></span>";
    el.innerHTML = icon + "<span class=\"label\">" + escapeHtml(engine.name) + "</span>" + hotkeyHintHtml(hotkey);
    el.onclick = () => postToAhk({ type: "toggleEngine", engine: engine.value });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderFilters() {
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  state.filters.forEach((filter) => {
    const hotkey = getHintHotkey("filter", filter.key);
    const el = document.createElement("button");
    el.className = "filter-chip hotkey-item" + (filter.key === state.filterType ? " active" : "");
    el.dataset.hotkey = hotkey || "";
    el.innerHTML = "<span class=\"filter-label\">" + escapeHtml(filter.text) + "</span>" + hotkeyHintHtml(hotkey);
    el.onclick = () => postToAhk({ type: "setFilter", filterType: filter.key });
    wrap.appendChild(el);
  });
  updateHotkeyHighlights();
}

function renderResults() {
  const list = document.getElementById("result-list");
  list.innerHTML = "";
  disconnectLoadMoreObserver();

  if (!state.results.length) {
    list.innerHTML =
      "<div class=\"empty\">暂无结果。<br>你可以在输入框输入关键词搜索本地内容，或选择引擎后执行网络搜索 / CLI 发送。</div>" +
      buildSkeletonListHtml(7);
    renderPreview();
    return;
  }

  if (state.selectedRow < 1 || state.selectedRow > state.results.length) {
    state.selectedRow = 1;
  }

  state.results.forEach((item) => {
    const row = document.createElement("div");
    row.className = "result-item" + (item.row === state.selectedRow ? " active" : "");
    const isHistory = (item.type === "history" || item.type === "History");
    const isTutorial = (item.type === "tutorial");
    const pinMark = item.pinned ? "<span class=\"pin-ico\" title=\"置顶\">🔝</span>" : "";
    
    let icon = "";
    if (isHistory) icon = "<span style='margin-right:6px; opacity:0.5; font-size:12px'>🕒</span>";
    if (isTutorial) icon = "<span style='margin-right:6px; color:#ffb347; font-size:12px'>💡</span>";
    
    // 如果是历史记录，标题置灰，弱化表现；如果是教程，标题加亮
    let titleStyle = "";
    if (isHistory) titleStyle = " style='color:#bbb'";
    if (isTutorial) titleStyle = " style='color:#ffb347; font-weight:500'";
    
    row.innerHTML =
      "<div>" +
        "<div class=\"result-title\"" + titleStyle + ">" + icon + pinMark + highlight(item.title, state.keyword) + "</div>" +
        "<div class=\"result-sub\">" + escapeHtml(item.subtitle || "") + "</div>" +
        "<div class=\"result-preview\">" + highlight(item.preview || "", state.keyword) + "</div>" +
      "</div>" +
      "<div class=\"result-meta\">" +
        (isHistory || isTutorial ? "" : "<span class=\"pill\">" + escapeHtml(item.type || "") + "</span>") +
        "<span class=\"time\">" + escapeHtml(item.time || "") + "</span>" +
      "</div>";
    row.onclick = () => {
      state.selectedRow = item.row;
      renderResults();
    };
    row.oncontextmenu = (ev) => {
      ev.preventDefault();
      state.selectedRow = item.row;
      renderResults();
      postToAhk({
        type: "searchCenterContextMenu",
        row: item.row,
        screenX: ev.screenX,
        screenY: ev.screenY,
      });
    };
    row.ondblclick = () => {
      if ((item.type === "history" || item.type === "History") && state.keyword === "") {
        postToAhk({ type: "set_input", keyword: item.title });
        postToAhk({ type: "search", keyword: item.title });
      } else {
        postToAhk({ type: "activateResult", row: item.row });
      }
    };
    list.appendChild(row);
  });

  if (state.results.length < 7) {
    list.insertAdjacentHTML("beforeend", buildSkeletonListHtml(7 - state.results.length));
  }

  if (state.hasMore) {
    const sent = document.createElement("div");
    sent.id = "load-sentinel";
    sent.style.height = "2px";
    sent.style.width = "100%";
    sent.style.pointerEvents = "none";
    list.appendChild(sent);
    setupLoadMoreObserver();
  }

  renderPreview();
}

function looksLikeWindowsPath(s) {
  if (!s || typeof s !== "string") return false;
  const t = s.trim();
  if (t.length < 3) return false;
  if (/^[A-Za-z]:[\\/]/.test(t)) return true;
  if (t.startsWith("\\\\")) return true;
  return false;
}

function getSelectedItemPath(item) {
  if (!item) return "";
  const p = (item.path && String(item.path).trim()) || "";
  if (p && looksLikeWindowsPath(p)) return p;
  const dt = String(item.dataType || item.type || "").toLowerCase();
  const isFileish = dt === "file" || dt === "folder" || /文件|路径/.test(String(item.source || ""));
  const c = item.content ? String(item.content).trim() : "";
  if (isFileish && looksLikeWindowsPath(c)) return c;
  return "";
}

function pathExtensionLower(path) {
  if (!path) return "";
  const base = path.replace(/^.*[\\/]/, "");
  const i = base.lastIndexOf(".");
  if (i <= 0 || i === base.length - 1) return "";
  return base.slice(i + 1).toLowerCase();
}

function prismLangForExt(ext) {
  if (ext === "py") return "python";
  if (ext === "js") return "javascript";
  if (ext === "md") return "markdown";
  if (ext === "json") return "json";
  if (ext === "ahk") return "clike";
  if (ext === "txt" || ext === "log") return "plaintext";
  return "plaintext";
}

function truncateToLines(text, maxLines) {
  const lines = text.split(/\r\n|\r|\n/);
  if (lines.length <= maxLines) return { text, truncated: false };
  return { text: lines.slice(0, maxLines).join("\n"), truncated: true };
}

function setQuickLookHintVisible(show) {
  const el = document.getElementById("preview-ql-hint");
  if (!el) return;
  el.classList.toggle("hidden", !show);
}

function stopNativePreview() {
  postToAhk({ type: "PREVIEW_NATIVE_STOP" });
}

function setPreviewLayoutMode(mode) {
  const web = document.getElementById("preview-web-scroll");
  const host = document.getElementById("preview-host");
  if (!web || !host) return;
  if (mode === "native") {
    web.classList.add("mode-hidden");
    host.classList.add("mode-native");
    host.setAttribute("aria-hidden", "false");
  } else {
    web.classList.remove("mode-hidden");
    host.classList.remove("mode-native");
    host.setAttribute("aria-hidden", "true");
  }
}

function renderFallbackTextPreview(item, pane, meta) {
  meta.textContent = [item.source || item.subtitle || "", item.type || "", item.time || ""].filter(Boolean).join(" · ");
  pane.innerHTML = "";
  pane.textContent = item.previewText || item.content || item.title || "";
}

function scheduleRunPreview() {
  if (state.previewTimer) clearTimeout(state.previewTimer);
  state.iPreviewActive = false;
  state.iPreviewFailed = false;
  state.previewTimer = setTimeout(() => {
    state.previewTimer = 0;
    runPreviewForSelection();
  }, PREVIEW_DEBOUNCE_MS);
}

function collectPreviewBounds() {
  const host = document.getElementById("preview-host");
  if (!host || !host.classList.contains("mode-native")) return null;
  const r = host.getBoundingClientRect();
  if (r.width < 4 || r.height < 4) return null;
  return {
    left: r.left,
    top: r.top,
    width: r.width,
    height: r.height,
    dpr: typeof window.devicePixelRatio === "number" ? window.devicePixelRatio : 1
  };
}

function runPreviewForSelection() {
  state.previewSeq += 1;
  const seq = state.previewSeq;
  const meta = document.getElementById("preview-meta");
  const pane = document.getElementById("preview-web-scroll");
  const item = state.results.find((entry) => entry.row == state.selectedRow);
  if (!meta || !pane) return;

  if (!item) {
    meta.textContent = "未选中结果";
    pane.innerHTML =
      "<div class=\"preview-empty\">当前未选中本地结果。<br><br>在输入框中输入内容可实时过滤数据，点击列表项后会在这里显示详细预览。<br><br>" +
      "<div class=\"sk-line w1\"></div><div class=\"sk-line w3\"></div><div class=\"sk-line w2\"></div></div>";
    setPreviewLayoutMode("web");
    setQuickLookHintVisible(false);
    state.previewPath = "";
    stopNativePreview();
    return;
  }

  const isFile = !!getSelectedItemPath(item);
  const path = getSelectedItemPath(item);
  state.previewPath = path;
  setQuickLookHintVisible(!!path);

  renderRichMeta({
    "来源": item.source || item.subtitle || "",
    "类型": item.type || "",
    "时间": item.time || ""
  });

  if (!path) {
    setPreviewLayoutMode("web");
    stopNativePreview();
    renderFallbackTextPreview(item, pane, meta);
    return;
  }

  const ext = pathExtensionLower(path);

  if (PREVIEW_TEXT_EXT.has(ext)) {
    setPreviewLayoutMode("web");
    stopNativePreview();
    pane.innerHTML = "<div class=\"preview-loading\">加载文本…</div>";
    postToAhk({ type: "WEB_PREVIEW_TEXT", path, seq });
    return;
  }

  if (PREVIEW_IMAGE_EXT.has(ext)) {
    setPreviewLayoutMode("web");
    stopNativePreview();
    pane.innerHTML = "<div class=\"preview-loading\">加载图片…</div>";
    postToAhk({ type: "WEB_PREVIEW_IMAGE", path, seq });
    return;
  }

  const isWebMedia = PREVIEW_WEB_VIDEO_EXT.has(ext) || PREVIEW_WEB_AUDIO_EXT.has(ext);
  const isNativeMedia = (PREVIEW_VIDEO_EXT.has(ext) || PREVIEW_AUDIO_EXT.has(ext)) && !isWebMedia;
  
  if (isWebMedia) {
    setPreviewLayoutMode("web");
    stopNativePreview();
    pane.innerHTML = "<div class=\"preview-loading\">正在初始化播放器…</div>";
    postToAhk({ type: "INVOKE_WEB_MEDIA", path, seq });
    return;
  }

  if (isNativeMedia) {
    setPreviewLayoutMode("native");
    pane.innerHTML = "<div class=\"preview-loading\">正在加载多媒体预览组件…</div>";
    invokeIPreviewHandler();
    return;
  }

  setPreviewLayoutMode("native");
  pane.innerHTML = "<div class=\"preview-empty\" style=\"min-height:80px\">此处为原生预览占位区域。<br><br>你可以点击下方按钮或按空格尝试不同预览方式。</div>";
  
  const isL1Handled = PREVIEW_TEXT_EXT.has(ext) || PREVIEW_IMAGE_EXT.has(ext);
  const qlBtn = document.getElementById("preview-ql-btn");
  const nativeBtn = document.getElementById("preview-native-btn");
  if (qlBtn) qlBtn.classList.toggle("btn-highlight", !isL1Handled);
  if (nativeBtn) nativeBtn.classList.toggle("btn-highlight", !isL1Handled && !state.iPreviewFailed);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (seq !== state.previewSeq) return;
      // 默认不自动加载重型 IPreviewHandler，除非文件类型非常明确或是用户要求
    });
  });
}

function onWebPreviewTextResult(payload) {
  if (Number(payload.seq) !== state.previewSeq) return;
  const pane = document.getElementById("preview-web-scroll");
  if (!pane) return;
  const raw = payload.text != null ? String(payload.text) : "";
  const sizeBytes = Number(payload.sizeBytes) || 0;
  const truncatedServer = !!payload.truncated;
  let body = raw;
  let note = "";
  let lineTrunc = false;
  if (sizeBytes > ONE_MB || truncatedServer) {
    const t = truncateToLines(body, 1000);
    body = t.text;
    lineTrunc = t.truncated;
    note = "文件较大，已截断显示（最多约 1MB / 1000 行）。完整内容请点击下方 QuickLook 或使用外部编辑器。";
  }
  const ext = pathExtensionLower(state.previewPath);
  const lang = prismLangForExt(ext);
  const esc = body
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  let html = "";
  if (note) html += "<div class=\"preview-truncate-note\">" + note + (lineTrunc ? "（已限制为前 1000 行）" : "") + "</div>";
  if (lang === "plaintext") {
    html += "<pre class=\"preview-plain\">" + esc + "</pre>";
  } else {
    html += "<pre><code class=\"language-" + lang + "\">" + esc + "</code></pre>";
  }
  pane.innerHTML = html;
  if (lang !== "plaintext") {
    const code = pane.querySelector("code");
    if (code && window.Prism) {
      try {
        Prism.highlightElement(code);
      } catch (e) {
        /* ignore */
      }
    }
  }
}

function onWebPreviewImageResult(payload) {
  if (Number(payload.seq) !== state.previewSeq) return;
  const pane = document.getElementById("preview-web-scroll");
  if (!pane) return;
  const url = payload.dataUrl ? String(payload.dataUrl) : "";
  if (!url) {
    pane.innerHTML = "<div class=\"preview-empty\">无法加载图片预览。</div>";
    return;
  }
  const img = new Image();
  img.className = "preview-img";
  img.onload = () => {
     renderRichMeta({ "图片尺寸": img.naturalWidth + " x " + img.naturalHeight }, true);
  };
  img.src = url;
  pane.innerHTML = "";
  pane.appendChild(img);
}

function onWebPreviewMediaResult(payload) {
  if (Number(payload.seq) !== state.previewSeq) return;
  console.log("Media Preview Debug:", payload);
  const pane = document.getElementById("preview-web-scroll");
  if (!pane) return;
  const url = payload.url || "";
  const ext = pathExtensionLower(state.previewPath);
  
  if (!url) {
    pane.innerHTML = "<div class=\"preview-empty\">无法加载媒体文件。</div>";
    return;
  }

  const errorHint = `<p style="margin-top:10px; color:#ff4d4d; font-size:12px;">如果无法播放，请检查文件编码或使用 QuickLook (空格键)。</p>`;

  if (PREVIEW_WEB_VIDEO_EXT.has(ext)) {
    pane.innerHTML = `
      <div class="preview-video-container">
        <video controls autoplay class="preview-video" style="max-height: 480px; width: 100%;" onerror="this.parentElement.innerHTML += '${errorHint}'">
          <source src="${url}">
          您的浏览器不支持播放此视频。
        </video>
      </div>
    `;
  } else if (PREVIEW_WEB_AUDIO_EXT.has(ext)) {
    pane.innerHTML = `
      <div class="preview-audio-container">
        <audio controls autoplay class="preview-audio" style="margin-bottom:10px; width: 100%;" onerror="this.parentElement.innerHTML += '${errorHint}'">
          <source src="${url}">
          您的浏览器不支持播放此音频。
        </audio>
      </div>
    `;
  }
}

function renderRichMeta(data, append = false) {
  const wrap = document.getElementById("preview-meta");
  if (!wrap) return;
  if (!append) wrap.innerHTML = "";
  
  Object.keys(data).forEach(key => {
    const val = data[key];
    if (val == null || val === "") return;
    
    // 如果是追加且已存在该 Key，则更新
    let existing = wrap.querySelector(`[data-meta-key="${key}"]`);
    if (existing) {
       existing.querySelector(".preview-meta-val").textContent = val;
    } else {
       const row = document.createElement("div");
       row.className = "preview-meta-item";
       row.dataset.metaKey = key;
       row.innerHTML = `<span class="preview-meta-key">${escapeHtml(key)}:</span><span class="preview-meta-val">${escapeHtml(val)}</span>`;
       wrap.appendChild(row);
    }
  });
}

function onPreviewMetaUpdate(payload) {
  if (Number(payload.seq) !== state.previewSeq) return;
  if (payload.meta) {
    renderRichMeta(payload.meta, true);
  }
}

function onNativePreviewFailed(payload) {
  state.iPreviewFailed = true;
  state.iPreviewActive = false;
  const pane = document.getElementById("preview-web-scroll");
  if (!pane) return;
  const msg = payload.message ? String(payload.message) : "系统原生预览不可用。";
  stopNativePreview();
  setPreviewLayoutMode("web");
  pane.innerHTML = "<div class=\"preview-empty\">" + escapeHtml(msg) + "<br><br>建议点击 QuickLook 按钮或按空格预览。</div>";
  
  const qlBtn = document.getElementById("preview-ql-btn");
  if (qlBtn) qlBtn.classList.add("btn-highlight");
}

function invokeIPreviewHandler() {
  if (!state.previewPath) return;
  state.iPreviewActive = true;
  state.iPreviewFailed = false; // 重试
  const b = collectPreviewBounds();
  postToAhk({ 
    type: "INVOKE_IPREVIEW", 
    path: state.previewPath, 
    seq: state.previewSeq,
    bounds: b 
  });
}

let previewHostRo = null;
function ensurePreviewHostObserver() {
  const host = document.getElementById("preview-host");
  if (!host || previewHostRo) return;
  previewHostRo = new ResizeObserver(() => {
    if (!state.previewPath) return;
    const ext = pathExtensionLower(state.previewPath);
    if (PREVIEW_TEXT_EXT.has(ext) || PREVIEW_IMAGE_EXT.has(ext)) return;
    
    // 如果 IPreviewHandler 激活中，同步 Bounds
    if (state.iPreviewActive) {
      const b = collectPreviewBounds();
      postToAhk({ type: "NATIVE_PREVIEW", path: state.previewPath, seq: state.previewSeq, bounds: b });
    }
  });
  previewHostRo.observe(host);
}

function renderPreview() {
  ensurePreviewHostObserver();
  scheduleRunPreview();
}

function buildSkeletonListHtml(count) {
  let html = "<div class=\"skeleton-list\" aria-hidden=\"true\">";
  for (let i = 0; i < count; i += 1) {
    html += "<div class=\"skeleton-item\"><div><div class=\"sk-line w1\"></div><div class=\"sk-line w2\"></div><div class=\"sk-line w3\"></div></div><div class=\"sk-meta\"></div></div>";
  }
  html += "</div>";
  return html;
}

function syncRecycleBadge() {
  const badge = document.getElementById("recycle-badge");
  if (!badge) return;
  const n = Number(state.recycleCount) || 0;
  badge.textContent = String(n);
  badge.classList.toggle("muted", n < 1);
}

function renderRecycleModalList() {
  const list = document.getElementById("recycle-list");
  if (!list) return;
  const rows = state.recycleBin || [];
  if (!rows.length) {
    list.innerHTML = "<div class=\"empty\" style=\"min-height:100px\">暂无已移除项。在结果行使用「回收」命令可将条目暂存于此。</div>";
    return;
  }
  list.innerHTML = "";
  rows.forEach((it) => {
    const wrap = document.createElement("div");
    wrap.className = "recycle-row";
    const idx = Number(it.index) || 0;
    wrap.innerHTML =
      "<div><div class=\"t\">" + escapeHtml(it.title || "（无标题）") + "</div>" +
      "<div class=\"p\">" + escapeHtml(it.preview || "") + "</div></div>";
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "btn ghost";
    btn.textContent = "还原";
    btn.onclick = () => postToAhk({ type: "searchCenterRestoreRecycle", index: idx });
    wrap.appendChild(btn);
    list.appendChild(wrap);
  });
}

function openRecycleModal() {
  const ov = document.getElementById("recycle-overlay");
  if (!ov) return;
  renderRecycleModalList();
  ov.classList.add("open");
  ov.setAttribute("aria-hidden", "false");
}

function closeRecycleModal() {
  const ov = document.getElementById("recycle-overlay");
  if (!ov) return;
  ov.classList.remove("open");
  ov.setAttribute("aria-hidden", "true");
}

function applyState(payload) {
  state.keyword = payload.keyword || "";
  state.limit = payload.limit || 50;
  state.categories = payload.categories || [];
  state.currentCategoryKey = payload.currentCategoryKey || "ai";
  state.engines = payload.engines || [];
  state.selectedEngines = payload.selectedEngines || [];
  state.filters = payload.filters || [];
  state.filterType = payload.filterType || "";
  state.results = payload.results || [];
  state.hasMore = !!payload.hasMore;
  state.loading = false;
  state.isCliCategory = !!payload.isCliCategory;
  state.statusLine = payload.statusLine || "";
  state.recycleBin = Array.isArray(payload.recycleBin) ? payload.recycleBin : [];
  state.recycleCount = typeof payload.recycleCount === "number" ? payload.recycleCount : state.recycleBin.length;

  const wasSelected = state.selectedRow;
  if (!state.results.some((item) => item.row == wasSelected)) {
    state.selectedRow = state.results.length ? state.results[0].row : 1;
  }

  document.getElementById("search").value = state.keyword;
  document.getElementById("limit").value = String(state.limit);
  document.getElementById("status").textContent = state.statusLine || "已同步";
  document.getElementById("result-count").textContent = String(state.results.length) + " 条";
  document.getElementById("btn-run").textContent = "搜索";
  document.getElementById("btn-open-cli").style.display = state.isCliCategory ? "inline-flex" : "none";
  syncFooterHint();
  syncRecycleBadge();
  if (document.getElementById("recycle-overlay") && document.getElementById("recycle-overlay").classList.contains("open")) {
    renderRecycleModalList();
  }

  renderCategories();
  renderEngines();
  renderFilters();
  renderResults();
  requestAnimationFrame(() => {
    window.dispatchEvent(new Event("resize"));
  });
}

let searchDebounceTimer = 0;
function triggerSearch() {
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    postToAhk({ type: "search", keyword: state.keyword });
  }, 400);
}

let loadMoreObserver = null;
function disconnectLoadMoreObserver() {
  if (loadMoreObserver) {
    loadMoreObserver.disconnect();
    loadMoreObserver = null;
  }
}

function requestLoadMore() {
  if (!state.hasMore || state.loading) return;
  if (Date.now() < state.loadMoreCooldownUntil) return;
  state.loading = true;
  state.loadMoreCooldownUntil = Date.now() + 350;
  postToAhk({ type: "loadMore", offset: state.results.length });
}

function setupLoadMoreObserver() {
  const list = document.getElementById("result-list");
  const sent = document.getElementById("load-sentinel");
  if (!list || !sent || !state.hasMore) return;
  loadMoreObserver = new IntersectionObserver((entries) => {
    const e = entries[0];
    if (!e || !e.isIntersecting) return;
    requestLoadMore();
  }, { root: list, rootMargin: "0px 0px 320px 0px", threshold: 0 });
  loadMoreObserver.observe(sent);
}

document.getElementById("search").addEventListener("input", (event) => {
  state.keyword = event.target.value;
  triggerSearch();
});

document.getElementById("limit").addEventListener("change", (event) => {
  postToAhk({ type: "setLimit", limit: Number(event.target.value) || 50 });
});

document.getElementById("btn-run").addEventListener("click", () => {
  const keyword = document.getElementById("search").value;
  postToAhk({ type: "search", keyword });
});

document.getElementById("btn-web-search").addEventListener("click", () => {
  postToAhk({ type: "webSearch" });
});

document.getElementById("btn-open-cli").addEventListener("click", () => {
  postToAhk({ type: "cliOpen" });
});

const btnScRecycle = document.getElementById("btn-sc-recycle");
if (btnScRecycle) {
  btnScRecycle.addEventListener("click", () => openRecycleModal());
}
const btnWinRecycleSc = document.getElementById("btn-win-recycle-sc");
if (btnWinRecycleSc) {
  btnWinRecycleSc.addEventListener("click", () => postToAhk({ type: "openWindowsRecycleBin" }));
}
const recycleClose = document.getElementById("recycle-close");
if (recycleClose) {
  recycleClose.addEventListener("click", () => closeRecycleModal());
}
const recycleEmptyAll = document.getElementById("recycle-empty-all");
if (recycleEmptyAll) {
  recycleEmptyAll.addEventListener("click", () => {
    if (!state.recycleCount) return;
    if (!window.confirm("清空搜索中心回收站？已移除的条目将无法从此处还原。")) return;
    postToAhk({ type: "searchCenterEmptyRecycle" });
  });
}
const recycleOverlay = document.getElementById("recycle-overlay");
if (recycleOverlay) {
  recycleOverlay.addEventListener("click", (e) => {
    if (e.target === recycleOverlay) closeRecycleModal();
  });
}
const previewQlBtn = document.getElementById("preview-ql-btn");
if (previewQlBtn) {
  previewQlBtn.addEventListener("click", () => {
    if (!state.previewPath) return;
    postToAhk({ type: "QUICKLOOK", path: state.previewPath });
  });
}
const previewNativeBtn = document.getElementById("preview-native-btn");
if (previewNativeBtn) {
  previewNativeBtn.addEventListener("click", () => {
    invokeIPreviewHandler();
  });
}

const chromeCloseBtn = document.getElementById("chrome-close");
const chromeMinimizeBtn = document.getElementById("chrome-minimize");
const chromeMaximizeBtn = document.getElementById("chrome-maximize");
if (chromeMinimizeBtn) {
  chromeMinimizeBtn.addEventListener("click", () => {
    postToAhk({ type: "windowMinimize" });
  });
}
if (chromeMaximizeBtn) {
  chromeMaximizeBtn.addEventListener("click", () => {
    postToAhk({ type: "windowToggleMaximize" });
  });
}
if (chromeCloseBtn) {
  chromeCloseBtn.addEventListener("click", () => {
    postToAhk({ type: "close" });
  });
}

(function initChromeDrag() {
  const dragHost = document.getElementById("chrome-header");
  const dragTitle = document.getElementById("chrome-drag");
  const startHostDrag = (e) => {
    if (e.target && e.target.closest(".chrome-btn")) return;
    if (e.button !== 0) return;
    e.preventDefault();
    postToAhk({ type: "dragHost" });
  };
  const bindDragStart = (el) => {
    if (!el) return;
    if (window.PointerEvent) {
      el.addEventListener("pointerdown", startHostDrag);
    } else {
      el.addEventListener("mousedown", startHostDrag);
    }
  };
  bindDragStart(dragHost);
  if (dragTitle && dragTitle !== dragHost) bindDragStart(dragTitle);
})();

document.addEventListener("keydown", (event) => {
  if (event.key === "CapsLock") {
    beginCapsHoldHint();
  } else if (state.capsHintActive) {
    const pressed = normalizeHintKey(event.key);
    if (pressed) setCapsPressedKey(pressed);
  }

  const activeTag = document.activeElement ? document.activeElement.tagName : "";
  const isTyping = activeTag === "INPUT" || activeTag === "TEXTAREA" || activeTag === "SELECT";

  if (event.key === "Escape") {
    event.preventDefault();
    postToAhk({ type: "close" });
    return;
  }

  if (event.key === "Enter" && document.activeElement && document.activeElement.id === "search") {
    event.preventDefault();
    const keyword = document.getElementById("search").value;
    postToAhk({ type: "search", keyword });
    return;
  }

  if (isTyping) return;

  if (event.key === " ") {
    event.preventDefault();
    if (state.previewPath) {
      postToAhk({ type: "QUICKLOOK", path: state.previewPath });
    }
    return;
  }

  if (event.key === "ArrowDown" && state.results.length) {
    event.preventDefault();
    const current = state.results.findIndex((item) => item.row === state.selectedRow);
    const next = Math.min(state.results.length - 1, Math.max(0, current + 1));
    state.selectedRow = state.results[next].row;
    renderResults();
  }

  if (event.key === "ArrowUp" && state.results.length) {
    event.preventDefault();
    const current = state.results.findIndex((item) => item.row === state.selectedRow);
    const next = Math.max(0, (current < 0 ? 0 : current) - 1);
    state.selectedRow = state.results[next].row;
    renderResults();
  }

  if (event.key === "Enter" && state.results.length) {
    event.preventDefault();
    const selItem = state.results.find(x => x.row === state.selectedRow);
    if (selItem && (selItem.type === "history" || selItem.type === "History") && state.keyword === "") {
        postToAhk({ type: "set_input", keyword: selItem.title });
        postToAhk({ type: "search", keyword: selItem.title });
    } else {
        postToAhk({ type: "activateResult", row: state.selectedRow });
    }
  }
});

document.addEventListener("keyup", (event) => {
  if (event.key === "CapsLock") {
    endCapsHoldHint();
    return;
  }
  if (!state.capsHintActive) return;
  const released = normalizeHintKey(event.key);
  if (released && state.capsPressedKey === released) {
    state.capsPressedKey = "";
    updateHotkeyHighlights();
  }
});

window.addEventListener("resize", () => {
  scheduleRunPreview();
});

window.addEventListener("blur", () => {
  endCapsHoldHint();
});

document.addEventListener("visibilitychange", () => {
  if (document.hidden) endCapsHoldHint();
});

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener("message", (event) => {
    const payload = event.data;
    if (!payload || !payload.type) return;
    if (payload.type === "capsHint") {
      setCapsHintActive(!!payload.active);
      return;
    }
    if (payload.type === "capsHintPress") {
      flashCapsPressedKey(payload.key || "");
      return;
    }
    if (payload.type === "setCategory") {
      postToAhk({ type: "setCategory", category: payload.category || "" });
      return;
    }
    if (payload.type === "toggleEngine") {
      postToAhk({ type: "toggleEngine", engine: payload.engine || "" });
      return;
    }
    if (payload.type === "setFilter") {
      postToAhk({ type: "setFilter", filterType: payload.filterType || "" });
      return;
    }
    if (payload.type === "setLimit") {
      postToAhk({ type: "setLimit", limit: Number(payload.limit) || 50 });
      return;
    }
    if (payload.type === "activateResult") {
      postToAhk({ type: "activateResult", row: Number(payload.row) || state.selectedRow || 1 });
      return;
    }
    if (payload.type === "focus_input") {
      const input = document.getElementById("search");
      if (input) input.focus();
      return;
    }
    if (payload.type === "set_input") {
      const input = document.getElementById("search");
      if (input) {
        state.keyword = payload.keyword || "";
        input.value = state.keyword;
        input.focus();
        input.select();
      }
      return;
    }
    if (payload.type === "WEB_PREVIEW_TEXT_RESULT") {
      onWebPreviewTextResult(payload);
      return;
    }
    if (payload.type === "WEB_PREVIEW_IMAGE_RESULT") {
      onWebPreviewImageResult(payload);
    }
    if (payload.type === "WEB_PREVIEW_MEDIA_RESULT") {
      onWebPreviewMediaResult(payload);
    }
    if (payload.type === "INVOKE_IPREVIEW_HANDLER") {
      onNativePreviewFailed(payload);
      return;
    }
    if (payload.type === "PREVIEW_META_UPDATE") {
      onPreviewMetaUpdate(payload);
      return;
    }
    if (payload.type === "init" || payload.type === "state") {
      applyState(payload);
    }
  });
  postToAhk({ type: "ready" });
}
</script>
