<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>牛马云</title>
<style>
:root{
  --line:#263246;
  --text:#eef3ff;
  --muted:#8ea0bf;
  --ok:#37d67a;
  --bg1:#0d1016;
  --bg2:#1a2f4a;
}
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;
  background:radial-gradient(1200px 600px at 80% -10%,var(--bg2) 0%,var(--bg1) 58%);
  color:var(--text);
  font:14px/1.45 "Segoe UI","Microsoft YaHei UI","Microsoft YaHei",sans-serif;
}
body{display:flex;flex-direction:column}
input,button,select{
  height:36px;border-radius:10px;border:1px solid var(--line);
  background:#171f2d;color:var(--text);
}
input,select{padding:0 10px;outline:none}
button{padding:0 14px;cursor:pointer;font-weight:600}
button:hover{border-color:#3a4961}
button.primary{background:linear-gradient(180deg,#ff963f,#ff7a21);color:#121212;border-color:#ff8d37}
button.ghost{background:#151d2b}
.compact-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(10,15,22,.86)
}
.compact-actions{display:flex;gap:8px;align-items:center}
.settings-drawer{max-height:0;overflow:hidden;transition:max-height .24s ease;border-bottom:1px solid transparent}
.settings-drawer.open{max-height:560px;border-bottom-color:var(--line)}
.adv-head{padding:8px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:rgba(8,12,18,.6)}

.top{
  display:grid;
  grid-template-columns:1.2fr 1.4fr auto auto;
  gap:10px;padding:12px;border-bottom:1px solid var(--line);
  background:rgba(10,15,22,.82);backdrop-filter:blur(8px);
}
.wrap{display:flex;flex-direction:column;min-width:0}
.lab{font-size:11px;color:var(--muted);margin-bottom:5px}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:#9da9bb}
.dot.ok{background:var(--ok);box-shadow:0 0 10px rgba(55,214,122,.55)}

.providers{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(8,12,18,.7)}
.pbtn{height:34px;padding:0 12px;border-radius:999px;border:1px solid #32445f;background:#132033;color:#cfe2ff;display:inline-flex;align-items:center;gap:8px}
.pbtn:hover{border-color:#4c6283}
.pbtn.active{border-color:#ff9d4f;background:linear-gradient(180deg,#ff8f35,#ff7420);color:#111}
.provider-ico{width:18px;height:18px;object-fit:contain;flex:none}
.provider-label{line-height:1}
.provider-dot{width:8px;height:8px;border-radius:50%;background:#8f9db3;box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;flex:none}
.provider-dot.online{background:#37d67a;box-shadow:0 0 8px rgba(55,214,122,.55)}
.bind-toggle{margin-left:auto;border-style:dashed}

.quick-import{
  display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(8,12,18,.55);
}
.hint{font-size:12px;color:var(--muted);padding:0 2px 2px}
.quick-import .hint{grid-column:1 / span 2;margin:0}
.mini-toggle{display:inline-flex;align-items:center;gap:6px;padding:0 6px;font-size:12px;color:var(--muted)}
.mini-toggle input{height:14px;width:14px}

.adv-panel{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(7,11,18,.75);
}
.adv-item{display:flex;flex-direction:column;gap:4px}
.adv-item label{font-size:11px;color:var(--muted)}
.adv-item.full{grid-column:1 / span 3}

.pmap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
.pmap .row{display:flex;align-items:center;gap:8px}
.pmap .row span{min-width:74px;color:var(--muted);font-size:12px}
.pmap .row input{flex:1;height:32px}

.main{flex:1;min-height:0;min-width:0;display:grid;grid-template-columns:minmax(260px,380px) minmax(0,1fr);gap:12px;padding:12px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));border-radius:14px;min-height:0;min-width:0}
.left{display:flex;flex-direction:column;min-height:0}
.pathbar{padding:10px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
.pathbar .navbtn{min-width:74px;padding:0 10px}
.path-search-wrap{flex:1;display:flex;align-items:center;gap:8px;padding:0 10px;height:36px;border:1px solid var(--line);border-radius:10px;background:#111a27}
.path-search-wrap .mag{width:16px;height:16px;color:#ff9d4f;opacity:.95;flex:none}
.path-search-wrap input{flex:1;height:30px;border:none;background:transparent;padding:0;color:#b9c9e3}
.path-search-wrap input::placeholder{color:#7f93b5}
.path-search-wrap input:focus{outline:none}
.list{flex:1;overflow:auto;padding:8px}
.left-status{padding:8px 10px;border-top:1px solid var(--line)}
.item{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;padding:9px 8px;border-radius:10px;border:1px solid transparent}
.item:hover{background:rgba(255,255,255,.03);border-color:#26364f}
.item.active{border-color:#3c5475;background:rgba(86,136,205,.14)}
.item.selected{border-color:#486284;background:rgba(86,136,205,.22)}
.item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{color:var(--muted);font-size:12px}
.ico{display:inline-flex;align-items:center;justify-content:center;color:#b8c9e8}
.ico.dir{color:#ffd18c}
.row-provider-ico{width:16px;height:16px;object-fit:contain;display:block}
.empty{padding:16px;color:var(--muted)}
.pin{color:#ffb24c;margin-right:4px}

.right{display:flex;flex-direction:column;padding:10px;gap:10px;min-width:0}
.playbar{display:flex;gap:8px}
.playbar input{flex:1}
video{width:100%;height:100%;min-height:320px;flex:1;background:#06090f;border:1px solid #293245;border-radius:12px}
#artPlayerWrap{width:100%;height:100%;min-height:320px;flex:1;background:#06090f;border:1px solid #293245;border-radius:12px;overflow:hidden}
#docPreview{width:100%;height:100%;min-height:320px;flex:1;background:#0a0f18;border:1px solid #293245;border-radius:12px;overflow:auto;padding:14px;line-height:1.7}
#docPreview h1,#docPreview h2,#docPreview h3{color:#f5f7ff;margin:12px 0 8px}
#docPreview p,#docPreview li,#docPreview span,#docPreview td,#docPreview th{color:#d8e2f4}
#webEmbed{
  width:100%;height:100%;min-height:320px;flex:1;background:#06090f;
  border:1px solid #293245;border-radius:12px;overflow:hidden;
}
.resume-toast{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  background:linear-gradient(168deg,rgba(48,26,12,.94),rgba(20,12,8,.96));border:1px solid rgba(255,140,72,.5);color:#fff2e8;
  border-radius:12px;padding:12px 16px;font-size:13px;z-index:5000;
  box-shadow:0 16px 40px rgba(0,0,0,.45),0 0 24px rgba(255,120,40,.12);
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.resume-toast.show{opacity:1}
.player-mode{display:flex;gap:8px}
.mode-btn.active{border-color:#ff9d4f;background:linear-gradient(180deg,#ff8f35,#ff7420);color:#111}

.modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(8,4,2,.68);backdrop-filter:blur(5px);z-index:2000;
}
.modal.open{display:flex}
.modal-card{
  width:min(980px,92vw);height:min(760px,90vh);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  background:linear-gradient(168deg,rgba(52,28,12,.97) 0%,rgba(24,14,8,.98) 50%,rgba(14,9,6,.99) 100%);
  border:1px solid rgba(255,130,60,.55);
  box-shadow:0 22px 52px rgba(0,0,0,.55),0 0 0 1px rgba(255,170,96,.12) inset,0 0 36px rgba(255,100,40,.1);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;
  border-bottom:1px solid rgba(255,140,72,.38);background:rgba(40,22,10,.55);
}
.modal-head-left{display:flex;align-items:center;gap:10px;min-width:0}
.modal-provider-ico{width:24px;height:24px;object-fit:contain;flex:none}
.modal-title{font-weight:700;color:#ffd8bc}
.modal-hint{font-size:12px;color:rgba(255,220,190,.72)}
.modal-body{flex:1;min-height:0;background:linear-gradient(180deg,rgba(18,10,6,.92) 0%,rgba(10,6,4,.96) 100%)}
.modal-body iframe{width:100%;height:100%;border:0}
.guide-panel{padding:16px;display:flex;flex-direction:column;gap:12px;height:100%;overflow:auto}
.guide-panel .hint{color:rgba(255,200,170,.65)}
.guide-steps{margin:0;padding-left:18px;color:rgba(255,214,186,.78);line-height:1.6}
.guide-row{display:flex;gap:8px;align-items:center}
.guide-row input{flex:1;border-color:rgba(255,140,72,.4);background:rgba(10,6,4,.88);color:#fff4eb}

.cp-dialog-text{margin:0 0 12px;font-size:13px;line-height:1.55;color:rgba(255,230,210,.88);white-space:pre-wrap;word-break:break-word}

.ctx-menu{
  position:fixed;z-index:4000;display:none;min-width:186px;max-width:min(92vw,320px);max-height:min(72vh,520px);
  overflow-x:hidden;overflow-y:auto;padding:6px;border-radius:12px;
  background:linear-gradient(165deg,rgba(58,32,14,.97) 0%,rgba(28,16,8,.98) 48%,rgba(18,12,8,.98) 100%);
  border:1px solid rgba(255,140,64,.55);
  box-shadow:0 14px 36px rgba(0,0,0,.48),0 0 0 1px rgba(255,160,80,.12) inset,0 0 28px rgba(255,120,40,.12);
  -webkit-overflow-scrolling:touch;
}
.ctx-menu.open{display:block}
.ctx-item{
  width:100%;height:34px;border-radius:8px;border:1px solid transparent;background:transparent;
  color:#fff0e6;text-align:left;padding:0 12px;cursor:pointer;font-weight:500;
}
.ctx-item:hover{
  background:linear-gradient(180deg,rgba(255,145,64,.22),rgba(255,120,48,.14));
  border-color:rgba(255,150,88,.42);color:#fffcf8;
}
.ctx-item:disabled{
  opacity:.45;
  cursor:not-allowed;
  pointer-events:none;
  color:rgba(255,230,210,.55);
}

.mkdir-modal{position:fixed;inset:0;z-index:4100;display:none;align-items:center;justify-content:center;padding:18px;box-sizing:border-box}
.mkdir-modal.open{display:flex}
.mkdir-modal-backdrop{position:absolute;inset:0;background:rgba(8,5,3,.72);backdrop-filter:blur(4px)}
.mkdir-modal-card{
  position:relative;width:min(100%,360px);border-radius:14px;padding:18px 18px 16px;
  background:linear-gradient(168deg,rgba(52,28,12,.98) 0%,rgba(22,12,6,.99) 55%,rgba(14,9,6,.99) 100%);
  border:1px solid rgba(255,130,60,.55);
  box-shadow:0 22px 48px rgba(0,0,0,.55),0 0 0 1px rgba(255,170,96,.14) inset,0 0 32px rgba(255,100,40,.12);
}
.mkdir-modal-title{font-weight:700;font-size:15px;color:#ffd8bc;margin:0 0 12px;letter-spacing:.02em}
.mkdir-modal .mkdir-inp{width:100%;height:40px;border-radius:10px;border:1px solid rgba(255,140,72,.45);
  background:rgba(10,6,4,.92);color:#fff6ee;padding:0 12px;outline:none;box-sizing:border-box}
.mkdir-modal .mkdir-inp:focus{border-color:#ff963f;box-shadow:0 0 0 2px rgba(255,140,64,.2)}
.mkdir-modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.mkdir-modal-actions button{min-width:88px}

#cpDialogModal .mkdir-modal-card{max-width:min(100%,420px)}

@media (max-width:1300px){
  .top{grid-template-columns:1fr 1fr}
  .quick-import{grid-template-columns:1fr}
  .quick-import .hint{grid-column:1 / span 1}
  .adv-panel{grid-template-columns:1fr 1fr}
  .adv-item.full{grid-column:1 / span 2}
}
@media (max-width:1100px){
  .pmap,.adv-panel,.main{grid-template-columns:1fr}
  .adv-item.full{grid-column:1}
}
.hidden{display:none !important}
</style>
</head>
<body>
  <div class="compact-head">
    <div class="compact-actions">
      <button id="btnSettingsDrawer" class="ghost">设置</button>
    </div>
  </div>
  <div class="providers">
    <button id="btnRoot" class="pbtn"><span class="provider-dot" data-provider-dot></span><span id="providerLabelRoot" class="provider-label">主页</span></button>
    <button id="btnAli" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/aliyun.png" alt=""><span id="providerLabelAli" class="provider-label">阿里云盘</span></button>
    <button id="btnBaidu" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/baiduyun.png" alt=""><span id="providerLabelBaidu" class="provider-label">Baidu</span></button>
    <button id="btnQuark" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/kuake.png" alt=""><span id="providerLabelQuark" class="provider-label">Quark</span></button>
    <button id="btn115" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/115.png" alt=""><span id="providerLabel115" class="provider-label">115</span></button>
    <button id="btn123" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/123.png" alt=""><span id="providerLabel123" class="provider-label">123</span></button>
    <button id="btnOneDrive" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/OneDrive.png" alt=""><span id="providerLabelOneDrive" class="provider-label">OneDrive</span></button>
    <button id="btnDropbox" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/dropbox.png" alt=""><span id="providerLabelDropbox" class="provider-label">Dropbox</span></button>
  </div>

  <div class="quick-import">
    <input id="aliRefreshToken" class="hidden" placeholder="粘贴阿里云 refresh_token">
    <input id="aliMountPath" class="hidden" value="/aliyun" placeholder="/aliyun">
    <button id="btnSmartLogin" class="primary">智能登录</button>
    <p id="importHint" class="hint">新手提示：点击“智能登录”，在浏览器完成登录后复制令牌，云播放器会自动填充并导入。</p>
  </div>

  <div id="settingsDrawer" class="settings-drawer">
    <div class="adv-head">高级设置</div>
    <div class="top">
      <div class="wrap"><div class="lab">OpenList API</div><input id="apiBase" value="http://127.0.0.1:5244"></div>
      <div class="wrap hidden"><div class="lab">令牌（可选）</div><input id="token" placeholder="鉴权令牌"></div>
      <button id="btnDashboard" class="ghost">OpenList 管理页</button>
      <button id="btnRestart" class="primary">重启 OpenList</button>
    </div>

    <div id="advPanel" class="adv-panel">
      <div class="adv-item"><label for="advRootFolderId">根目录 ID</label><input id="advRootFolderId" value="root"></div>
      <div class="adv-item"><label for="advDriveType">盘类型</label><select id="advDriveType"><option value="default">default</option><option value="resource">resource</option><option value="backup">backup</option></select></div>
      <div class="adv-item"><label for="advAlipanType">阿里盘类型</label><select id="advAlipanType"><option value="default">default</option><option value="alipanTV">alipanTV</option></select></div>
      <div class="adv-item"><label for="advUseOnlineApi">使用在线 API</label><select id="advUseOnlineApi"><option value="true">true</option><option value="false">false</option></select></div>
      <div class="adv-item"><label for="advClientId">Client ID</label><input id="advClientId" value=""></div>
      <div class="adv-item"><label for="advClientSecret">Client Secret</label><input id="advClientSecret" value=""></div>
      <div class="adv-item full"><label for="advApiUrlAddress">API URL Address</label><input id="advApiUrlAddress" value="https://api.oplist.org/alicloud/renewapi"></div>
    </div>

    <input id="mountAli" class="hidden" value="/aliyun">
    <input id="mountBaidu" class="hidden" value="/baidu">
    <input id="mountQuark" class="hidden" value="/quark">
    <input id="mount115" class="hidden" value="/pan115">
    <input id="mount123" class="hidden" value="/pan123">
    <input id="mountOneDrive" class="hidden" value="/onedrive">
    <input id="mountDropbox" class="hidden" value="/dropbox">
    <input id="mountYandex" class="hidden" value="/yandex">
    <input id="mountGDrive" class="hidden" value="/gdrive">
  </div>

  <div class="main">
    <div class="card left">
      <div class="pathbar">
        <button id="btnBack" class="navbtn ghost" title="后退">后退</button>
        <button id="btnForward" class="navbtn ghost" title="前进">前进</button>
        <button id="btnUp" class="navbtn ghost" title="上级目录">上级目录</button>
        <input id="pathInput" class="hidden" value="/">
        <button id="btnLoad" class="hidden">加载</button>
        <label class="path-search-wrap" for="pathSearchInput">
          <svg class="mag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
          <input id="pathSearchInput" placeholder="路径 | 搜索关键词（回车可跳转路径）" value="/">
        </label>
        <button id="btnSearchClear" class="ghost">清空</button>
      </div>
      <div id="fileList" class="list"></div>
      <div class="left-status"><div id="currentInfo" class="hint">未选择文件。</div></div>
    </div>
    <div class="card right">
      <div class="playbar"><input id="manualUrl" placeholder="粘贴视频 URL（支持直链 / B站 / YouTube）"><button id="btnPlayUrl">播放 URL</button><div class="player-mode"><button id="btnModeNative" class="ghost mode-btn active">原生</button><button id="btnModeArt" class="ghost mode-btn">ArtPlayer</button></div></div>
      <video id="video" controls playsinline preload="metadata"></video>
      <div id="artPlayerWrap" class="hidden"></div>
      <div id="docPreview" class="hidden"></div>
      <iframe id="webEmbed" class="hidden" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      <div class="hint">导入成功后，点击上方云盘标签浏览文件夹。</div>
    </div>
  </div>

  <div id="scanModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-head-left"><img id="guideProviderIcon" class="modal-provider-ico" src="lib/images/aliyun.png" alt=""><div><div class="modal-title">智能登录指引</div><div class="modal-hint">在浏览器登录后，复制 refresh_token 再粘贴到下方。</div></div></div>
        <div style="display:flex;gap:8px"><button id="btnCloseScan" class="primary">关闭</button></div>
      </div>
      <div class="modal-body">
        <div class="guide-panel">
          <ol class="guide-steps">
            <li id="guideStep1">点击<b>打开登录页</b>并在浏览器完成云盘登录。</li>
            <li id="guideStep2">登录成功后，复制 <code>refresh_token</code> 文本。</li>
            <li id="guideStep3">将令牌粘贴到下方输入框，再点击 <b>立即导入</b>。</li>
          </ol>
          <div class="guide-row">
            <input id="guideTokenInput" placeholder="在此粘贴 refresh_token">
            <button id="btnGuideImport" class="primary">立即导入</button>
          </div>
          <div class="hint">提示：令牌会保存在本地，下次可自动复用。</div>
        </div>
      </div>
    </div>
  </div>

  <div id="ctxMenu" class="ctx-menu">
    <button class="ctx-item" data-act="copy">复制</button>
    <button class="ctx-item" data-act="paste">粘贴</button>
    <button class="ctx-item" data-act="mkdir">新建文件夹</button>
    <button class="ctx-item" data-act="delete">删除</button>
    <button class="ctx-item" data-act="download">下载</button>
    <button class="ctx-item" data-act="rename">重命名</button>
    <button class="ctx-item" data-act="move">移动</button>
    <button class="ctx-item" data-act="playview">播放/查看</button>
    <button class="ctx-item" data-act="info">信息</button>
    <button class="ctx-item" data-act="pin">置顶/取消置顶</button>
  </div>
  <div id="mkdirModal" class="mkdir-modal" aria-hidden="true">
    <div class="mkdir-modal-backdrop" role="presentation"></div>
    <div class="mkdir-modal-card" role="dialog" aria-modal="true" aria-labelledby="mkdirModalTitle">
      <div id="mkdirModalTitle" class="mkdir-modal-title">新建文件夹</div>
      <input id="mkdirInput" class="mkdir-inp" type="text" autocomplete="off" maxlength="255">
      <div class="mkdir-modal-actions">
        <button type="button" class="ghost" id="mkdirCancel">取消</button>
        <button type="button" class="primary" id="mkdirOk">创建</button>
      </div>
    </div>
  </div>
  <div id="cpDialogModal" class="mkdir-modal" aria-hidden="true">
    <div class="mkdir-modal-backdrop" role="presentation"></div>
    <div class="mkdir-modal-card" role="dialog" aria-modal="true" aria-labelledby="cpDialogTitle">
      <div id="cpDialogTitle" class="mkdir-modal-title"></div>

    var right = parts.length > 1 ? String(parts.slice(1).join("|") || "").trim() : "";
    var path = left && left.charAt(0) === "/" ? normPath(left) : "";
    var query = left && left.charAt(0) !== "/" ? left : right;
    return { path:path, query:String(query || "").trim() };
  }

  function getProviderMountPath(providerKey){
    var key = normalizeProviderKey(providerKey);
    var m = providerMap[key] || providerMap.ali;
    var p = (m.mountId && $(m.mountId)) ? $(m.mountId).value : (m.defaultPath || "/");
    return normPath(p);
  }
  function setProviderMountPath(providerKey, path){
    var key = normalizeProviderKey(providerKey);
    var m = providerMap[key] || providerMap.ali;
    var p = normPath(path || m.defaultPath || "/");
    if(m.mountId && $(m.mountId)) $(m.mountId).value = p;
    if(key === "ali" && $("aliMountPath")) $("aliMountPath").value = p;
    return p;

  function findMountOwnerByPath(path, excludeProviderKey){
    var p = normPath(path || "/");
    var ex = excludeProviderKey ? normalizeProviderKey(excludeProviderKey) : "";
    var keys = Object.keys(providerMap);
    for(var i=0;i<keys.length;i++){
      var k = keys[i];
      if(ex && k === ex) continue;
      if(getProviderMountPath(k) === p) return k;
    }
    return "";
  }
  function providerKeyForFsPath(fsPath){
    var p = normPath(fsPath || "/");
    if(p === "/") return "";
    var best = "";
    var bestLen = -1;
    var keys = Object.keys(providerMap);
    for(var i=0;i<keys.length;i++){
      var k = keys[i];
      var m = normPath(getProviderMountPath(k));
      if(m.length <= 1 || m === "/") continue;
      if(p === m || p.indexOf(m + "/") === 0){
        if(m.length > bestLen){
          bestLen = m.length;
          best = k;
        }
      }
    }
    return best;
  }
  function ctxMenuMkdirSupported(){

      if(sp && providerMap[sp]) key = sp;
    }
    if(!key) return true;
    var m = providerMap[key];
    return !(m && m.mkdirSupported === false);
  }

  async function resolveProviderLoginUrl(providerKey){

      return "";
    }

      buildNoCacheUrl(base + (base.indexOf("?")>=0?"&":"?") + "server_use=true&driver_txt=quarkyun_fn"),
      buildNoCacheUrl(base + (base.indexOf("?")>=0?"&":"?") + "server_use=true&driver_txt=quarkyun_oa"),
      buildNoCacheUrl(base + (base.indexOf("?")>=0?"&":"?") + "server_use=true&driver_txt=quarkyun")
    ];

      var ret = await httpViaHost("GET", urls[i], { "Accept":"application/json" });

    }

    try{
      var fallbackBody = JSON.stringify({
        authType: 4,
        grantType: "authorization_code",
        redirectUrlToFrontend: String(m.loginUrl || "https://api.oplist.org/quarkyun/callback"),
        trimAppId: "com.trim.cloudstorage"
      });
      var ret2 = await httpViaHost("POST", "https://oauth.fnnas.com/api/v1/oauth/getAuthUrl", {
        "Accept":"application/json",
        "Content-Type":"application/json"
      }, fallbackBody);
      if(ret2 && ret2.ok){
        var body2 = String(ret2.body || "").trim();
        var j2 = JSON.parse(body2 || "{}");
        var u2 = String((((j2||{}).data||{}).authUrlWithNonce) || "").trim();

        if(j2 && typeof j2.msg === "string" && j2.msg) lastSmartLoginError = j2.msg;
      }
    }catch(_){}
    if(!lastSmartLoginError) lastSmartLoginError = "Failed to fetch Quark authorization URL from /quarkyun/requests.";
    return "";
  }

  async function httpViaHost(method, url, headers, body){
    var m = String(method || "GET");

    var hs = headers || {};
    var b = body==null?"":String(body);
    var bridgeTimeoutMs = 1500;
    var bridgeAvailable = !!(window.chrome && window.chrome.webview && window.chrome.webview.hostObjects && window.chrome.webview.hostObjects.ahk);
    if(bridgeAvailable){
      var bridgePromise = (async function(){
        try{
          var raw = await window.chrome.webview.hostObjects.ahk.HttpRequest(m, u, JSON.stringify(hs), b);
          var parsed = JSON.parse(String(raw||"{}"));
          parsed.channel = "bridge";
          return parsed;
        }catch(e){
          return { ok:false, status:0, body:"", error:e && e.message ? e.message : "bridge request failed", channel:"bridge" };
        }
      })();
      var raceRet = await Promise.race([
        bridgePromise,
        new Promise(function(resolve){
          setTimeout(function(){ resolve({ __timeout:true }); }, bridgeTimeoutMs);
        })
      ]);
      if(!(raceRet && raceRet.__timeout)){
        logNet(m + " " + u + " -> bridge", { status:raceRet.status||0, ok:!!raceRet.ok });
        return raceRet;
      }
      logNet(m + " " + u + " -> bridge timeout, fallback fetch", { timeoutMs:bridgeTimeoutMs });
    }
    try{
      var r = await fetch(u, { method: m, headers: hs, body: body || undefined });
      var ret = { ok:r.ok, status:r.status, body:await r.text(), error:"", channel:"fetch" };
      logNet(m + " " + u + " -> fetch", { status:ret.status, ok:ret.ok });
      return ret;
    }catch(e){
      var errRet = { ok:false, status:0, body:"", error:e && e.message ? e.message : "fetch failed", channel:"fetch" };
      logNet(m + " " + u + " -> fetch failed", { error:errRet.error });
      return errRet;
    }
  }

  async function checkOpenList(opts){
    opts = opts || {};

    state.apiBase = normalizeApiBase($("apiBase").value);
    $("apiBase").value = state.apiBase;
    state.token = $("token").value.trim();
    if (!opts.skipInitialPending) setStatus(false);

    // Ask host process to ping OpenList as primary path (more reliable in WebView).
    postHost("cloudplayer_ping_openlist", { apiBase: state.apiBase });

    // Also do a direct probe with timeout as fallback.
    var timeoutMs = 4500;
    var timedOut = false;
    var res = await Promise.race([
      httpViaHost("GET", state.apiBase + "/", getHeaders(false), ""),
      new Promise(function(resolve){
        setTimeout(function(){
          timedOut = true;
          resolve({ ok:false, status:0, body:"", error:"timeout" });
        }, timeoutMs);
      })
    ]);
    if (seq !== checkSeq) return false;

    // If host already replied for this check cycle, trust host status and avoid flip-flop.
    if (lastHostStatusAt > hostStatusBefore) {
      setStatus(lastHostStatusOnline);
      return lastHostStatusOnline;
    }

    var ok = !!(res.status >= 200 && res.status < 600);
    if (ok) {
      setStatus(true);
      return true;
    }
    if (timedOut) {
      setStatus(false);
    } else {
      setStatus(false);
    }
    return false;
  }

  function isHttpUrl(url){
    return /^https?:\/\//i.test(String(url || "").trim());
  }
  function normalizeInputUrl(raw){
    var s = String(raw || "").trim();
    if(!s) return "";
    if(/^https?:\/\//i.test(s)) return s;
    if(/^\/\//.test(s)) return "https:" + s;
    if(/^(www\.)/i.test(s)) return "https://" + s;
    if(/^(m\.)/i.test(s)) return "https://" + s;
    if(/^(youtu\.be|youtube\.com|m\.youtube\.com|bilibili\.com|www\.bilibili\.com|m\.bilibili\.com|b23\.tv|bili2233\.cn)\b/i.test(s))
      return "https://" + s;
    return s;
  }
  function parseTimeSeconds(v){
    var s = String(v || "").trim().toLowerCase();
    if(!s) return 0;
    if(/^\d+$/.test(s)) return Math.max(0, parseInt(s, 10) || 0);
    var total = 0, m;
    m = s.match(/(\d+)h/); if(m) total += (parseInt(m[1], 10) || 0) * 3600;
    m = s.match(/(\d+)m/); if(m) total += (parseInt(m[1], 10) || 0) * 60;
    m = s.match(/(\d+)s/); if(m) total += (parseInt(m[1], 10) || 0);
    return Math.max(0, total);
  }
  function isLikelyYoutubeHost(host){

  function isLikelyBiliHost(host){

  }
  function resolveWebEmbedFromUrl(raw){
    var normalized = normalizeInputUrl(raw);
    if(!isHttpUrl(normalized)) return null;
    var u;
    try{ u = new URL(normalized); }catch(_){ return null; }
    var host = String(u.hostname || "").toLowerCase();
    var path = String(u.pathname || "");
    var m = null;
    if(isLikelyYoutubeHost(host)){
      var vid = "";
      if(host === "youtu.be"){
        vid = (path.split("/").filter(Boolean)[0] || "").trim();
      }else{
        vid = (u.searchParams.get("v") || "").trim();
        if(!vid){ m = path.match(/\/shorts\/([^/?#]+)/i); if(m) vid = m[1]; }
        if(!vid){ m = path.match(/\/embed\/([^/?#]+)/i); if(m) vid = m[1]; }
        if(!vid){ m = path.match(/\/live\/([^/?#]+)/i); if(m) vid = m[1]; }
        if(!vid){ m = path.match(/\/v\/([^/?#]+)/i); if(m) vid = m[1]; }
      }
      vid = String(vid || "").replace(/[^\w-]/g, "");
      if(vid){
        var sec = parseTimeSeconds(u.searchParams.get("t") || u.searchParams.get("start"));
        var q = ["autoplay=1","rel=0","modestbranding=1"];
        if(sec > 0) q.push("start=" + sec);
        return { type:"youtube", title:"YouTube", embedUrl:"https://www.youtube.com/embed/" + encodeURIComponent(vid) + "?" + q.join("&"), originalUrl:normalized };
      }
    }
    if(isLikelyBiliHost(host)){
      if(host === "player.bilibili.com" && /\/player\.html$/i.test(path)){
        var p = new URLSearchParams(u.search);
        if(!p.get("autoplay")) p.set("autoplay", "1");
        return { type:"bilibili", title:"Bilibili", embedUrl:"https://player.bilibili.com/player.html?" + p.toString(), originalUrl:normalized };
      }
      m = path.match(/\/video\/(BV[0-9A-Za-z]+)/i);
      if(m && m[1]){
        var bv = m[1];
        var page = Math.max(1, parseInt(u.searchParams.get("p") || "1", 10) || 1);
        return { type:"bilibili", title:"Bilibili", embedUrl:"https://player.bilibili.com/player.html?bvid=" + encodeURIComponent(bv) + "&page=" + page + "&autoplay=1&high_quality=1&danmaku=0", originalUrl:normalized };
      }
      m = path.match(/\/video\/av(\d+)/i);
      if(m && m[1]){
        var aid = m[1];
        var page2 = Math.max(1, parseInt(u.searchParams.get("p") || "1", 10) || 1);
        return { type:"bilibili", title:"Bilibili", embedUrl:"https://player.bilibili.com/player.html?aid=" + encodeURIComponent(aid) + "&page=" + page2 + "&autoplay=1&high_quality=1&danmaku=0", originalUrl:normalized };
      }
      m = path.match(/\/bangumi\/play\/ep(\d+)/i);
      if(m && m[1]){
        return { type:"bilibili", title:"Bilibili", embedUrl:"https://player.bilibili.com/player.html?ep_id=" + encodeURIComponent(m[1]) + "&autoplay=1&high_quality=1&danmaku=0", originalUrl:normalized };
      }
      if(host.indexOf("b23.tv") >= 0 || host.indexOf("bili2233.cn") >= 0){
        m = path.match(/\/(BV[0-9A-Za-z]+)/i);
        if(m && m[1]){
          return { type:"bilibili", title:"Bilibili", embedUrl:"https://player.bilibili.com/player.html?bvid=" + encodeURIComponent(m[1]) + "&page=1&autoplay=1&high_quality=1&danmaku=0", originalUrl:normalized };
        }
      }
    }
    return null;
  }
  async function resolveWebEmbedSmart(raw){
    var normalized = normalizeInputUrl(raw);
    var direct = resolveWebEmbedFromUrl(normalized);
    if(direct) return direct;
    var u;
    try{ u = new URL(normalized); }catch(_){ return null; }
    var host = String(u.hostname || "").toLowerCase();
    if(!(host.indexOf("b23.tv") >= 0 || host.indexOf("bili2233.cn") >= 0)) return null;
    var ret = await httpViaHost("GET", normalized, { "Accept":"text/html,*/*;q=0.9" }, "");
    var cands = [
      ret && ret.finalUrl,
      ret && ret.url,
      ret && ret.responseUrl,
      ret && ret.final_url,
      ret && ret.redirectedUrl,
      ret && ret.location
    ];
    for(var i=0;i<cands.length;i++){
      var one = String(cands[i] || "").trim();
      if(!one) continue;
      var got = resolveWebEmbedFromUrl(one);
      if(got) return got;
    }
    var body = String((ret && ret.body) || "");
    if(body){
      var m = body.match(/https?:\/\/(?:www\.)?bilibili\.com\/video\/BV[0-9A-Za-z]+(?:[^\s"'<>]*)/i);
      if(m && m[0]){

      var m2 = body.match(/https?:\/\/(?:www\.)?youtube\.com\/watch\?v=[A-Za-z0-9_-]{11}(?:[^\s"'<>]*)/i);

        var got3 = resolveWebEmbedFromUrl(m2[0]);
        if(got3) return got3;
      }
    }
    return null;
  }
  /**
   * 选路策略：网盘/存储直链优先，本机 OpenList 的 /d/ 仅作垫后；不做开播前多路 Range 探测，避免
   * 首包 TTFB 总偏向 127.0.0.1 且与 <video> 首帧抢带宽。失败时由 onPlaybackError 按 candidates 切下一跳。
   */
  async function getOptimalUrl(fullPath, fileData){
    var d = fileData || {};
    var h = (d && d.header && typeof d.header === "object") ? d.header : {};
    var sign = String((d && (d.sign || (d.content && d.content.sign))) || "").trim();
    var ordered = [];
    var seen = {};
    var push = function(u, source, headers, direct){
      var url = String(u || "").trim();
      if(!url) return;
      if(!isHttpUrl(url)) return;
      if(/\/@manage(?:[/?#]|$)/i.test(url)) return;
      if(seen[url]) return;
      seen[url] = 1;
      ordered.push({ url:url, source:String(source||""), headers:(headers && typeof headers==="object") ? headers : {}, direct: !!direct });
    };
    if(d && typeof d.raw_url === "string" && isHttpUrl(d.raw_url)) push(d.raw_url, "raw_url", h, true);
    if(d && typeof d.url === "string" && isHttpUrl(d.url)) push(d.url, "url", h, true);
    if(d && d.content && typeof d.content.url === "string" && isHttpUrl(d.content.url)) push(d.content.url, "content.url", h, true);
    var proxyUrl = makeDirectDUrl(fullPath, sign);
    push(proxyUrl, "/d proxy", {}, false);
    if(!ordered.length) return { primary:{ url:"", source:"none", headers:{} }, candidates:[], debug:{ reason:"no_candidate" } };
    var p = ordered[0] || { url:"", source:"none", headers:{} };
    logNet("optimal url selected", { source:p.source, url:p.url, strategy:"direct_first", probe:false });
    return { primary:p, candidates:ordered, debug:{ strategy:"direct_first", noPreProbe:true } };
  }
  async function fetchWithRange(url, options){
    options = options || {};
    var u = String(url || "").trim();
    if(!u) throw new Error("empty url");
    var method = options.method || "GET";
    var baseHeaders = (options.headers && typeof options.headers === "object") ? Object.assign({}, options.headers) : {};
    var tryRangeFirst = !!options.tryRangeFirst;
    var doFetch = async function(withRange){
      var hs = Object.assign({}, baseHeaders);
      if(withRange) hs["Range"] = hs["Range"] || "bytes=0-";
      var resp = await fetch(u, { method: method, headers: hs, body: options.body || undefined });
      var rangeHit = !!(resp && (resp.status === 206 || String(resp.headers.get("content-range")||"").trim() !== "" || String(resp.headers.get("accept-ranges")||"").toLowerCase().indexOf("bytes") >= 0));
      logNet(method + " " + u + " -> fetchWithRange", { usedRange:withRange, status:resp.status, rangeResponse:rangeHit });
      return resp;
    };
    var res = null;
    if(tryRangeFirst){
      try{
        res = await doFetch(true);
        if(res && (res.ok || res.status === 206)) return res;
      }catch(_){}
    }
    res = await doFetch(false);
    if((!res.ok || res.status >= 400) && !tryRangeFirst){
      try{
        var res2 = await doFetch(true);
        if(res2 && (res2.ok || res2.status === 206)) return res2;
      }catch(_){}
    }
    return res;
  }

      if(parsedPayload.clientId && !String(options.clientId||"").trim()) options.clientId = parsedPayload.clientId;
      if(parsedPayload.clientSecret && !String(options.clientSecret||"").trim()) options.clientSecret = parsedPayload.clientSecret;
      if(options.clientId) $("advClientId").value = options.clientId;
      if(options.clientSecret) $("advClientSecret").value = options.clientSecret;
      if(options.clientId && options.clientSecret){
        importDriver = "QuarkOpen";
      }
    }
    var mountPath = getProviderMountPath(providerKey);
    var conflictProvider = findMountOwnerByPath(mountPath, providerKey);
    if(conflictProvider){
      if(providerKey === "ali"){
        mountPath = setProviderMountPath("ali", m.defaultPath || "/aliyun");
        saveSettings();
        text($("importHint"), "Ali mount path conflicted with " + (providerMap[conflictProvider].label || conflictProvider) + ". Auto-reset to " + mountPath + " and continuing import.");
      }else{
        text($("importHint"), "Mount path " + mountPath + " is already used by " + (providerMap[conflictProvider].label || conflictProvider) + ". Please use a different path.");
        return;
      }
    }
    if(!token){ text($("importHint"), "Please paste " + m.label + " " + m.tokenLabel + " first."); return; }
    if(aliImportBusy){ text($("importHint"), "Import already running, please wait..."); return; }
    var online = !!lastHostStatusOnline;
    if(!online){
      var hostBefore = lastHostStatusAt;
      postHost("cloudplayer_ping_openlist", { apiBase: normalizeApiBase($("apiBase").value) });
      var hostRet = await waitForHostStatus(1400, hostBefore);
      if (hostRet !== null) online = !!hostRet;
    }
    if(!online){
      online = await checkOpenList();
    }
    if(!online){
      text($("importHint"), tr("openlist_offline"));
      return;
    }
    $("aliRefreshToken").value = token;
    if($("guideTokenInput")) $("guideTokenInput").value = token;
    setProviderToken(providerKey, token);
    setProviderMountPath(providerKey, mountPath);
    saveSettings();
    setAliImportBusy(true);
    markAliImportProgress(tr("importing_provider", { provider:m.label }));
    startAliImportWatchdog();
    startAliImportHardTimeout();
    postHost("cloudplayer_import_storage", { provider:providerKey, driver:importDriver, token:token, mountPath:mountPath, options:options });
  }
  async function mountPathReachable(path){
    var p = normPath(path || "/");
    var ret = await apiPost("/api/fs/list", { path:p, password:"", page:1, per_page:1, refresh:false });
    return !!(ret && ret.json && ret.json.code === 200);
  }
  async function autoEnterCloudDrive(){
    if(autoBootDone) return;
    autoBootDone = true;
    var rt = getProviderToken(state.provider);
    var m = providerMap[state.provider] || providerMap.ali;
    var mp = normPath((m.mountId && $(m.mountId)) ? $(m.mountId).value : m.defaultPath || "/");
    if(rt){
      markProvider(state.provider);
      var ok = await mountPathReachable(mp);
      if(ok){
        text($("importHint"), "Detected saved " + m.label + " token. Opened " + m.label + " automatically.");
        await loadList(mp, false, { fromHistory:true });
      }else{
        text($("importHint"), tr("detected_saved_token_importing", { provider:m.label }));
        await doProviderImport(state.provider);
      }
      return;
    }
    openProvider("root");
  }

    $("ctxMenu").querySelectorAll(".ctx-item").forEach(function(btn){

    $("fileList").addEventListener("contextmenu", function(e){

        var fullPath = decodeURIComponent(row.getAttribute("data-path")||"/");
        if(!selectedEntries[normPath(fullPath)]){

          addSelection(fullPath);
        }else{
          setSelectedPath(fullPath);

    ["mountAli","mountBaidu","mountQuark","mount115","mount123","mountOneDrive","mountDropbox","mountYandex","mountGDrive","aliMountPath","advRootFolderId","advDriveType","advAlipanType","advUseOnlineApi","advClientId","advClientSecret","advApiUrlAddress"].forEach(function(id){
      $(id).addEventListener("change", saveSettings);

  var __nmDock = null;
  function onHostMessage(evt){
    var data=evt && evt.data ? evt.data : null;
    if(!data || typeof data!=="object") return;
    if(__nmDock && typeof __nmDock.onHostMessage==="function") __nmDock.onHostMessage(data);
    if(data.type==="cloudplayer_status"){
      if(typeof data.apiBase==="string" && data.apiBase){
        var nb = normalizeApiBase(data.apiBase);
        $("apiBase").value = nb;
        state.apiBase = nb;
      }
      lastHostStatusAt = Date.now();
      lastHostStatusOnline = !!data.openListOnline;
      setStatus(lastHostStatusOnline);
      return;
    }
    if(data.type==="cloudplayer_import_result"){
      stopTokenAssist(false);
      setAliImportBusy(false);
      stopAliImportWatchdog();
      stopAliImportHardTimeout();
      if(data.ok){
        var resultProvider = normalizeProviderKey(data.provider || state.provider || "ali");
        var resultMeta = providerMap[resultProvider] || providerMap.ali;
        var mp = normPath(data.mountPath || resultMeta.defaultPath || "/");
        if((!$("token").value || !$("token").value.trim()) && data.authToken){
          $("token").value = String(data.authToken);
          state.token = String(data.authToken);
          saveSettings();
        }
        setProviderMountPath(resultProvider, mp);
        setProviderOnline(resultProvider, true);
        saveSettings();
        var successMsg = tr("import_success", { path:mp, driver:(data.driver||resultMeta.driver||"storage") });
        var detailMsg = String(data.message || "").trim();
        if(detailMsg && detailMsg.toLowerCase().indexOf("auto-migrated") >= 0){
          successMsg += " - " + detailMsg;
        }
        text($("importHint"), successMsg);
        closeScanModal();
        setSettingsDrawer(false);
        if(state.provider === resultProvider){
          openProvider(state.provider || "ali");
        }
      }else{
        if(state.provider) setProviderOnline(state.provider, false);
        text($("importHint"), tr("import_failed", { msg:(data.message||"unknown error") }));
      }
      return;
    }
    if(data.type==="cloudplayer_import_progress"){
      markAliImportProgress(data.message || tr("importing_cloud_storage"));
      return;
    }
    if(data.type==="cloudplayer_admin_token"){
      if(data.ok && data.token){
        $("token").value = String(data.token);
        state.token = String(data.token);
        saveSettings();
      }
      return;
    }
    if(data.type==="cloudplayer_download_result"){
      var msg = data.ok
        ? ("打包下载完成：" + (data.path || data.name || "zip"))
        : ("打包下载失败：" + (data.message || "unknown error"));
      text($("currentInfo"), msg);
      return;
    }
    if(data.type==="cloudplayer_download_progress"){
      var pmsg = String(data.message || "").trim();
      if(pmsg) text($("currentInfo"), pmsg);
      return;
    }
  }
  async function boot(){
    loadProviderTokens();
    loadSettings();
    loadPlaybackProgress();
    startProgressPersistence();
    if(uiLang !== "en") uiLang = "zh";
    initProviderOnline();
    applyUiLanguage();
    loadPins();
    bindEvents();
    if(window.NiumaBottomDock && typeof window.NiumaBottomDock.mount === "function"){
      __nmDock = window.NiumaBottomDock.mount({
        sceneId: "cloudplayer",
        uiScale: 1.22,
        post: function(p){ postHost(p.type || "", p); }
      });
    }
    setPlayerMode("native");
    setSettingsDrawer(false);
    if(window.chrome && window.chrome.webview) window.chrome.webview.addEventListener("message", onHostMessage);
    state.apiBase = normalizeApiBase($("apiBase").value);
    $("apiBase").value = state.apiBase;
    state.token = String($("token").value || "").trim();
    if(!providerMap[state.provider]) state.provider = "ali";
    markProvider(state.provider);
    syncGuideText();
    postHost("cloudplayer_ready", { apiBase: state.apiBase });
    await new Promise(function(r){ setTimeout(r, 80); });
    await checkOpenList({ skipInitialPending: true });
    startOpenListAutoCheck();
    await autoEnterCloudDrive();
  }
  boot();
})();
