<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>牛马云</title>
<style>
:root{
  --line:#263246;
  --text:#eef3ff;
  --muted:#8ea0bf;
  --ok:#37d67a;
  --bg1:#0d1016;
  --bg2:#1a2f4a;
}
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;
  background:radial-gradient(1200px 600px at 80% -10%,var(--bg2) 0%,var(--bg1) 58%);
  color:var(--text);
  font:14px/1.45 "Segoe UI","Microsoft YaHei UI","Microsoft YaHei",sans-serif;
}
body{display:flex;flex-direction:column}
input,button,select{
  height:36px;border-radius:10px;border:1px solid var(--line);
  background:#171f2d;color:var(--text);
}
input,select{padding:0 10px;outline:none}
button{padding:0 14px;cursor:pointer;font-weight:600}
button:hover{border-color:#3a4961}
button.primary{background:linear-gradient(180deg,#ff963f,#ff7a21);color:#121212;border-color:#ff8d37}
button.ghost{background:#151d2b}
.compact-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(10,15,22,.86)
}
.compact-actions{display:flex;gap:8px;align-items:center}
.settings-drawer{max-height:0;overflow:hidden;transition:max-height .24s ease;border-bottom:1px solid transparent}
.settings-drawer.open{max-height:560px;border-bottom-color:var(--line)}
.adv-head{padding:8px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:rgba(8,12,18,.6)}

.top{
  display:grid;
  grid-template-columns:1.2fr 1.4fr auto auto;
  gap:10px;padding:12px;border-bottom:1px solid var(--line);
  background:rgba(10,15,22,.82);backdrop-filter:blur(8px);
}
.wrap{display:flex;flex-direction:column;min-width:0}
.lab{font-size:11px;color:var(--muted);margin-bottom:5px}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:#9da9bb}
.dot.ok{background:var(--ok);box-shadow:0 0 10px rgba(55,214,122,.55)}

.providers{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(8,12,18,.7)}
.pbtn{height:34px;padding:0 12px;border-radius:999px;border:1px solid #32445f;background:#132033;color:#cfe2ff;display:inline-flex;align-items:center;gap:8px}
.pbtn:hover{border-color:#4c6283}
.pbtn.active{border-color:#ff9d4f;background:linear-gradient(180deg,#ff8f35,#ff7420);color:#111}
.provider-ico{width:18px;height:18px;object-fit:contain;flex:none}
.provider-label{line-height:1}
.provider-dot{width:8px;height:8px;border-radius:50%;background:#8f9db3;box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;flex:none}
.provider-dot.online{background:#37d67a;box-shadow:0 0 8px rgba(55,214,122,.55)}
.bind-toggle{margin-left:auto;border-style:dashed}

.quick-import{
  display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(8,12,18,.55);
}
.hint{font-size:12px;color:var(--muted);padding:0 2px 2px}
.quick-import .hint{grid-column:1 / span 2;margin:0}
.mini-toggle{display:inline-flex;align-items:center;gap:6px;padding:0 6px;font-size:12px;color:var(--muted)}
.mini-toggle input{height:14px;width:14px}

.adv-panel{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(7,11,18,.75);
}
.adv-item{display:flex;flex-direction:column;gap:4px}
.adv-item label{font-size:11px;color:var(--muted)}
.adv-item.full{grid-column:1 / span 3}

.pmap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
.pmap .row{display:flex;align-items:center;gap:8px}
.pmap .row span{min-width:74px;color:var(--muted);font-size:12px}
.pmap .row input{flex:1;height:32px}

.main{flex:1;min-height:0;display:grid;grid-template-columns:380px 1fr;gap:12px;padding:12px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));border-radius:14px;min-height:0}
.left{display:flex;flex-direction:column;min-height:0}
.pathbar{padding:10px;border-bottom:1px solid var(--line);display:flex;gap:8px}
.pathbar input{flex:1}
.pathbar .navbtn{min-width:74px;padding:0 10px}
.path-display{flex:1;display:flex;align-items:center;padding:0 10px;border:1px solid var(--line);border-radius:10px;background:#111a27;color:#b9c9e3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.searchbar{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;gap:8px}
.searchbar input{flex:1}
.list{flex:1;overflow:auto;padding:8px}
.item{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;padding:9px 8px;border-radius:10px;border:1px solid transparent}
.item:hover{background:rgba(255,255,255,.03);border-color:#26364f}
.item.active{border-color:#3c5475;background:rgba(86,136,205,.14)}
.item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{color:var(--muted);font-size:12px}
.ico{display:inline-flex;align-items:center;justify-content:center;color:#b8c9e8}
.ico.dir{color:#ffd18c}
.row-provider-ico{width:16px;height:16px;object-fit:contain;display:block}
.empty{padding:16px;color:var(--muted)}
.pin{color:#ffb24c;margin-right:4px}

.right{display:flex;flex-direction:column;padding:10px;gap:10px}
.playbar{display:flex;gap:8px}
.playbar input{flex:1}
video{width:100%;height:100%;min-height:320px;flex:1;background:#06090f;border:1px solid #293245;border-radius:12px}
#artPlayerWrap{width:100%;height:100%;min-height:320px;flex:1;background:#06090f;border:1px solid #293245;border-radius:12px;overflow:hidden}
#docPreview{width:100%;height:100%;min-height:320px;flex:1;background:#0a0f18;border:1px solid #293245;border-radius:12px;overflow:auto;padding:14px;line-height:1.7}
#docPreview h1,#docPreview h2,#docPreview h3{color:#f5f7ff;margin:12px 0 8px}
#docPreview p,#docPreview li,#docPreview span,#docPreview td,#docPreview th{color:#d8e2f4}
.resume-toast{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  background:rgba(9,14,22,.86);border:1px solid #40506b;color:#ecf3ff;
  border-radius:10px;padding:10px 14px;font-size:13px;z-index:5000;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.resume-toast.show{opacity:1}
.player-mode{display:flex;gap:8px}
.mode-btn.active{border-color:#ff9d4f;background:linear-gradient(180deg,#ff8f35,#ff7420);color:#111}

.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,6,10,.62);z-index:2000}
.modal.open{display:flex}
.modal-card{width:min(980px,92vw);height:min(760px,90vh);border:1px solid #2c3d56;border-radius:14px;background:#111826;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
.modal-head-left{display:flex;align-items:center;gap:10px;min-width:0}
.modal-provider-ico{width:24px;height:24px;object-fit:contain;flex:none}
.modal-title{font-weight:700}
.modal-hint{font-size:12px;color:var(--muted)}
.modal-body{flex:1;min-height:0;background:#0d1220}
.modal-body iframe{width:100%;height:100%;border:0}
.guide-panel{padding:16px;display:flex;flex-direction:column;gap:12px;height:100%;overflow:auto}
.guide-steps{margin:0;padding-left:18px;color:var(--muted);line-height:1.6}
.guide-row{display:flex;gap:8px;align-items:center}
.guide-row input{flex:1}

.ctx-menu{
  position:fixed;z-index:4000;display:none;min-width:180px;background:#111c2d;border:1px solid #2f425f;border-radius:10px;
  box-shadow:0 10px 28px rgba(0,0,0,.42);padding:6px;
}
.ctx-menu.open{display:block}
.ctx-item{
  width:100%;height:32px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text);
  text-align:left;padding:0 10px;cursor:pointer
}
.ctx-item:hover{background:rgba(255,255,255,.06);border-color:#354a67}

@media (max-width:1300px){
  .top{grid-template-columns:1fr 1fr}
  .quick-import{grid-template-columns:1fr}
  .quick-import .hint{grid-column:1 / span 1}
  .adv-panel{grid-template-columns:1fr 1fr}
  .adv-item.full{grid-column:1 / span 2}
}
@media (max-width:1100px){
  .pmap,.adv-panel,.main{grid-template-columns:1fr}
  .adv-item.full{grid-column:1}
}
.hidden{display:none !important}
</style>
</head>
<body>
  <div class="compact-head">
    <div class="compact-actions">
      <button id="btnSettingsDrawer" class="ghost">设置</button>
    </div>
  </div>
  <div class="providers">
    <button id="btnRoot" class="pbtn"><span class="provider-dot" data-provider-dot></span><span id="providerLabelRoot" class="provider-label">主页</span></button>
    <button id="btnAli" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/aliyun.png" alt=""><span id="providerLabelAli" class="provider-label">阿里云盘</span></button>
    <button id="btnBaidu" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/baiduyun.png" alt=""><span id="providerLabelBaidu" class="provider-label">Baidu</span></button>
    <button id="btnQuark" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/kuake.png" alt=""><span id="providerLabelQuark" class="provider-label">Quark</span></button>
    <button id="btn115" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/115.png" alt=""><span id="providerLabel115" class="provider-label">115</span></button>
    <button id="btn123" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/123.png" alt=""><span id="providerLabel123" class="provider-label">123</span></button>
    <button id="btnOneDrive" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/OneDrive.png" alt=""><span id="providerLabelOneDrive" class="provider-label">OneDrive</span></button>
    <button id="btnDropbox" class="pbtn"><span class="provider-dot" data-provider-dot></span><img class="provider-ico" src="lib/images/dropbox.png" alt=""><span id="providerLabelDropbox" class="provider-label">Dropbox</span></button>
  </div>

  <div class="quick-import">
    <input id="aliRefreshToken" class="hidden" placeholder="粘贴阿里云 refresh_token">
    <input id="aliMountPath" class="hidden" value="/aliyun" placeholder="/aliyun">
    <button id="btnSmartLogin" class="primary">智能登录</button>
    <p id="importHint" class="hint">新手提示：点击“智能登录”，在浏览器完成登录后复制令牌，云播放器会自动填充并导入。</p>
  </div>

  <div id="settingsDrawer" class="settings-drawer">
    <div class="adv-head">高级设置</div>
    <div class="top">
      <div class="wrap"><div class="lab">OpenList API</div><input id="apiBase" value="http://127.0.0.1:5244"></div>
      <div class="wrap hidden"><div class="lab">令牌（可选）</div><input id="token" placeholder="鉴权令牌"></div>
      <button id="btnDashboard" class="ghost">OpenList 管理页</button>
      <button id="btnRestart" class="primary">重启 OpenList</button>
    </div>

    <div id="advPanel" class="adv-panel">
      <div class="adv-item"><label for="advRootFolderId">根目录 ID</label><input id="advRootFolderId" value="root"></div>
      <div class="adv-item"><label for="advDriveType">盘类型</label><select id="advDriveType"><option value="default">default</option><option value="resource">resource</option><option value="backup">backup</option></select></div>
      <div class="adv-item"><label for="advAlipanType">阿里盘类型</label><select id="advAlipanType"><option value="default">default</option><option value="alipanTV">alipanTV</option></select></div>
      <div class="adv-item"><label for="advUseOnlineApi">使用在线 API</label><select id="advUseOnlineApi"><option value="true">true</option><option value="false">false</option></select></div>
      <div class="adv-item"><label for="advClientId">Client ID</label><input id="advClientId" value=""></div>
      <div class="adv-item"><label for="advClientSecret">Client Secret</label><input id="advClientSecret" value=""></div>
      <div class="adv-item full"><label for="advApiUrlAddress">API URL Address</label><input id="advApiUrlAddress" value="https://api.oplist.org/alicloud/renewapi"></div>
    </div>

    <input id="mountAli" class="hidden" value="/aliyun">
    <input id="mountBaidu" class="hidden" value="/baidu">
    <input id="mountQuark" class="hidden" value="/quark">
    <input id="mount115" class="hidden" value="/pan115">
    <input id="mount123" class="hidden" value="/pan123">
    <input id="mountOneDrive" class="hidden" value="/onedrive">
    <input id="mountDropbox" class="hidden" value="/dropbox">
    <input id="mountYandex" class="hidden" value="/yandex">
    <input id="mountGDrive" class="hidden" value="/gdrive">
  </div>

  <div class="main">
    <div class="card left">
      <div class="pathbar">
        <button id="btnBack" class="navbtn ghost" title="后退">后退</button>
        <button id="btnForward" class="navbtn ghost" title="前进">前进</button>
        <button id="btnUp" class="navbtn ghost" title="上级目录">上级目录</button>
        <input id="pathInput" class="hidden" value="/">
        <button id="btnLoad" class="hidden">加载</button>
        <div id="pathDisplay" class="path-display">/</div>
      </div>
      <div class="searchbar"><input id="searchInput" placeholder="搜索当前目录"><button id="btnSearchClear" class="ghost">清空</button></div>
      <div id="fileList" class="list"></div>
    </div>
    <div class="card right">
      <div class="playbar"><input id="manualUrl" placeholder="或粘贴直链视频 URL"><button id="btnPlayUrl">播放 URL</button><div class="player-mode"><button id="btnModeNative" class="ghost mode-btn active">原生</button><button id="btnModeArt" class="ghost mode-btn">ArtPlayer</button></div></div>
      <div id="currentInfo" class="hint">未选择文件。</div>
      <video id="video" controls playsinline preload="metadata"></video>
      <div id="artPlayerWrap" class="hidden"></div>
      <div id="docPreview" class="hidden"></div>
      <div class="hint">导入成功后，点击上方云盘标签浏览文件夹。</div>
    </div>
  </div>

  <div id="scanModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-head-left"><img id="guideProviderIcon" class="modal-provider-ico" src="lib/images/aliyun.png" alt=""><div><div class="modal-title">智能登录指引</div><div class="modal-hint">在浏览器登录后，复制 refresh_token 再粘贴到下方。</div></div></div>
        <div style="display:flex;gap:8px"><button id="btnCloseScan" class="primary">关闭</button></div>
      </div>
      <div class="modal-body">
        <div class="guide-panel">
          <ol class="guide-steps">
            <li id="guideStep1">点击<b>打开登录页</b>并在浏览器完成云盘登录。</li>
            <li id="guideStep2">登录成功后，复制 <code>refresh_token</code> 文本。</li>
            <li id="guideStep3">将令牌粘贴到下方输入框，再点击 <b>立即导入</b>。</li>
          </ol>
          <div class="guide-row">
            <input id="guideTokenInput" placeholder="在此粘贴 refresh_token">
            <button id="btnGuideImport" class="primary">立即导入</button>
          </div>
          <div class="hint">提示：令牌会保存在本地，下次可自动复用。</div>
        </div>
      </div>
    </div>
  </div>

  <div id="ctxMenu" class="ctx-menu">
    <button class="ctx-item" data-act="copy">复制</button>
    <button class="ctx-item" data-act="paste">粘贴</button>
    <button class="ctx-item" data-act="delete">删除</button>
    <button class="ctx-item" data-act="download">下载</button>
    <button class="ctx-item" data-act="rename">重命名</button>
    <button class="ctx-item" data-act="move">移动</button>
    <button class="ctx-item" data-act="playview">播放/查看</button>
    <button class="ctx-item" data-act="info">信息</button>
    <button class="ctx-item" data-act="pin">置顶/取消置顶</button>
  </div>
  <div id="resumeToast" class="resume-toast">已为您恢复至上次播放位置</div>

<script src="https://unpkg.com/artplayer@5.2.3/dist/artplayer.js"></script>

  async function httpViaHost(method, url, headers, body){
    var m = String(method || "GET");
    var u = String(url || "");
    var hs = headers || {};
    var b = body==null?"":String(body);
    var bridgeTimeoutMs = 1500;
    var bridgeAvailable = !!(window.chrome && window.chrome.webview && window.chrome.webview.hostObjects && window.chrome.webview.hostObjects.ahk);
    if(bridgeAvailable){
      var bridgePromise = (async function(){
        try{
          var raw = await window.chrome.webview.hostObjects.ahk.HttpRequest(m, u, JSON.stringify(hs), b);
          var parsed = JSON.parse(String(raw||"{}"));
          parsed.channel = "bridge";
          return parsed;
        }catch(e){
          return { ok:false, status:0, body:"", error:e && e.message ? e.message : "bridge request failed", channel:"bridge" };
        }
      })();
      var raceRet = await Promise.race([
        bridgePromise,
        new Promise(function(resolve){
          setTimeout(function(){ resolve({ __timeout:true }); }, bridgeTimeoutMs);
        })
      ]);
      if(!(raceRet && raceRet.__timeout)){
        logNet(m + " " + u + " -> bridge", { status:raceRet.status||0, ok:!!raceRet.ok });
        return raceRet;
      }
      logNet(m + " " + u + " -> bridge timeout, fallback fetch", { timeoutMs:bridgeTimeoutMs });
    }
    try{
      var r = await fetch(u, { method: m, headers: hs, body: body || undefined });
      var ret = { ok:r.ok, status:r.status, body:await r.text(), error:"", channel:"fetch" };
      logNet(m + " " + u + " -> fetch", { status:ret.status, ok:ret.ok });
      return ret;
    }catch(e){
      var errRet = { ok:false, status:0, body:"", error:e && e.message ? e.message : "fetch failed", channel:"fetch" };
      logNet(m + " " + u + " -> fetch failed", { error:errRet.error });
      return errRet;
    }
  }

  async function checkOpenList(opts){

    // Ask host process to ping OpenList as primary path (more reliable in WebView).
    postHost("cloudplayer_ping_openlist", { apiBase: state.apiBase });

    // Also do a direct probe with timeout as fallback.
    var timeoutMs = 4500;
    var timedOut = false;
    var res = await Promise.race([
      httpViaHost("GET", state.apiBase + "/", getHeaders(false), ""),
      new Promise(function(resolve){
        setTimeout(function(){
          timedOut = true;
          resolve({ ok:false, status:0, body:"", error:"timeout" });
        }, timeoutMs);
      })
    ]);
    if (seq !== checkSeq) return false;

    // If host already replied for this check cycle, trust host status and avoid flip-flop.
    if (lastHostStatusAt > hostStatusBefore) {
      setStatus(lastHostStatusOnline);
      return lastHostStatusOnline;
    }

    var ok = !!(res.status >= 200 && res.status < 600);
    if (ok) {

  async function probeCandidateLatency(candidate, timeoutMs){
    var c = candidate || {};
    var u = String(c.url || "").trim();
    if(!u) return { ok:false, latency:999999, range:false };
    timeoutMs = Math.max(300, Number(timeoutMs || 1200));
    var controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var timer = 0;
    var started = Date.now();
    try{
      if(controller){
        timer = setTimeout(function(){ try{ controller.abort(); }catch(_){} }, timeoutMs);
      }
      var hs = (c.headers && typeof c.headers === "object") ? Object.assign({}, c.headers) : {};
      hs["Range"] = hs["Range"] || "bytes=0-";
      var r = await fetch(u, {
        method:"GET",
        headers: hs,
        signal: controller ? controller.signal : undefined
      });
      var latency = Date.now() - started;
      var rangeHit = !!(r && (r.status === 206 || String(r.headers.get("content-range")||"").trim() !== "" || String(r.headers.get("accept-ranges")||"").toLowerCase().indexOf("bytes") >= 0));
      logNet("probe " + u, { status:r.status, latencyMs:latency, rangeResponse:rangeHit });
      if(!r || !r.ok) return { ok:false, latency:latency, range:rangeHit };
      return { ok:true, latency:latency, range:rangeHit };
    }catch(e){
      return { ok:false, latency:Date.now() - started, range:false, error:e && e.message ? e.message : "probe failed" };
    }finally{
      if(timer) clearTimeout(timer);
    }

  async function getOptimalUrl(fullPath, fileData){
    var d = fileData || {};
    var h = (d && d.header && typeof d.header === "object") ? d.header : {};
    var candidates = [];
    var seen = {};
    var pushCandidate = function(u, source, headers, direct){
      var url = String(u || "").trim();
      if(!url) return;
      if(!isHttpUrl(url)) return;
      if(seen[url]) return;
      seen[url] = 1;
      candidates.push({ url:url, source:String(source||""), headers:(headers && typeof headers==="object") ? headers : {}, direct: !!direct });
    };
    var proxyUrl = makeDirectDUrl(fullPath);
    pushCandidate(proxyUrl, "/d proxy", {}, false);
    if(d && typeof d.raw_url === "string" && isHttpUrl(d.raw_url)) pushCandidate(d.raw_url, "raw_url", h, true);
    if(d && typeof d.url === "string" && isHttpUrl(d.url)) pushCandidate(d.url, "url", h, true);
    if(d && d.content && typeof d.content.url === "string" && isHttpUrl(d.content.url)) pushCandidate(d.content.url, "content.url", h, true);
    if(!candidates.length) return { primary:{ url:"", source:"none", headers:{} }, candidates:[], debug:{ reason:"no_candidate" } };

    var probes = await Promise.all(candidates.map(function(c){
      return probeCandidateLatency(c, 1200);
    }));
    var bestIdx = -1;
    var bestLatency = 999999;
    for(var i=0;i<probes.length;i++){
      if(!probes[i] || !probes[i].ok) continue;
      if(probes[i].latency < bestLatency){
        bestLatency = probes[i].latency;
        bestIdx = i;
      }
    }
    if(bestIdx < 0){
      // Fallback order: validated raw_url first, then /d proxy.
      var rawFirst = candidates.findIndex(function(c){ return c.source === "raw_url"; });
      bestIdx = rawFirst >= 0 ? rawFirst : 0;
    }
    var ordered = [candidates[bestIdx]].concat(candidates.filter(function(_, idx){ return idx !== bestIdx; }));
    var p = ordered[0] || { url:"", source:"none", headers:{} };
    logNet("optimal url selected", { source:p.source, url:p.url, probeBestMs:bestLatency });
    return { primary:p, candidates:ordered, debug:{ bestLatencyMs:bestLatency, bestIndex:bestIdx } };
  }
  async function fetchWithRange(url, options){
    options = options || {};
    var u = String(url || "").trim();
    if(!u) throw new Error("empty url");
    var method = options.method || "GET";
    var baseHeaders = (options.headers && typeof options.headers === "object") ? Object.assign({}, options.headers) : {};
    var tryRangeFirst = !!options.tryRangeFirst;
    var doFetch = async function(withRange){
      var hs = Object.assign({}, baseHeaders);
      if(withRange) hs["Range"] = hs["Range"] || "bytes=0-";
      var resp = await fetch(u, { method: method, headers: hs, body: options.body || undefined });

      logNet(method + " " + u + " -> fetchWithRange", { usedRange:withRange, status:resp.status, rangeResponse:rangeHit });
      return resp;
    };
    var res = null;
    if(tryRangeFirst){
      try{
        res = await doFetch(true);
        if(res && (res.ok || res.status === 206)) return res;
      }catch(_){}
    }
    res = await doFetch(false);
    if((!res.ok || res.status >= 400) && !tryRangeFirst){

    }

      };

        if(done) return;
        done = true;
        try{ if(window.chrome && window.chrome.webview) window.chrome.webview.removeEventListener("message", handler); }catch(_){ }

  async function playEntry(entry){

    if(isOfficeDocPath(entry.path)){
      var okPreview = await previewOfficeEntry(entry);
      if(okPreview) return;
    }
    text($("currentInfo"), "Resolving stream URL: " + entry.path);
    var link = await resolveFileUrl(entry.path);
    if(!link || !link.url){ text($("currentInfo"), "Failed to resolve stream URL."); return; }
    lastPlayCandidates = Array.isArray(link.candidates) ? link.candidates : [{ url:link.url, source:link.source||"", headers:(link.headers||{}) }];
    lastPlayCandidateIndex = 0;
    lastPlayPath = entry.path;
    lastPlaySourceUrl = lastPlayCandidates[0].url;
    lastPlayHeaders = (lastPlayCandidates[0].headers && typeof lastPlayCandidates[0].headers === "object") ? lastPlayCandidates[0].headers : {};
    resumeAppliedForId = "";
    playUrl(lastPlaySourceUrl, entry.path);

  async function doProviderImport(providerKey){
    stopTokenAssist(false);
    providerKey = normalizeProviderKey(providerKey || state.provider);
    var m = providerMap[providerKey] || providerMap.ali;
    var rawToken = String($("aliRefreshToken").value||"").trim();
    var token=extractProviderToken(providerKey, rawToken);
    var parsedPayload = parseSmartLoginPayload(rawToken);
    var importDriver = m.driver;
    var options = getAliImportOptions();
    if(providerKey === "quark"){
      if(parsedPayload.clientId && !String(options.clientId||"").trim()) options.clientId = parsedPayload.clientId;
      if(parsedPayload.clientSecret && !String(options.clientSecret||"").trim()) options.clientSecret = parsedPayload.clientSecret;
      if(options.clientId) $("advClientId").value = options.clientId;
      if(options.clientSecret) $("advClientSecret").value = options.clientSecret;
      if(options.clientId && options.clientSecret){
        importDriver = "QuarkOpen";
      }
    }
    var mountPath = getProviderMountPath(providerKey);
    var conflictProvider = findMountOwnerByPath(mountPath, providerKey);
    if(conflictProvider){
      if(providerKey === "ali"){
        mountPath = setProviderMountPath("ali", m.defaultPath || "/aliyun");
        saveSettings();
        text($("importHint"), "Ali mount path conflicted with " + (providerMap[conflictProvider].label || conflictProvider) + ". Auto-reset to " + mountPath + " and continuing import.");
      }else{
        text($("importHint"), "Mount path " + mountPath + " is already used by " + (providerMap[conflictProvider].label || conflictProvider) + ". Please use a different path.");
        return;
      }
    }
    if(!token){ text($("importHint"), "Please paste " + m.label + " " + m.tokenLabel + " first."); return; }
    if(aliImportBusy){ text($("importHint"), "Import already running, please wait..."); return; }
    var online = !!lastHostStatusOnline;
    if(!online){
      var hostBefore = lastHostStatusAt;
      postHost("cloudplayer_ping_openlist", { apiBase: normalizeApiBase($("apiBase").value) });
      var hostRet = await waitForHostStatus(1400, hostBefore);
      if (hostRet !== null) online = !!hostRet;
    }
    if(!online){
      online = await checkOpenList();
    }
    if(!online){
      text($("importHint"), tr("openlist_offline"));
      return;
    }
    $("aliRefreshToken").value = token;
    if($("guideTokenInput")) $("guideTokenInput").value = token;
    setProviderToken(providerKey, token);
    setProviderMountPath(providerKey, mountPath);
    saveSettings();
    setAliImportBusy(true);
    markAliImportProgress(tr("importing_provider", { provider:m.label }));
    startAliImportWatchdog();
    startAliImportHardTimeout();
    postHost("cloudplayer_import_storage", { provider:providerKey, driver:importDriver, token:token, mountPath:mountPath, options:options });
  }

  function onHostMessage(evt){
    var data=evt && evt.data ? evt.data : null;
    if(!data || typeof data!=="object") return;
    if(data.type==="cloudplayer_status"){
      if(typeof data.apiBase==="string" && data.apiBase) $("apiBase").value=normalizeApiBase(data.apiBase);
      lastHostStatusAt = Date.now();
      lastHostStatusOnline = !!data.openListOnline;
      setStatus(lastHostStatusOnline);
      return;
    }
    if(data.type==="cloudplayer_import_result"){
      stopTokenAssist(false);
      setAliImportBusy(false);
      stopAliImportWatchdog();
      stopAliImportHardTimeout();
      if(data.ok){
        var resultProvider = normalizeProviderKey(data.provider || state.provider || "ali");
        var resultMeta = providerMap[resultProvider] || providerMap.ali;
        var mp = normPath(data.mountPath || resultMeta.defaultPath || "/");
        if((!$("token").value || !$("token").value.trim()) && data.authToken){
          $("token").value = String(data.authToken);
          state.token = String(data.authToken);
          saveSettings();
        }
        setProviderMountPath(resultProvider, mp);
        setProviderOnline(resultProvider, true);
        saveSettings();
        var successMsg = tr("import_success", { path:mp, driver:(data.driver||resultMeta.driver||"storage") });
        var detailMsg = String(data.message || "").trim();
        if(detailMsg && detailMsg.toLowerCase().indexOf("auto-migrated") >= 0){
          successMsg += " - " + detailMsg;
        }
        text($("importHint"), successMsg);
        closeScanModal();
        setSettingsDrawer(false);
        if(state.provider === resultProvider){
          openProvider(state.provider || "ali");
        }
      }else{
        if(state.provider) setProviderOnline(state.provider, false);
        text($("importHint"), tr("import_failed", { msg:(data.message||"unknown error") }));
      }
      return;
    }
    if(data.type==="cloudplayer_import_progress"){
      markAliImportProgress(data.message || tr("importing_cloud_storage"));
      return;
    }
    if(data.type==="cloudplayer_admin_token"){
      if(data.ok && data.token){
        $("token").value = String(data.token);
        state.token = String(data.token);
        saveSettings();
      }
      return;
    }
  }

    setSettingsDrawer(false);
    if(window.chrome && window.chrome.webview) window.chrome.webview.addEventListener("message", onHostMessage);
    state.apiBase = normalizeApiBase($("apiBase").value);
    $("apiBase").value = state.apiBase;
    state.token = String($("token").value || "").trim();
    if(!providerMap[state.provider]) state.provider = "ali";
    markProvider(state.provider);
    syncGuideText();
    postHost("cloudplayer_ready", { apiBase: state.apiBase });
    await new Promise(function(r){ setTimeout(r, 80); });
    await checkOpenList({ skipInitialPending: true });
    startOpenListAutoCheck();
    await autoEnterCloudDrive();
  }
  boot();
})();
</script>
</body>
</html>
