                cap.textContent = i18n[currentLang]['demo-search-1'];
                const text = "Python Asyncio";
                for(let c of text) { input.textContent += c; await new Promise(r => setTimeout(r, 80)); }
                await new Promise(r => setTimeout(r, 400));
                document.getElementById('eng-1')?.classList.add('engine-selected'); document.getElementById('eng-2')?.classList.add('engine-selected');
                cap.textContent = i18n[currentLang]['demo-search-2'];
                await new Promise(r => setTimeout(r, 600));
                panel.style.transform = "scale(0.8)"; panel.style.opacity = "0"; win.classList.remove('translate-y-full');
                ['DeepSeek', 'Google'].forEach(t => tabs.innerHTML += `<div class="bg-gray-50 dark:bg-[#3C3C3C] px-2 text-[8px] h-4 rounded-t flex items-center border-x border-t border-gray-200 dark:border-niu-border text-gray-900 dark:text-gray-100 animate-pulse">${t}</div>`);
                await new Promise(r => setTimeout(r, 3000));
            }
        }

        async function runScreenshotDemo() {
            const stage = document.getElementById('screenshot-demo-stage');
            const ov = document.getElementById('ss-ov'), box = document.getElementById('ss-box'), btn = document.getElementById('ss-btn'), cap = document.getElementById('screenshot-demo-caption');
            
            function updateScreenshotPanel() {
                const btnText = currentLang === 'zh' ? '绮樿创鍒?Cursor' : 'Paste to Cursor';
                if (stage) {
                    stage.innerHTML = `<div class="flex-1 p-4 grid grid-cols-2 gap-2 opacity-30"><div class="bg-gray-200 dark:bg-gray-800 h-10 rounded"></div><div class="bg-gray-200 dark:bg-gray-800 h-10 rounded"></div><div class="bg-gray-200 dark:bg-gray-800 h-20 rounded col-span-2"></div></div><div id="ss-ov" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity"></div><div id="ss-box" class="absolute border-2 border-white dark:border-gray-300 opacity-0 transition-all duration-1000"></div><div id="ss-btn" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-niu-accent text-white px-4 py-2 rounded-lg text-xs opacity-0 scale-75 transition-all shadow-xl font-bold flex items-center gap-1"><i data-lucide="clipboard" class="w-3 h-3"></i> ${btnText}</div>`;
                    lucide.createIcons();
                }
            }
            
            updateScreenshotPanel();
            
            let lastLang = currentLang;
            while(true) {
                // 濡傛灉璇█鏀瑰彉锛屾洿鏂伴潰鏉?                if (lastLang !== currentLang) {
                    lastLang = currentLang;
                    updateScreenshotPanel();
                    await new Promise(r => setTimeout(r, 100));
                }
                const ov = document.getElementById('ss-ov'), box = document.getElementById('ss-box'), btn = document.getElementById('ss-btn');
                if (!ov || !box || !btn) {
                    updateScreenshotPanel();
                    await new Promise(r => setTimeout(r, 100));
                    continue;
                }
                ov.style.opacity = "0"; box.style.opacity = "0"; btn.style.opacity = "0"; btn.style.transform = "scale(0.75)";
                cap.textContent = i18n[currentLang]['demo-screenshot-1']; await new Promise(r => setTimeout(r, 1200));
                ov.style.opacity = "1"; cap.textContent = i18n[currentLang]['demo-screenshot-2']; await new Promise(r => setTimeout(r, 400));
                box.style.opacity = "1"; box.style.top = "20%"; box.style.left = "20%"; box.style.width = "60%"; box.style.height = "40%";
                await new Promise(r => setTimeout(r, 1200));
                ov.style.opacity = "0"; box.style.opacity = "0"; btn.style.opacity = "1"; btn.style.transform = "scale(1)";
                cap.textContent = i18n[currentLang]['demo-screenshot-3']; await new Promise(r => setTimeout(r, 3000));
            }
        }

        // 瀛樺偍鍔ㄧ敾鍑芥暟寮曠敤浠ヤ究閲嶆柊鍚姩
        let clipboardDemoRunning = false;
        let searchDemoRunning = false;
        let screenshotDemoRunning = false;

        function startDemos() {
            if (!clipboardDemoRunning) {
                clipboardDemoRunning = true;
                runClipboardDemo();
            }
            if (!searchDemoRunning) {
                searchDemoRunning = true;
                runSearchDemo();
            }
            if (!screenshotDemoRunning) {
                screenshotDemoRunning = true;
                runScreenshotDemo();
            }
        }

        updateUI();
        startDemos();
    </script>
</body>
</html>
